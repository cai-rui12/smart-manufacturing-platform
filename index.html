<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能制造组管理平台 V5</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#3370ff;--bl:#e8f0ff;--bd:#2b5ce6;--bg:#f5f6f7;--w:#fff;--t:#1f2329;--t2:#646a73;--t3:#8f959e;--br:#dee0e3;--br2:#e8e8e8;--gn:#34c724;--or:#ff9800;--rd:#f54a45;--r:8px;--sh:0 1px 3px rgba(0,0,0,.08)}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;color:var(--t);background:var(--bg)}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:260px;min-width:260px;background:var(--w);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden}
.sb-h{height:48px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--br);background:var(--blue);color:#fff;flex-shrink:0}
.sb-h .lo{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-h .v{margin-left:auto;font-size:11px;opacity:.8;flex-shrink:0}
.sb-b{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 0}
.sb-b::-webkit-scrollbar{width:4px}
.sb-b::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.mi{user-select:none}
.ml{display:flex;align-items:center;padding:6px 12px 6px 0;cursor:pointer;color:var(--t);font-size:13px;transition:background .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ml:hover{background:var(--bl);color:var(--blue)}
.ml.act{background:var(--bl);color:var(--blue);font-weight:600}
.ml .a{margin-left:auto;margin-right:10px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--t3);transition:transform .2s}
.ml .a.ex{transform:rotate(90deg)}
.mc{display:none}.mc.op{display:block}
.mi.l0>.ml{font-weight:600;font-size:14px}
.mi.l1>.ml{padding-left:14px}
.mi.l2>.ml{padding-left:28px}
.mi.l3>.ml{padding-left:42px}
.mi.l4>.ml{padding-left:56px;font-size:12px}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mn-h{height:48px;background:var(--w);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 20px;flex-shrink:0}
.bc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t2)}
.bc .cu{color:var(--t);font-weight:500}
.mn-b{flex:1;overflow-y:auto;padding:16px 20px;background:var(--bg)}
.pt{font-size:18px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.bdg{font-size:11px;background:var(--bl);color:var(--blue);padding:2px 8px;border-radius:10px;font-weight:500}
.cd{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:14px}
.ct{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--t)}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.sc{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:16px;text-align:center}
.sc .sv{font-size:26px;font-weight:700;color:var(--blue)}
.sc .sl{font-size:12px;color:var(--t2);margin-top:3px}
.sc .sc2{font-size:11px;margin-top:4px}.sc .up{color:var(--gn)}.sc .dn{color:var(--rd)}
table.dt{width:100%;border-collapse:collapse;font-size:12px}
table.dt th{background:#f7f8fa;padding:8px 10px;text-align:left;font-weight:600;color:var(--t2);border-bottom:1px solid var(--br);white-space:nowrap}
table.dt td{padding:8px 10px;border-bottom:1px solid var(--br2);color:var(--t)}
table.dt tr:hover td{background:#f7f9ff;cursor:pointer}
.t{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tb{background:#e8f0ff;color:#3370ff}.tg{background:#e8f8e8;color:#34c724}.to{background:#fff4e0;color:#ff9800}
.tr{background:#ffe8e8;color:#f54a45}.tx{background:#f0f0f0;color:#8f959e}.tp{background:#f0e8ff;color:#7c3aed}
.pb{background:#f0f0f0;border-radius:10px;height:7px;overflow:hidden;width:100%}
.pf{height:100%;border-radius:10px;transition:width .6s}
.pfb{background:linear-gradient(90deg,#3370ff,#5b93ff)}.pfg{background:linear-gradient(90deg,#34c724,#6dd55e)}
.pfo{background:linear-gradient(90deg,#ff9800,#ffb74d)}.pfr{background:linear-gradient(90deg,#f54a45,#ff7070)}
.ch{position:relative;height:280px;width:100%}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.bp{background:var(--blue);color:#fff}.bp:hover{background:var(--bd)}
.bo{background:#fff;color:var(--blue);border:1px solid var(--blue)}.bo:hover{background:var(--bl)}
.bg{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.fi{width:100%;padding:6px 10px;border:1px solid var(--br);border-radius:6px;font-size:12px}
.fi:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(51,112,255,.15)}
.mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding-top:60px}
.mo.sh{display:flex}
.md{background:var(--w);border-radius:12px;width:600px;max-width:90vw;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.md-h{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--br);flex-shrink:0}
.md-h h3{font-size:15px;font-weight:600}
.md-x{margin-left:auto;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;font-size:16px;color:var(--t2)}
.md-x:hover{background:#f0f0f0}
.md-b{padding:16px 18px;overflow-y:auto;flex:1}
.md-f{padding:10px 18px;border-top:1px solid var(--br);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.fg{margin-bottom:12px}
.fl{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.tl{position:relative;padding-left:22px}
.tl::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--br)}
.tli{position:relative;padding-bottom:20px}
.tli::before{content:'';position:absolute;left:-18px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--blue);border:2px solid #fff;box-shadow:0 0 0 2px var(--blue)}
.tli .tm{font-size:11px;color:var(--t3);margin-bottom:3px}
.tli .tc{font-size:12px;color:var(--t)}
.hc{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;min-width:18px;min-height:18px;padding:2px}
.h0{background:#e8f0ff;color:#999}.h1{background:#b8d4ff}.h2{background:#3370ff}.h3{background:#2b5ce6}.h4{background:#1a3fad}
.fc{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:20px;border-left:4px solid var(--blue);transition:transform .2s,box-shadow .2s}
.fc:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.fc .ic{font-size:28px;margin-bottom:10px}
.fc h4{font-size:14px;font-weight:600;margin-bottom:6px}
.fc p{font-size:12px;color:var(--t2);line-height:1.5}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:768px){.sb{width:50px;min-width:50px}.sb-h .lo,.sb-h .v,.ml span:not(.a){display:none}.ml{justify-content:center;padding:6px 4px}.ml .a{margin:0}.sr{grid-template-columns:repeat(2,1fr)}.g2,.g3,.g4{grid-template-columns:1fr}}
/* 系统配置与自动化任务样式 */
.sw{position:relative;width:36px;height:20px;display:inline-block;vertical-align:middle}
.sw input{opacity:0;width:0;height:0}
.sw .sl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:20px;transition:.2s}
.sw .sl::before{content:'';position:absolute;height:16px;width:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked+.sl{background:var(--blue)}
.sw input:checked+.sl::before{transform:translateX(16px)}
.cfg-card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:16px;border:1px solid var(--br);transition:box-shadow .2s}
.cfg-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.cfg-card h4{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cfg-card p{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:8px}
.tpl-card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:20px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s}
.tpl-card:hover{border-color:var(--blue);transform:translateY(-2px)}
.tpl-card .ti{font-size:32px;margin-bottom:8px}
.tpl-card h4{font-size:13px;font-weight:600;margin-bottom:4px}
.tpl-card p{font-size:11px;color:var(--t2)}
.cfg-table{width:100%;border-collapse:collapse;font-size:12px}
.cfg-table th{background:#f7f8fa;padding:8px 10px;text-align:left;font-weight:600;color:var(--t2);border-bottom:1px solid var(--br);white-space:nowrap}
.cfg-table td{padding:6px 10px;border-bottom:1px solid var(--br2);color:var(--t);vertical-align:middle}
.cfg-table tr:hover td{background:#f7f9ff}
.cfg-table .ei{padding:4px 6px;border:1px solid var(--br);border-radius:4px;font-size:12px;width:100%}
.cfg-table .ei:focus{outline:none;border-color:var(--blue)}
.btn-sm{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:none;transition:all .15s}
.btn-sm.bp{background:var(--blue);color:#fff}.btn-sm.bp:hover{background:var(--bd)}
.btn-sm.bo{background:#fff;color:var(--blue);border:1px solid var(--blue)}.btn-sm.bo:hover{background:var(--bl)}
.btn-sm.dg{background:#fff;color:var(--rd);border:1px solid var(--rd)}.btn-sm.dg:hover{background:#ffe8e8}
.btn-sm.gn{background:#fff;color:var(--gn);border:1px solid var(--gn)}.btn-sm.gn:hover{background:#e8f8e8}
.level-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500}
.level-tag.l1{background:#e8f0ff;color:#3370ff}.level-tag.l2{background:#e8f8e8;color:#34c724}.level-tag.l3{background:#f0e8ff;color:#7c3aed}.level-tag.l4{background:#fff4e0;color:#ff9800}
.disabled-page{text-align:center;padding:60px 20px;color:var(--t3)}
.disabled-page .dp-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.disabled-page .dp-text{font-size:16px;font-weight:500;margin-bottom:8px}
.disabled-page .dp-hint{font-size:13px}
.color-picker-wrap{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.color-picker-wrap input[type="color"]{width:40px;height:32px;border:1px solid var(--br);border-radius:6px;cursor:pointer;padding:2px}
.color-picker-wrap input[type="text"]{width:120px;padding:6px 10px;border:1px solid var(--br);border-radius:6px;font-size:12px;font-family:monospace}
.auto-task-tpl{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:18px;border-left:4px solid var(--blue);transition:transform .2s,box-shadow .2s}
.auto-task-tpl:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.auto-task-tpl .atp-icon{font-size:24px;margin-bottom:6px}
.auto-task-tpl h4{font-size:13px;font-weight:600;margin-bottom:4px}
.auto-task-tpl p{font-size:11px;color:var(--t2);line-height:1.5;margin-bottom:10px}
.auto-task-tpl .atp-schedule{font-size:11px;color:var(--blue);font-weight:500;margin-bottom:8px}

/* ===== 登录界面样式 ===== */
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a3fad 0%,#3370ff 50%,#5b93ff 100%);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--w);border-radius:16px;padding:40px;width:420px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-box .login-logo{text-align:center;margin-bottom:28px}
.login-box .login-logo .logo-icon{font-size:48px;margin-bottom:8px}
.login-box .login-logo h2{font-size:20px;font-weight:600;color:var(--t);margin-bottom:4px}
.login-box .login-logo p{font-size:13px;color:var(--t2)}
.login-box .login-fg{margin-bottom:18px}
.login-box .login-fg label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px}
.login-box .login-fg input,.login-box .login-fg select{width:100%;padding:10px 14px;border:1px solid var(--br);border-radius:8px;font-size:14px;transition:all .15s}
.login-box .login-fg input:focus,.login-box .login-fg select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(51,112,255,.15)}
.login-box .login-btn{width:100%;padding:12px;border-radius:8px;background:var(--blue);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:background .15s}
.login-box .login-btn:hover{background:var(--bd)}
.login-box .login-hint{margin-top:16px;text-align:center;font-size:12px;color:var(--t3)}
.login-box .role-desc{margin-top:8px;padding:10px 12px;background:var(--bl);border-radius:6px;font-size:12px;color:var(--t2);line-height:1.6}

/* 权限提示 */
.perm-tip{background:#fff4e0;border:1px solid #ff9800;border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#e65100;display:none}
.perm-tip.sh{display:block}
.perm-tip.deny{background:#ffe8e8;border-color:#f54a45;color:#c62828}

/* 顶部用户信息栏 */
.user-bar{margin-left:auto;display:flex;align-items:center;gap:10px}
.user-bar .user-role{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bl);color:var(--blue);font-weight:500}
.user-bar .user-name{font-size:13px;font-weight:500}
.user-bar .logout-btn{font-size:12px;color:var(--t3);cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .15s}
.user-bar .logout-btn:hover{background:#f0f0f0;color:var(--rd)}

/* 代码块 */
.code-block{background:#1e1e1e;color:#d4d4d4;border-radius:8px;padding:16px;font-family:"Consolas","Monaco",monospace;font-size:12px;line-height:1.6;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.code-block .comment{color:#6a9955}
.code-block .keyword{color:#569cd6}
.code-block .string{color:#ce9178}

/* 部署方案卡片 */
.deploy-card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:20px;border:1px solid var(--br);transition:all .2s}
.deploy-card:hover{border-color:var(--blue)}
.deploy-card h4{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--blue)}
.deploy-card p{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.deploy-card .step{font-size:12px;color:var(--t);line-height:1.8}
.deploy-card .step .num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:600;margin-right:6px}

/* 数据源映射表格增强 */
.ds-status-online{color:var(--gn);font-weight:500}
.ds-status-offline{color:var(--rd);font-weight:500}
.ds-status-test{color:var(--or);font-weight:500}
</style>
</head>
<body>
<!-- 登录界面 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">&#9881;</div>
      <h2>智能制造组管理平台</h2>
      <p>V5 终极版本 - 四级权限系统</p>
    </div>
    <div class="login-fg">
      <label>用户名</label>
      <input type="text" id="loginUser" value="蔡瑞" placeholder="请输入用户名">
    </div>
    <div class="login-fg">
      <label>角色</label>
      <select id="loginRole" onchange="onRoleChange()">
        <option value="viewer">可阅读 (viewer)</option>
        <option value="editor">可编辑 (editor)</option>
        <option value="admin">可管理 (admin)</option>
        <option value="owner" selected>所有者 (owner)</option>
      </select>
    </div>
    <div class="login-fg" id="roleDescBox">
      <div class="role-desc" id="roleDescText">所有者：全部权限，包括系统配置、用户管理、数据所有权</div>
    </div>
    <button class="login-btn" onclick="doLogin()">登录系统</button>
    <div class="login-hint">首次登录默认所有者权限，后续从本地存储读取</div>
  </div>
</div>

<!-- 主应用 -->
<div class="app" id="mainApp" style="display:none">
<div class="sb"><div class="sb-h"><span class="lo">&#9881; 智能制造组管理平台</span><span class="v">V5</span></div><div class="sb-b" id="sb"></div></div>
<div class="mn"><div class="mn-h"><div class="bc" id="bc">首页</div><div class="user-bar" id="userBar"></div></div><div class="mn-b" id="ct"></div></div>
</div>
<div class="mo" id="mo"><div class="md"><div class="md-h"><h3 id="mt">详情</h3><button class="md-x" onclick="closeMo()">&times;</button></div><div class="md-b" id="mb"></div><div class="md-f" id="mf"><button class="btn bo" id="btnEdit" onclick="togEdit()">编辑</button><button class="btn bo" onclick="saveL()">保存本地</button><button class="btn bo" onclick="syncF()">同步飞书</button><button class="btn bp" onclick="closeMo()">关闭</button></div></div></div>

<script>
// ==========================================
// V5 全局配置与权限系统
// ==========================================

/**
 * 四级权限定义
 * viewer: 只读，不可编辑，看不到系统配置和自动化任务
 * editor: 可编辑数据，看不到系统配置，自动化任务只读
 * admin: 可编辑+管理，能看到系统配置和自动化任务，可管理用户权限
 * owner: 全部权限
 */
const PERMISSIONS = {
  viewer: { canView: true, canEdit: false, canManage: false, canOwn: false },
  editor: { canView: true, canEdit: true, canManage: false, canOwn: false },
  admin:  { canView: true, canEdit: true, canManage: true, canOwn: false },
  owner:  { canView: true, canEdit: true, canManage: true, canOwn: true }
};

// 角色中文名称映射
const ROLE_NAMES = {
  viewer: '可阅读', editor: '可编辑', admin: '可管理', owner: '所有者'
};

// 角色描述
const ROLE_DESCS = {
  viewer: '只能查看所有页面，不能编辑，看不到"系统配置"和"自动化任务"模块',
  editor: '可以查看和编辑数据（弹窗中的编辑按钮可用），看不到"系统配置"但能看到"自动化任务"（只读）',
  admin: '可以编辑数据，能看到"系统配置"和"自动化任务"，可以管理用户权限',
  owner: '全部权限，包括系统配置、用户管理、数据所有权'
};

// 当前登录用户信息
var currentUser = { name: '', role: 'owner' };

// 权限检查辅助函数
function hasPermission(action) {
  if (!currentUser || !currentUser.role) return false;
  var p = PERMISSIONS[currentUser.role];
  if (!p) return false;
  if (action === 'view') return p.canView;
  if (action === 'edit') return p.canEdit;
  if (action === 'manage') return p.canManage;
  if (action === 'own') return p.canOwn;
  return false;
}

// 检查当前角色是否可以访问某页面ID
function canAccessPage(pageId) {
  if (!currentUser.role) return false;
  // viewer 和 editor 看不到系统配置
  if ((pageId.indexOf('cfg-') === 0 || pageId.indexOf('config') !== -1) && !hasPermission('manage')) return false;
  // viewer 看不到自动化任务
  if ((pageId.indexOf('at-') === 0 || pageId.indexOf('auto-task') !== -1) && currentUser.role === 'viewer') return false;
  return true;
}

// 登录相关函数
function onRoleChange() {
  var role = document.getElementById('loginRole').value;
  document.getElementById('roleDescText').textContent = ROLE_NAMES[role] + '：' + ROLE_DESCS[role];
}

function doLogin() {
  var name = document.getElementById('loginUser').value.trim() || '蔡瑞';
  var role = document.getElementById('loginRole').value;
  currentUser = { name: name, role: role };

  refresh();
}

function doLogout() {
  localStorage.removeItem('v5_user');
  currentUser = { name: '', role: '' };
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}

function updateUserBar() {
  var bar = document.getElementById('userBar');
  if (!bar) return;
  bar.innerHTML = '<span class="user-role">' + ROLE_NAMES[currentUser.role] + '</span><span class="user-name">' + currentUser.name + '</span><span class="logout-btn" onclick="doLogout()">退出</span>';
}

document.addEventListener('DOMContentLoaded', function() {
  var saved = localStorage.getItem('v5_user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainApp').style.display = 'flex';
      document.getElementById('loginUser').value = currentUser.name || '蔡瑞';
      document.getElementById('loginRole').value = currentUser.role || 'owner';
      onRoleChange();
      updateUserBar();
    } catch (e) {
      currentUser = { name: '蔡瑞', role: 'owner' };
    }
  }
});

let curPage='daily-today';
let pathMap={};
let allLabels={};
let editMode=false;
let modalData=null;

// 构建路径映射和标签映射
function buildMaps(items,path){
  items.forEach(item=>{
    allLabels[item.id]=item.label;
    pathMap[item.id]=path.concat(item);
    if(item.children) buildMaps(item.children,path.concat(item));
  });
}
buildMaps(M,[]);

// 获取面包屑
function getBC(id){
  const p=pathMap[id]||[];
  return p.map(x=>'<span>'+x.label+'</span>').join(' <span style="color:var(--t3)">/</span> ');
}

// 获取第一个叶子节点ID
function firstLeaf(item){
  if(!item.children||!item.children.length) return item.id;
  return firstLeaf(item.children[0]);
}

// 获取配置
function getAppConfig(){
  var c=localStorage.getItem('app_config');
  if(!c){
    initDefaultConfig();
    c=localStorage.getItem('app_config');
  }
  return JSON.parse(c);
}
function saveAppConfig(cfg){localStorage.setItem('app_config',JSON.stringify(cfg));}

// 检查菜单项是否可见（结合权限系统和配置）
function isMenuVisible(id){
  // 先检查权限
  if (!canAccessPage(id)) return false;
  try{
    var cfg=getAppConfig();
    var mi=cfg.menuItems.find(function(m){return m.id===id;});
    return mi?mi.visible:true;
  }catch(e){return true;}
}

// 递归渲染菜单（支持可见性过滤）
function renderMenu(items,level){
  return items.map(item=>{
    if(!isMenuVisible(item.id)) return '';
    const has=item.children&&item.children.length;
    const isAct=item.id===curPage||(pathMap[curPage]||[]).some(p=>p.id===item.id);
    let h='<div class="mi l'+level+'">';
    h+='<div class="ml'+(isAct?' act':'')+'" data-id="'+item.id+'" onclick="onMenuClick(\''+item.id+'\')">';
    if(item.icon) h+='<span style="margin-right:6px">'+item.icon+'</span>';
    h+='<span>'+item.label+'</span>';
    if(has) h+='<span class="a'+(isAct?' ex':'')+'">&#9654;</span>';
    h+='</div>';
    if(has){
      const isOpen=(pathMap[curPage]||[]).some(p=>p.id===item.id);
      h+='<div class="mc'+(isOpen?' op':'')+'">';
      h+=renderMenu(item.children,level+1);
      h+='</div>';
    }
    h+='</div>';
    return h;
  }).join('');
}

// 菜单点击
function onMenuClick(id){
  const item=allLabels[id]?'':'';
  function find(items,target){
    for(let i of items){
      if(i.id===target) return i;
      if(i.children){let r=find(i.children,target);if(r)return r;}
    }
    return null;
  }
  const m=find(M,id);
  if(!m) return;
  if(m.children&&m.children.length){
    const leafId=firstLeaf(m);
    curPage=leafId;
  } else {
    curPage=id;
  }
  refresh();
}

// 刷新界面
function refresh(){
  document.getElementById('sb').innerHTML=renderMenu(M,0);
  document.getElementById('bc').innerHTML=getBC(curPage);
  // 检查页面是否禁用
  try{
    var cfg=getAppConfig();
    var pg=cfg.pages.find(function(p){return p.id===curPage;});
    if(pg&&!pg.visible){
      document.getElementById('ct').innerHTML='<div class="disabled-page"><div class="dp-icon">&#128274;</div><div class="dp-text">该页面已禁用</div><div class="dp-hint">请在 系统配置 > 页面配置 > 页面列表 中启用该页面</div></div>';
      return;
    }
  }catch(e){}
  // 检查页面权限
  if (!canAccessPage(curPage)) {
    document.getElementById('ct').innerHTML='<div class="disabled-page"><div class="dp-icon">&#128274;</div><div class="dp-text">权限不足</div><div class="dp-hint">当前角色（'+ROLE_NAMES[currentUser.role]+'）无权访问此页面</div></div>';
    return;
  }
  document.getElementById('ct').innerHTML=renderPage(curPage);
  // 更新模态框按钮可见性
  updateModalButtons();
  setTimeout(()=>{try{initCharts(curPage)}catch(e){}},100);
}

  var btnEdit = document.getElementById('btnEdit');
  if (btnEdit) {
    if (!hasPermission('edit')) {
      btnEdit.style.display = 'none';
    } else {
      btnEdit.style.display = 'inline-flex';
    }
  }
}

// 数据导出功能
function exportData(type){
  var data, filename, csv;
  if(type==='daily'){
    data = REAL_DAILY_REPORTS;
    filename = '日报数据_'+(new Date().toISOString().slice(0,10))+'.csv';
    csv = '编号,汇报人,日期,状态,工时,工作内容,明日计划,问题\n';
    data.forEach(function(r){csv+=r.id+','+r.reporter+','+r.date+','+r.status+','+(r.workHours||'')+',"'+(r.content||'').replace(/"/g,'""').replace(/\n/g,' ')+'","'+(r.plan||'').replace(/"/g,'""').replace(/\n/g,' ')+'","'+(r.issues||'').replace(/"/g,'""').replace(/\n/g,' ')+'"\n';});
  }else if(type==='task'){
    data = REAL_TASKS;
    filename = '任务数据_'+(new Date().toISOString().slice(0,10))+'.csv';
    csv = '编号,任务描述,负责人,优先级,状态,进度,开始日期,结束日期\n';
    data.forEach(function(r){csv+=r.id+',"'+r.desc+'",'+r.owner+','+r.priority+','+r.status+','+r.progress+','+r.start+','+r.end+'\n';});
  }else if(type==='project'){
    data = REAL_PROJECTS;
    filename = '项目数据_'+(new Date().toISOString().slice(0,10))+'.csv';
    csv = '编号,名称,描述,状态,优先级,经理,进度\n';
    data.forEach(function(r){csv+=r.id+',"'+r.name+'","'+(r.desc||'').replace(/"/g,'""')+'",'+r.status+','+r.priority+','+r.manager+','+r.progress+'\n';});
  }else{
    alert('导出类型不支持');return;
  }
  var blob = new Blob(['\ufeff'+csv], {type: 'text/csv;charset=utf-8;'});
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  alert('已导出: '+filename);
}

// 递归收集所有菜单项（扁平化）
function flattenMenu(items,level,result){
  if(!result) result=[];
  items.forEach(function(item,i){
    result.push({id:item.id,label:item.label,icon:item.icon||'',level:level+1,visible:true,order:result.length});
    if(item.children) flattenMenu(item.children,level+1,result);
  });
  return result;
}
function collectLeaves(items,parentId,moduleLabel,result){
  if(!result) result=[];
  items.forEach(function(item){
    if(item.children&&item.children.length){
      collectLeaves(item.children,item.id,moduleLabel||item.label,result);
    }else{
      result.push({id:item.id,label:item.label,visible:true,order:result.length,module:moduleLabel||'未知',type:'表格'});
    }
  });
  return result;
}
function collectModules(items,result){
  if(!result) result=[];
  items.forEach(function(item,i){
    var childCount=0;
    (function cnt(ch){ch.forEach(function(c){childCount++;if(c.children)cnt(c.children);});})(item.children||[]);
    result.push({id:item.id,label:item.label,icon:item.icon||'',visible:true,order:i,childCount:childCount,desc:''});
  });
  return result;
}

}

  var typeMap={};
  M.forEach(function(m){
    var ml=m.label;
    (function walk(items,type){
      items.forEach(function(item){
        if(item.children&&item.children.length){
          var t=item.label.indexOf('看板')>-1?'看板':item.label.indexOf('统计')>-1?'统计':item.label.indexOf('追踪')>-1?'看板':'表格';
          walk(item.children,t);
        }else{
          typeMap[item.id]=type||'表格';
        }
      });
    })(m.children||[],'表格');
  });
  var h='<div class="pt">页面列表 <span class="bdg">'+pages.length+'个页面</span></div>';
  h+='<div class="cd"><div class="bg"><button class="btn bp" onclick="savePageConfig()">保存全部</button></div>';

  pages.forEach(function(p,i){
    h+='<tr>';
    h+='<td><label class="sw"><input type="checkbox" '+(p.visible?'checked':'')+' onchange="togglePage('+i+',this.checked)"><span class="sl"></span></label></td>';

    h+='<td><span class="t tb">'+(typeMap[p.id]||'表格')+'</span></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

  h+='<div style="overflow-x:auto"><table class="dt"><thead><tr><th>编号</th><th>任务名称</th><th>触发方式</th><th>目标动作</th><th>通知对象</th><th>上次执行</th><th>下次执行</th><th>状态</th><th>操作</th></tr></thead><tbody>';
  autoTasks.forEach(function(t,i){
    var stCls=t.status==='启用'?'tg':'tx';

  });

function toggleAutoTask(idx){
  if (!hasPermission('edit')) {alert('权限不足');return;}
  autoTasks[idx].status=autoTasks[idx].status==='启用'?'停用':'启用';
  saveAutoTasks();refresh();
}
function runAutoTask(idx){
  var t=autoTasks[idx];
  alert('任务 ['+t.name+'] 已执行（演示）\n动作: '+t.action+'\n目标: '+t.target);
  t.lastRun=new Date().toLocaleString('zh-CN');
  saveAutoTasks();refresh();
}

function renderAtCreate(){

function fillTemplate(){
  var tplId=document.getElementById('at-template').value;
  if(!tplId)return;
  var tpl=AUTO_TEMPLATES.find(function(t){return t.id===tplId;});
  if(tpl){
    document.getElementById('at-name').value=tpl.name;
    document.getElementById('at-time').value=tpl.schedule;
    document.getElementById('at-action').value=tpl.action;
    document.getElementById('at-target').value=tpl.target;
  }
}
function saveAutoTask(){
  if (!hasPermission('edit')) {alert('权限不足');return;}
  var name=document.getElementById('at-name').value;
  if(!name){alert('请输入任务名称');return;}
  var newId='AT-'+(autoTasks.length+1).toString().padStart(3,'0');
  autoTasks.push({
    id:newId,name:name,template:document.getElementById('at-template').value,
    status:'启用',lastRun:'-',nextRun:'待计算',
    trigger:document.getElementById('at-trigger').value+' '+document.getElementById('at-time').value,
    action:document.getElementById('at-action').value,
    target:document.getElementById('at-target').value
  });
  saveAutoTasks();
  curPage='at-list';refresh();
}

function init(){
  // 检查登录状态
  var saved = localStorage.getItem('v5_user');
  if(saved){
    try{currentUser=JSON.parse(saved);}catch(e){currentUser={name:'蔡瑞',role:'owner'};}
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainApp').style.display='flex';
    updateUserBar();
  }
  // 初始化默认配置
  if(!localStorage.getItem('app_config')){initDefaultConfig();}
  // 渲染界面
  refresh();
}

// 页面加载完成后初始化
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
