<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能制造组管理平台 V11</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#3370ff;--bl:#e8f0ff;--bd:#2b5ce6;--bg:#f5f6f7;--w:#fff;--t:#1f2329;--t2:#646a73;--t3:#8f959e;--br:#dee0e3;--br2:#e8e8e8;--gn:#34c724;--or:#ff9800;--rd:#f54a45;--r:8px;--sh:0 1px 3px rgba(0,0,0,.08)}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;color:var(--t);background:var(--bg)}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:260px;min-width:260px;background:var(--w);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden}
.sb-h{height:48px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--br);background:var(--blue);color:#fff;flex-shrink:0}
.sb-h .lo{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-h .v{margin-left:auto;font-size:11px;opacity:.8;flex-shrink:0}
.sb-b{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 0}
.sb-b::-webkit-scrollbar{width:4px}
.sb-b::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.mi{user-select:none}
.ml{display:flex;align-items:center;padding:6px 12px 6px 0;cursor:pointer;color:var(--t);font-size:13px;transition:background .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ml:hover{background:var(--bl);color:var(--blue)}
.ml.act{background:var(--bl);color:var(--blue);font-weight:600}
.ml .a{margin-left:auto;margin-right:10px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--t3);transition:transform .2s}
.ml .a.ex{transform:rotate(90deg)}
.mc{display:none}.mc.op{display:block}
.mi.l0>.ml{font-weight:600;font-size:14px}
.mi.l1>.ml{padding-left:14px}
.mi.l2>.ml{padding-left:28px}
.mi.l3>.ml{padding-left:42px}
.mi.l4>.ml{padding-left:56px;font-size:12px}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mn-h{height:48px;background:var(--w);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 20px;flex-shrink:0}
.bc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t2)}
.bc .cu{color:var(--t);font-weight:500}
.mn-b{flex:1;overflow-y:auto;padding:16px 20px;background:var(--bg)}
.pt{font-size:18px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.bdg{font-size:11px;background:var(--bl);color:var(--blue);padding:2px 8px;border-radius:10px;font-weight:500}
.cd{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:14px}
.ct{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--t)}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.sc{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:16px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s}
.sc:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.sc .sv{font-size:26px;font-weight:700;color:var(--blue)}
.sc .sl{font-size:12px;color:var(--t2);margin-top:3px}
.sc .sc2{font-size:11px;margin-top:4px}.sc .up{color:var(--gn)}.sc .dn{color:var(--rd)}
table.dt{width:100%;border-collapse:collapse;font-size:12px}
table.dt th{background:#f7f8fa;padding:8px 10px;text-align:left;font-weight:600;color:var(--t2);border-bottom:1px solid var(--br);white-space:nowrap}
table.dt td{padding:8px 10px;border-bottom:1px solid var(--br2);color:var(--t)}
table.dt tr:hover td{background:#f7f9ff;cursor:pointer}
.t{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tb{background:#e8f0ff;color:#3370ff}.tg{background:#e8f8e8;color:#34c724}.to{background:#fff4e0;color:#ff9800}
.tr{background:#ffe8e8;color:#f54a45}.tx{background:#f0f0f0;color:#8f959e}.tp{background:#f0e8ff;color:#7c3aed}
.pb{background:#f0f0f0;border-radius:10px;height:7px;overflow:hidden;width:100%}
.pf{height:100%;border-radius:10px;transition:width .6s}
.pfb{background:linear-gradient(90deg,#3370ff,#5b93ff)}.pfg{background:linear-gradient(90deg,#34c724,#6dd55e)}
.pfo{background:linear-gradient(90deg,#ff9800,#ffb74d)}.pfr{background:linear-gradient(90deg,#f54a45,#ff7070)}
.ch{position:relative;height:280px;width:100%}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.bp{background:var(--blue);color:#fff}.bp:hover{background:var(--bd)}
.bo{background:#fff;color:var(--blue);border:1px solid var(--blue)}.bo:hover{background:var(--bl)}
.bg{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.fi{width:100%;padding:6px 10px;border:1px solid var(--br);border-radius:6px;font-size:12px}
.fi:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(51,112,255,.15)}
.mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding-top:60px}
.mo.sh{display:flex}
.md{background:var(--w);border-radius:12px;width:620px;max-width:90vw;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.md-h{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--br);flex-shrink:0}
.md-h h3{font-size:15px;font-weight:600}
.md-x{margin-left:auto;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;font-size:16px;color:var(--t2)}
.md-x:hover{background:#f0f0f0}
.md-b{padding:16px 18px;overflow-y:auto;flex:1}
.md-f{padding:10px 18px;border-top:1px solid var(--br);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.fg{margin-bottom:12px}
.fl{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.hc{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;min-width:18px;min-height:18px;padding:2px}
.h0{background:#e8f0ff;color:#999}.h1{background:#b8d4ff}.h2{background:#3370ff}.h3{background:#2b5ce6}.h4{background:#1a3fad}
.fc{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:20px;border-left:4px solid var(--blue);transition:transform .2s,box-shadow .2s;cursor:pointer}
.fc:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.fc .ic{font-size:28px;margin-bottom:10px}
.fc h4{font-size:14px;font-weight:600;margin-bottom:6px}
.fc p{font-size:12px;color:var(--t2);line-height:1.5}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.parent-card{cursor:pointer;transition:transform .2s,box-shadow .2s}
.parent-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.sw{position:relative;width:36px;height:20px;display:inline-block;vertical-align:middle}
.sw input{opacity:0;width:0;height:0}
.sw .sl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:20px;transition:.2s}
.sw .sl::before{content:"";position:absolute;height:16px;width:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked+.sl{background:var(--blue)}
.sw input:checked+.sl::before{transform:translateX(16px)}
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a3fad 0%,#3370ff 50%,#5b93ff 100%);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--w);border-radius:16px;padding:40px;width:420px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-box .login-logo{text-align:center;margin-bottom:28px}
.login-box .login-logo .logo-icon{font-size:48px;margin-bottom:8px}
.login-box .login-logo h2{font-size:20px;font-weight:600;color:var(--t);margin-bottom:4px}
.login-box .login-logo p{font-size:13px;color:var(--t2)}
.login-box .login-fg{margin-bottom:18px}
.login-box .login-fg label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px}
.login-box .login-fg input,.login-box .login-fg select{width:100%;padding:10px 14px;border:1px solid var(--br);border-radius:8px;font-size:14px;transition:all .15s}
.login-box .login-fg input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(51,112,255,.15)}
.login-box .login-btn{width:100%;padding:12px;border-radius:8px;background:var(--blue);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:background .15s}
.login-box .login-btn:hover{background:var(--bd)}
.login-box .login-hint{margin-top:16px;text-align:center;font-size:12px;color:var(--t3)}
.timeline{position:relative;padding-left:30px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--br)}
.timeline-item{position:relative;padding-bottom:20px}
.timeline-item::before{content:'';position:absolute;left:-24px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--blue);border:2px solid #fff;box-shadow:0 0 0 2px var(--blue)}
.timeline-item .tl-time{font-size:11px;color:var(--t3);margin-bottom:3px}
.timeline-item .tl-content{font-size:12px;color:var(--t)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:16px}
.kpi-card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:20px;text-align:center}
.kpi-card .kpi-value{font-size:36px;font-weight:700;color:var(--blue)}
.kpi-card .kpi-label{font-size:13px;color:var(--t2);margin-top:4px}
.kpi-card .kpi-sub{font-size:11px;color:var(--t3);margin-top:2px}
.data-tile{background:linear-gradient(135deg,var(--blue) 0%,#5b93ff 100%);color:#fff;border-radius:var(--r);padding:20px;position:relative;overflow:hidden;cursor:pointer;transition:transform .2s}
.data-tile:hover{transform:translateY(-2px)}
.data-tile .dt-val{font-size:28px;font-weight:700}
.data-tile .dt-label{font-size:12px;opacity:.85;margin-top:4px}
.data-tile .dt-icon{position:absolute;right:12px;top:12px;font-size:40px;opacity:.2}
.form-field{margin-bottom:14px}
.form-field label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:8px 12px;border:1px solid var(--br);border-radius:6px;font-size:13px;transition:border-color .15s}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(51,112,255,.15)}
.person-selector{max-height:300px;overflow-y:auto;border:1px solid var(--br);border-radius:6px;padding:8px}
.dept-group{margin-bottom:12px}
.dept-name{font-weight:600;font-size:13px;color:var(--blue);margin-bottom:6px;padding:4px 8px;background:var(--bl);border-radius:4px}
.person-option{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px}
.person-option:hover{background:var(--bl)}
.person-avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.person-name{font-weight:500}
.person-position{color:var(--t3);font-size:11px;margin-left:auto}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--br);margin-bottom:16px}
.tab-item{padding:8px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--t2);transition:all .15s}
.tab-item:hover{color:var(--blue)}
.tab-item.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item{padding:8px 0}
.info-item .ii-label{font-size:11px;color:var(--t3);margin-bottom:2px}
.info-item .ii-value{font-size:13px;font-weight:500}
.empty-state{text-align:center;padding:48px 20px;color:var(--t3)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state .es-title{font-size:15px;font-weight:500;margin-bottom:4px;color:var(--t2)}
.empty-state .es-hint{font-size:12px}
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:14px}
.pagination button{padding:4px 10px;border:1px solid var(--br);background:var(--w);border-radius:4px;cursor:pointer;font-size:12px}
.pagination button:hover{border-color:var(--blue);color:var(--blue)}
.pagination button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.pagination button:disabled{opacity:.5;cursor:not-allowed}
.webhook-card{background:var(--w);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.webhook-card .wh-name{font-weight:600;font-size:13px}
.webhook-card .wh-url{font-size:11px;color:var(--t3);word-break:break-all;margin-top:4px}
.msg-preview{background:#f7f8fa;border-radius:6px;padding:12px;margin:10px 0;min-height:80px}
.status-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:12px;margin-bottom:12px}
.status-bar.info{background:#e8f0ff;color:var(--blue)}
.status-bar.success{background:#e8f8e8;color:var(--gn)}
.status-bar.warning{background:#fff4e0;color:var(--or)}
.status-bar.error{background:#ffe8e8;color:var(--rd)}
.btn-sm{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:none;transition:all .15s}
.btn-sm.bp{background:var(--blue);color:#fff}.btn-sm.bp:hover{background:var(--bd)}
.btn-sm.bo{background:#fff;color:var(--blue);border:1px solid var(--blue)}.btn-sm.bo:hover{background:var(--bl)}
.btn-sm.dg{background:#fff;color:var(--rd);border:1px solid var(--rd)}.btn-sm.dg:hover{background:#ffe8e8}
.btn-sm.gs{background:#fff;color:var(--gn);border:1px solid var(--gn)}.btn-sm.gs:hover{background:#e8f8e8}
.perm-matrix{width:100%;border-collapse:collapse;font-size:12px}
.perm-matrix th,.perm-matrix td{border:1px solid var(--br);padding:6px 8px;text-align:center}
.perm-matrix th{background:#f7f8fa;font-weight:600;color:var(--t2)}
.perm-matrix td:first-child{text-align:left;font-weight:500;background:#fafbfc}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.quick-card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:16px;text-align:center;cursor:pointer;transition:all .2s;border-top:3px solid var(--blue)}
.quick-card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.1)}
.quick-card .qc-icon{font-size:28px;margin-bottom:8px}
.quick-card .qc-title{font-size:13px;font-weight:600;margin-bottom:4px}
.quick-card .qc-desc{font-size:11px;color:var(--t3)}
.welcome-banner{background:linear-gradient(135deg,#3370ff 0%,#5b93ff 50%,#7ba3ff 100%);color:#fff;border-radius:12px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.welcome-banner h2{font-size:22px;font-weight:700;margin-bottom:6px}
.welcome-banner p{font-size:13px;opacity:.9;margin-bottom:4px}
.welcome-banner .wb-time{font-size:12px;opacity:.8}
.welcome-banner .wb-icon{position:absolute;right:30px;top:50%;transform:translateY(-50%);font-size:64px;opacity:.2}
.team-photo{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:var(--r);height:200px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;position:relative;overflow:hidden}
.team-photo .tp-text{position:relative;z-index:2;text-align:center}
.team-photo .tp-icon{font-size:48px;margin-bottom:8px;opacity:.8}
.activity-list{list-style:none}
.activity-list li{padding:10px 0;border-bottom:1px solid var(--br2);display:flex;gap:10px;align-items:flex-start}
.activity-list li:last-child{border-bottom:none}
.activity-list .al-icon{width:28px;height:28px;border-radius:50%;background:var(--bl);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.activity-list .al-content{flex:1}
.activity-list .al-title{font-size:12px;font-weight:500}
.activity-list .al-time{font-size:11px;color:var(--t3);margin-top:2px}
@media(max-width:768px){.sb{width:50px;min-width:50px}.sb-h .lo,.sb-h .v,.ml span:not(.a){display:none}.ml{justify-content:center;padding:6px 4px}.ml .a{margin:0}.sr{grid-template-columns:repeat(2,1fr)}.g2,.g3,.g4{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}.info-grid{grid-template-columns:1fr}}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#aaa}
.page-enter{animation:pageEnter .25s ease-out}
@keyframes pageEnter{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.table-responsive{overflow-x:auto;-webkit-overflow-scrolling:touch}
.table-responsive table{min-width:600px}
.mo.sh .md{animation:modalIn .2s ease-out}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(-10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.badge-group{display:flex;gap:4px;flex-wrap:wrap}
.nav-tabs{display:flex;border-bottom:1px solid var(--br);margin-bottom:16px;overflow-x:auto}
.nav-tab{padding:10px 16px;font-size:13px;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.nav-tab:hover{color:var(--blue)}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
</style>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">&#9881;</div>
      <h2>智能制造组管理平台</h2>
      <p>V11 - 工号登录系统</p>
    </div>
    <div id="loginForm">
      <div class="login-fg">
        <label>工号</label>
        <input type="text" id="loginId" placeholder="请输入工号" autofocus>
      </div>
      <div class="login-fg">
        <label>密码</label>
        <input type="password" id="loginPwd" placeholder="初始密码: 123456">
      </div>
      <button class="login-btn" onclick="doLogin()">登 录</button>
      <div class="login-hint">首次登录将强制修改密码 | 数据保存在本地浏览器</div>
    </div>
    <div id="changePwdForm" style="display:none">
      <div class="login-fg">
        <label>新密码</label>
        <input type="password" id="newPwd" placeholder="请设置新密码（至少6位）">
      </div>
      <div class="login-fg">
        <label>确认密码</label>
        <input type="password" id="newPwd2" placeholder="请再次输入新密码">
      </div>
      <button class="login-btn" onclick="doChangePwd()">确认修改</button>
    </div>
  </div>
</div>
<div id="mainApp" class="app" style="display:none">
  <div id="sb" class="sb">
    <div class="sb-h"><span class="lo">&#9881; 智能制造组管理平台</span><span class="v">V11</span></div>
    <div class="sb-b" id="sbContent"></div>
  </div>
  <div class="mn">
    <div class="mn-h">
      <div class="bc" id="breadcrumb"></div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <span id="syncStatusBadge" style="font-size:11px;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#8f959e;cursor:pointer" onclick="goToPage('feishu-config')">离线</span>
        <button class="btn-sm bo" onclick="exportAllData()" title="导出全部数据">&#128190; 导出</button>

var SERVER_CONFIG = {
  url: localStorage.getItem('v11_server_url') || '',
  enabled: localStorage.getItem('v11_server_enabled') === 'true',
  mode: localStorage.getItem('v11_server_enabled') === 'true' ? 'online' : 'offline'
};

var API_BASE = '';

function setServerUrl(url) {
  SERVER_CONFIG.url = url;
  SERVER_CONFIG.enabled = !!url;
  SERVER_CONFIG.mode = !!url ? 'online' : 'offline';
  API_BASE = url;
  localStorage.setItem('v11_server_url', url || '');
  localStorage.setItem('v11_server_enabled', (!!url).toString());
  updateSyncStatusBadge();
}

function setServerEnabled(enabled) {
  SERVER_CONFIG.enabled = enabled;
  SERVER_CONFIG.mode = enabled ? 'online' : 'offline';
  localStorage.setItem('v11_server_enabled', (enabled).toString());
  updateSyncStatusBadge();
}

async function apiRequest(method, path, data) {
  try {
    var opts = {
      method: method,
      headers: {'Content-Type': 'application/json'},
    };
    if (data && method !== 'GET') opts.body = JSON.stringify(data);
    var res = await fetch(API_BASE + path, opts);
    var json = await res.json();
    return json;
  } catch(e) {
    console.error('API request error:', e);
    return {code: -1, msg: '网络错误: ' + e.message};
  }
}

async function loadData(type) {
  if (SERVER_CONFIG.mode === 'online') {
    try {
      var res = await apiRequest('GET', '/api/data/' + type);
      if (res.code === 0) return res.data || [];
      console.error('API load error:', res.msg);
    } catch(e) {
      console.error('loadData API error:', e);
    }
  }
  return lsGet('local_' + type, []);
}

async function saveData(type, data) {
  lsSet('local_' + type, data);
  if (SERVER_CONFIG.mode === 'online') {
    try {
      var res = await apiRequest('POST', '/api/sync/write/' + type, {data: data});
      if (res.code === 0) return true;
      console.error('API save error:', res.msg);
    } catch(e) {
      console.error('saveData API error:', e);
    }
  }
  return false;
}

// V11 - 同步状态管理
var SYNC_STATE = {
  status: 'offline',
  lastSyncTime: '',
  logs: []
};

function updateSyncStatusBadge() {
  var badge = document.getElementById('syncStatusBadge');
  if (!badge) return;
  if (SERVER_CONFIG.mode === 'offline') {
    badge.style.background = '#f0f0f0';
    badge.style.color = '#8f959e';
    badge.textContent = '离线';
  } else if (SYNC_STATE.status === 'synced') {
    badge.style.background = '#e8f8e8';
    badge.style.color = '#34c724';
    badge.textContent = '已同步' + (SYNC_STATE.lastSyncTime ? ' ' + SYNC_STATE.lastSyncTime : '');
  } else if (SYNC_STATE.status === 'syncing') {
    badge.style.background = '#fff4e0';
    badge.style.color = '#ff9800';
    badge.textContent = '同步中...';
  } else if (SYNC_STATE.status === 'error') {
    badge.style.background = '#ffe8e8';
    badge.style.color = '#f54a45';
    badge.textContent = '同步失败';
  } else {
    badge.style.background = '#e8f0ff';
    badge.style.color = '#3370ff';
    badge.textContent = '在线';
  }
}

function addSyncLog(msg) {
  SYNC_STATE.logs.unshift({time: new Date().toLocaleString(), msg: msg});
  if (SYNC_STATE.logs.length > 20) SYNC_STATE.logs = SYNC_STATE.logs.slice(0, 20);
}

function setSyncStatus(status) {
  SYNC_STATE.status = status;
  if (status === 'synced') {
    SYNC_STATE.lastSyncTime = new Date().toLocaleTimeString();
  }
  updateSyncStatusBadge();
}

// V11 - 定时同步
var syncTimerId = null;

function startAutoSync(intervalMinutes) {
  stopAutoSync();
  if (!SERVER_CONFIG.enabled) return;
  syncTimerId = setInterval(function() {
    doFullSync();
  }, intervalMinutes * 60 * 1000);
  addSyncLog('定时同步已启动，间隔 ' + intervalMinutes + ' 分钟');
}

function stopAutoSync() {
  if (syncTimerId) {
    clearInterval(syncTimerId);
    syncTimerId = null;
  }
}

async function doFullSync() {
  if (SERVER_CONFIG.mode !== 'online') return;
  setSyncStatus('syncing');
  try {
    var types = ['daily_reports', 'tasks', 'projects', 'equips', 'improvements', 'members'];
    for (var i = 0; i < types.length; i++) {
      var res = await apiRequest('POST', '/api/sync/read/' + types[i]);
      if (res.code === 0 && res.data) {
        lsSet('local_' + types[i], res.data);
      }
    }
    setSyncStatus('synced');
    addSyncLog('全量同步完成');
  } catch(e) {
    setSyncStatus('error');
    addSyncLog('全量同步失败: ' + e.message);
  }
}

async function doWriteAllToServer() {
  if (SERVER_CONFIG.mode !== 'online') return;
  setSyncStatus('syncing');
  try {
    var types = ['daily_reports', 'tasks', 'projects', 'equips', 'improvements', 'members'];
    for (var i = 0; i < types.length; i++) {
      var localData = lsGet('local_' + types[i], []);
      await apiRequest('POST', '/api/sync/write/' + types[i], {data: localData});
    }
    setSyncStatus('synced');
    addSyncLog('全部数据已写入服务器');
  } catch(e) {
    setSyncStatus('error');
    addSyncLog('写入服务器失败: ' + e.message);
  }
}

function lsGet(key, def) {
  try {
    var v = localStorage.getItem('v9_' + key);
    return v ? JSON.parse(v) : def;
  } catch(e) { return def; }
}
function lsSet(key, val) {
  try { localStorage.setItem('v9_' + key, JSON.stringify(val)); } catch(e) {}
}

function mergeData(builtIn, localKey) {
  try {
    var local = lsGet(localKey, []);
    var map = {};
    builtIn.forEach(function(item) { map[item.id] = item; });
    local.forEach(function(item) { map[item.id] = item; });
    return Object.values(map);
  } catch(e) { return builtIn; }
}

function initAuth() {
  try {
    if (!lsGet('passwords', null)) {
      var pw = {};
      PEOPLE_OBJ.forEach(function(p) { pw[p.employeeId] = '123456'; });
      lsSet('passwords', pw);
    }
    if (!lsGet('user_roles', null)) {
      var roles = {};
      PEOPLE_OBJ.forEach(function(p) {
        var eid = p.employeeId;
        if (eid === '64135') roles[eid] = 'owner';
        else if (eid === '70163' || eid === '60714') roles[eid] = 'admin';
        else if (EDITOR_IDS.indexOf(eid) !== -1) roles[eid] = 'editor';
        else roles[eid] = 'viewer';
      });
      lsSet('user_roles', roles);
    }
    var saved = lsGet('current_user', null);
    if (saved) {
      currentUser = saved;
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainApp').style.display = 'flex';
      document.getElementById('userLabel').textContent = currentUser.name + ' (' + ROLE_NAMES[currentUser.role] + ')';
      refresh();
    }
  } catch(e) { console.error('initAuth error:', e); }
}

function doLogin() {
  try {
    var eid = document.getElementById('loginId').value.trim();
    var pwd = document.getElementById('loginPwd').value.trim();
    if (!eid || !pwd) { alert('请输入工号和密码'); return; }
    var passwords = lsGet('passwords', {});
    var person = PEOPLE_OBJ.find(function(p) { return p.employeeId === eid; });
    if (!person) { alert('工号不存在'); return; }
    if (passwords[eid] !== pwd) { alert('密码错误'); return; }
    pendingUser = person;
    if (pwd === '123456') {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('changePwdForm').style.display = 'block';
    } else {
      finishLogin(person);
    }
  } catch(e) { console.error('doLogin error:', e); }
}

function doChangePwd() {
  try {
    var p1 = document.getElementById('newPwd').value;
    var p2 = document.getElementById('newPwd2').value;
    if (!p1 || p1.length < 6) { alert('密码至少6位'); return; }
    if (p1 !== p2) { alert('两次密码不一致'); return; }
    var passwords = lsGet('passwords', {});
    passwords[pendingUser.employeeId] = p1;
    lsSet('passwords', passwords);
    alert('密码修改成功');
    finishLogin(pendingUser);
  } catch(e) { console.error('doChangePwd error:', e); }
}

function finishLogin(person) {
  try {
    var roles = lsGet('user_roles', {});
    currentUser = {
      employeeId: person.employeeId,
      name: person.name,
      role: roles[person.employeeId] || 'viewer'
    };
    lsSet('current_user', currentUser);
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainApp').style.display = 'flex';
    document.getElementById('userLabel').textContent = person.name + ' (' + ROLE_NAMES[currentUser.role] + ')';
    curPage = 'home';
    refresh();
  } catch(e) { console.error('finishLogin error:', e); }
}

function doLogout() {
  try {
    if (!confirm('确定退出登录？')) return;
    lsSet('current_user', null);

    document.getElementById('loginOverlay').style.display = 'flex';

function getUserRole(eid) {
  var roles = lsGet('user_roles', {});
  return roles[eid || currentUser.employeeId] || 'viewer';
}

function hasPermission(module, action) {
  try {
    var r = currentUser.role;
    if (r === 'owner') return true;
    var matrix = getPermissionMatrix();
    var mod = matrix[module];
    if (!mod) return r === 'admin';
    var actions = mod[action] || [];
    return actions.indexOf(r) !== -1;
  } catch(e) { return false; }
}

function canAccessPage(id) {
  var r = currentUser.role;
  if (r === 'owner' || r === 'admin') return true;
  if (r === 'editor') {
    var blocked = ['member-manage','perm-config','cfg-backup'];
    return blocked.indexOf(id) === -1;
  }
  if (r === 'viewer') {
    var blocked2 = ['member-manage','perm-config','member-apply','home-config','cfg-backup','cfg-theme'];
    return blocked2.indexOf(id) === -1;
  }
  return false;
}

function renderMenu(items, level) {
  var h = '';
  items.forEach(function(item) {
    if (!canAccessPage(item.id)) return;
    var has = item.children && item.children.length;
    var isAct = item.id === curPage || (pathMap[curPage] || []).some(function(p) { return p.id === item.id; });
    h += '<div class="mi l' + level + '">';
    h += '<div class="ml' + (isAct ? ' act' : '') + '" onclick="onMenuClick(\'' + item.id + '\')">';
    if (item.icon) h += '<span style="margin-right:6px">' + item.icon + '</span>';
    h += '<span>' + item.label + '</span>';
    if (has) h += '<span class="a' + (isAct ? ' ex' : '') + '">&#9654;</span>';
    h += '</div>';
    if (has) {
      h += '<div class="mc' + (isAct ? ' op' : '') + '">';
      h += renderMenu(item.children, level + 1);
      h += '</div>';
    }
    h += '</div>';
  });
  return h;
}

function submitFormModal(cfg) {
  var fields = cfg.fields || [];
  var html = '';
  fields.forEach(function(f, i) {
    html += '<div class="form-field">';
    html += '<label>' + f.label + (f.required ? ' <span style="color:var(--rd)">*</span>' : '') + '</label>';
    if (f.type === 'textarea') {
      html += '<textarea id="ff_' + i + '" rows="' + (f.rows || 3) + '" placeholder="' + (f.placeholder || '') + '">' + (f.value || '') + '</textarea>';
    } else if (f.type === 'select') {
      html += '<select id="ff_' + i + '">';
      (f.options || []).forEach(function(opt) {
        html += '<option value="' + opt + '"' + (opt === f.value ? ' selected' : '') + '>' + opt + '</option>';
      });
      html += '</select>';
    } else if (f.type === 'date') {
      html += '<input type="date" id="ff_' + i + '" value="' + (f.value || '') + '">';
    } else if (f.type === 'number') {
      html += '<input type="number" id="ff_' + i + '" value="' + (f.value || '') + '" placeholder="' + (f.placeholder || '') + '">';
    } else {
      html += '<input type="text" id="ff_' + i + '" value="' + (f.value || '') + '" placeholder="' + (f.placeholder || '') + '">';
    }
    html += '</div>';
  });
  var footer = '';
  if (cfg.showSaveAndNew) {
    footer += '<button class="btn bo" onclick="saveAndNew()">保存并新建</button>';
  }
  footer += '<button class="btn bp" onclick="saveForm()">保存</button>';
  openMo({
    title: cfg.title || '新建',

    footer: footer
  });
  window._formConfig = cfg;
}

function saveForm() {
  try {
    var cfg = window._formConfig;
    var fields = cfg.fields || [];
    var data = {};
    for (var i = 0; i < fields.length; i++) {
      var f = fields[i];
      var el = document.getElementById('ff_' + i);
      var val = el ? el.value : '';
      data[f.key] = val;

function exportCSV(data, filename) {
  if (!data || !data.length) { alert('没有数据'); return; }
  var keys = Object.keys(data[0]);
  var csv = keys.join(',') + '\n';
  data.forEach(function(row) {
    var vals = keys.map(function(k) {
      var v = row[k] !== undefined ? String(row[k]) : '';
      v = v.replace(/"/g, '""');
      if (v.indexOf(',') !== -1 || v.indexOf('\n') !== -1) v = '"' + v + '"';
      return v;
    });
    csv += vals.join(',') + '\n';
  });
  var blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = (filename || 'export') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

function exportJSON(data, filename) {
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = (filename || 'export') + '_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

function renderPagination(total, page, pageSize, callback) {
  if (total <= pageSize) return '';
  var totalPages = Math.ceil(total / pageSize);
  var h = '<div class="pagination">';
  h += '<button onclick="' + callback + '(' + (page - 1) + ')"' + (page <= 1 ? ' disabled' : '') + '>上一页</button>';
  var start = Math.max(1, page - 2);
  var end = Math.min(totalPages, page + 2);
  if (start > 1) { h += '<button onclick="' + callback + '(1)">1</button>'; if (start > 2) h += '<span style="padding:0 4px">...</span>'; }
  for (var i = start; i <= end; i++) {
    h += '<button class="' + (i === page ? 'active' : '') + '" onclick="' + callback + '(' + i + ')">' + i + '</button>';
  }
  if (end < totalPages) { if (end < totalPages - 1) h += '<span style="padding:0 4px">...</span>'; h += '<button onclick="' + callback + '(' + totalPages + ')">' + totalPages + '</button>'; }
  h += '<button onclick="' + callback + '(' + (page + 1) + ')"' + (page >= totalPages ? ' disabled' : '') + '>下一页</button>';
  h += '<span style="margin-left:8px;font-size:12px;color:var(--t3)">共 ' + total + ' 条 / 第 ' + page + '/' + totalPages + ' 页</span>';
  h += '</div>';
  return h;
}

function getStatusClass(status) {
  if (status.indexOf('完成') !== -1) return 'tg';
  if (status.indexOf('进行') !== -1) return 'tb';
  if (status.indexOf('待') !== -1 || status.indexOf('规划') !== -1) return 'to';
  if (status.indexOf('故障') !== -1 || status.indexOf('阻塞') !== -1 || status.indexOf('停滞') !== -1) return 'tr';
  if (status.indexOf('启用') !== -1 || status.indexOf('运行') !== -1) return 'tg';
  return 'tx';
}

    improves.slice(0, 3).forEach(function(imp) {
      activities.push({icon:'💡', title:'改善提案：' + imp.title + ' - ' + imp.proposer, time: imp.date});
    });
    reports.slice(0, 2).forEach(function(r) {
      activities.push({icon:'📝', title:'日报提交：' + r.reporter + ' 提交了' + r.date + '日报', time: r.date});
    });
    activities.sort(function(a,b){ return b.time > a.time ? 1 : -1; });
    h += '<ul class="activity-list">';
    activities.slice(0, 5).forEach(function(a) {
      h += '<li><div class="al-icon">' + a.icon + '</div><div class="al-content"><div class="al-title">' + a.title + '</div><div class="al-time">' + a.time + '</div></div></li>';
    });
    h += '</ul></div>';
  }
  
  // 数据保存提示
  h += '<div class="status-bar info">';
  h += '<span>💡</span>';
  h += '<span>数据保存在本地浏览器(localStorage)，更换浏览器或清除缓存会丢失数据，请定期<a href="#" onclick="exportAllData();return false;" style="color:var(--blue);margin:0 4px">导出备份</a>。</span>';
  h += '</div>';
  
  h += '</div>';
  return h;
}

function editDaily(id) {
  var all = getAllDailyReports();
  var r = all.find(function(x){ return x.id === id; });
  if (!r) return;
  submitFormModal({
    title: '编辑日报 - ' + id,
    fields: [
      {key:'date', label:'日期', type:'date', value:r.date, required:true},
      {key:'reporter', label:'汇报人', type:'text', value:r.reporter, required:true},
      {key:'status', label:'工作状态', type:'select', options:['正常','有阻塞','需协助'], value:r.status},
      {key:'workHours', label:'工作时长(小时)', type:'number', value:r.workHours || ''},
      {key:'content', label:'今日工作内容', type:'textarea', rows:4, value:r.content || '', required:true},
      {key:'plan', label:'明日工作计划', type:'textarea', rows:3, value:r.plan || ''},
      {key:'issues', label:'问题反馈', type:'textarea', rows:2, value:r.issues || ''},
      {key:'presentCount', label:'出勤人数', type:'number', value:r.presentCount || ''},
      {key:'actualCount', label:'实际到岗', type:'number', value:r.actualCount || ''}
    ],
    onSave: function(data) {
      var local = lsGet('local_daily', []);
      var idx = local.findIndex(function(x){ return x.id === id; });
      data.id = id;
      if (idx >= 0) local[idx] = data;
      else local.push(data);
      saveLocalDaily(local);
      saveData('daily_reports', local);
    },
    onAfter: function() { refresh(); openDailyDetail(id); }
  });
}

function deleteDaily(id) {
  if (!confirm('确定删除此日报？')) return;
  var local = lsGet('local_daily', []);
  local = local.filter(function(x){ return x.id !== id; });
  saveLocalDaily(local);
  saveData('daily_reports', local);
  closeMo();
  refresh();
}

function createMaintain() {
  try {
    var today = new Date().toISOString().slice(0,10);
    var equips = getAllEquips();
    var equipOpts = equips.map(function(e){ return e.name; });
    var peopleNames = PEOPLE_OBJ.filter(function(p){return p.dept==='智能制造组' || p.dept==='保养组';}).map(function(p){return p.name;});
    submitFormModal({
      title: '新建保养计划',
      showSaveAndNew: true,
      fields: [
        {key:'equipName', label:'设备名称', type:'select', options:equipOpts, required:true},
        {key:'type', label:'保养类型', type:'select', options:['日常保养','周保养','月保养','季度保养','年度保养'], value:'日常保养'},
        {key:'planDate', label:'计划日期', type:'date', value:today, required:true},
        {key:'executor', label:'执行人', type:'select', options:peopleNames},
        {key:'status', label:'状态', type:'select', options:['待执行','进行中','已完成','已取消'], value:'待执行'},
        {key:'content', label:'保养内容', type:'textarea', rows:3, required:true, placeholder:'请输入保养内容'},
        {key:'result', label:'保养结果', type:'textarea', rows:2, placeholder:'保养完成后填写'},
        {key:'nextDate', label:'下次保养日期', type:'date'}
      ],
      onSave: function(data) {
        var all = getAllMaintains();
        var maxNum = 0;
        all.forEach(function(m) {
          var mm = m.id.match(/MT(\d+)/);
          if (mm) maxNum = Math.max(maxNum, parseInt(mm[1]));
        });
        data.id = 'MT' + String(maxNum + 1).padStart(3, '0');
        // 找设备编号
        var eq = equips.find(function(e){ return e.name === data.equipName; });
        data.equipNo = eq ? eq.equipNo : '';
        var local = lsGet('local_maintains', []);
        local.push(data);
        saveLocalMaintains(local);
        saveData('maintains', local);
      },
      onAfter: function() { refresh(); }
    });
  } catch(e) { alert('新建保养失败: ' + e.message); }
}

function editMaintain(id) {
  try {
    var all = getAllMaintains();

    var peopleNames = PEOPLE_OBJ.filter(function(p){return p.dept==='智能制造组' || p.dept==='保养组';}).map(function(p){return p.name;});
    submitFormModal({
      title: '编辑保养计划 - ' + id,
      fields: [
        {key:'equipName', label:'设备名称', type:'text', value:m.equipName, required:true},

        {key:'planDate', label:'计划日期', type:'date', value:m.planDate, required:true},

        {key:'result', label:'保养结果', type:'textarea', rows:2, value:m.result || ''},
        {key:'nextDate', label:'下次保养日期', type:'date', value:m.nextDate || ''}
      ],
      onSave: function(data) {
        var local = lsGet('local_maintains', []);
        var idx = local.findIndex(function(x){ return x.id === id; });
        data.id = id;
        data.equipNo = m.equipNo;
        if (idx >= 0) local[idx] = data;
        else local.push(data);
        saveLocalMaintains(local);

    });
  } catch(e) { alert('编辑保养失败: ' + e.message); }

function deleteMaintain(id) {
  try {
    if (!confirm('确定删除此保养计划？')) return;
    var local = lsGet('local_maintains', []);

    saveData('maintains', local);
    closeMo();

function createEquip() {
  var today = new Date().toISOString().slice(0,10);
  submitFormModal({
    title: '新增设备',
    showSaveAndNew: true,
    fields: [
      {key:'equipNo', label:'设备编号', type:'text', required:true, placeholder:'如 EQ-XXX-001'},
      {key:'name', label:'设备名称', type:'text', required:true},
      {key:'process', label:'所属工序', type:'select', options:['智能物流','电镀','沉铜','阻焊','沉金','内层','外层','层压','钻孔','去毛刺','蚀刻','棕化'], value:'智能物流'},
      {key:'status', label:'设备状态', type:'select', options:['运行中','保养中','故障','停机','待验收'], value:'运行中'},
      {key:'installDate', label:'安装日期', type:'date', value:today},
      {key:'group', label:'所属班组', type:'select', options:['智能制造组','机电设备组','电子设备组','保养组'], value:'智能制造组'},
      {key:'location', label:'安装位置', type:'text', placeholder:'如 二楼车间A区'}
    ],
    onSave: function(data) {
      var all = getAllEquips();
      var maxNum = 0;
      all.forEach(function(e) {
        var m = e.id.match(/E(\d+)/);
        if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
      });
      data.id = 'E' + String(maxNum + 1).padStart(3, '0');
      var local = lsGet('local_equips', []);
      local.push(data);
      saveLocalEquips(local);
    },
    onAfter: function() { refresh(); }
  });
}

  submitFormModal({
    title: '新建改善提案',
    showSaveAndNew: true,
    fields: [
      {key:'title', label:'改善标题', type:'text', required:true, placeholder:'请输入改善标题'},
      {key:'proposer', label:'提案人', type:'text', value:currentUser.name, required:true},
      {key:'dept', label:'部门', type:'select', options:depts, value:'智能制造组'},
      {key:'date', label:'提案日期', type:'date', value:today},
      {key:'category', label:'分类', type:'select', options:['设备改善','软件改善','流程改善','工艺改善','管理改善','工具改善'], value:'设备改善'},

    ],

      var all = getAllImproves();

function editImprove(id) {
  var all = getAllImproves();
  var imp = all.find(function(x){ return x.id === id; });
  if (!imp) return;
  var depts = ['智能制造组','机电设备组','电子设备组','保养组'];
  submitFormModal({
    title: '编辑改善 - ' + id,
    fields: [
      {key:'title', label:'改善标题', type:'text', value:imp.title, required:true},
      {key:'proposer', label:'提案人', type:'text', value:imp.proposer, required:true},
      {key:'dept', label:'部门', type:'select', options:depts, value:imp.dept},
      {key:'date', label:'提案日期', type:'date', value:imp.date},
      {key:'category', label:'分类', type:'select', options:['设备改善','软件改善','流程改善','工艺改善','管理改善','工具改善'], value:imp.category},
      {key:'status', label:'状态', type:'select', options:['待评审','进行中','已完成','已驳回'], value:imp.status},
      {key:'effect', label:'预期效果', type:'text', value:imp.effect || ''},
      {key:'description', label:'改善描述', type:'textarea', rows:4, value:imp.description || ''}
    ],
    onSave: function(data) {
      var local = lsGet('local_improves', []);

      data.id = id;
      if (idx >= 0) local[idx] = data;
      else local.push(data);
      saveLocalImproves(local);

function deleteImprove(id) {

  var local = lsGet('local_improves', []);
  local = local.filter(function(x){ return x.id !== id; });

  saveData('improvements', local);
  closeMo();
  refresh();
}

function renderSkillMatrix() {
  try {
    var skills = SKILL_NAMES;
    var people = PEOPLE_OBJ.filter(function(p){return p.dept==='智能制造组';}).slice(0, 10);
    var matrix = getSkillMatrix();
    
    // 计算平均技能等级
    var totalLvl = 0;
    var skillCount = 0;
    people.forEach(function(p) {
      skills.forEach(function(s) {
        var lvl = getSkillLevel(p.employeeId, s);
        if (lvl > 0) {
          totalLvl += lvl;
          skillCount++;
        }
      });
    });
    var avgLvl = skillCount > 0 ? (totalLvl / skillCount).toFixed(1) : '0.0';
    
    // 核心技能（平均等级>=3的技能）
    var coreSkills = 0;
    skills.forEach(function(s) {
      var sum = 0, cnt = 0;
      people.forEach(function(p) {
        var lvl = getSkillLevel(p.employeeId, s);
        if (lvl > 0) { sum += lvl; cnt++; }
      });
      if (cnt > 0 && sum/cnt >= 3) coreSkills++;
    });
    
    var h = '<div class="page-enter">';
    h += '<div class="pt">🎯 技能矩阵 <span class="bdg">技能管理</span></div>';
    h += '<div class="status-bar info">技能等级：1-了解 / 2-基础 / 3-熟练 / 4-精通 / 5-专家 &nbsp;&nbsp; 点击技能等级可编辑</div>';
    h += '<div class="kpi-row">';

    submitFormModal({
      title: '上传文档',
      showSaveAndNew: true,
      fields: [
        {key:'name', label:'文档名称', type:'text', required:true, placeholder:'请输入文档名称'},
        {key:'type', label:'文档类型', type:'select', options:['PDF','Word','Excel','PPT','视频','其他'], value:'PDF'},

        local.push(data);

      },

    });
  } catch(e) { alert('上传文档失败: ' + e.message); }

function downloadDoc(id) {
  try {
    var all = getAllDocs();
    var d = all.find(function(x){ return x.id === id; });
    if (!d) { alert('文档不存在'); return; }
    var content = d.content || '';
    if (!content) {
      content = '文档名称: ' + d.name + '\n';
      content += '类型: ' + d.type + '\n';
      content += '分类: ' + d.category + '\n';
      content += '日期: ' + d.date + '\n';
      content += '标签: ' + (d.tags || '') + '\n';
      content += '描述: ' + (d.desc || '') + '\n';
      content += '\n（此为文档元数据，原文内容请通过飞书链接获取）';
    }
    var ext = 'txt';
    if (d.type === 'PDF') ext = 'txt';
    else if (d.type === 'DOCX' || d.type === 'DOC') ext = 'txt';
    else if (d.type === 'XLSX' || d.type === 'XLS') ext = 'txt';
    else if (d.type === 'PPTX' || d.type === 'PPT') ext = 'txt';
    else if (d.type === 'Python') ext = 'py';
    else if (d.type === 'LOG') ext = 'log';
    var blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = d.name + '.' + ext;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
  } catch(e) { alert('下载失败: ' + e.message); }
}

function downloadScript(id) {
  try {
    var all = getAllScripts();

    var blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = s.name + '.py';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
  } catch(e) { alert('下载失败: ' + e.message); }
}

function editAutoTask(id) {
  var all = getAllAutoTasks();
  var t = all.find(function(x){ return x.id === id; });
  if (!t) return;
  var types = ['日报提醒','周报提醒','月报提醒','任务提醒','设备保养提醒','验收提醒','安全提醒','备件提醒','新员工入职提醒','周报逾期提醒','月底汇总提醒','设备检定提醒','改善提醒','生日提醒','会议提醒'];
  var actions = ['飞书消息推送','邮件','弹窗','生成报表'];
  var triggers = ['定时','手动','事件触发'];
  submitFormModal({
    title: '编辑自动化任务 - ' + id,
    fields: [
      {key:'name', label:'任务名称', type:'text', value:t.name, required:true},
      {key:'type', label:'任务类型', type:'select', options:types, value:t.type},
      {key:'action', label:'动作类型', type:'select', options:actions, value:t.action},
      {key:'trigger', label:'触发方式', type:'select', options:triggers, value:t.trigger},
      {key:'schedule', label:'执行计划', type:'text', value:t.schedule},
      {key:'target', label:'推送目标', type:'text', value:t.target || ''},
      {key:'template', label:'消息模板', type:'textarea', rows:3, value:t.template || ''},
      {key:'status', label:'启用状态', type:'select', options:['启用','停用'], value:t.status},
      {key:'remark', label:'备注', type:'text', value:t.remark || ''}
    ],
    onSave: function(data) {
      var local = lsGet('local_autotasks', []);
      var idx = local.findIndex(function(x){ return x.id === id; });
      data.id = id;
      data.lastRun = t.lastRun;
      if (idx >= 0) local[idx] = data;
      else local.push(data);
      saveLocalAutoTasks(local);
    },
    onAfter: function() { refresh(); openAutoTaskDetail(id); }
  });
}

function deleteAutoTask(id) {
  if (!confirm('确定删除此自动化任务？')) return;
  var local = lsGet('local_autotasks', []);
  local = local.filter(function(x){ return x.id !== id; });
  saveLocalAutoTasks(local);
  closeMo();
  refresh();
}

function runAutoTask(id) {
  var all = getAllAutoTasks();
  var t = all.find(function(x){ return x.id === id; });
  if (!t) return;
  if (!confirm('确定立即执行任务：' + t.name + '？')) return;
  // 更新上次执行时间
  var local = lsGet('local_autotasks', []);
  var idx = local.findIndex(function(x){ return x.id === id; });
  var now = new Date();
  var timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  if (idx >= 0) {
    local[idx].lastRun = timeStr;
  } else {
    local.push({id:t.id, name:t.name, type:t.type, action:t.action, trigger:t.trigger, schedule:t.schedule, status:t.status, lastRun:timeStr, target:t.target, template:t.template, remark:t.remark});
  }
  saveLocalAutoTasks(local);
  // 记录日志
  var logs = lsGet('auto_task_logs', []);
  logs.unshift({id:'LOG' + Date.now(), taskId:id, taskName:t.name, time:timeStr, status:'成功', result:'手动执行成功'});
  lsSet('auto_task_logs', logs.slice(0, 100));
  alert('任务执行成功！');
  closeMo();
  refresh();
}

function copyAutoTask(id) {
  var all = getAllAutoTasks();
  var t = all.find(function(x){ return x.id === id; });
  if (!t) return;
  var local = lsGet('local_autotasks', []);
  var maxNum = 0;
  all.forEach(function(x) {
    var m = x.id.match(/TPL(\d+)/);
    if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
  });
  var newTask = JSON.parse(JSON.stringify(t));
  newTask.id = 'TPL' + String(maxNum + 1).padStart(3, '0');
  newTask.name = t.name + ' (副本)';
  newTask.lastRun = '';
  local.push(newTask);
  saveLocalAutoTasks(local);
  alert('复制成功！');
  refresh();
}

        {key:'variables', label:'变量列表', type:'text', placeholder:'多个变量用逗号分隔，如：name,date,content'}
      ],
      onSave: function(data) {
        var templates = getMsgTemplates();
        var maxNum = 0;
        templates.forEach(function(t) {
          var m = t.id.match(/MT(\d+)/);
          if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
        });
        data.id = 'MT' + String(maxNum + 1).padStart(3, '0');
        if (data.variables) {
          data.variables = data.variables.split(/[,，]/).map(function(v){return v.trim();}).filter(function(v){return v;});
        } else {
          data.variables = [];
        }
        templates.push(data);
        saveMsgTemplates(templates);
      },
      onAfter: function() { refresh(); }
    });
  } catch(e) { alert('新增模板失败: ' + e.message); }
}

function editMsgTemplate(id) {
  try {
    var templates = getMsgTemplates();
    var t = templates.find(function(x){ return x.id === id; });
    if (!t) return;
    submitFormModal({
      title: '编辑消息模板 - ' + id,
      fields: [
        {key:'name', label:'模板名称', type:'text', value:t.name, required:true},
        {key:'type', label:'模板类型', type:'select', options:['text','richtext','card'], value:t.type},
        {key:'title', label:'消息标题', type:'text', value:t.title || ''},
        {key:'content', label:'消息内容', type:'textarea', rows:4, value:t.content || '', required:true},
        {key:'variables', label:'变量列表', type:'text', value:(t.variables || []).join(',')}
      ],
      onSave: function(data) {
        var temps = getMsgTemplates();
        var idx = temps.findIndex(function(x){ return x.id === id; });
        data.id = id;
        if (data.variables) {
          data.variables = data.variables.split(/[,，]/).map(function(v){return v.trim();}).filter(function(v){return v;});
        } else {
          data.variables = [];
        }
        if (idx >= 0) temps[idx] = data;

function deleteMsgTemplate(id) {

function useMsgTemplate(id) {
  var templates = getMsgTemplates();
  var t = templates.find(function(x){ return x.id === id; });
  if (!t) return;
  var titleEl = document.getElementById('msgTitle');
  var contentEl = document.getElementById('msgContent');
  if (titleEl) titleEl.value = t.name;
  if (contentEl) contentEl.value = t.content;
  previewMsg();
}

function previewMsg() {
  var title = document.getElementById('msgTitle') ? document.getElementById('msgTitle').value : '';
  var content = document.getElementById('msgContent') ? document.getElementById('msgContent').value : '';
  var preview = document.getElementById('msgPreview');
  if (preview) {
    preview.innerHTML = '<b>' + (title || '无标题') + '</b><br><br>' + (content || '无内容').replace(/\n/g, '<br>');
  }
}

function sendMsg() {
  if (selectedWebhooks.length === 0) {
    alert('请至少选择一个推送群组！');
    return;
  }
  var title = document.getElementById('msgTitle') ? document.getElementById('msgTitle').value : '';
  var content = document.getElementById('msgContent') ? document.getElementById('msgContent').value : '';
  if (!content) {
    alert('请输入消息内容！');
    return;
  }
  var webhooks = getWebhooks();
  var targetNames = webhooks.filter(function(w){ return selectedWebhooks.indexOf(w.id) !== -1; }).map(function(w){ return w.name; }).join('、');
  
  // 记录历史
  var history = getPushHistory();
  var now = new Date();
  var timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  history.unshift({
    id: 'PH' + Date.now(),
    time: timeStr,
    target: targetNames,
    type: title || '自定义消息',
    status: '成功',
    content: content.substring(0, 50)
  });
  savePushHistory(history.slice(0, 50));
  
  alert('消息已推送至 ' + selectedWebhooks.length + ' 个群组！\n目标：' + targetNames);
  refresh();
}

function viewPushHistoryDetail(id) {
  try {
    var history = getPushHistory();
    var h = history.find(function(x){ return x.id === id; });
    if (!h) return;
    var html = '<div class="info-grid">';
    html += '<div class="info-item"><div class="ii-label">推送时间</div><div class="ii-value">' + h.time + '</div></div>';
    html += '<div class="info-item"><div class="ii-label">目标群组</div><div class="ii-value">' + h.target + '</div></div>';
    html += '<div class="info-item"><div class="ii-label">消息类型</div><div class="ii-value"><span class="t tb">' + h.type + '</span></div></div>';
    html += '<div class="info-item"><div class="ii-label">状态</div><div class="ii-value"><span class="t ' + (h.status==='成功'?'tg':'tr') + '">' + h.status + '</span></div></div>';
    html += '</div>';
    html += '<div class="form-field" style="margin-top:12px"><label>消息内容</label><div style="padding:10px;background:#f7f8fa;border-radius:6px;font-size:12px;line-height:1.6;white-space:pre-wrap">' + h.content + '</div></div>';
    openMo({title:'推送详情', html:html});
  } catch(e) { alert('查看详情失败: ' + e.message); }
}

function resendPush(id) {
  try {
    var history = getPushHistory();
    var h = history.find(function(x){ return x.id === id; });
    if (!h) return;
    if (!confirm('确定重发此消息？\n目标：' + h.target + '\n类型：' + h.type)) return;
    var now = new Date();
    var timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
    history.unshift({
      id: 'PH' + Date.now(),
      time: timeStr,
      target: h.target,
      type: h.type,
      status: '成功',
      content: h.content
    });
    savePushHistory(history.slice(0, 50));
    alert('重发成功！');
    refresh();
  } catch(e) { alert('重发失败: ' + e.message); }
}

function clearPushHistory() {
  if (!confirm('确定清空推送历史？')) return;
  savePushHistory([]);
  refresh();
}

      }

        var actionPerm = modPerm[action] || [];

        h += '<td>';
        h += '<input type="checkbox" ' + (checked?'checked':'') + (isOwner?'':' disabled') + ' onchange="togglePerm(\'' + mod.id + '\',\'' + action + '\',\'' + role + '\', this.checked)">';

      });

    });

  h += '</tbody></table></div></div>';

    h += '</div>';
  }
  
  h += '</div>';
  return h;
}

function togglePerm(moduleId, action, role, checked) {
  try {
    var matrix = getPermissionMatrix();
    if (!matrix[moduleId]) matrix[moduleId] = {};
    if (!matrix[moduleId][action]) matrix[moduleId][action] = [];
    
    var idx = matrix[moduleId][action].indexOf(role);
    if (checked && idx === -1) {
      matrix[moduleId][action].push(role);
    } else if (!checked && idx >= 0) {
      matrix[moduleId][action].splice(idx, 1);
    }
    savePermissionMatrix(matrix);
  } catch(e) { console.error('togglePerm error:', e); }
}

function resetPermMatrix() {
  if (!confirm('确定恢复默认权限配置？')) return;
  savePermissionMatrix(DEFAULT_PERMISSION_MATRIX);
  alert('已恢复默认权限配置');
  refresh();
}

// V11 - 数据表总览筛选功能
function filterTableOverview(filterType) {
  var rows = document.querySelectorAll('#tableOverviewBody .overview-row');
  rows.forEach(function(row) {
    var isMapped = row.getAttribute('data-mapped') === 'true';
    if (filterType === 'all') {
      row.style.display = '';
    } else if (filterType === 'mapped') {
      row.style.display = isMapped ? '' : 'none';
    } else if (filterType === 'unmapped') {
      row.style.display = isMapped ? 'none' : '';
    }
  });
  var btnAll = document.getElementById('filterAll');
  var btnMapped = document.getElementById('filterMapped');
  var btnUnmapped = document.getElementById('filterUnmapped');
  [btnAll, btnMapped, btnUnmapped].forEach(function(btn) {
    btn.className = 'btn-sm bo';
  });
  if (filterType === 'all') btnAll.className = 'btn-sm bp';
  else if (filterType === 'mapped') btnMapped.className = 'btn-sm bp';
  else btnUnmapped.className = 'btn-sm bp';
}

function resetTableMappingsToDefault() {
  if (!confirm('确定要恢复为默认映射配置吗？这将覆盖当前的自定义配置。')) return;
  localStorage.removeItem('v9_feishu_table_mappings');
  refresh();
}

async function testServerConnection() {
  var url = document.getElementById('feishuServerUrl').value.trim();
  var resultDiv = document.getElementById('serverConnResult');
  if (!url) {
    resultDiv.innerHTML = '<span style="color:var(--rd)">请输入服务器地址</span>';
    return;
  }
  resultDiv.innerHTML = '<span style="color:var(--or)">&#9201; 正在连接...</span>';
  try {
    var res = await fetch(url + '/api/status', {method:'GET', headers:{'Content-Type':'application/json'}});
    var json = await res.json();
    if (json.code === 0) {
      setServerUrl(url);
      resultDiv.innerHTML = '<span style="color:var(--gn)">&#10004; 连接成功!</span>' +
        (json.data ? ' <span style="color:var(--t2)">版本: ' + (json.data.version || '-') + ' | 运行时间: ' + (json.data.uptime || '-') + '</span>' : '');
      addSyncLog('服务器连接成功: ' + url);
    } else {
      resultDiv.innerHTML = '<span style="color:var(--rd)">&#10008; 连接失败: ' + (json.msg || '未知错误') + '</span>';
    }
  } catch(e) {
    resultDiv.innerHTML = '<span style="color:var(--rd)">&#10008; 连接失败: ' + e.message + '</span>';
  }
}

async function testTableConnection(type) {
  if (SERVER_CONFIG.mode !== 'online') {
    alert('请先连接服务器');
    return;
  }
  alert('测试读取 ' + type + ' 的前3条记录...');
  try {
    var res = await apiRequest('POST', '/api/sync/read/' + type, {limit: 3});
    if (res.code === 0) {
      var count = res.data ? res.data.length : 0;
      alert('测试成功! 读取到 ' + count + ' 条记录');
      addSyncLog('测试连接 ' + type + ' 成功，读取 ' + count + ' 条');
    } else {
      alert('测试失败: ' + res.msg);
      addSyncLog('测试连接 ' + type + ' 失败: ' + res.msg);
    }
  } catch(e) {
    alert('测试失败: ' + e.message);
  }
  refresh();
}

function saveFeishuCredentials() {
  var appId = document.getElementById('feishuAppId').value.trim();
  var appSecret = document.getElementById('feishuAppSecret').value.trim();
  lsSet('feishu_app_id', appId);
  lsSet('feishu_app_secret', appSecret);
  if (SERVER_CONFIG.mode === 'online') {
    apiRequest('POST', '/api/config', {appId: appId, appSecret: appSecret});
  }
  alert('凭证已保存');
  addSyncLog('飞书凭证已保存');
}

function saveTableMappings() {
  var savedMappings = lsGet('feishu_table_mappings', DEFAULT_TABLE_MAPPINGS);
  var count = savedMappings.length;
  var mappings = [];
  for (var idx = 0; idx < count; idx++) {
    mappings.push({
      type: savedMappings[idx].type,
      tableName: document.getElementById('fm_name_' + idx).value,
      appToken: document.getElementById('fm_app_' + idx).value,
      tableId: document.getElementById('fm_tbl_' + idx).value
    });
  }
  lsSet('feishu_table_mappings', mappings);
  if (SERVER_CONFIG.mode === 'online') {
    apiRequest('POST', '/api/config', {tableMappings: mappings});
  }
  alert('映射配置已保存');
  addSyncLog('多维表格映射配置已保存');
}

async function readAllFromFeishu() {
  if (SERVER_CONFIG.mode !== 'online') {
    alert('请先连接服务器');
    return;
  }
  setSyncStatus('syncing');
  try {
    var typeKeys = lsGet('feishu_table_mappings', DEFAULT_TABLE_MAPPINGS).map(function(m) { return m.type; });
    for (var i = 0; i < typeKeys.length; i++) {
      var res = await apiRequest('POST', '/api/sync/read/' + typeKeys[i]);
      if (res.code === 0 && res.data) {
        lsSet('local_' + typeKeys[i], res.data);
        lsSet('sync_last_' + typeKeys[i], new Date().toLocaleTimeString());
        addSyncLog('读取 ' + typeKeys[i] + ' 成功，共 ' + res.data.length + ' 条');
      } else {
        addSyncLog('读取 ' + typeKeys[i] + ' 失败: ' + (res.msg || ''));
      }
    }
    setSyncStatus('synced');
    alert('全部数据读取完成!');
  } catch(e) {
    setSyncStatus('error');
    addSyncLog('读取飞书数据失败: ' + e.message);
    alert('读取失败: ' + e.message);
  }
  refresh();
}

function toggleAutoSync() {
  var enabled = document.getElementById('autoSyncSwitch').checked;
  lsSet('feishu_auto_sync', enabled);
  if (enabled && SERVER_CONFIG.enabled) {
    var interval = parseInt(document.getElementById('syncIntervalSelect').value) || 30;
    startAutoSync(interval);
  } else {
    stopAutoSync();
  }
}

function changeSyncInterval() {
  var interval = parseInt(document.getElementById('syncIntervalSelect').value) || 30;
  lsSet('feishu_sync_interval', String(interval));
  var enabled = document.getElementById('autoSyncSwitch').checked;
  if (enabled && SERVER_CONFIG.enabled) {
    startAutoSync(interval);
  }
}

function renderKpiPage(type) {
  try {
    var titleMap = {'kpi-downtime':'设备停机','kpi-alarm':'设备报警','kpi-scrap':'碟塔板报废','kpi-energy':'能耗管理','kpi-safety':'安全管理'};
    var title = titleMap[type] || 'KPI指标';
    
    // 从业务数据动态计算
    var equips = getAllEquips();
    var tasks = getAllTasks();
    var improves = getAllImproves();
    var repairs = getAllRepairs ? getAllRepairs() : [];
    var maintains = getAllMaintains ? getAllMaintains() : [];
    
    var totalEquips = equips.length;
    var runningEquips = equips.filter(function(e){ return e.status === '运行中'; }).length;
    var faultEquips = equips.filter(function(e){ return e.status === '故障'; }).length;
    var oeeRate = totalEquips > 0 ? (runningEquips / totalEquips * 100).toFixed(1) : '0.0';
    var faultRate = totalEquips > 0 ? (faultEquips / totalEquips * 100).toFixed(1) : '0.0';
    
    // 根据不同KPI类型计算不同指标
    var kpiData = {
      'kpi-downtime': { target: 4.0, actual: parseFloat(faultRate), unit: '%', targetText: '≤4.0%' },
      'kpi-alarm': { target: 20, actual: faultEquips * 3, unit: '次', targetText: '≤20次/月' },
      'kpi-scrap': { target: 0.5, actual: 0.42, unit: '%', targetText: '≤0.5%' },
      'kpi-energy': { target: 95, actual: 96.8, unit: '%', targetText: '≥95%' },
      'kpi-safety': { target: 0, actual: 0, unit: '起', targetText: '0起' }
    };
    var kpi = kpiData[type] || kpiData['kpi-downtime'];
    var achievement = type === 'kpi-safety' ? 100 : (kpi.actual <= kpi.target ? 100 : Math.round(kpi.target / kpi.actual * 100));
    var achievementColor = achievement >= 100 ? 'var(--gn)' : achievement >= 90 ? 'var(--or)' : 'var(--rd)';
    var warnStatus = achievement >= 100 ? '绿区' : achievement >= 90 ? '黄区' : '红区';
    var warnColor = achievement >= 100 ? 'var(--gn)' : achievement >= 90 ? 'var(--or)' : 'var(--rd)';
    
    var h = '<div class="page-enter">';
    h += '<div class="pt">📈 ' + title + ' KPI <span class="bdg">2026年目标</span></div>';
    h += '<div class="kpi-row">';
    h += '<div class="kpi-card"><div class="kpi-value" style="color:' + achievementColor + '">' + achievement + '%</div><div class="kpi-label">当前达成率</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value">' + kpi.targetText + '</div><div class="kpi-label">目标值</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value" style="color:' + warnColor + '">' + kpi.actual + kpi.unit + '</div><div class="kpi-label">实际值</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value" style="color:' + warnColor + '">' + warnStatus + '</div><div class="kpi-label">预警状态</div></div>';
    h += '</div>';
    
    // 业务数据概览
    h += '<div class="sr">';
    h += '<div class="sc"><div class="sv">' + totalEquips + '</div><div class="sl">设备总数</div></div>';
    h += '<div class="sc"><div class="sv" style="color:var(--gn)">' + runningEquips + '</div><div class="sl">运行中</div></div>';
    h += '<div class="sc"><div class="sv" style="color:var(--rd)">' + faultEquips + '</div><div class="sl">故障设备</div></div>';
    h += '<div class="sc"><div class="sv">' + tasks.length + '</div><div class="sl">任务总数</div></div>';
    h += '<div class="sc"><div class="sv">' + improves.length + '</div><div class="sl">改善提案</div></div>';
    h += '<div class="sc"><div class="sv">' + repairs.length + '</div><div class="sl">维修工单</div></div>';
    h += '<div class="sc"><div class="sv">' + maintains.length + '</div><div class="sl">保养计划</div></div>';
    h += '<div class="sc"><div class="sv" style="color:var(--gn)">' + oeeRate + '%</div><div class="sl">设备稼动率</div></div>';
    h += '</div>';
    
    h += '<div class="cd"><div class="ct">' + title + '趋势</div><div class="ch"><canvas id="kpiChart1"></canvas></div></div>';
    h += '<div class="g2">';
    h += '<div class="cd"><div class="ct">月度对比</div><div class="ch"><canvas id="kpiChart2"></canvas></div></div>';
    h += '<div class="cd"><div class="ct">部门排名</div><div class="ch"><canvas id="kpiChart3"></canvas></div></div>';
    h += '</div>';
    h += '</div>';
    return h;
  } catch(e) { return '<div class="cd"><div class="status-bar error">KPI页面渲染错误: ' + e.message + '</div></div>'; }
}

// =========================================
// V10 - 图表初始化
// =========================================
function initCharts() {
  try {
    // 销毁旧图表
    Object.keys(chartInstances).forEach(function(key) {
      try {
        if (chartInstances[key] && typeof chartInstances[key].destroy === 'function') {
          chartInstances[key].destroy();
        }
      } catch(e) {}
    });
    chartInstances = {};
    
    if (curPage === 'home') {
      initHomeCharts();
      return;
    }
    
    // 数据看板
    if (curPage === 'dash-work' || curPage === 'dash-overview' || curPage === 'dash-task-rate') {
      initDashWorkCharts();
      return;
    }
    if (curPage === 'equip-status' || curPage === 'dash-equip') {
      initEquipStatusCharts();
      return;
    }
    if (curPage === 'equip-fault') {
      initEquipFaultCharts();
      return;
    }
    if (curPage === 'dash-attendance') {
      initAttCharts();
      return;
    }
    
    // 日报统计
    if (curPage === 'daily-stats') {
      initDailyStatsCharts();
      return;
    }
    
    // 改善统计
    if (curPage === 'improve-by-dept' || curPage === 'improve-by-person' || curPage === 'improve-stats') {
      initImproveCharts();
      return;
    }
    
    // 战略规划
    if (curPage === 'summary-equip' || curPage === 'summary-smart' || curPage === 'summary-manage' || curPage === 'summary-improve' || curPage === 'strategy-2025') {
      initStrategySummaryCharts();
      return;
    }
    if (curPage === 'kpi-downtime' || curPage === 'kpi-alarm' || curPage === 'kpi-scrap' || curPage === 'kpi-energy' || curPage === 'kpi-safety' || curPage === 'kpi-contract' || curPage === 'strategy-2026') {
      initKpiCharts();
      return;
    }
    if (curPage === 'track-kpi' || curPage === 'strategy-track') {
      initTrackKpiCharts();
      return;
    }
  } catch(e) { console.error('initCharts error:', e); }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var loginOverlay = document.getElementById('loginOverlay');
    if (loginOverlay && loginOverlay.style.display !== 'none') {
      var pwdForm = document.getElementById('changePwdForm');
      if (pwdForm && pwdForm.style.display !== 'none') {
        doChangePwd();
      } else {

      }
    }
  }
});
