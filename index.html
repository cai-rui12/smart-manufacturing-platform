<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能制造组管理平台 V8</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#3370ff;--bl:#e8f0ff;--bd:#2b5ce6;--bg:#f5f6f7;--w:#fff;--t:#1f2329;--t2:#646a73;--t3:#8f959e;--br:#dee0e3;--br2:#e8e8e8;--gn:#34c724;--or:#ff9800;--rd:#f54a45;--r:8px;--sh:0 1px 3px rgba(0,0,0,.08)}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;color:var(--t);background:var(--bg)}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:260px;min-width:260px;background:var(--w);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden}
.sb-h{height:48px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--br);background:var(--blue);color:#fff;flex-shrink:0}
.sb-h .lo{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-h .v{margin-left:auto;font-size:11px;opacity:.8;flex-shrink:0}
.sb-b{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 0}
.sb-b::-webkit-scrollbar{width:4px}
.sb-b::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.mi{user-select:none}
.ml{display:flex;align-items:center;padding:6px 12px 6px 0;cursor:pointer;color:var(--t);font-size:13px;transition:background .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ml:hover{background:var(--bl);color:var(--blue)}
.ml.act{background:var(--bl);color:var(--blue);font-weight:600}
.ml .a{margin-left:auto;margin-right:10px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--t3);transition:transform .2s}
.ml .a.ex{transform:rotate(90deg)}
.mc{display:none}.mc.op{display:block}
.mi.l0>.ml{font-weight:600;font-size:14px}
.mi.l1>.ml{padding-left:14px}
.mi.l2>.ml{padding-left:28px}
.mi.l3>.ml{padding-left:42px}
.mi.l4>.ml{padding-left:56px;font-size:12px}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mn-h{height:48px;background:var(--w);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 20px;flex-shrink:0}
.bc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t2)}
.bc .cu{color:var(--t);font-weight:500}
.mn-b{flex:1;overflow-y:auto;padding:16px 20px;background:var(--bg)}
.pt{font-size:18px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.bdg{font-size:11px;background:var(--bl);color:var(--blue);padding:2px 8px;border-radius:10px;font-weight:500}
.cd{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:14px}
.ct{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--t)}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.sc{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:16px;text-align:center}
.sc .sv{font-size:26px;font-weight:700;color:var(--blue)}
.sc .sl{font-size:12px;color:var(--t2);margin-top:3px}
.sc .sc2{font-size:11px;margin-top:4px}.sc .up{color:var(--gn)}.sc .dn{color:var(--rd)}
table.dt{width:100%;border-collapse:collapse;font-size:12px}
table.dt th{background:#f7f8fa;padding:8px 10px;text-align:left;font-weight:600;color:var(--t2);border-bottom:1px solid var(--br);white-space:nowrap}
table.dt td{padding:8px 10px;border-bottom:1px solid var(--br2);color:var(--t)}
table.dt tr:hover td{background:#f7f9ff;cursor:pointer}
.t{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tb{background:#e8f0ff;color:#3370ff}.tg{background:#e8f8e8;color:#34c724}.to{background:#fff4e0;color:#ff9800}
.tr{background:#ffe8e8;color:#f54a45}.tx{background:#f0f0f0;color:#8f959e}.tp{background:#f0e8ff;color:#7c3aed}
.pb{background:#f0f0f0;border-radius:10px;height:7px;overflow:hidden;width:100%}
.pf{height:100%;border-radius:10px;transition:width .6s}
.pfb{background:linear-gradient(90deg,#3370ff,#5b93ff)}.pfg{background:linear-gradient(90deg,#34c724,#6dd55e)}
.pfo{background:linear-gradient(90deg,#ff9800,#ffb74d)}.pfr{background:linear-gradient(90deg,#f54a45,#ff7070)}
.ch{position:relative;height:280px;width:100%}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.bp{background:var(--blue);color:#fff}.bp:hover{background:var(--bd)}
.bo{background:#fff;color:var(--blue);border:1px solid var(--blue)}.bo:hover{background:var(--bl)}
.bg{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.fi{width:100%;padding:6px 10px;border:1px solid var(--br);border-radius:6px;font-size:12px}
.fi:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(51,112,255,.15)}
.mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding-top:60px}
.mo.sh{display:flex}
.md{background:var(--w);border-radius:12px;width:620px;max-width:90vw;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.md-h{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--br);flex-shrink:0}
.md-h h3{font-size:15px;font-weight:600}
.md-x{margin-left:auto;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;font-size:16px;color:var(--t2)}
.md-x:hover{background:#f0f0f0}
.md-b{padding:16px 18px;overflow-y:auto;flex:1}
.md-f{padding:10px 18px;border-top:1px solid var(--br);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.fg{margin-bottom:12px}
.fl{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.hc{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;min-width:18px;min-height:18px;padding:2px}
.h0{background:#e8f0ff;color:#999}.h1{background:#b8d4ff}.h2{background:#3370ff}.h3{background:#2b5ce6}.h4{background:#1a3fad}
.fc{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:20px;border-left:4px solid var(--blue);transition:transform .2s,box-shadow .2s;cursor:pointer}
.fc:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.fc .ic{font-size:28px;margin-bottom:10px}
.fc h4{font-size:14px;font-weight:600;margin-bottom:6px}
.fc p{font-size:12px;color:var(--t2);line-height:1.5}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.parent-card{cursor:pointer;transition:transform .2s,box-shadow .2s}
.parent-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.sw{position:relative;width:36px;height:20px;display:inline-block;vertical-align:middle}
.sw input{opacity:0;width:0;height:0}
.sw .sl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:20px;transition:.2s}
.sw .sl::before{content:"";position:absolute;height:16px;width:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked+.sl{background:var(--blue)}
.sw input:checked+.sl::before{transform:translateX(16px)}
.cfg-card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:16px;border:1px solid var(--br);transition:box-shadow .2s}
.cfg-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.cfg-card h4{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cfg-card p{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:8px}
.btn-sm{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:none;transition:all .15s}
.btn-sm.bp{background:var(--blue);color:#fff}.btn-sm.bp:hover{background:var(--bd)}
.btn-sm.bo{background:#fff;color:var(--blue);border:1px solid var(--blue)}.btn-sm.bo:hover{background:var(--bl)}
.btn-sm.dg{background:#fff;color:var(--rd);border:1px solid var(--rd)}.btn-sm.dg:hover{background:#ffe8e8}
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a3fad 0%,#3370ff 50%,#5b93ff 100%);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--w);border-radius:16px;padding:40px;width:420px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-box .login-logo{text-align:center;margin-bottom:28px}
.login-box .login-logo .logo-icon{font-size:48px;margin-bottom:8px}
.login-box .login-logo h2{font-size:20px;font-weight:600;color:var(--t);margin-bottom:4px}
.login-box .login-logo p{font-size:13px;color:var(--t2)}
.login-box .login-fg{margin-bottom:18px}
.login-box .login-fg label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px}
.login-box .login-fg input,.login-box .login-fg select{width:100%;padding:10px 14px;border:1px solid var(--br);border-radius:8px;font-size:14px;transition:all .15s}
.login-box .login-fg input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(51,112,255,.15)}
.login-box .login-btn{width:100%;padding:12px;border-radius:8px;background:var(--blue);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:background .15s}
.login-box .login-btn:hover{background:var(--bd)}
.login-box .login-hint{margin-top:16px;text-align:center;font-size:12px;color:var(--t3)}
.disabled-page{text-align:center;padding:60px 20px;color:var(--t3)}
.disabled-page .dp-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.disabled-page .dp-text{font-size:16px;font-weight:500;margin-bottom:8px}
@media(max-width:768px){.sb{width:50px;min-width:50px}.sb-h .lo,.sb-h .v,.ml span:not(.a){display:none}.ml{justify-content:center;padding:6px 4px}.ml .a{margin:0}.sr{grid-template-columns:repeat(2,1fr)}.g2,.g3,.g4{grid-template-columns:1fr}}

/* V8 Additional Styles */
.parent-card{cursor:pointer;transition:transform .2s,box-shadow .2s}
.parent-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
table.dt tr{transition:background .15s}
.timeline{position:relative;padding-left:30px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--br)}
.timeline-item{position:relative;padding-bottom:20px}
.timeline-item::before{content:'';position:absolute;left:-24px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--blue);border:2px solid #fff;box-shadow:0 0 0 2px var(--blue)}
.timeline-item .tl-time{font-size:11px;color:var(--t3);margin-bottom:3px}
.timeline-item .tl-content{font-size:12px;color:var(--t)}
.kpi-card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:20px;text-align:center}
.kpi-card .kpi-value{font-size:36px;font-weight:700;color:var(--blue)}
.kpi-card .kpi-label{font-size:13px;color:var(--t2);margin-top:4px}
.kpi-card .kpi-sub{font-size:11px;color:var(--t3);margin-top:2px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:16px}
.data-tile{background:linear-gradient(135deg,var(--blue) 0%,#5b93ff 100%);color:#fff;border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.data-tile .dt-val{font-size:28px;font-weight:700}
.data-tile .dt-label{font-size:12px;opacity:.85;margin-top:4px}
.data-tile .dt-icon{position:absolute;right:12px;top:12px;font-size:40px;opacity:.2}
.webhook-card{background:var(--w);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:10px}
.webhook-card .wh-name{font-weight:600;font-size:13px}
.webhook-card .wh-url{font-size:11px;color:var(--t3);word-break:break-all;margin-top:4px}
/* V8 Extended Styles - Part 2 */
.form-field{margin-bottom:14px}
.form-field label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:8px 12px;border:1px solid var(--br);border-radius:6px;font-size:13px;transition:border-color .15s}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(51,112,255,.15)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--br)}
.person-selector{max-height:300px;overflow-y:auto;border:1px solid var(--br);border-radius:6px;padding:8px}
.dept-group{margin-bottom:12px}
.dept-name{font-weight:600;font-size:13px;color:var(--blue);margin-bottom:6px;padding:4px 8px;background:var(--bl);border-radius:4px}
.person-option{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px}
.person-option:hover{background:var(--bl)}
.person-avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.person-name{font-weight:500}
.person-position{color:var(--t3);font-size:11px;margin-left:auto}
.sync-status{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f0f7ff;border-radius:6px;margin-bottom:12px;font-size:12px}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sync-dot.ok{background:var(--gn)}
.sync-dot.warn{background:var(--or)}
.sync-dot.err{background:var(--rd)}
.msg-preview{background:#f7f8fa;border-radius:6px;padding:12px;margin:10px 0;min-height:80px}
.apply-card{background:var(--w);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.apply-card .ac-info{flex:1}
.apply-card .ac-eid{font-weight:600;font-size:13px}
.apply-card .ac-reason{font-size:12px;color:var(--t2);margin-top:2px}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--br);margin-bottom:16px}
.tab-item{padding:8px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--t2);transition:all .15s}
.tab-item:hover{color:var(--blue)}
.tab-item.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item{padding:8px 0}
.info-item .ii-label{font-size:11px;color:var(--t3);margin-bottom:2px}
.info-item .ii-value{font-size:13px;font-weight:500}
.badge-group{display:flex;gap:4px;flex-wrap:wrap}
.badge-group .t{margin-right:4px}
.divider{height:1px;background:var(--br);margin:16px 0}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.quick-actions .btn{flex-shrink:0}
.status-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:12px;margin-bottom:12px}
.status-bar.info{background:#e8f0ff;color:var(--blue)}
.status-bar.success{background:#e8f8e8;color:var(--gn)}
.status-bar.warning{background:#fff4e0;color:var(--or)}
.status-bar.error{background:#ffe8e8;color:var(--rd)}
.accordion{border:1px solid var(--br);border-radius:var(--r);overflow:hidden}
.accordion-header{padding:12px 16px;background:#f7f8fa;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500}
.accordion-header:hover{background:#f0f0f0}
.accordion-body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s}
.accordion-body.open{max-height:1000px;padding:12px 16px}
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px}
.tag-item{padding:3px 10px;background:var(--bl);color:var(--blue);border-radius:12px;font-size:11px;cursor:pointer}
.tag-item:hover{background:var(--blue);color:#fff}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#f0f0f0;border-radius:10px;font-size:11px}
.chip .chip-x{cursor:pointer;color:var(--t3)}
.chip .chip-x:hover{color:var(--rd)}
.empty-state{text-align:center;padding:48px 20px;color:var(--t3)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state .es-title{font-size:15px;font-weight:500;margin-bottom:4px;color:var(--t2)}
.empty-state .es-hint{font-size:12px}
.inline-edit{background:transparent;border:1px solid transparent;border-radius:4px;padding:2px 4px;transition:all .15s;font-size:inherit;color:inherit;width:100%}
.inline-edit:hover{border-color:var(--br)}
.inline-edit:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(51,112,255,.15);background:#fff;outline:none}
.tooltip{position:relative}
.tooltip::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
.tooltip:hover::after{opacity:1}
.card-list{display:flex;flex-direction:column;gap:10px}
.card-list-item{background:var(--w);border:1px solid var(--br);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .15s}
.card-list-item:hover{border-color:var(--blue);box-shadow:var(--sh)}
.card-list-item .cli-title{font-size:13px;font-weight:600;margin-bottom:4px}
.card-list-item .cli-desc{font-size:12px;color:var(--t2)}
.card-list-item .cli-meta{display:flex;gap:8px;margin-top:6px;font-size:11px;color:var(--t3)}
.drop-zone{border:2px dashed var(--br);border-radius:var(--r);padding:32px;text-align:center;color:var(--t3);cursor:pointer;transition:border-color .15s}
.drop-zone:hover{border-color:var(--blue);color:var(--blue)}
.notification-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--rd);color:#fff;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center}
.avatar-group{display:flex}
.avatar-group .person-avatar{margin-left:-6px;border:2px solid #fff}
.avatar-group .person-avatar:first-child{margin-left:0}
.search-box{position:relative;display:inline-block}
.search-box input{padding-left:32px}
.search-box::before{content:'&#128269;';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3)}
@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .g2,.g3,.g4{grid-template-columns:1fr}
}
/* V8 Extended Styles - Part 3: Print & Animation */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fade-in{animation:fadeIn .3s ease-out}
.slide-in{animation:slideIn .3s ease-out}
.pulse{animation:pulse 2s ease-in-out infinite}
.spinner{width:20px;height:20px;border:2px solid var(--br);border-top:2px solid var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}
.skeleton-line{height:14px;margin-bottom:8px}
.skeleton-line:last-child{width:60%}
.skeleton-title{height:20px;width:40%;margin-bottom:16px}
.highlight{background:#fff3cd;border:1px solid #ffc107;padding:2px 6px;border-radius:3px;font-size:inherit}
.mono{font-family:'Consolas','Monaco','Courier New',monospace;font-size:12px}
.text-center{text-align:center}
.text-right{text-align:right}
.text-muted{color:var(--t3)}
.text-primary{color:var(--blue)}
.text-success{color:var(--gn)}

    code:"import os, openpyxl, docx\nfrom docx import Document\n\ndef fill_word_from_excel(excel_path, template_path, output_dir):\n    wb = openpyxl.load_workbook(excel_path)\n    ws = wb.active\n    headers = [cell.value for cell in ws[1]]\n    for row in ws.iter_rows(min_row=2, values_only=True):\n        data = dict(zip(headers, row))\n        doc = Document(template_path)\n        for para in doc.paragraphs:\n            for key, val in data.items():\n                if key and val and key in para.text:\n                    para.text = para.text.replace(key, str(val))\n        for table in doc.tables:\n            for row_cells in table.rows:\n                for cell in row_cells.cells:\n                    for key, val in data.items():\n                        if key and val and key in cell.text:\n                            cell.text = cell.text.replace(key, str(val))\n        out_name = str(data.get('设备编号', 'unknown')) + '.docx'\n        doc.save(os.path.join(output_dir, out_name))\n    print('完成')"},
  {name:"设备表单填写工具(fill_device_form.py)", desc:"读取Excel，自动填写Word模板字段", tags:"设备,表单,Word,Excel",
    code:"import pandas as pd\nfrom docx import Document\nimport os\n\ndef batch_fill(excel_file, word_template, out_folder):\n    df = pd.read_excel(excel_file)\n    if not os.path.exists(out_folder): os.makedirs(out_folder)\n    for _, row in df.iterrows():\n        doc = Document(word_template)\n        context = row.to_dict()\n        for p in doc.paragraphs:\n            for k, v in context.items():\n                placeholder = '{{' + str(k) + '}}'\n                if placeholder in p.text: p.text = p.text.replace(placeholder, str(v))\n        filename = f\"{context.get('设备编号','doc')}.docx\"\n        doc.save(os.path.join(out_folder, filename))\n    print(f'成功生成 {len(df)} 份设备表单')"},

    code:"import pandas as pd\nimport os\nimport shutil\n\ndef rename_pdfs(excel_path, pdf_dir, out_dir):\n    df = pd.read_excel(excel_path)\n    if not os.path.exists(out_dir): os.makedirs(out_dir)\n    for _, row in df.iterrows():\n        old_name = str(row.get('原文件名',''))\n        new_name = str(row.get('新文件名',''))\n        if not old_name.endswith('.pdf'): old_name += '.pdf'\n        if not new_name.endswith('.pdf'): new_name += '.pdf'\n        src = os.path.join(pdf_dir, old_name)\n        dst = os.path.join(out_dir, new_name)\n        if os.path.exists(src):\n            shutil.copy2(src, dst)\n            print(f'重命名: {old_name} -> {new_name}')"},
  {name:"PDF批量重命名工具-增强版", desc:"增强图形界面版(TK GUI)，支持多种表格格式", tags:"PDF,重命名,Excel,GUI,预览",
    code:"import tkinter as tk\nfrom tkinter import ttk, filedialog\nimport pandas as pd\n\nclass PDFRenamerApp:\n    def __init__(self, root):\n        self.root = root\n        self.root.title('PDF批量重命名工具-增强版')\n        self.df = None\n        tk.Label(root, text='Excel/ODS/CSV文件:').grid(row=0, column=0, sticky='w')\n        self.entry_file = tk.Entry(root, width=50)\n        self.entry_file.grid(row=0, column=1)\n        tk.Button(root, text='浏览...', command=self.load_file).grid(row=0, column=2)\n        tk.Label(root, text='PDF文件夹:').grid(row=1, column=0, sticky='w')\n        self.entry_pdf = tk.Entry(root, width=50)\n        self.entry_pdf.grid(row=1, column=1)\n        tk.Button(root, text='预览重命名', command=self.preview).grid(row=2, column=1, pady=10)\n        self.tree = ttk.Treeview(root, columns=('old','new'), show='headings')\n        self.tree.heading('old', text='原文件名')\n        self.tree.heading('new', text='新文件名')\n        self.tree.grid(row=3, column=0, columnspan=3, sticky='nsew')\n\n    def load_file(self):\n        path = filedialog.askopenfilename()\n        if path:\n            self.entry_file.delete(0, tk.END)\n            self.entry_file.insert(0, path)\n            self.df = pd.read_excel(path) if not path.endswith('.csv') else pd.read_csv(path)\n\n    def preview(self):\n        if self.df is None: return\n        self.tree.delete(*self.tree.get_children())\n        for _, row in self.df.iterrows():\n            self.tree.insert('', 'end', values=(row.get('原文件名',''), row.get('新文件名','')))"},
  {name:"自动化PDF合并工具(验收资料整理.py)", desc:"可配置规则版，开箱单+装机报告+验收报告自动合并", tags:"PDF,合并,验收,开箱,装机",
    code:"import os, json\nfrom PyPDF2 import PdfMerger, PdfReader\nimport pandas as pd\n\ndef merge_acceptance_docs(config_path, excel_path, output_dir):\n    with open(config_path, 'r', encoding='utf-8') as f:\n        config = json.load(f)\n    df = pd.read_excel(excel_path)\n    if not os.path.exists(output_dir): os.makedirs(output_dir)\n    for _, row in df.iterrows():\n        device_id = str(row.get('设备编号','unknown'))\n        merger = PdfMerger()\n        for rule in config.get('rules', []):\n            file_name = row.get(rule['column'], '')\n            if file_name and str(file_name) != 'nan':\n                file_path = os.path.join(rule['folder'], str(file_name))\n                if os.path.exists(file_path): merger.append(file_path)\n        out_path = os.path.join(output_dir, f'{device_id}_验收资料.pdf')\n        merger.write(out_path)\n        merger.close()\n        print(f'已生成: {out_path}')"}

function doChangePwd() {
  var p1 = document.getElementById('newPwd').value;
  var p2 = document.getElementById('newPwd2').value;
  if (!p1 || p1.length < 6) { alert('密码至少6位'); return; }
  if (p1 !== p2) { alert('两次密码不一致'); return; }
  var passwords = JSON.parse(localStorage.getItem('v8_passwords') || '{}');
  passwords[pendingUser.employeeId] = p1;
  localStorage.setItem('v8_passwords', JSON.stringify(passwords));
  alert('密码修改成功');
  finishLogin(pendingUser);
}

function finishLogin(person) {
  var roles = JSON.parse(localStorage.getItem('v8_user_roles') || '{}');
  currentUser = {
    employeeId: person.employeeId,
    name: person.name,
    role: roles[person.employeeId] || 'viewer'
  };
  localStorage.setItem('v8_current_user', JSON.stringify(currentUser));
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  document.getElementById('userLabel').textContent = person.name + ' (' + currentUser.role + ')';
  refresh();
}

function doLogout() {

  localStorage.removeItem('v8_current_user');
  currentUser = {employeeId: '', name: '', role: ''};
  document.getElementById('loginOverlay').style.display = 'flex';

  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('changePwdForm').style.display = 'none';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPwd').value = '';
}

function getUserRole(eid) {
  var roles = JSON.parse(localStorage.getItem('v8_user_roles') || '{}');
  return roles[eid || currentUser.employeeId] || 'viewer';
}

function hasPermission(action) {
  var r = currentUser.role;
  if (r === 'owner' || r === 'admin') return true;
  if (r === 'editor' && (action === 'edit' || action === 'create')) return true;
  if (action === 'view') return true;
  return false;
}

function canAccessPage(id) {

  if (r === 'editor') return true;

    return blocked.indexOf(id) === -1;

}

function mergeData(builtIn, localKey) {
  try {
    var local = JSON.parse(localStorage.getItem(localKey) || '[]');
    var map = {};
    builtIn.forEach(function(item) { map[item.id] = item; });
    local.forEach(function(item) { map[item.id] = item; });
    return Object.values(map);
  } catch(e) { return builtIn; }
}

var curPage = 'daily-today';
var pathMap = {};
var allLabels = {};
var modalData = null;

function buildMaps(items, path) {
  items.forEach(function(item) {
    allLabels[item.id] = item.label;
    pathMap[item.id] = path.concat(item);
    if (item.children) buildMaps(item.children, path.concat(item));
  });
}
buildMaps(M, []);

function getBC(id) {
  var p = pathMap[id] || [];
  if (!p.length) return '<span class="cu">首页</span>';
  return p.map(function(x, i) {
    if (i === p.length - 1) return '<span class="cu">' + x.label + '</span>';
    return '<span>' + x.label + '</span>';
  }).join(' <span style="color:var(--t3)">/</span> ');
}

function firstLeaf(item) {
  if (!item.children || !item.children.length) return item.id;
  return firstLeaf(item.children[0]);
}

function findItem(id, items) {
  if (!items) items = M;
  for (var i = 0; i < items.length; i++) {
    if (items[i].id === id) return items[i];
    if (items[i].children) {
      var r = findItem(id, items[i].children);
      if (r) return r;
    }
  }
  return null;
}

function onMenuClick(id) {
  curPage = id;
  refresh();
}

function refresh() {
  renderSidebar();
  renderContent();
}

function renderSidebar() {
  document.getElementById('sbContent').innerHTML = renderMenu(M, 0);
}

function renderMenu(items, level) {
  var h = '';
  items.forEach(function(item) {
    if (!canAccessPage(item.id)) return;
    var has = item.children && item.children.length;
    var isAct = item.id === curPage || (pathMap[curPage] || []).some(function(p) { return p.id === item.id; });
    h += '<div class="mi l' + level + '">';
    h += '<div class="ml' + (isAct ? ' act' : '') + '" onclick="onMenuClick(\'' + item.id + '\')">';
    if (item.icon) h += '<span style="margin-right:6px">' + item.icon + '</span>';
    h += '<span>' + item.label + '</span>';
    if (has) h += '<span class="a' + (isAct ? ' ex' : '') + '">&#9654;</span>';
    h += '</div>';
    if (has) {
      h += '<div class="mc' + (isAct ? ' op' : '') + '">';
      h += renderMenu(item.children, level + 1);
      h += '</div>';
    }
    h += '</div>';
  });
  return h;
}

function renderContent() {
  var el = document.getElementById('breadcrumb');
  el.innerHTML = getBC(curPage);
  var content = renderPage(curPage);
  document.getElementById('mainContent').innerHTML = content;
  // Initialize charts if any
  initCharts();
}

function exportCSV(data, filename) {
  if (!data || !data.length) { alert('没有数据'); return; }
  var keys = Object.keys(data[0]);
  var csv = keys.join(',') + '\n';
  data.forEach(function(row) {
    var vals = keys.map(function(k) {
      var v = row[k] !== undefined ? String(row[k]) : '';
      v = v.replace(/"/g, '""');
      if (v.indexOf(',') !== -1 || v.indexOf('\n') !== -1) v = '"' + v + '"';
      return v;
    });
    csv += vals.join(',') + '\n';
  });
  var blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = (filename || 'export') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

function exportJSON(data, filename) {
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = (filename || 'export') + '_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

function importJSON(callback) {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (callback) callback(data);
      } catch(ex) { alert('JSON解析失败'); }
    };
    reader.readAsText(file, 'utf-8');
  };
  input.click();
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(function() {});
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

var _formModalConfig = null;
function openFormModal(config) {
  _formModalConfig = config;
  var html = '<h3 style="margin-bottom:16px;font-size:16px">' + config.title + '</h3>';
  config.fields.forEach(function(f) {
    var fid = 'fm_' + f.label.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
    html += '<div class="fg"><label class="fl">' + f.label + (f.required ? ' *' : '') + '</label>';
    if (f.type === 'text') {
      html += '<input type="text" class="fi" id="' + fid + '" value="' + (f.value || '') + '" placeholder="' + (f.placeholder || '') + '">';
    } else if (f.type === 'textarea') {
      html += '<textarea class="fi" id="' + fid + '" rows="' + (f.rows || 3) + '" placeholder="' + (f.placeholder || '') + '">' + (f.value || '') + '</textarea>';
    } else if (f.type === 'select') {
      html += '<select class="fi" id="' + fid + '">';
      (f.options || []).forEach(function(o) {
        var sel = o === f.value ? ' selected' : '';
        html += '<option' + sel + '>' + o + '</option>';
      });
      html += '</select>';
    } else if (f.type === 'date') {
      html += '<input type="date" class="fi" id="' + fid + '" value="' + (f.value || '') + '">';
    } else if (f.type === 'number') {
      html += '<input type="number" class="fi" id="' + fid + '" value="' + (f.value || '') + '" placeholder="' + (f.placeholder || '') + '">';
    }
    html += '</div>';
  });
  html += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">';
  html += '<button class="btn bp" onclick="submitFormModal()">保存</button>';
  html += '<button class="btn bo" onclick="closeMo()">取消</button></div>';
  openMo({title: config.title, html: html});
}

function submitFormModal() {
  if (!_formModalConfig) return;
  var data = {};
  var hasError = false;
  _formModalConfig.fields.forEach(function(f) {
    var fid = 'fm_' + f.label.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
    var el = document.getElementById(fid);
    var val = el ? el.value : '';
    if (f.required && !val) { alert('请填写：' + f.label); hasError = true; }
    data[f.label] = val;
  });
  if (hasError) return;
  if (_formModalConfig.onSave) _formModalConfig.onSave(data);
  closeMo();
}

// ===== RENDER PAGE - MAIN SWITCH =====
function renderPage(id) {
  var h = '';
  var item = findItem(id);
  var label = (item ? item.label : id);

  // PARENT PAGE RENDERER: if item has children, render child cards grid
  function renderParentPage() {
    var cards = '';
    if (item && item.children) {
      item.children.forEach(function(child) {
        var icon = child.icon || '\ud83d\udccb';
        var desc = child.children ? (child.children.length + ' 个子项') : '';
        cards += '<div class="fc parent-card" onclick="onMenuClick(\'' + child.id + '\')" style="cursor:pointer">';
        cards += '<div class="ic">' + icon + '</div>';
        cards += '<h4>' + child.label + '</h4>';
        cards += '<p>' + desc + '</p></div>';
      });
    }
    return '<div class="g3">' + cards + '</div>';
  }

  // DEFAULT PARENT: items with children but no specific handler
  // Skip pages that have dedicated renderers below
  var pagesWithRenderers = ['daily-today','daily-list','daily-history','daily-stats',
    'task-all','task-all-list','task-pending','task-progress','task-done','task-stalled',
    'task-personal','task-cycle','task-daily','task-weekly','task-monthly',
    'project-all','project-track','project-milestone',
    'equip-all','equip-auto','equip-expand','equip-accept','equip-spare',
    'improve-today','improve-list','improve-stats','improve-by-dept',
    'org-chart','org-member','org-perm','org-apply',
    'doc-library','doc-script','doc-tool',
    'dash-all','dash-task-rate','dash-attendance','dash-equip','dash-cost',
    'wp-white','wp-ten-projects','wp-goal','wp-trace','wp-culture',
    'cfg-menu','cfg-page','cfg-theme','cfg-advanced','cfg-member','cfg-perm','cfg-apply','cfg-sync','cfg-backup','cfg-deploy',
    'auto-list','auto-new','auto-log','auto-tpl','msg-push',
    'dash-weekly','dash-monthly'];
  if (item && item.children && item.children.length && !item.children[0].children && pagesWithRenderers.indexOf(id) === -1) {
    // Level 3 parent (children are leaf nodes)
    return permTip() + '<div class="pt">' + label + '</div>' + renderParentPage();
  }

  // ===== DAILY REPORT PAGES =====
  if (id === 'daily-today') {
    var all = getAllDailyReports();
    var today = all.filter(function(r) { return r.date === '2026-07-10'; });

function toggleCode() {
  var el = document.getElementById('codeBlock');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function downloadScript(idx) {
  var s = REAL_SCRIPT_CONTENTS[idx];
  if (!s) return;
  var blob = new Blob([s.code || ''], {type: 'text/plain'});
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = s.name;
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

function updateRole(eid, role) {
  var roles = JSON.parse(localStorage.getItem('v8_user_roles') || '{}');
  roles[eid] = role;
  localStorage.setItem('v8_user_roles', JSON.stringify(roles));
  alert('已更新 ' + eid + ' 的角色为 ' + role);
}

function resetPwd(eid) {
  if (!confirm('确定重置 ' + eid + ' 的密码为 123456？')) return;
  var pw = JSON.parse(localStorage.getItem('v8_passwords') || '{}');
  pw[eid] = '123456';
  localStorage.setItem('v8_passwords', JSON.stringify(pw));
  alert('密码已重置为 123456');
}

function submitApply() {
  var eid = document.getElementById('applyEid').value.trim();
  var reason = document.getElementById('applyReason').value.trim();
  if (!eid || !reason) { alert('请填写工号和申请原因'); return; }
  var apps = JSON.parse(localStorage.getItem('v8_member_applications') || '[]');
  apps.push({eid: eid, reason: reason, time: new Date().toLocaleString('zh-CN'), status: 'pending', applicant: currentUser.employeeId});
  localStorage.setItem('v8_member_applications', JSON.stringify(apps));
  alert('申请已提交');
  refresh();
}

function approveApply(idx, approve) {
  var apps = JSON.parse(localStorage.getItem('v8_member_applications') || '[]');

function sendWebhookMsg() {
  var hooks = JSON.parse(localStorage.getItem('v8_webhooks') || '[]');
  if (!hooks.length) { alert('请先添加Webhook URL'); return; }
  var msgType = document.getElementById('msgType').value;
  var title = document.getElementById('msgTitle').value.trim() || '通知';
  var content = document.getElementById('msgContent').value.trim() || '';
  if (!content) { alert('请输入消息内容'); return; }

  var body = {};
  if (msgType === 'interactive') {
    body = {
      msg_type: 'interactive',
      card: {
        header: {title: {tag: 'plain_text', content: title}},
        elements: [{tag: 'div', text: {tag: 'lark_md', content: content}}]
      }
    };
  } else {
    body = {msg_type: 'text', content: {text: content}};
  }

  var history = JSON.parse(localStorage.getItem('v8_push_history') || '[]');
  var success = 0;

  var promises = hooks.map(function(hook) {
    return fetch(hook.url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    }).then(function(r) {
      if (r.ok) {
        success++;
        history.unshift({time: new Date().toLocaleString('zh-CN'), target: hook.name, status: 'ok', msg: content});
      } else {
        history.unshift({time: new Date().toLocaleString('zh-CN'), target: hook.name, status: 'fail', msg: content});
      }
    }).catch(function() {
      // CORS fallback
      var cmd = 'curl -X POST -H "Content-Type: application/json" -d ' + JSON.stringify(JSON.stringify(body)) + ' "' + hook.url + '"';
      history.unshift({time: new Date().toLocaleString('zh-CN'), target: hook.name, status: 'cors-fail', msg: content});
      alert('CORS受限，请使用以下命令发送:\n' + cmd);
    });
  });

  Promise.all(promises).then(function() {
    localStorage.setItem('v8_push_history', JSON.stringify(history.slice(0, 100)));
    if (success > 0) alert('成功发送 ' + success + '/' + hooks.length + ' 条消息');
    refresh();
  });
}

// Apply template helper
function applyTemplate(name) {
  var t = AUTO_TASK_TEMPLATES.find(function(x) { return x.name === name; });
  if (!t) return;
  onMenuClick('at-create');
  setTimeout(function() {
    var nameEl = document.getElementById('atName');
    var actionEl = document.getElementById('atAction');
    var scheduleEl = document.getElementById('atSchedule');
    if (nameEl) nameEl.value = t.name;
    if (actionEl) actionEl.value = t.action;
    if (scheduleEl) scheduleEl.value = t.schedule;
  }, 100);
}

// Filter page list helper
function filterPageList(q) {
  var rows = document.querySelectorAll('#pageListContainer tbody tr');
  rows.forEach(function(row) {
    var text = row.textContent.toLowerCase();
    row.style.display = text.indexOf(q.toLowerCase()) !== -1 ? '' : 'none';
  });
}

// ===== V8 SEARCH FUNCTION =====
function searchAll(query) {
  if (!query || query.length < 1) return [];
  query = query.toLowerCase();
  var results = [];
  // Search people
  PEOPLE_OBJ.forEach(function(p) {
    if (p.name.toLowerCase().indexOf(query) !== -1 || p.employeeId.indexOf(query) !== -1 || p.dept.toLowerCase().indexOf(query) !== -1) {
      results.push({type: 'person', label: p.name, id: 'people-list', sub: p.dept + ' | ' + p.employeeId});
    }
  });
  // Search tasks
  getAllTasks().forEach(function(t) {
    if (t.desc.toLowerCase().indexOf(query) !== -1 || t.owner.toLowerCase().indexOf(query) !== -1) {
      results.push({type: 'task', label: t.desc, id: 'task-all-list', sub: t.status + ' | ' + t.owner});
    }
  });
  // Search projects
  getAllProjects().forEach(function(p) {
    if ((p.name || '').toLowerCase().indexOf(query) !== -1 || (p.manager || '').toLowerCase().indexOf(query) !== -1) {
      results.push({type: 'project', label: p.name || '-', id: 'project-all', sub: p.status + ' | ' + (p.manager || '-')});
    }
  });
  // Search daily reports
  getAllDailyReports().forEach(function(r) {
    if (r.reporter.toLowerCase().indexOf(query) !== -1 || (r.content || '').toLowerCase().indexOf(query) !== -1) {
      results.push({type: 'daily', label: '日报 - ' + r.reporter, id: 'daily-today', sub: r.date + ' | ' + r.status});
    }
  });
  // Search docs
  getAllDocs().forEach(function(d) {
    if (d.name.toLowerCase().indexOf(query) !== -1 || (d.tags || '').toLowerCase().indexOf(query) !== -1) {
      results.push({type: 'doc', label: d.name, id: 'doc-library', sub: d.category + ' | ' + d.type});
    }
  });
  // Search pages
  Object.keys(allLabels).forEach(function(pid) {
    if (allLabels[pid].toLowerCase().indexOf(query) !== -1) {
      results.push({type: 'page', label: allLabels[pid], id: pid, sub: '页面'});
    }
  });
  return results.slice(0, 20);
}

// ===== V8 UTIL: Deep clone =====
function deepClone(obj) {
  try { return JSON.parse(JSON.stringify(obj)); } catch(e) { return obj; }
}

// ===== V8 UTIL: Debounce =====
function debounce(fn, delay) {
  var timer = null;
  return function() {
    var ctx = this, args = arguments;
    if (timer) clearTimeout(timer);
    timer = setTimeout(function() { fn.apply(ctx, args); }, delay || 300);
  };
}

// ===== V8 UTIL: Throttle =====
function throttle(fn, limit) {
  var last = 0;
  return function() {
    var now = Date.now();
    if (now - last >= (limit || 200)) { last = now; fn.apply(this, arguments); }
  };
}

// ===== V8 UTIL: Format file size =====
function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

// ===== V8 UTIL: Generate ID =====
function generateId(prefix) {
  return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).substr(2, 5);
}

// ===== V8 UTIL: Date range helper =====
function getDateRange(days) {
  var dates = [];
  var now = new Date();
  for (var i = 0; i < days; i++) {
    var d = new Date(now);
    d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0, 10));
  }
  return dates;
}

// ===== V8 UTIL: Group by =====
function groupBy(arr, key) {
  var groups = {};
  arr.forEach(function(item) {
    var k = typeof key === 'function' ? key(item) : item[key];
    if (!groups[k]) groups[k] = [];
    groups[k].push(item);
  });
  return groups;
}

// ===== V8 UTIL: Unique by =====
function uniqueBy(arr, key) {
  var seen = {};
  return arr.filter(function(item) {
    var k = typeof key === 'function' ? key(item) : item[key];
    if (seen[k]) return false;
    seen[k] = true;
    return true;
  });
}

// ===== V8 UTIL: Sort by =====
function sortBy(arr, key, desc) {
  return arr.slice().sort(function(a, b) {
    var va = typeof key === 'function' ? key(a) : a[key];
    var vb = typeof key === 'function' ? key(b) : b[key];
    if (va < vb) return desc ? 1 : -1;
    if (va > vb) return desc ? -1 : 1;
    return 0;
  });
}

// ===== V8 UTIL: Count by =====
function countBy(arr, key) {
  var counts = {};
  arr.forEach(function(item) {
    var k = typeof key === 'function' ? key(item) : item[key];
    counts[k] = (counts[k] || 0) + 1;
  });
  return counts;
}

// ===== V8 UTIL: Average =====
function average(arr, key) {
  var filtered = arr.filter(function(item) { var v = typeof key === 'function' ? key(item) : item[key]; return v !== null && v !== undefined && !isNaN(v); });
  if (!filtered.length) return 0;
  var sum = filtered.reduce(function(s, item) { return s + (typeof key === 'function' ? key(item) : item[key]); }, 0);
  return sum / filtered.length;
}

// ===== V8 UTIL: Percentile =====
function percentile(arr, key, pct) {
  var sorted = sortBy(arr, key);
  var idx = Math.floor(sorted.length * pct / 100);
  return sorted[Math.min(idx, sorted.length - 1)];
}
