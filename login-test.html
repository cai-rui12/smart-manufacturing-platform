<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录测试</title><style>
body{margin:0;background:#0f172a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif}
.box{background:#fff;padding:32px;border-radius:12px;width:90%;max-width:400px}
h2{margin:0 0 16px;text-align:center;color:#333}
input{display:block;width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:6px;font-size:16px;box-sizing:border-box}
button{width:100%;padding:12px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border:none;border-radius:6px;font-size:16px;margin-top:12px;cursor:pointer}
#msg{margin-top:12px;padding:8px;border-radius:6px;text-align:center;font-size:14px;display:none}
.err{background:#fee2e2;color:#991b1b}
.ok{background:#dcfce7;color:#166534}
.info{background:#e0f2fe;color:#075985}
</style></head><body>
<div class="box">
<h2>登录测试 V17</h2>
<input id="eid" placeholder="工号" value="64135">
<input id="pwd" type="password" placeholder="密码" value="12345678">
<button onclick="testLogin()">登 录</button>
<div id="msg"></div>
</div>
<script>
var PWD_SALT='SMP@2026!#';
function obfuscatePwd(p){var s=p+'|'+PWD_SALT;try{return btoa(unescape(encodeURIComponent(s)))}catch(e){return btoa(s)}}
function deobfuscatePwd(e){try{var d=decodeURIComponent(escape(atob(e)))}catch(x){d=atob(e)}return d.split('|')[0]||''}
function showMsg(t,c){var m=document.getElementById('msg');m.textContent=t;m.className=c;m.style.display='block'}
function testLogin(){showMsg('验证中...','info');setTimeout(function(){try{var eid=document.getElementById('eid').value.trim();var pwd=document.getElementById('pwd').value.trim();var pw={};pw[eid]=obfuscatePwd('12345678');var sp=pw[eid]||'';var matched=false;try{var dp=deobfuscatePwd(sp);if(pwd===dp)matched=true}catch(e){}if(!matched&&pwd===sp)matched=true;if(matched){showMsg('登录成功! 工号'+eid,'ok')}else{showMsg('密码错误! pwd='+pwd+' decoded='+deobfuscatePwd(sp),'err')}}catch(e){showMsg('错误:'+e.message,'err')}},100)}
</script></body></html>
