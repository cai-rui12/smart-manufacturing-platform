<!--
================================================================================
  智能制造组管理平台 V17 - 网页内审报告
  审审日期: 2026-07-19
  审审范围: V15前端代码全面内审
================================================================================

【审审结论：总体合格，存在中低风险项需关注】

一、交互按钮功能完整性检查
  [通过] 大部分按钮均绑定了实际功能（onclick事件）
  [低风险] markCycleTaskDone() - 仅弹Toast提示，未实际修改任务状态（第444行）
  [低风险] refreshData('daily') - 日报刷新分支为空操作（第8952行），缺少实际数据重载逻辑
  [中风险] importAllData() 按钮与 exportAllData() 按钮图标相同（均为&#128190;），
          用户无法通过图标区分导入/导出功能（第421-422行）

二、API调用错误处理
  [通过] apiRequest() 函数有完整的 try-catch 和超时处理（第1102-1125行）
  [通过] 后端所有API端点均有 try-catch 包裹
  [低风险] detectServer() 中 fetch CONFIG_URL 失败被静默吞掉（第1156行），
          用户无法感知配置文件加载失败
  [低风险] connectToServer() 中超时设置为8秒，但其他API调用超时仅5秒，
          可能导致连接测试超时但后续API调用失败的不一致体验
  [低风险] 同步状态 badge 有两个 onclick 属性（第420行），第二个覆盖了第一个，
          showConnectionInfo() 实际未被调用

三、角色权限检查
  [通过] canAccessPage() 实现了基于角色的页面级访问控制（第1899行）
  [通过] OWNER_IDS=['64135'], ADMIN_IDS=['70163','60714'] 强制修正逻辑正确（第1756行）
  [中风险] feishu-config 页面（飞书配置）未加入 viewer 的阻止列表，
          viewer 角色可访问敏感的飞书token和表映射配置
  [中风险] msg-push 页面（消息推送）未加入 viewer 的阻止列表，
          viewer 可发送消息到群组
  [低风险] 权限检查仅基于前端角色判断，后端API缺少角色权限中间件
          （/api/config POST 未校验调用者角色）
  [低风险] EDITOR_IDS 硬编码在前端（第623行），无法通过界面动态管理

四、数据验证
  [通过] 登录表单验证工号和密码非空（第1796行）
  [通过] 后端 authenticateUser 对密码进行明文比较
  [中风险] 密码以明文存储在 localStorage（passwords对象），存在XSS窃取风险
  [中风险] doChangePwd() 未验证新密码长度（前端loginOverlay中要求至少6位，
          但 doChangePwd 函数未做长度校验）
  [低风险] 表单提交（submitFormModal）的 required 字段验证仅检查非空，
          未做格式校验（如URL格式、数字范围等）
  [低风险] 飞书PersonalBaseToken硬编码在前端代码中（第6557行），
          虽然在独立文件中但前端可见

五、移动端适配
  [通过] 有 @media(max-width:768px) 响应式断点（第329行）
  [通过] 侧边栏在移动端收缩为50px图标模式
  [通过] 表格使用 table-responsive 实现横向滚动
  [中风险] 模态框(mo)使用固定 padding-top:80px，在小屏设备上可能遮挡内容
  [中风险] g2/g3/g4 网格在移动端均变为单列，但部分页面使用内联grid未适配
  [低风险] login-box 的 max-width:440px 在极小屏幕(<360px)上可能溢出
  [低风险] 打印样式隐藏了侧边栏和头部，但未隐藏模态框的遮罩层

六、性能优化
  [通过] 图表实例在页面切换时正确销毁（第8886行）
  [通过] 使用 setTimeout(initCharts, 100) 避免渲染阻塞
  [中风险] 全量 refresh() 每次都重新渲染整个页面内容（innerHTML替换），
          对于大型列表页面（如设备管理279台设备）可能造成卡顿
  [中风险] PEOPLE_OBJ 数组直接内嵌在HTML中（约1500+行数据定义），
          增大了首屏加载体积，建议按需加载
  [低风险] syncLocalToServer() 串行同步8种数据类型，可考虑并行处理
  [低风险] localStorage 读写频繁（每次 refresh 读取多个 key），
          可考虑批量读取后缓存

七、其他发现
  [低风险] 第420行有两个 onclick 属性，HTML规范中后者会覆盖前者
  [低风险] showMsg() 和 showToast() 是两个独立的提示函数，建议统一
  [低风险] 部分页面ID如 kpi-contract 和 strategy-2026 均映射到
          renderKpiPage('kpi-downtime')，可能不是预期行为
  [信息] 前端代码约9000行，建议后续考虑模块化拆分
  [信息] 后端 session 存储在内存Map中，服务器重启后所有会话失效

================================================================================
-->

function renderModuleListPage() {
  var mods = getRegisteredModules();
  var h = '<div class="page-enter">';
  h += '<div class="pt">模块管理 <span class="bdg">共 ' + mods.length + ' 个模块</span></div>';
  h += '<div class="status-bar info">模块注册系统允许动态扩展平台功能。内置模块不可禁用。</div>';
  h += '<div class="g2">';
  mods.forEach(function(mod) {
    h += '<div class="cd" style="border-left:4px solid ' + (mod.builtIn ? 'var(--blue)' : 'var(--gn)') + '">';
    h += '<div class="ct"><span style="font-size:20px;margin-right:8px">' + (mod.icon || '📦') + '</span> ' + mod.name + ' <span class="bdg" style="margin-left:8px">v' + (mod.version || '1.0') + '</span>';
    if (mod.builtIn) h += '<span class="t tb" style="margin-left:8px">内置</span>';
    h += '</div>';
    h += '<div class="info-grid"><div class="info-item"><div class="ii-label">模块ID</div><div class="ii-value">' + mod.id + '</div></div>';
    h += '<div class="info-item"><div class="ii-label">状态</div><div class="ii-value"><span class="t ' + (mod.enabled ? 'tg' : 'tr') + '">' + (mod.enabled ? '已启用' : '已禁用') + '</span></div></div></div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div class="cd"><div class="ct">如何注册新模块</div>';
  h += '<div style="font-size:13px;color:var(--t2);line-height:1.8">';
  h += '<p>1. 在浏览器控制台调用 <code style="background:var(--bg-s);padding:2px 6px;border-radius:4px">registerModule({id:"my-mod", name:"我的模块", icon:"🔧", version:"1.0", parentId:"config"})</code></p>';
  h += '<p>2. 或前往 <a href="javascript:void(0)" onclick="goToPage(&apos;module-register&amp;apos;)" style="color:var(--blue)">注册新模块</a> 页面填写表单</p>';
  h += '<p>3. 注册后模块会自动出现在侧边栏菜单中</p>';
  h += '</div></div>';
  h += '</div>';
  return h;
}

function renderModuleRegisterPage() {
  var h = '<div class="page-enter">';
  h += '<div class="pt">注册新模块</div>';
  h += '<div class="status-bar info">填写模块信息并注册到系统。注册后模块将自动出现在侧边栏菜单中。</div>';
  h += '<div class="cd" style="max-width:600px">';
  h += '<div class="form-field"><label>模块ID（英文，唯一标识）</label><input id="mod_id" placeholder="例如: my-module"></div>';
  h += '<div class="form-field"><label>模块名称</label><input id="mod_name" placeholder="例如: 我的模块"></div>';
  h += '<div class="form-field"><label>图标（emoji）</label><input id="mod_icon" placeholder="例如: 🔧" value="📦"></div>';
  h += '<div class="form-field"><label>版本号</label><input id="mod_version" placeholder="例如: 1.0" value="1.0"></div>';
  h += '<div class="form-field"><label>父菜单ID（可选，挂在哪个菜单下）</label><input id="mod_parent" placeholder="例如: config（留空则为顶级菜单）"></div>';
  h += '<div class="bg"><button class="btn bp" onclick="doRegisterModule()">注册模块</button><button class="btn bo" onclick="goToPage(&apos;module-list&apos;)">取消</button></div>';
  h += '</div></div>';
  return h;
}

function doRegisterModule() {
  var id = document.getElementById('mod_id').value.trim();
  var name = document.getElementById('mod_name').value.trim();
  var icon = document.getElementById('mod_icon').value.trim() || '📦';
  var version = document.getElementById('mod_version').value.trim() || '1.0';
  var parentId = document.getElementById('mod_parent').value.trim();
  if (!id || !name) { showToast('模块ID和名称不能为空', 'warn'); return; }
  if (!/^[a-zA-Z0-9_-]+$/.test(id)) { showToast('模块ID只能包含英文、数字、横线和下划线', 'warn'); return; }
  // Check if already exists
  var existing = MODULE_REGISTRY.find(function(m){ return m.id === id; });
  if (existing) { showToast('模块ID "' + id + '" 已存在', 'warn'); return; }
  registerModule({id:id, name:name, icon:icon, version:version, parentId:parentId || null, enabled:true, builtIn:false});
}

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#2f6be5;--blue-h:#4a85f5;--bl:#edf3fe;--bd:#1d58c9;
  --bg:#f0f2f5;--bg-s:#e8eaef;--w:#fff;--w2:#fafbfc;
  --t:#1a1f36;--t2:#5a6270;--t3:#97a0ae;
  --br:#e2e5ea;--br2:#ebeef2;--br3:#d5d9e0;
  --gn:#2db84d;--gn-l:#e6f9ec;
  --or:#e68a17;--or-l:#fef5e6;
  --rd:#e84855;--rd-l:#fde8ea;
  --pp:#8b5cf6;--pp-l:#f0ebff;
  --r:10px;--r-sm:6px;--r-lg:14px;
  --sh-sm:0 1px 3px rgba(15,23,42,.04),0 1px 2px rgba(15,23,42,.06);
  --sh:0 1px 4px rgba(15,23,42,.06),0 4px 16px rgba(15,23,42,.04);
  --sh-lg:0 4px 8px rgba(15,23,42,.06),0 12px 28px rgba(15,23,42,.08);
  --sh-xl:0 8px 16px rgba(15,23,42,.08),0 20px 40px rgba(15,23,42,.12);
  --tr:all .2s cubic-bezier(.4,0,.2,1);
  --tr-fast:all .15s cubic-bezier(.4,0,.2,1);
  --sidebar-w:264px;
  --header-h:52px;
  --accent:#2f6be5;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;font-size:14px;color:var(--t);background:var(--bg);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* === Layout === */
.app{display:flex;height:100vh;overflow:hidden}

/* === Sidebar === */
.sb{width:var(--sidebar-w);min-width:var(--sidebar-w);background:linear-gradient(180deg,#1a2038 0%,#0f1628 100%);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(255,255,255,.06);box-shadow:4px 0 24px rgba(0,0,0,.15)}
.sb-h{height:var(--header-h);display:flex;align-items:center;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.08);background:transparent;color:#fff;flex-shrink:0;letter-spacing:.3px}
.sb-h .lo{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.8) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-h .v{margin-left:auto;font-size:10px;opacity:.5;flex-shrink:0;background:rgba(255,255,255,.12);padding:1px 8px;border-radius:10px;color:rgba(255,255,255,.7);-webkit-text-fill-color:rgba(255,255,255,.7)}
.sb-b{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 0}
.sb-b::-webkit-scrollbar{width:3px}
.sb-b::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.sb-b::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
.mi{user-select:none}
.ml{display:flex;align-items:center;padding:7px 14px 7px 0;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;transition:var(--tr-fast);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid transparent;margin:1px 8px 1px 0;border-radius:0 6px 6px 0}
.ml:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.ml.act{background:rgba(45,107,229,.18);color:#fff;font-weight:600;border-left-color:var(--blue-h)}
.ml .a{margin-left:auto;margin-right:12px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:rgba(255,255,255,.35);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.ml .a.ex{transform:rotate(90deg);color:rgba(255,255,255,.7)}
.mc{display:none}.mc.op{display:block}
.mi.l0>.ml{font-weight:600;font-size:13.5px;color:rgba(255,255,255,.85);margin-top:4px}
.mi.l0>.ml:hover{color:#fff}
.mi.l1>.ml{padding-left:16px}
.mi.l2>.ml{padding-left:30px;font-size:12.5px}
.mi.l3>.ml{padding-left:44px;font-size:12px}
.mi.l4>.ml{padding-left:56px;font-size:12px}

/* === Main === */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.mn-h{height:var(--header-h);background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 24px;flex-shrink:0;z-index:10}
.bc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t3)}
.bc .cu{color:var(--t);font-weight:600}
.mn-b{flex:1;overflow-y:auto;padding:20px 24px;background:var(--bg)}

/* === Page Title === */
.pt{font-size:20px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:var(--t);letter-spacing:-.2px}
.bdg{font-size:10.5px;background:linear-gradient(135deg,var(--bl),#dce6fb);color:var(--blue);padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.3px;border:1px solid rgba(45,107,229,.1)}

/* === Card === */
.cd{background:var(--w);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:20px;margin-bottom:16px;border:1px solid rgba(0,0,0,.04);transition:box-shadow .2s}
.cd:hover{box-shadow:var(--sh)}
.ct{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--t);display:flex;align-items:center;gap:6px}

/* === Stat Cards === */
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
.sc{background:var(--w);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:18px 16px;text-align:center;cursor:pointer;transition:var(--tr);border:1px solid rgba(0,0,0,.04);position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--blue-h));opacity:0;transition:opacity .2s}
.sc:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
.sc:hover::after{opacity:1}
.sc .sv{font-size:28px;font-weight:800;color:var(--blue);letter-spacing:-.5px}
.sc .sl{font-size:12px;color:var(--t2);margin-top:4px;font-weight:500}
.sc .sc2{font-size:11px;margin-top:5px}.sc .up{color:var(--gn);font-weight:600}.sc .dn{color:var(--rd);font-weight:600}

/* === Table === */
table.dt{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px}
table.dt th{background:var(--w2);padding:10px 14px;text-align:left;font-weight:600;color:var(--t2);border-bottom:1px solid var(--br);white-space:nowrap;position:sticky;top:0;z-index:1;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
table.dt th:first-child{border-radius:var(--r-sm) 0 0 0}
table.dt th:last-child{border-radius:0 var(--r-sm) 0 0}
table.dt td{padding:10px 14px;border-bottom:1px solid var(--br2);color:var(--t);transition:background .15s}
table.dt tr:nth-child(even) td{background:rgba(240,242,245,.4)}
table.dt tr:hover td{background:var(--bl);cursor:pointer}
table.dt tr{transition:var(--tr-fast)}

/* === Tags/Badges === */
.t{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px}
.tb{background:linear-gradient(135deg,#edf3fe,#dce6fb);color:var(--blue)}
.tg{background:linear-gradient(135deg,#e6f9ec,#d0f2da);color:var(--gn)}
.to{background:linear-gradient(135deg,#fef5e6,#fde8c8);color:var(--or)}
.tr{background:linear-gradient(135deg,#fde8ea,#fbd0d4);color:var(--rd)}
.tx{background:linear-gradient(135deg,#f0f2f5,#e4e7ec);color:var(--t3)}
.tp{background:linear-gradient(135deg,#f0ebff,#e0d6ff);color:var(--pp)}

/* === Progress Bar === */

.pf::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(255,255,255,.25) 0%,transparent 100%);border-radius:20px}
.pfb{background:linear-gradient(90deg,#1d58c9,#4a85f5,#7aacff)}
.pfg{background:linear-gradient(90deg,#1a9e38,#2db84d,#5dd97a)}
.pfo{background:linear-gradient(90deg,#c97515,#e68a17,#f0a840)}
.pfr{background:linear-gradient(90deg,#c9303c,#e84855,#f07080)}

/* === Chart Container === */
.ch{position:relative;height:280px;width:100%}

/* === Buttons === */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;border-radius:var(--r-sm);font-size:12.5px;font-weight:600;cursor:pointer;border:none;transition:var(--tr-fast);letter-spacing:.2px;position:relative;overflow:hidden}

.bp{background:linear-gradient(180deg,var(--blue-h),var(--blue));color:#fff;box-shadow:0 2px 8px rgba(45,107,229,.3)}

/* === Form Inputs === */
.fi{width:100%;padding:8px 14px;border:1.5px solid var(--br);border-radius:var(--r-sm);font-size:13px;transition:var(--tr-fast);background:var(--w);color:var(--t)}

.mo.sh{display:flex}
.mo.sh .mo-bg{animation:modalBgIn .3s ease-out}

.md{background:var(--w);border-radius:var(--r-lg);width:640px;max-width:92vw;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh-xl);border:1px solid rgba(0,0,0,.06);animation:modalIn .3s cubic-bezier(.2,.8,.3,1)}
.md-h{display:flex;align-items:center;padding:16px 22px;border-bottom:1px solid var(--br);flex-shrink:0;background:var(--w2)}
.md-h h3{font-size:16px;font-weight:700;color:var(--t)}
.md-x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;font-size:18px;color:var(--t3);transition:var(--tr-fast)}
.md-x:hover{background:var(--rd-l);color:var(--rd)}
.md-b{padding:20px 22px;overflow-y:auto;flex:1}
.md-f{padding:12px 22px;border-top:1px solid var(--br);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;background:var(--w2)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;letter-spacing:.2px}
.hc{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;min-width:18px;min-height:18px;padding:2px}
.h0{background:#e8ecf2;color:#8b95a5}.h1{background:#a8c4f0}.h2{background:var(--blue)}.h3{background:var(--bd)}.h4{background:#0f3f9e}

/* === Feature Cards === */
.fc{background:var(--w);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:22px;border-left:4px solid var(--blue);transition:var(--tr);cursor:pointer;border:1px solid rgba(0,0,0,.04);border-left:4px solid var(--blue)}
.fc:hover{transform:translateY(-3px);box-shadow:var(--sh-lg);border-left-color:var(--blue-h)}
.fc .ic{font-size:30px;margin-bottom:12px}
.fc h4{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--t)}
.fc p{font-size:12px;color:var(--t2);line-height:1.6}

/* === Grid === */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.parent-card{cursor:pointer;transition:var(--tr);border-radius:var(--r-lg)}
.parent-card:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}

/* === Switch === */
.sw{position:relative;width:38px;height:22px;display:inline-block;vertical-align:middle}
.sw input{opacity:0;width:0;height:0}
.sw .sl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--br3);border-radius:22px;transition:.25s cubic-bezier(.4,0,.2,1)}
.sw .sl::before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.sw input:checked+.sl{background:linear-gradient(135deg,var(--blue),var(--blue-h))}
.sw input:checked+.sl::before{transform:translateX(16px)}

/* === Login === */
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0f1e;z-index:9999;display:flex;align-items:center;justify-content:center;overflow:hidden}
.login-overlay::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(45,107,229,.15) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(139,92,246,.1) 0%,transparent 50%);animation:loginBgPulse 8s ease-in-out infinite alternate}
@keyframes loginBgPulse{0%{transform:scale(1) rotate(0deg)}100%{transform:scale(1.05) rotate(3deg)}}
.login-box{background:rgba(255,255,255,.97);border-radius:20px;padding:44px;width:440px;max-width:92vw;box-shadow:0 24px 80px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.1);position:relative;z-index:1;backdrop-filter:blur(20px);animation:loginBoxIn .5s cubic-bezier(.2,.8,.3,1)}
@keyframes loginBoxIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.login-box .login-logo{text-align:center;margin-bottom:32px}
.login-box .login-logo .logo-icon{font-size:48px;margin-bottom:10px;filter:grayscale(0)}
.login-box .login-logo h2{font-size:21px;font-weight:700;color:var(--t);margin-bottom:6px;letter-spacing:-.3px}
.login-box .login-logo p{font-size:13px;color:var(--t3);font-weight:500}
.login-box .login-fg{margin-bottom:20px}
.login-box .login-fg label{display:block;font-size:13px;font-weight:600;color:var(--t2);margin-bottom:7px;letter-spacing:.2px}
.login-box .login-fg input,.login-box .login-fg select{width:100%;padding:11px 16px;border:1.5px solid var(--br);border-radius:10px;font-size:14px;transition:var(--tr);background:var(--w2)}
.login-box .login-fg input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,107,229,.1)}
.login-box .login-btn{width:100%;padding:13px;border-radius:10px;background:linear-gradient(180deg,var(--blue-h),var(--blue));color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:var(--tr);box-shadow:0 4px 16px rgba(45,107,229,.3);letter-spacing:.5px;margin-top:4px}
.login-box .login-btn:hover{box-shadow:0 6px 24px rgba(45,107,229,.4);transform:translateY(-1px)}
.login-box .login-btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(45,107,229,.3)}
.login-box .login-hint{margin-top:18px;text-align:center;font-size:12px;color:var(--t3)}

/* === Timeline === */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:11px;top:4px;bottom:4px;width:2px;background:linear-gradient(180deg,var(--br),var(--br3));border-radius:1px}
.timeline-item{position:relative;padding-bottom:22px;animation:timelineIn .3s ease-out both}
.timeline-item:last-child{padding-bottom:0}
.timeline-item::before{content:'';position:absolute;left:-25px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--w);border:2.5px solid var(--blue);box-shadow:0 0 0 4px var(--bl);transition:var(--tr)}
.timeline-item:hover::before{box-shadow:0 0 0 6px var(--bl);border-color:var(--blue-h)}
.timeline-item .tl-time{font-size:11px;color:var(--t3);margin-bottom:4px;font-weight:500}
.timeline-item .tl-content{font-size:12.5px;color:var(--t);line-height:1.6}

/* === KPI Cards === */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:18px}
.kpi-card{background:var(--w);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:22px;text-align:center;border:1px solid rgba(0,0,0,.04);transition:var(--tr)}
.kpi-card:hover{box-shadow:var(--sh);transform:translateY(-2px)}
.kpi-card .kpi-value{font-size:38px;font-weight:800;color:var(--blue);letter-spacing:-.5px;background:linear-gradient(180deg,var(--blue),var(--blue-h));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi-card .kpi-label{font-size:13px;color:var(--t2);margin-top:6px;font-weight:500}
.kpi-card .kpi-sub{font-size:11px;color:var(--t3);margin-top:3px}

/* === Data Tiles === */
.data-tile{background:linear-gradient(135deg,#0f3f9e 0%,var(--blue) 40%,var(--blue-h) 100%);color:#fff;border-radius:var(--r-lg);padding:22px;position:relative;overflow:hidden;cursor:pointer;transition:var(--tr);box-shadow:0 4px 16px rgba(45,107,229,.2)}
.data-tile:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(45,107,229,.3)}
.data-tile::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:200%;background:radial-gradient(ellipse,rgba(255,255,255,.08) 0%,transparent 70%)}
.data-tile .dt-val{font-size:30px;font-weight:800;letter-spacing:-.5px;position:relative;z-index:1}
.data-tile .dt-label{font-size:12px;opacity:.85;margin-top:6px;font-weight:500;position:relative;z-index:1}
.data-tile .dt-icon{position:absolute;right:14px;top:14px;font-size:42px;opacity:.15}

/* === Form Fields === */
.form-field{margin-bottom:16px}
.form-field label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;letter-spacing:.2px}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:9px 14px;border:1.5px solid var(--br);border-radius:var(--r-sm);font-size:13px;transition:var(--tr-fast);background:var(--w);color:var(--t)}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,107,229,.1),var(--sh-sm)}
.form-field textarea{resize:vertical;min-height:80px}

/* === Person Selector === */
.person-selector{max-height:300px;overflow-y:auto;border:1.5px solid var(--br);border-radius:var(--r-sm);padding:8px;background:var(--w)}
.dept-group{margin-bottom:12px}
.dept-name{font-weight:600;font-size:12.5px;color:var(--blue);margin-bottom:6px;padding:5px 10px;background:linear-gradient(135deg,var(--bl),#dce6fb);border-radius:var(--r-sm);letter-spacing:.2px}
.person-option{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:12.5px;transition:var(--tr-fast)}
.person-option:hover{background:var(--bl)}
.person-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-h));color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:600;box-shadow:0 2px 6px rgba(45,107,229,.25)}
.person-name{font-weight:600;color:var(--t)}
.person-position{color:var(--t3);font-size:11px;margin-left:auto}

/* === Tabs === */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--br2);margin-bottom:18px}
.tab-item{padding:9px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--t3);transition:var(--tr-fast);font-weight:500;position:relative}
.tab-item:hover{color:var(--blue)}
.tab-item.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.tab-item.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--blue)}

/* === Info Grid === */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.info-item{padding:10px 0;border-bottom:1px solid var(--br2)}
.info-item:last-child{border-bottom:none}
.info-item .ii-label{font-size:11px;color:var(--t3);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.info-item .ii-value{font-size:13.5px;font-weight:600;color:var(--t)}

/* === Empty State === */
.empty-state{text-align:center;padding:60px 24px;color:var(--t3)}
.empty-state .es-icon{font-size:56px;margin-bottom:16px;opacity:.3;filter:grayscale(.5)}
.empty-state .es-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--t2)}
.empty-state .es-hint{font-size:13px;line-height:1.5;max-width:300px;margin:0 auto}

/* === Pagination === */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:16px}
.pagination button{padding:5px 12px;border:1.5px solid var(--br);background:var(--w);border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-weight:500;transition:var(--tr-fast);color:var(--t2)}
.pagination button:hover{border-color:var(--blue);color:var(--blue);background:var(--bl)}
.pagination button.active{background:linear-gradient(180deg,var(--blue-h),var(--blue));color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(45,107,229,.25)}
.pagination button:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* === Webhook Card === */
.webhook-card{background:var(--w);border:1px solid var(--br);border-radius:var(--r);padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;transition:var(--tr-fast);box-shadow:var(--sh-sm)}
.webhook-card:hover{border-color:var(--blue);box-shadow:var(--sh)}
.webhook-card .wh-name{font-weight:600;font-size:13px;color:var(--t)}
.webhook-card .wh-url{font-size:11px;color:var(--t3);word-break:break-all;margin-top:4px}

/* === Message Preview === */
.msg-preview{background:var(--w2);border-radius:var(--r-sm);padding:14px;margin:12px 0;min-height:80px;border:1px solid var(--br);font-size:13px;line-height:1.6}

/* === Status Bar === */
.status-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:var(--r-sm);font-size:12.5px;margin-bottom:14px;font-weight:500;letter-spacing:.2px}
.status-bar.info{background:linear-gradient(135deg,var(--bl),#dce6fb);color:var(--blue);border:1px solid rgba(45,107,229,.1)}
.status-bar.success{background:linear-gradient(135deg,var(--gn-l),#d0f2da);color:var(--gn);border:1px solid rgba(45,184,77,.1)}
.status-bar.warning{background:linear-gradient(135deg,var(--or-l),#fde8c8);color:var(--or);border:1px solid rgba(230,138,23,.1)}
.status-bar.error{background:linear-gradient(135deg,var(--rd-l),#fbd0d4);color:var(--rd);border:1px solid rgba(232,72,85,.1)}

/* === Small Buttons === */
.btn-sm{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r-sm);font-size:11px;cursor:pointer;border:none;transition:var(--tr-fast);font-weight:600;letter-spacing:.2px}
.btn-sm:active{transform:scale(.96)}
.btn-sm.bp{background:linear-gradient(180deg,var(--blue-h),var(--blue));color:#fff;box-shadow:0 2px 6px rgba(45,107,229,.2)}.btn-sm.bp:hover{box-shadow:0 4px 12px rgba(45,107,229,.3);transform:translateY(-1px)}
.btn-sm.bo{background:var(--w);color:var(--blue);border:1.5px solid var(--blue);box-shadow:var(--sh-sm)}.btn-sm.bo:hover{background:var(--bl);box-shadow:0 2px 8px rgba(45,107,229,.12)}
.btn-sm.dg{background:var(--w);color:var(--rd);border:1.5px solid var(--rd)}.btn-sm.dg:hover{background:var(--rd-l)}
.btn-sm.gs{background:var(--w);color:var(--gn);border:1.5px solid var(--gn)}.btn-sm.gs:hover{background:var(--gn-l)}

/* === Permission Matrix === */
.perm-matrix{width:100%;border-collapse:collapse;font-size:12px}
.perm-matrix th,.perm-matrix td{border:1px solid var(--br);padding:7px 10px;text-align:center}
.perm-matrix th{background:var(--w2);font-weight:700;color:var(--t2);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.perm-matrix td:first-child{text-align:left;font-weight:600;background:var(--w2);color:var(--t)}

/* === Quick Cards === */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-bottom:18px}
.quick-card{background:var(--w);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:18px 14px;text-align:center;cursor:pointer;transition:var(--tr);border:1px solid rgba(0,0,0,.04);position:relative;overflow:hidden}
.quick-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--pp));transform:scaleX(0);transition:transform .3s cubic-bezier(.4,0,.2,1);transform-origin:left}
.quick-card:hover{transform:translateY(-4px);box-shadow:var(--sh-lg)}
.quick-card:hover::before{transform:scaleX(1)}
.quick-card .qc-icon{font-size:30px;margin-bottom:10px}
.quick-card .qc-title{font-size:13px;font-weight:700;margin-bottom:4px;color:var(--t)}
.quick-card .qc-desc{font-size:11px;color:var(--t3);line-height:1.4}

/* === Welcome Banner === */
.welcome-banner{background:linear-gradient(135deg,#0f3f9e 0%,var(--blue) 40%,var(--blue-h) 70%,#7aacff 100%);color:#fff;border-radius:var(--r-lg);padding:28px 32px;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(45,107,229,.25)}
.welcome-banner::before{content:'';position:absolute;top:-50%;right:-30%;width:60%;height:200%;background:radial-gradient(ellipse,rgba(255,255,255,.08) 0%,transparent 70%);animation:welcomeShimmer 6s ease-in-out infinite alternate}
@keyframes welcomeShimmer{0%{transform:translateX(-10px)}100%{transform:translateX(10px)}}
.welcome-banner h2{font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-.3px;position:relative;z-index:1}
.welcome-banner p{font-size:14px;opacity:.92;margin-bottom:5px;position:relative;z-index:1;font-weight:500}
.welcome-banner .wb-time{font-size:12px;opacity:.75;position:relative;z-index:1}
.welcome-banner .wb-icon{position:absolute;right:32px;top:50%;transform:translateY(-50%);font-size:68px;opacity:.12}

/* === Team Photo === */
.team-photo{background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 30%,#3a7bc8 60%,#5b9bd5 100%);border-radius:var(--r-lg);height:200px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.team-photo::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 60% 40%,rgba(255,255,255,.06) 0%,transparent 60%)}
.team-photo .tp-text{position:relative;z-index:2;text-align:center}
.team-photo .tp-icon{font-size:48px;margin-bottom:10px;opacity:.85}

/* === Activity List === */
.activity-list{list-style:none}
.activity-list li{padding:12px 0;border-bottom:1px solid var(--br2);display:flex;gap:12px;align-items:flex-start;transition:var(--tr-fast)}
.activity-list li:last-child{border-bottom:none}
.activity-list li:hover{background:rgba(45,107,229,.02);margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:var(--r-sm)}
.activity-list .al-icon{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--bl),#dce6fb);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;box-shadow:var(--sh-sm)}
.activity-list .al-content{flex:1}
.activity-list .al-title{font-size:12.5px;font-weight:500;color:var(--t);line-height:1.5}
.activity-list .al-time{font-size:11px;color:var(--t3);margin-top:3px}

/* === Print === */
@media print{.sb,.mn-h,.bg,.btn,.pagination,.toast-container{display:none !important}.mn-b{padding:0;background:#fff}.cd{box-shadow:none;border:1px solid #ddd;margin-bottom:8px;page-break-inside:avoid}.ch{height:200px}.timeline{padding-left:20px}.md{position:static;display:block;padding:0;backdrop-filter:none;background:none}.md .mo-bg{animation:none}.table-responsive{overflow:visible}} .print-only{display:none} @media print{.print-only{display:block}} .no-print{@media print{display:none !important}}

/* === Responsive === */
@media(max-width:768px){.sb{width:50px;min-width:50px}.sb-h .lo,.sb-h .v,.ml span:not(.a){display:none}.ml{justify-content:center;padding:7px 4px}.ml .a{margin:0}.sr{grid-template-columns:repeat(2,1fr)}.g2,.g3,.g4{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}.info-grid{grid-template-columns:1fr}.mo{padding-top:20px;align-items:center}.md{max-width:95vw;max-height:85vh;width:100%}.login-box{max-width:95vw;padding:30px 20px}}

/* V17 - Small screen modal fix */
@media(max-width:480px){.mo{padding-top:10px}.md{max-width:98vw;max-height:90vh;border-radius:var(--r)}.md-h{padding:12px 16px}.md-b{padding:16px}.md-f{padding:10px 16px}.login-box{padding:24px 16px}}

/* V17 - Responsive inline grid */
@media(max-width:768px){.quick-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}[style*="grid-template-columns"]{grid-template-columns:1fr !important}}

/* === Scrollbar === */
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--br3);border-radius:10px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--t3);border:2px solid transparent;background-clip:content-box}

/* === Page Enter Animation === */
.page-enter{animation:pageEnter .3s cubic-bezier(.2,.8,.3,1)}
@keyframes pageEnter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* === Table Responsive === */
.table-responsive{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r-sm)}
.table-responsive table{min-width:600px}

/* === Modal Animation === */
.mo.sh .md{animation:modalIn .3s cubic-bezier(.2,.8,.3,1)}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(-16px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* === Badge Group === */
.badge-group{display:flex;gap:5px;flex-wrap:wrap}

/* === Nav Tabs === */
.nav-tabs{display:flex;border-bottom:1px solid var(--br);margin-bottom:18px;overflow-x:auto;gap:0}
.nav-tab{padding:11px 18px;font-size:13px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;transition:var(--tr-fast);white-space:nowrap;flex-shrink:0;font-weight:500;position:relative}
.nav-tab:hover{color:var(--blue)}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}

/* === Timeline Animation === */
@keyframes timelineIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* === Selection / Focus Global === */
::selection{background:rgba(45,107,229,.15);color:var(--t)}
*:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:2px}
input:focus-visible,select:focus-visible,textarea:focus-visible{outline:none}

/* === Toast Notification === */
.toast-container{position:fixed;top:16px;right:16px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{pointer-events:auto;display:flex;align-items:center;gap:10px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:toastIn .35s cubic-bezier(.2,.8,.3,1);min-width:260px;max-width:420px;line-height:1.5}
.toast.success{background:linear-gradient(135deg,#2db84d,#34c724)}
.toast.error{background:linear-gradient(135deg,#e84855,#f07080)}
.toast.warn{background:linear-gradient(135deg,#e68a17,#f0a840)}
.toast.info{background:linear-gradient(135deg,#2f6be5,#4a85f5)}
.toast.removing{animation:toastOut .3s ease-in forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(100px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}

// =========================================

// =========================================
// Toast 通知函数

// =========================================
// 周期任务 - 标记完成
// =========================================
function markCycleTaskDone(taskId) {
  showToast('周期任务 ' + taskId + ' 已标记为完成', 'success');
}

// =========================================
// 设备按工序筛选
// =========================================
function filterEquipByProcess(processName) {
  var all = getAllEquips();
  var filtered = all.filter(function(e){ return e.process === processName; });
  var h = '<div class="page-enter">';
  h += '<div class="pt">' + processName + ' 设备列表 <span class="bdg">共 ' + filtered.length + ' 台</span></div>';
  h += '<div class="bg"><button class="btn bo" onclick="refresh()">&#8635; 返回</button></div>';
  h += '<div class="cd" style="padding:0"><div class="table-responsive"><table class="dt">';
  h += '<thead><tr><th>设备编号</th><th>设备名称</th><th>状态</th><th>位置</th><th>操作</th></tr></thead><tbody>';
  if (filtered.length === 0) {
    h += '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--t3)">该工序暂无设备</td></tr>';
  } else {
    filtered.forEach(function(e) {
      h += '<tr><td>' + e.equipNo + '</td><td>' + e.name + '</td><td><span class="t ' + getStatusClass(e.status) + '">' + e.status + '</span></td><td>' + e.location + '</td>';
      h += '<td><button class="btn-sm bo" onclick="openEquipDetail(\'' + e.id + '\')">查看</button></td></tr>';
    });
  }
  h += '</tbody></table></div></div>';
  h += '</div>';
  document.getElementById('mainContent').innerHTML = h;
}

// =========================================
// 主题色切换
// =========================================
function applyThemeColor(colorVal, colorName) {
  document.documentElement.style.setProperty('--blue', colorVal);
  document.documentElement.style.setProperty('--blue-h', colorVal);
  document.documentElement.style.setProperty('--accent', colorVal);
  showToast('主题色已切换为' + colorName, 'success');
}

// =========================================
// 执行日志详情
// =========================================
function viewLogDetail(logId) {
  var logs = lsGet('auto_task_logs', []);
  var l = logs.find(function(x){ return x.id === logId; });
  if (!l) { showToast('日志不存在', 'warn'); return; }
  var h = '<div class="info-grid">';
  h += '<div class="info-item"><div class="ii-label">日志ID</div><div class="ii-value">' + l.id + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">任务名称</div><div class="ii-value">' + (l.taskName || '-') + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">执行时间</div><div class="ii-value">' + (l.time || '-') + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">执行状态</div><div class="ii-value"><span class="t ' + (l.status==='成功'?'tg':'tr') + '">' + (l.status || '-') + '</span></div></div>';
  h += '</div>';
  h += '<div class="form-field" style="margin-top:12px"><label>执行结果</label><div style="padding:10px;background:#f7f8fa;border-radius:6px;font-size:12px;line-height:1.6;white-space:pre-wrap">' + (l.result || '无') + '</div></div>';
  openMo({title:'执行日志详情', html:h});
}

// =========================================
// 清空执行日志
// =========================================
function clearAutoTaskLogs() {
  if (!confirm('确定清空所有执行日志？')) return;
  lsSet('auto_task_logs', []);
  showToast('日志已清空', 'success');
  refresh();
}

// =========================================
// 决策跟踪详情
// =========================================
function viewDecisionDetail(item, time, owner, status, finish) {
  var h = '<div class="info-grid">';
  h += '<div class="info-item"><div class="ii-label">决策事项</div><div class="ii-value">' + item + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">决策时间</div><div class="ii-value">' + time + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">责任人</div><div class="ii-value">' + owner + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">状态</div><div class="ii-value"><span class="t ' + getStatusClass(status) + '">' + status + '</span></div></div>';
  h += '<div class="info-item"><div class="ii-label">完成时间</div><div class="ii-value">' + finish + '</div></div>';
  h += '</div>';
  openMo({title:'决策详情', html:h});
}

function showToast(msg, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toastContainer';
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  var iconMap = {success:'\u2705', error:'\u274c', warn:'\u26a0\ufe0f', info:'\u2139\ufe0f'};
  toast.innerHTML = '<span>' + (iconMap[type] || iconMap.info) + '</span><span>' + msg.replace(/\n/g, '<br>') + '</span>';
  container.appendChild(toast);
  var duration = Math.max(2500, Math.min(msg.length * 120, 5000));
  setTimeout(function() {
    toast.classList.add('removing');
    setTimeout(function() {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 300);
  }, duration);
}

function registerModule(mod) {
  if (!mod || !mod.id) return;
  var existing = MODULE_REGISTRY.findIndex(function(m){ return m.id === mod.id; });
  if (existing >= 0) {
    MODULE_REGISTRY[existing] = Object.assign(MODULE_REGISTRY[existing], mod);
  } else {
    MODULE_REGISTRY.push(mod);
  }
  // Add to menu if not built-in
  if (!mod.builtIn) {
    var menuEntry = {id: mod.id, label: (mod.icon || '📦') + ' ' + mod.name, icon: mod.icon || '📦'};
    if (mod.parentId) {
      var parent = M.find(function(m){ return m.id === mod.parentId; });
      if (parent && parent.children) {
        parent.children.push(menuEntry);
      }
    } else {
      M.push(menuEntry);
    }
    // Rebuild menu maps
    pathMap = {};
    allLabels = {};
    buildMaps(M, []);
  }
  refresh();
  showToast('模块 "' + mod.name + '" 已注册', 'success');
}

function unregisterModule(modId) {
  var idx = MODULE_REGISTRY.findIndex(function(m){ return m.id === modId; });
  if (idx >= 0 && !MODULE_REGISTRY[idx].builtIn) {
    MODULE_REGISTRY.splice(idx, 1);
    showToast('模块已注销', 'success');
  }
}

function getRegisteredModules() { return MODULE_REGISTRY; }

async function apiRequest(method, path, data) {
  try {
    var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
    var timeoutId = controller ? setTimeout(function() { controller.abort(); }, 5000) : null;
    var opts = {
      method: method,
      headers: {'Content-Type': 'application/json'},
      signal: controller ? controller.signal : undefined
    };
    if (data && method !== 'GET') opts.body = JSON.stringify(data);
    var res = await fetch(API_BASE + path, opts);
    if (timeoutId) clearTimeout(timeoutId);
    var json = await res.json();
    return json;
  } catch(e) {
    if (timeoutId) clearTimeout(timeoutId);
    if (e.name === 'AbortError') {
      console.warn('API request timeout:', path);
      return {code: -1, msg: '请求超时，后端不可达'};
    }
    console.error('API request error:', e);
    return {code: -1, msg: '网络错误: ' + e.message};
  }
}

var SERVER_URL_CANDIDATES = [

var CONFIG_URL = 'https://cai-rui12.github.io/smart-manufacturing-platform/server-config.json';

async function tryConnectServer(url, timeoutMs) {
  try {
    var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
    var timeoutId = controller ? setTimeout(function() { controller.abort(); }, timeoutMs || 15000) : null;
    var res = await fetch(url + '/api/status', {method:'GET', headers:{'Content-Type':'application/json'}, signal: controller ? controller.signal : undefined});
    if (timeoutId) clearTimeout(timeoutId);
    var json = await res.json();

async function detectServer() {
  updateSyncStatusBadge('syncing', '连接中...');

  // 1. 先从GitHub配置文件获取最新隧道URL
  var dynamicUrl = null;
  try {
    var configRes = await fetch(CONFIG_URL, {cache:'no-store'});
    if (configRes.ok) {
      var config = await configRes.json();
      if (config.tunnel_url) { dynamicUrl = config.tunnel_url; }
    }
  } catch(e) {}

  // 2. 构建候选URL列表（动态隧道URL最优先）
  var candidates = [];
  if (dynamicUrl) candidates.push(dynamicUrl);
  var savedUrl = localStorage.getItem('v13_server_url');
  if (savedUrl && candidates.indexOf(savedUrl) === -1) candidates.push(savedUrl);
  // 3. 添加固定候选URL（去重）
  for (var i = 0; i < SERVER_URL_CANDIDATES.length; i++) {
    if (candidates.indexOf(SERVER_URL_CANDIDATES[i]) === -1) {
      candidates.push(SERVER_URL_CANDIDATES[i]);
    }
  }
  
  updateSyncStatusBadge('syncing', '连接中...');
  
  // 依次尝试每个候选URL
  for (var i = 0; i < candidates.length; i++) {
    var url = candidates[i];
    var result = await tryConnectServer(url, 15000);
    if (result) {
      SERVER_CONFIG.url = url;
      SERVER_CONFIG.enabled = true;
      SERVER_CONFIG.mode = 'online';
      API_BASE = url;
      localStorage.setItem('v13_server_url', url);
      localStorage.setItem('v13_server_enabled', 'true');
      updateSyncStatusBadge('connected', '已连接');
      addSyncLog('服务器连接成功: ' + url + (result.data ? ' (版本: ' + (result.data.version || '-') + ', 运行: ' + Math.round(result.data.uptime || 0) + '秒)' : ''));
      // 自动同步本地数据到服务器
      await syncLocalToServer();
      return;
    }
  }
  
  // 所有候选URL都失败
  SERVER_CONFIG.enabled = false;
  SERVER_CONFIG.mode = 'offline';
  API_BASE = '';
  updateSyncStatusBadge('offline', '离线');
  addSyncLog('服务器连接失败，请确认后端服务器已在运行（见smart-manufacturing-server目录下的start.bat）');
  localStorage.setItem('v13_server_connect_error', '服务器连接失败，请确认后端服务器已在运行（见smart-manufacturing-server目录下的start.bat）');

async function loadData(type) {
  var lsKey = getLsKey(type);
  if (SERVER_CONFIG.mode === 'online') {
    try {
      var res = await apiRequest('GET', '/api/data/' + type);
      if (res.code === 0 && res.data) {
        var serverData = Array.isArray(res.data) ? res.data : [];
        var local = lsGet(lsKey, []);
        // 合并策略：用后端数据为基准，合并本地新增的数据
        if (serverData.length > 0) {
          var serverIds = {};
          serverData.forEach(function(item) { if (item.id) serverIds[item.id] = true; });
          var hasNew = false;
          local.forEach(function(item) {
            if (item.id && !serverIds[item.id]) {
              serverData.push(item);
              hasNew = true;
            }
          });
          if (local.length > serverData.length || hasNew) {
            // 把合并后的数据推回服务器
            lsSet(lsKey, serverData);
            await apiRequest('POST', '/api/data/' + type, serverData);
          } else {
            lsSet(lsKey, serverData);
          }
        } else if (local.length > 0) {
          // 后端为空，把本地数据上传
          await apiRequest('POST', '/api/data/' + type, local);
        }
        return lsGet(lsKey, []);
      }
    } catch(e) {
      console.error('loadData API error:', e);
    }
  }
  return lsGet(lsKey, []);
}

// 将前端记录转换为飞书webhook body格式
function convertToFeishuPayload(dataType, record) {
  var fieldMap = FEISHU_FIELD_MAP[dataType];
  if (!fieldMap) return record; // 无映射则原样发送
  var body = {};
  for (var key in record) {
    if (record.hasOwnProperty(key)) {
      var feishuKey = fieldMap[key] || key;
      body[feishuKey] = record[key];
    }
  }
  return body;
}

async function syncAllToFeishu(dataType, showMsg) {

  }
  var records = lsGet('local_' + dataType, []);
  if (!records || records.length === 0) {

    return;
  }
  if (showMsg) showToast('正在同步 ' + records.length + ' 条记录到飞书...', 'info');

  for (var i = 0; i < records.length; i++) {
    var ok = await syncRecordToFeishu(dataType, records[i], false);
    if (ok) success++; else fail++;
    // 避免频率限制，每条间隔500ms
    if (i < records.length - 1) await new Promise(function(r){ setTimeout(r, 500); });
  }
  if (showMsg) showToast('同步完成: 成功' + success + '条, 失败' + fail + '条', success > 0 ? 'success' : 'error');
  addSyncLog('[' + dataType + '] 批量同步完成: 成功' + success + ', 失败' + fail);

function setOfflineQueue(q) { lsSet('offline_queue', q); }
function addToOfflineQueue(operation) {
  var q = getOfflineQueue();
  q.push({id: Date.now() + '_' + Math.random().toString(36).substr(2,4), ts: new Date().toISOString(), op: operation});
  if (q.length > 200) q = q.slice(-200); // max 200 pending ops
  setOfflineQueue(q);

function clearOfflineQueue() { setOfflineQueue([]); updateSyncStatusBadge(); }

// V17 - 自动ping + 离线队列重放
var _pingTimer = null;
var _replayInProgress = false;

function startAutoPing() {
  stopAutoPing();
  _pingTimer = setInterval(function() {
    autoPingServer();
  }, 30000); // every 30 seconds
  // Also do initial ping
  autoPingServer();
}

function stopAutoPing() {
  if (_pingTimer) { clearInterval(_pingTimer); _pingTimer = null; }
}

async function autoPingServer() {
  if (!SERVER_CONFIG.url) return;
  try {
    var res = await tryConnectServer(SERVER_CONFIG.url, 10000);
    if (res) {
      // Was offline, now online -> replay queue
      if (SERVER_CONFIG.mode === 'offline') {
        SERVER_CONFIG.mode = 'online';
        API_BASE = SERVER_CONFIG.url;
        updateSyncStatusBadge('connected', '已同步');
        addSyncLog('网络恢复，自动重连成功');
        showToast('网络已恢复，正在同步离线操作...', 'success');
        await replayOfflineQueue();
      } else {
        updateSyncStatusBadge('connected', '已同步');
      }
    } else {
      if (SERVER_CONFIG.mode === 'online') {
        SERVER_CONFIG.mode = 'offline';
        API_BASE = '';
        updateSyncStatusBadge('offline', '离线');
        addSyncLog('网络断开，已切换到离线模式');
      }
    }
  } catch(e) {
    // ping failed
    if (SERVER_CONFIG.mode === 'online') {
      SERVER_CONFIG.mode = 'offline';
      API_BASE = '';
      updateSyncStatusBadge('offline', '离线');
    }
  }
}

async function replayOfflineQueue() {
  if (_replayInProgress) return;
  var q = getOfflineQueue();
  if (q.length === 0) { clearOfflineQueue(); return; }
  _replayInProgress = true;
  setSyncStatus('syncing');
  var success = 0, fail = 0;
  for (var i = 0; i < q.length; i++) {
    var item = q[i];
    try {
      var op = item.op;
      if (op.method && op.path && op.data) {
        var res = await apiRequest(op.method, op.path, op.data);
        if (res.code === 0) success++; else fail++;
      } else { fail++; }
    } catch(e) { fail++; }
  }
  if (fail === 0) {
    clearOfflineQueue();
    addSyncLog('离线队列重放完成: ' + success + ' 条操作已同步');
    showToast('离线操作已全部同步', 'success');
  } else {
    // Remove succeeded items, keep failed ones
    setOfflineQueue(q.slice(success));
    addSyncLog('离线队列部分重放: 成功' + success + ', 失败' + fail);
    showToast('部分离线操作同步失败', 'warn');
  }
  setSyncStatus('synced');
  _replayInProgress = false;
}

function lsGet(key, def) {
  try {
    var v = localStorage.getItem('v9_' + key);
    return v ? JSON.parse(v) : def;
  } catch(e) { return def; }
}
function lsSet(key, val) {
  try { localStorage.setItem('v9_' + key, JSON.stringify(val)); } catch(e) {}
}

function mergeData(builtIn, localKey) {
  try {
    var local = lsGet(localKey, []);
    var map = {};
    builtIn.forEach(function(item) { map[item.id] = item; });
    local.forEach(function(item) { map[item.id] = item; });
    return Object.values(map);
  } catch(e) { return builtIn; }
}

// V17 - 密码混淆存储 (base64 + salt)
// =========================================
var PWD_SALT = 'SMP@2026!#';
function obfuscatePwd(pwd) {
  var salted = pwd + '|' + PWD_SALT;
  try { return btoa(unescape(encodeURIComponent(salted))); } catch(e) { return btoa(salted); }
}
function deobfuscatePwd(encoded) {
  try { var decoded = decodeURIComponent(escape(atob(encoded))); } catch(e) { decoded = atob(encoded); }
  var parts = decoded.split('|');
  return parts[0] || '';
}
function migratePasswords() {
  var pw = lsGet('passwords', null);
  if (!pw) return;
  var changed = false;
  for (var eid in pw) {
    if (pw[eid] && eid !== '__v17_migrated') {
      // 尝试base64解码，如果失败则说明是明文，需要迁移
      try {
        var decoded = atob(pw[eid]);
        // base64解码成功，检查是否包含salt分隔符（混淆密码的特征）
        if (decoded.indexOf('|') === -1) {
          // 虽然是合法base64，但解码后没有分隔符，说明只是巧合的base64明文
          // 尝试deobfuscate，如果结果与原值不同则说明是真正的混淆密码
          var deob = deobfuscatePwd(pw[eid]);
          if (deob === pw[eid]) {
            // deobfuscate返回的值等于编码值，说明不是真正的混淆密码
            // 需要迁移
            pw[eid] = obfuscatePwd(pw[eid]);
            changed = true;
          }
        }
        // 如果包含'|'，说明已经是混淆密码，无需迁移
      } catch(e) {
        // atob失败，确定是明文密码，需要迁移
        pw[eid] = obfuscatePwd(pw[eid]);
        changed = true;
      }
    }
  }
  if (changed) {
    pw['__v17_migrated'] = true;
    lsSet('passwords', pw);
  }
}

function initAuth() {

      }
      // V17: migrate non-obfuscated passwords
      else if (pw[p.employeeId] && pw[p.employeeId] !== obfuscatePwd('123456')) {
        try { deobfuscatePwd(pw[p.employeeId]); } catch(e) {
          pw[p.employeeId] = obfuscatePwd(pw[p.employeeId]);
          pwChanged = true;
        }
      }
    });

    });
    if (forceFix) { lsSet('user_roles', roles); }

    PEOPLE_OBJ.forEach(function(p) {
      var eid = p.employeeId;
      if (!roles[eid]) {

        else if (EDITOR_IDS.indexOf(eid) !== -1) roles[eid] = 'editor';

    });

async function doLogin() {
  try {
    var eid = document.getElementById('loginId').value.trim();
    var pwd = document.getElementById('loginPwd').value.trim();
    if (!eid || !pwd) { showToast('请输入工号和密码', 'warn'); return; }
    var passwords = lsGet('passwords', {});
    var person = PEOPLE_OBJ.find(function(p) { return p.employeeId === eid; });
    if (!person) { showToast('工号不存在，请检查工号输入', 'error'); return; }

    // V17 Fix: 兼容明文和混淆密码比对
    var storedPwd = passwords[eid] || '';
    var matched = false;
    var needUpgrade = false; // 标记是否需要将明文升级为混淆存储

    if (!storedPwd) {
      // 没有存储过密码，使用默认密码12345678
      matched = (pwd === '12345678');
      needUpgrade = true;
    } else {
      // 先尝试混淆密码比对
      try {
        var decodedPwd = deobfuscatePwd(storedPwd);
        if (pwd === decodedPwd) {
          matched = true;
        }
      } catch(e) {
        // deobfuscatePwd失败，说明存储的不是base64，可能是明文
      }
      // 再尝试明文直接比对（向后兼容旧版本明文存储）
      if (!matched && pwd === storedPwd) {
        matched = true;
        needUpgrade = true; // 明文匹配成功，自动升级为混淆存储
      }
    }

    if (!matched) { showToast('密码错误，请重试', 'error'); return; }

    // V17 Fix: 记录是否使用默认密码（在升级前检查）
    var isDefaultPwd = (pwd === '12345678' && !passwords[eid]);

    // 自动升级：将明文密码升级为混淆存储
    if (needUpgrade) {
      passwords[eid] = obfuscatePwd(pwd);
      lsSet('passwords', passwords);
    }

    // V13 - 在线模式下同步验证后端（带3秒超时保护，超时自动降级到本地验证）
    if (SERVER_CONFIG.mode === 'online') {
      try {
        var res = await Promise.race([
          apiRequest('POST', '/api/auth/login', {username: eid, password: pwd}),
          new Promise(function(_, reject) { setTimeout(function() { reject(new Error('timeout')); }, 3000); })
        ]);
        if (res.code === 1) {
          // 后端不存在此用户，先在后端创建
          var roles = lsGet('user_roles', {});
          await Promise.race([
            apiRequest('POST', '/api/members', {eid: eid, name: person.name, role: roles[eid] || 'viewer'}),
            new Promise(function(_, reject) { setTimeout(function() { reject(new Error('timeout')); }, 3000); })
          ]);
          addSyncLog('后端创建用户: ' + eid + ' (' + person.name + ')');
        }
        if (res.code === 0 || res.code === 1) {
          addSyncLog('用户登录验证成功: ' + eid);
        }
      } catch(e) {
        // 后端不可用时降级到本地验证
        console.warn('后端登录验证失败，降级到本地验证:', e.message || e);
        showToast('后端不可达，已使用本地验证登录', 'warn');
      }
    }
    pendingUser = person;
    if (isDefaultPwd) {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('changePwdForm').style.display = 'block';
    } else {
      finishLogin(person);
    }
  } catch(e) {
    console.error('doLogin error:', e);
    showToast('登录过程发生错误，请重试: ' + (e.message || e), 'error');
  }
}

function exportCSV(data, filename) {
  if (!data || !data.length) { showToast('没有数据', 'info'); return; }
  var keys = Object.keys(data[0]);
  var csv = keys.join(',') + '\n';
  data.forEach(function(row) {
    var vals = keys.map(function(k) {
      var v = row[k] !== undefined ? String(row[k]) : '';
      v = v.replace(/"/g, '""');
      if (v.indexOf(',') !== -1 || v.indexOf('\n') !== -1) v = '"' + v + '"';
      return v;
    });
    csv += vals.join(',') + '\n';
  });
  var blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = (filename || 'export') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

function exportJSON(data, filename) {

  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = (filename || 'export') + '_' + new Date().toISOString().slice(0,10) + '.json';

}

function renderPagination(total, page, pageSize, callback) {
  if (total <= pageSize) return '';
  var totalPages = Math.ceil(total / pageSize);
  var h = '<div class="pagination">';
  h += '<button onclick="' + callback + '(' + (page - 1) + ')"' + (page <= 1 ? ' disabled' : '') + '>上一页</button>';
  var start = Math.max(1, page - 2);
  var end = Math.min(totalPages, page + 2);
  if (start > 1) { h += '<button onclick="' + callback + '(1)">1</button>'; if (start > 2) h += '<span style="padding:0 4px">...</span>'; }
  for (var i = start; i <= end; i++) {
    h += '<button class="' + (i === page ? 'active' : '') + '" onclick="' + callback + '(' + i + ')">' + i + '</button>';
  }
  if (end < totalPages) { if (end < totalPages - 1) h += '<span style="padding:0 4px">...</span>'; h += '<button onclick="' + callback + '(' + totalPages + ')">' + totalPages + '</button>'; }
  h += '<button onclick="' + callback + '(' + (page + 1) + ')"' + (page >= totalPages ? ' disabled' : '') + '>下一页</button>';
  h += '<span style="margin-left:8px;font-size:12px;color:var(--t3)">共 ' + total + ' 条 / 第 ' + page + '/' + totalPages + ' 页</span>';
  h += '</div>';
  return h;
}

function initHomeCharts() {
  try {
    // 任务完成率饼图
    var c1 = document.getElementById('homeChart1');
    if (c1) {
      if (chartInstances.home1) chartInstances.home1.destroy();
      var tasks = getAllTasks();
      var done = tasks.filter(function(t){return t.status==='已完成';}).length;
      var progress = tasks.filter(function(t){return t.status==='进行中';}).length;
      var pending = tasks.filter(function(t){return t.status==='待开始' || t.status==='规划中';}).length;
      var stalled = tasks.filter(function(t){return t.status==='已停滞';}).length;
      chartInstances.home1 = new Chart(c1, {
        type: 'doughnut',
        data: {
          labels: ['已完成','进行中','待开始','已停滞'],
          datasets: [{data:[done,progress,pending,stalled], backgroundColor:['#34c724','#3370ff','#ff9800','#f54a45']}]
        },
        options: {responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}
      });
    }
    // 本周日报柱状图（动态统计）
    var c2 = document.getElementById('homeChart2');
    if (c2) {
      if (chartInstances.home2) chartInstances.home2.destroy();
      var days = ['周一','周二','周三','周四','周五','周六','周日'];
      var reports = getAllDailyReports();
      var now2 = new Date();
      var monday = new Date(now2);
      monday.setDate(now2.getDate() - ((now2.getDay() + 6) % 7));
      monday.setHours(0,0,0,0);
      var counts = [0,0,0,0,0,0,0];
      reports.forEach(function(r) {
        if (!r.date) return;
        var d = new Date(r.date.replace(/\//g,'-'));
        if (isNaN(d.getTime())) return;
        var diff = Math.floor((d - monday) / 86400000);
        if (diff >= 0 && diff < 7) counts[diff]++;
      });
      chartInstances.home2 = new Chart(c2, {
        type: 'bar',
        data: {
          labels: days,
          datasets: [{label:'提交数', data:counts, backgroundColor:'#3370ff', borderRadius:4}]
        },
        options: {responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
      });
    }
    // 设备状态饼图
    var c3 = document.getElementById('homeChart3');
    if (c3) {
      if (chartInstances.home3) chartInstances.home3.destroy();
      var equips = getAllEquips();
      var running = equips.filter(function(e){return e.status==='运行中';}).length;
      var maintain = equips.filter(function(e){return e.status==='保养中';}).length;
      var fault = equips.filter(function(e){return e.status==='故障';}).length;
      var other = equips.length - running - maintain - fault;
      chartInstances.home3 = new Chart(c3, {
        type: 'pie',
        data: {
          labels: ['运行中','保养中','故障','其他'],
          datasets: [{data:[running,maintain,fault,other], backgroundColor:['#34c724','#ff9800','#f54a45','#8f959e']}]
        },
        options: {responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}
      });
    }
  } catch(e) { console.error('initHomeCharts error:', e); }
}

// 推送日报到飞书群（从各组工作汇报和出勤统计表聚合）
async function sendDailyReportToGroup() {
  var btn = document.getElementById('btnSendDailyReport');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 推送中...'; }
  try {
    var today = new Date().toISOString().split('T')[0];
    if (SERVER_CONFIG.mode !== 'online') {
      // 离线降级：从本地数据聚合日报并生成文本摘要
      var all = getAllDailyReports();
      var todayReports = all.filter(function(r) { return r.date === today; });
      if (todayReports.length === 0) {
        showToast('今日暂无本地日报数据，请先提交日报', 'warn');
        return;
      }
      var totalHours = todayReports.reduce(function(s, r) { return s + (r.workHours || 0); }, 0);
      var normalCount = todayReports.filter(function(r) { return r.status === '正常'; }).length;
      var blockedCount = todayReports.filter(function(r) { return r.status === '有阻塞'; }).length;
      var summaryText = '【' + today + ' 日报聚合摘要（离线模式）】\n';
      summaryText += '共 ' + todayReports.length + ' 篇日报 | 正常:' + normalCount + ' | 有阻塞:' + blockedCount + ' | 总工时:' + totalHours + 'h\n';
      summaryText += '─────────────────\n';
      todayReports.forEach(function(r) {
        summaryText += '\n👤 ' + r.reporter + '（' + (r.workHours || 0) + 'h）[' + r.status + ']\n';
        summaryText += '工作：' + (r.content || '').substring(0, 80) + (r.content && r.content.length > 80 ? '...' : '') + '\n';
        if (r.issues && r.issues !== '无') summaryText += '问题：' + r.issues + '\n';
      });
      // 保存到剪贴板并提示
      try {
        await navigator.clipboard.writeText(summaryText);
        showToast('离线模式：日报摘要已生成并复制到剪贴板（' + todayReports.length + '篇），请手动粘贴到飞书群', 'success');
      } catch(clipErr) {
        showToast('离线模式：已聚合 ' + todayReports.length + ' 篇日报（总工时' + totalHours + 'h），请连接服务器后推送', 'warn');
      }
      return;
    }
    // 在线模式：调用后端API
    var resp = await apiRequest('POST', '/api/daily-report/send', { date: today });
    if (resp.code === 0) {
      var workCount = resp.data.work_report_count || 0;
      var attendCount = resp.data.attendance_count || 0;
      if (workCount === 0 && attendCount === 0) {
        showToast('日报已推送，但今日无数据（未配置PersonalBaseToken时无法自动读取飞书表）', 'warn');
      } else {
        showToast('日报已推送到飞书群！工作汇报:' + workCount + '条, 出勤:' + attendCount + '条', 'success');
      }
    } else {
      showToast('推送失败: ' + (resp.msg || '未知错误'), 'error');
      // 在线推送失败时，降级到离线模式提示
      var allFallback = getAllDailyReports();
      var todayFallback = allFallback.filter(function(r) { return r.date === today; });
      if (todayFallback.length > 0) {
        showToast('提示：本地有 ' + todayFallback.length + ' 篇今日日报，可断开后重试（将使用离线模式）', 'info');
      }
    }
  } catch(e) {
    showToast('推送异常: ' + e.message + '，请检查服务器连接', 'error');
    console.error('sendDailyReportToGroup error:', e);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '&#128227; 推送日报到飞书群'; }
  }
}

// 获取ISO周数
function getWeekNumber(d) {
  var date = new Date(d.getTime());
  date.setHours(0, 0, 0, 0);
  date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
  var week1 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

// 获取当前周的起止日期
function getWeekDateRange(d) {
  var date = new Date(d.getTime());
  var day = date.getDay() || 7;
  var start = new Date(date);
  start.setDate(date.getDate() - day + 1);
  var end = new Date(start);
  end.setDate(start.getDate() + 4);
  return {
    start: start.toISOString().slice(0, 10),
    end: end.toISOString().slice(0, 10)
  };
}

function createTask() {
  var today = new Date().toISOString().slice(0,10);
  var peopleNames = PEOPLE_OBJ.map(function(p){return p.name;});
  submitFormModal({
    title: '新建任务',
    showSaveAndNew: true,
    fields: [
      {key:'desc', label:'任务描述', type:'text', required:true, placeholder:'请输入任务描述'},
      {key:'owner', label:'负责人', type:'select', options:peopleNames, value:currentUser.name},
      {key:'priority', label:'优先级', type:'select', options:['重要紧急','紧急不重要','重要不紧急','不紧急不重要'], value:'重要不紧急'},
      {key:'status', label:'状态', type:'select', options:['待开始','进行中','已完成','已停滞'], value:'进行中'},
      {key:'progress', label:'进度(%)', type:'number', value:'0'},
      {key:'startDate', label:'开始日期', type:'date', value:today},
      {key:'endDate', label:'截止日期', type:'date', value:today},
      {key:'progressText', label:'进度说明', type:'textarea', rows:3},
      {key:'notifyPeople', label:'通知人员', type:'text', placeholder:'多人用逗号分隔'},
      {key:'assignees', label:'参与人员', type:'text', placeholder:'多人用逗号分隔'},
      {key:'process', label:'所属工序', type:'select', options:['智能物流','电镀','沉铜','阻焊','沉金','内层','外层','层压','钻孔','去毛刺','等离子','全流程'], value:'智能物流'}
    ],
    onSave: function(data) {
      var all = getAllTasks();
      var maxNum = 0;
      all.forEach(function(t) {
        var m = String(t.id).match(/T(\d+)/);
        if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
      });
      data.id = 'T' + String(maxNum + 1).padStart(3, '0');
      var local = lsGet('local_tasks', []);
      local.push(data);
      saveLocalTasks(local);
      saveData('tasks', local);
    },
    onAfter: function() { refresh(); }
  });
}

function editTask(id) {
  var all = getAllTasks();
  var t = all.find(function(x){ return x.id === id; });
  if (!t) return;
  var peopleNames = PEOPLE_OBJ.map(function(p){return p.name;});
  submitFormModal({
    title: '编辑任务 - ' + id,
    fields: [
      {key:'desc', label:'任务描述', type:'text', value:t.desc, required:true},
      {key:'owner', label:'负责人', type:'select', options:peopleNames, value:t.owner},

      {key:'status', label:'状态', type:'select', options:['待开始','进行中','已完成','已停滞'], value:t.status},
      {key:'progress', label:'进度(%)', type:'number', value:t.progress},
      {key:'startDate', label:'开始日期', type:'date', value:t.startDate},
      {key:'endDate', label:'截止日期', type:'date', value:t.endDate},
      {key:'progressText', label:'进度说明', type:'textarea', rows:3, value:t.progressText || ''},
      {key:'notifyPeople', label:'通知人员', type:'text', value:t.notifyPeople || ''},
      {key:'assignees', label:'参与人员', type:'text', value:t.assignees || ''},
      {key:'process', label:'所属工序', type:'select', options:['智能物流','电镀','沉铜','阻焊','沉金','内层','外层','层压','钻孔','去毛刺','等离子','全流程'], value:t.process || '智能物流'}
    ],
    onSave: function(data) {
      var local = lsGet('local_tasks', []);
      var idx = local.findIndex(function(x){ return x.id === id; });
      data.id = id;
      if (idx >= 0) local[idx] = data;
      else local.push(data);
      saveLocalTasks(local);
      saveData('tasks', local);
    },
    onAfter: function() { refresh(); openTaskDetail(id); }
  });
}

function deleteTask(id) {
  if (!confirm('确定删除此任务？')) return;
  var local = lsGet('local_tasks', []);
  local = local.filter(function(x){ return x.id !== id; });
  saveLocalTasks(local);
  saveData('tasks', local);
  closeMo();
  refresh();
}

function doQuickUpdateProgress(id) {
  var val = parseInt(document.getElementById('qprogress_val').value) || 0;
  if (val < 0 || val > 100) { showToast('进度必须在0-100之间', 'error'); return; }
  var local = lsGet('local_projects', []);
  var idx = local.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) {
    local[idx].progress = val;
    if (val >= 100) local[idx].status = '已完成';
    else if (val > 0 && local[idx].status === '规划中') local[idx].status = '进行中';
    saveLocalProjects(local);
    saveData('projects', local);
  }
  closeMo();
  refresh();
  showToast('项目 ' + id + ' 进度已更新为 ' + val + '%', 'success');
}

function changeProjectStatus(id) {
  var all = getAllProjects();
  var p = all.find(function(x){ return x.id === id; });
  if (!p) return;
  var currentStatus = p.status;
  var statuses = ['规划中','进行中','已完成','已暂停'];
  var html = '<div class="form-field"><label>当前状态</label>';
  html += '<div style="padding:8px 12px;background:var(--bg);border-radius:6px;font-size:13px"><span class="t ' + getStatusClass(currentStatus) + '">' + currentStatus + '</span></div></div>';
  html += '<div class="form-field"><label>变更为新状态</label>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
  statuses.forEach(function(s) {
    if (s !== currentStatus) {
      var cls = s==='已完成'?'tg':s==='进行中'?'tb':s==='已暂停'?'tr':'tx';
      html += '<button class="btn" style="background:var(--bg);border:1.5px solid var(--br)" onclick="doChangeProjectStatus(\'' + id + '\',\'' + s + '\')">';
      html += '<span class="t ' + cls + '">' + s + '</span></button>';
    }
  });
  html += '</div></div>';
  openMo({title:'变更状态 - ' + id, html:html, footer:''});
}

function doChangeProjectStatus(id, newStatus) {
  var local = lsGet('local_projects', []);
  var idx = local.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) {
    var oldStatus = local[idx].status;
    local[idx].status = newStatus;
    if (newStatus === '已完成' && (local[idx].progress || 0) < 100) local[idx].progress = 100;
    if (newStatus === '规划中' && (local[idx].progress || 0) > 0) local[idx].progress = 0;
    saveLocalProjects(local);
    saveData('projects', local);
    closeMo();
    refresh();
    showToast('项目 ' + id + ' 状态: ' + oldStatus + ' -> ' + newStatus, 'success');
  }
}

function renderRepairList(mode) {
  try {
    var all = getAllRepairs();
    var search = getSearch('repair');
    var statusFilter = lsGet('repair_status', '');
    var list = all;
    
    if (mode === 'pending') {
      list = list.filter(function(r){ return r.status === '待执行' || r.status === '进行中'; });
    }
    if (statusFilter) {
      list = list.filter(function(r){ return r.status === statusFilter; });
    }
    if (search) {
      list = list.filter(function(r) {
        return (r.equipName||'').indexOf(search) !== -1 || (r.faultDesc||'').indexOf(search) !== -1 || (r.reporter||'').indexOf(search) !== -1;
      });
    }
    
    var page = getPage('repair');
    var pageSize = 10;
    var total = list.length;
    var pageData = list.slice((page-1)*pageSize, page*pageSize);
    
    var title = mode === 'pending' ? '⚠️ 待处理报修' : '🔧 维修记录';
    var statuses = ['待执行','进行中','已完成','已取消'];
    
    var h = '<div class="page-enter">';
    h += '<div class="pt">🔧 ' + title + ' <span class="bdg">共 ' + total + ' 条</span></div>';
    h += '<div class="kpi-row">';
    h += '<div class="kpi-card"><div class="kpi-value">' + all.length + '</div><div class="kpi-label">维修总数</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value" style="color:var(--or)">' + all.filter(function(r){return r.status==='待执行';}).length + '</div><div class="kpi-label">待处理</div></div>';
    h += '<div class="kpi-card"><div class="pt" style="font-size:36px;color:var(--blue);margin:0;font-weight:700">' + all.filter(function(r){return r.status==='进行中';}).length + '</div><div class="kpi-label">处理中</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value" style="color:var(--gn)">' + all.filter(function(r){return r.status==='已完成';}).length + '</div><div class="kpi-label">已完成</div></div>';
    h += '</div>';
    h += '<div class="bg">';
    h += '<input class="fi" style="width:200px" placeholder="搜索设备/故障描述..." value="' + search + '" oninput="setSearch(\'repair\',this.value);setPage(\'repair\',1);refresh()">';
    h += '<select class="fi" style="width:120px" onchange="lsSet(\'repair_status\',this.value);setPage(\'repair\',1);refresh()">';
    h += '<option value=""' + (!statusFilter?' selected':'') + '>全部状态</option>';
    statuses.forEach(function(s){ h += '<option value="' + s + '"' + (statusFilter===s?' selected':'') + '>' + s + '</option>'; });
    h += '</select>';
    if (hasPermission('equip-manage','create')) {
      h += '<button class="btn bp" onclick="createRepair()">&#10133; 新建报修</button>';
    }
    h += '<button class="btn bo" onclick="refreshRepair()">&#8635; 刷新</button>';
    if (hasPermission('equip-manage','export')) {
      h += '<button class="btn bo" onclick="exportCSV(getAllRepairs(), \'报修记录\')">&#128190; 导出</button>';
    }
    h += '<button class="btn bo no-print" onclick="printPage()">🖨️ 打印</button>';
    h += '</div>';
    h += '<div class="cd" style="padding:0"><div class="table-responsive"><table class="dt">';
    h += '<thead><tr><th>编号</th><th>设备</th><th>故障描述</th><th>报修人</th><th>报修时间</th><th>状态</th><th>处理人</th><th>费用</th><th>操作</th></tr></thead><tbody>';
    if (pageData.length === 0) {
      h += '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--t3)">暂无数据</td></tr>';
    } else {
      pageData.forEach(function(r) {
        var sc = r.status==='已完成'?'tg':r.status==='进行中'?'tb':r.status==='已取消'?'tx':'to';
        h += '<tr onclick="openRepairDetail(\'' + r.id + '\')">';
        h += '<td>' + r.id + '</td>';
        h += '<td>' + r.equipName + '<br><span style="font-size:11px;color:var(--t3)">' + r.equipNo + '</span></td>';
        h += '<td style="max-width:200px" class="text-overflow-ellipsis">' + r.faultDesc + '</td>';
        h += '<td>' + r.reporter + '</td>';
        h += '<td style="font-size:11px">' + r.reportTime + '</td>';
        h += '<td><span class="t ' + sc + '">' + r.status + '</span></td>';
        h += '<td>' + (r.handler || '-') + '</td>';
        h += '<td>¥' + (r.cost || 0) + '</td>';
        h += '<td>';
        h += '<button class="btn-sm bp" onclick="event.stopPropagation();editRepair(\'' + r.id + '\')" title="编辑">✏</button> ';
        h += '<button class="btn-sm dg" onclick="event.stopPropagation();deleteRepair(\'' + r.id + '\')" title="删除">🗑</button>';
        h += '</td></tr>';
      });
    }
    h += '</tbody></table></div></div>';
    h += renderPagination(total, page, pageSize, 'repairPageChange');
    h += '</div>';
    return h;
  } catch(e) { return '<div class="cd"><div class="status-bar error">维修列表渲染错误: ' + e.message + '</div></div>'; }
}

function repairPageChange(p) { setPage('repair', p); refresh(); }
function refreshRepair() { setSearch('repair', ''); lsSet('repair_status', ''); setPage('repair', 1); refresh(); }

function createRepair() {
  try {
    var now = new Date();
    var nowStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':00';
    var equips = getAllEquips();
    var equipOpts = equips.map(function(e){ return e.name; });
    var peopleNames = PEOPLE_OBJ.filter(function(p){return p.dept==='智能制造组' || p.dept==='机电设备组';}).map(function(p){return p.name;});
    submitFormModal({
      title: '新建报修单',
      showSaveAndNew: true,
      fields: [
        {key:'equipName', label:'设备名称', type:'select', options:equipOpts, required:true},
        {key:'faultDesc', label:'故障描述', type:'textarea', rows:3, required:true, placeholder:'请详细描述故障现象'},
        {key:'reporter', label:'报修人', type:'select', options:peopleNames, value:currentUser.name},
        {key:'reportTime', label:'报修时间', type:'text', value:nowStr},
        {key:'status', label:'状态', type:'select', options:['待执行','进行中','已完成','已取消'], value:'待执行'},
        {key:'handler', label:'处理人', type:'select', options:peopleNames}
      ],
      onSave: function(data) {
        var all = getAllRepairs();
        var maxNum = 0;
        all.forEach(function(r) {
          var mm = String(r.id).match(/RP(\d+)/);
          if (mm) maxNum = Math.max(maxNum, parseInt(mm[1]));
        });
        data.id = 'RP' + String(maxNum + 1).padStart(3, '0');
        var eq = equips.find(function(e){ return e.name === data.equipName; });
        data.equipNo = eq ? eq.equipNo : '';
        data.handleTime = '';
        data.solution = '';
        data.cost = 0;
        var local = lsGet('local_repairs', []);
        local.push(data);
        saveLocalRepairs(local);
        saveData('repairs', local);
      },
      onAfter: function() { refresh(); }
    });
  } catch(e) { showToast('新建报修失败: ' + e.message, 'error'); }
}
