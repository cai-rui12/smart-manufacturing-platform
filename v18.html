          if (t.notifyPeople) h += '<span>🔔 通知: ' + t.notifyPeople + '</span>';

          if (t.taskDetail) h += '<span>📋 详情: ' + (t.taskDetail.length > 80 ? t.taskDetail.substring(0,80)+'...' : t.taskDetail) + '</span>';
          if (t.taskSituation) h += '<span>📊 情况: ' + (t.taskSituation.length > 80 ? t.taskSituation.substring(0,80)+'...' : t.taskSituation) + '</span>';

        }

        if (pText) {

          h += '<span style="font-weight:500;color:var(--t3)">最新进展: </span>' + shortP;

          h += '<button class="btn-sm bp" onclick="event.stopPropagation();editTask(\'' + t.id + '\')">编辑</button>';
        }
        if (hasPermission('task-manage','del')) {
          h += '<button class="btn-sm dg" onclick="event.stopPropagation();deleteTask(\'' + t.id + '\')">删除</button>';
        }
        h += '</div>';
        h += '</div>';
      });
    }
    h += '</div>';
  }

  h += '</div>';
  return h;
}

      h += '</div>';
      h += '</div>'; // end expandable

    }
    h += '</div>';
    h += renderPagination(total, page, pageSize, 'projectPageChange');
  h += '</div>';
  return h;
}

function projectPageChange(p) { setPage('project', p); refresh(); }

function toggleCardExpand(cid, btn) {
  var el = document.getElementById(cid);
  if (!el) return;
  var showing = el.style.display === 'none';
  el.style.display = showing ? 'block' : 'none';
  btn.textContent = showing ? '▲' : '▼';
  btn.title = showing ? '收起' : '展开';
}

function pushProject(projectId) {
  var projects = getAllProjects();
  var p = null;
  for (var i = 0; i < projects.length; i++) { if (projects[i].id === projectId) { p = projects[i]; break; } }
  if (!p) { showToast('项目不存在', 'error'); return; }
  var groups = getPushGroups().filter(function(g){return g.enabled;});
  if (groups.length === 0) { showToast('请先在推送中心添加启用的群组', 'error'); return; }
  var groupOptions = '<option value="">选择推送群组</option>';
  for (var g = 0; g < groups.length; g++) {
    var sel = (p.pushConfig && p.pushConfig.group === groups[g].id) ? ' selected' : '';
    groupOptions += '<option value="' + groups[g].id + '"' + sel + '>' + escapeHtml(groups[g].name) + '</option>';
  }
  var html = '<div class="modal-overlay" id="pushProjectModal" onclick="if(event.target===this)this.remove()">';
  html += '<div class="modal" style="max-width:500px"><div class="modal-header"><h3>推送项目消息</h3><button onclick="document.getElementById(\'pushProjectModal\').remove()">✕</button></div>';
  html += '<div class="modal-body">';
  html += '<div style="padding:8px 12px;background:rgba(59,130,246,0.06);border-radius:6px;margin-bottom:12px;font-size:13px"><b>' + escapeHtml(p.name) + '</b> (' + p.id + ') — 进度 ' + p.progress + '%</div>';
  html += '<label>推送群组</label><select id="pp_group" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;color:#e2e8f0;font-size:13px">' + groupOptions + '</select>';
  html += '<label style="margin-top:8px">推送类型</label><select id="pp_type" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;color:#e2e8f0;font-size:13px">';
  html += '<option value="project_summary">项目进度汇总</option><option value="project_detail">项目详细报告</option><option value="risk_alert">风险预警</option>';
  html += '</select>';
  html += '<label style="margin-top:8px">附加说明</label><textarea id="pp_remark" rows="2" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;color:#e2e8f0;font-size:13px;resize:vertical" placeholder="可选，补充说明..."></textarea>';
  html += '<div style="margin-top:8px"><b style="font-size:12px;color:#94a3b8">消息预览：</b><div id="pp_preview" style="margin-top:4px;padding:8px;background:rgba(59,130,246,0.06);border-radius:6px;font-size:12px;color:#cbd5e1;max-height:120px;overflow-y:auto">点击"预览"查看消息内容</div></div>';
  html += '</div><div class="modal-footer">';
  html += '<button class="btn" style="font-size:11px;padding:4px 10px;background:#10b981;color:#fff" onclick="previewPushProject(\'' + projectId + '\')">预览</button>';
  html += '<button class="btn" style="font-size:11px;padding:4px 10px" onclick="editPushTemplate(\'' + projectId + '\')">编辑模版</button>';
  html += '<button class="btn bp" onclick="doPushProject(\'' + projectId + '\')">发送推送</button>';
  html += '<button class="btn" onclick="document.getElementById(\'pushProjectModal\').remove()">取消</button>';
  html += '</div></div></div>';

function previewPushProject(projectId) {
  var group = document.getElementById('pp_group').value;
  var type = document.getElementById('pp_type').value;
  var remark = document.getElementById('pp_remark').value;
  var projects = getAllProjects();

  if (!p) return;
  var card = buildProjectPushCard(p, type, remark);

    if (el.text && el.text.content) preview += '<div style="margin:4px 0">' + el.text.content.replace(/\n/g, '<br>') + '</div>';
  }
  document.getElementById('pp_preview').innerHTML = preview;
}

function savePushTemplate(projectId) {

function doPushProject(projectId) {
  var groupId = document.getElementById('pp_group').value;
  var type = document.getElementById('pp_type').value;
  var remark = document.getElementById('pp_remark').value;
  if (!groupId) { showToast('请选择推送群组', 'error'); return; }
  var projects = getAllProjects();
  var p = null;
  for (var i = 0; i < projects.length; i++) { if (projects[i].id === projectId) { p = projects[i]; break; } }
  if (!p) return;
  var card = buildProjectPushCard(p, type, remark);
  var modal = document.getElementById('pushProjectModal');
  if (modal) modal.remove();
  sendToPushGroup('project', { card: card, groupIds: [groupId], title: '项目推送：' + (p.name||''), content: '项目：' + (p.name||'') + ' | 进度：' + p.progress + '% | 负责人：' + (p.manager||'') + (remark ? '\n备注：' + remark : '') });
}

function buildProjectPushCard(p, type, remark) {
  var elements = [];
  elements.push({tag:'div',text:{tag:'lark_md',content:'**项目：' + (p.name||'') + '** (' + p.id + ')'}});
  if (type === 'project_summary') {
    elements.push({tag:'hr'});
    elements.push({tag:'div',text:{tag:'lark_md',content:'**进度：** ' + p.progress + '%\n**状态：** ' + (p.status||'') + '\n**负责人：** ' + (p.manager||'') + (p.leadType?' ('+p.leadType+')':'')}});
    if (p.nextPlan) elements.push({tag:'div',text:{tag:'lark_md',content:'**后续计划：**\n' + p.nextPlan}});
  } else if (type === 'project_detail') {
    elements.push({tag:'hr'});
    elements.push({tag:'div',text:{tag:'lark_md',content:'**进度：** ' + p.progress + '% | **状态：** ' + (p.status||'') + '\n**负责人：** ' + (p.manager||'') + (p.leadType?' ('+p.leadType+')':'') + '\n**开始：** ' + (p.startDate||'-') + ' | **结束：** ' + (p.endDate||'-') + '\n**预算：** ' + (p.budget?'¥'+Math.round(p.budget/10000)+'万':'未设置')}});
    if (p.description) elements.push({tag:'div',text:{tag:'lark_md',content:'**描述：**\n' + p.description}});
    if (p.subSteps && p.subSteps.length > 0) {
      var stepText = '**子工序：**\n';
      for (var i = 0; i < p.subSteps.length; i++) stepText += '- ' + p.subSteps[i].name + ': ' + p.subSteps[i].done + '/' + p.subSteps[i].total + ' (' + p.subSteps[i].rate + '%)\n';
      elements.push({tag:'div',text:{tag:'lark_md',content:stepText}});
    }
    if (p.nextPlan) elements.push({tag:'div',text:{tag:'lark_md',content:'**后续计划：**\n' + p.nextPlan}});
  } else if (type === 'risk_alert') {
    elements.push({tag:'hr'});
    var riskContent = p.risks || '当前无风险记录';
    elements.push({tag:'div',text:{tag:'lark_md',content:'**风险与问题：**\n' + riskContent}});
    elements.push({tag:'div',text:{tag:'lark_md',content:'**当前进度：** ' + p.progress + '% | **状态：** ' + (p.status||'')}});
  }
  if (remark) {
    elements.push({tag:'hr'});
    elements.push({tag:'div',text:{tag:'lark_md',content:'**备注：** ' + remark}});
  }
  elements.push({tag:'note',elements:[{tag:'plain_text',content:'智能制造平台自动推送 | ' + new Date().toLocaleString('zh-CN')}].concat(p.pushConfig && p.pushConfig.enabled ? [{tag:'plain_text',content:'（定期推送已启用）'}] : [])});
  return {config:{wide_screen_mode:true},header:{title:{tag:'plain_text',content:'项目推送：' + (p.name||'')}},elements:elements};
}

function sendFeishuCard(webhook, card, callback) {
  var body = JSON.stringify({msg_type:'interactive',card:card});
  var xhr = new XMLHttpRequest();
  xhr.open('POST', webhook, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() { callback && callback(xhr.status >= 200 && xhr.status < 300); };
  xhr.onerror = function() { callback && callback(false); };
  xhr.send(body);
}

function createProject() {
  var today = new Date().toISOString().slice(0,10);
  var peopleNames = PEOPLE_OBJ.map(function(p){return p.name;});
  var rpCheckboxes = '';
  var allProjects = getAllProjects();
  for (var rpi = 0; rpi < allProjects.length; rpi++) {
    rpCheckboxes += '<label style="display:block;margin-bottom:2px"><input type="checkbox" value="' + escapeHtml(allProjects[rpi].id) + '" class="rp_check"> ' + escapeHtml(allProjects[rpi].name) + '</label>';
  }
  var rpHtml = '<div style="margin-top:8px"><label>关联项目（可多选）</label><div id="relatedProjectsCheckboxes" style="max-height:120px;overflow-y:auto;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;font-size:12px;color:#94a3b8">' + rpCheckboxes + '</div></div>';
  submitFormModal({
    title: '新建项目',
    showSaveAndNew: true,
    extraHtml: rpHtml,
    fields: [
      {key:'name', label:'项目名称', type:'text', required:true, placeholder:'请输入项目名称'},
      {key:'manager', label:'项目经理', type:'select', options:peopleNames, value:currentUser.name},
      {key:'status', label:'项目状态', type:'select', options:['规划中','进行中','已完成','已暂停'], value:'规划中'},
      {key:'progress', label:'进度(%)', type:'number', value:'0'},
      {key:'startDate', label:'开始日期', type:'date', value:today},
      {key:'endDate', label:'结束日期', type:'date', value:today},
      {key:'budget', label:'预算(元)', type:'number', value:'1000000'},
      {key:'members', label:'项目成员', type:'text', placeholder:'多人用逗号分隔'},
      {key:'description', label:'项目描述', type:'textarea', rows:3},
      {key:'leadType', label:'负责人类型', type:'select', options:['主导人','协助人','审批人'], value:''},
      {key:'nextPlan', label:'后续计划', type:'textarea', rows:3, placeholder:'项目后续计划和里程碑...'},
      {key:'risks', label:'风险与问题', type:'textarea', rows:2, placeholder:'当前风险和待解决问题...'}
    ],
    onSave: function(data) {
      var all = getAllProjects();
      var maxNum = 0;
      all.forEach(function(p) {
        var m = String(p.id).match(/PRJ-(\d+)/);
        if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
      });
      data.id = 'PRJ-' + String(maxNum + 1).padStart(4, '0');
      var rpChecks = document.querySelectorAll('.rp_check:checked');
      var rpArr = [];
      for (var rci = 0; rci < rpChecks.length; rci++) {
        var rpId = rpChecks[rci].value;
        var rpName = '';
        for (var rj = 0; rj < allProjects.length; rj++) {
          if (allProjects[rj].id === rpId) { rpName = allProjects[rj].name; break; }
        }
        rpArr.push({name: rpName, status: '进行中'});
      }
      if (rpArr.length > 0) data.relatedProjects = rpArr;
      var local = lsGet('local_projects', []);
      local.push(data);
      saveLocalProjects(local);
      saveData('projects', local);
    },
    onAfter: function() { refresh(); }
  });
}

function openGanttPopup(projectId) {
  var projects = getAllProjects();
  var p = null;
  for (var i = 0; i < projects.length; i++) { if (projects[i].id === projectId) { p = projects[i]; break; } }
  if (!p) { showToast('项目未找到', 'error'); return; }
  var html = '<div class="modal-overlay" id="ganttPopup" onclick="if(event.target===this)this.remove()" style="z-index:9999">';
  html += '<div class="modal" style="max-width:95vw;width:95vw;height:85vh;resize:both;overflow:auto;min-width:600px;min-height:400px">';
  html += '<div class="modal-header"><h3>甘特图 - ' + escapeHtml(p.name) + '</h3><button onclick="document.getElementById(\'ganttPopup\').remove()">✕</button></div>';
  html += '<div class="modal-body" style="overflow:visible">';
  html += '<div id="gantt_popup_' + projectId + '"></div>';
  html += '</div></div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
  // 等DOM渲染完成后渲染甘特图
  setTimeout(function(){ renderGanttChart(projectId, 'gantt_popup_' + projectId); }, 80);
}

// Global zoom level for Gantt charts (persisted across renders)
var ganttZoomLevel = 36;
function renderGanttChart(projectId, containerId) {
  var container = containerId ? document.getElementById(containerId) : document.getElementById('gantt_' + projectId);
  if (!container) { container = document.getElementById('gantt_popup_' + projectId); if (!container) return; }
  var projects = getAllProjects();
  var p = null;
  for (var i = 0; i < projects.length; i++) { if (projects[i].id === projectId) { p = projects[i]; break; } }
  if (!p) { container.innerHTML = '<div style="padding:12px;color:#94a3b8">项目数据未找到</div>'; return; }

  // Parse project start/end year-month
  var startYear = p.startDate ? parseInt(p.startDate.split('-')[0]) : new Date().getFullYear();
  var startMonth = p.startDate ? parseInt(p.startDate.split('-')[1]) : 1;
  var endYear = p.endDate ? parseInt(p.endDate.split('-')[0]) : startYear;
  var endMonth = p.endDate ? parseInt(p.endDate.split('-')[1]) : 12;
  if (endYear < startYear) { endYear = startYear; }
  if (endYear === startYear && endMonth < startMonth) { endMonth = 12; }

  var labelW = 140;
  var colW = ganttZoomLevel;
  var rowH = 32;
  var headerH1 = 28, headerH2 = 22, headerH3 = 20;

  var mNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var qNames = ['Q1','Q2','Q3','Q4'];

  // Build full week list across year range
  var allWeeks = [];
  var allMonths = [];
  var allQuarters = [];
  for (var yr = startYear; yr <= endYear; yr++) {
    var yStart = (yr === startYear) ? startMonth : 1;
    var yEnd = (yr === endYear) ? endMonth : 12;
    for (var mm = yStart; mm <= yEnd; mm++) {
      var firstDay = new Date(yr, mm - 1, 1);
      var lastDay = new Date(yr, mm, 0);
      var daysInMonth = lastDay.getDate();
      var weekStartDay = 1;
      var weekIndex = 0;
      while (weekStartDay <= daysInMonth) {
        var weekEndDay = Math.min(weekStartDay + 6, daysInMonth);
        allWeeks.push({
          year: yr, month: mm,
          start: weekStartDay, end: weekEndDay,
          label: mm + '/' + weekStartDay + '-' + mm + '/' + weekEndDay,
          startDate: new Date(yr, mm - 1, weekStartDay),
          endDate: new Date(yr, mm - 1, weekEndDay),
          monthIndex: allWeeks.length
        });
        weekStartDay = weekEndDay + 1;
        weekIndex++;
      }
      // Track month: first week index and week count
      allMonths.push({
        year: yr, month: mm,
        label: (yr > startYear || yr < endYear) ? yr + '年' + mNames[mm - 1] : mNames[mm - 1],
        weekStart: allWeeks.length - weekIndex,
        weekCount: weekIndex
      });
    }
  }
  // Build quarters
  var tmpM = 0;
  for (var yr2 = startYear; yr2 <= endYear; yr2++) {
    var yS = (yr2 === startYear) ? startMonth : 1;
    var yE = (yr2 === endYear) ? endMonth : 12;
    var qStart = Math.ceil(yS / 3);
    var qEnd = Math.ceil(yE / 3);
    for (var q = qStart; q <= qEnd; q++) {
      var qMonthStart = (q - 1) * 3 + 1;
      var qMonthEnd = Math.min(q * 3, 12);
      if (yr2 === startYear && qMonthStart < startMonth) qMonthStart = startMonth;
      if (yr2 === endYear && qMonthEnd > endMonth) qMonthEnd = endMonth;
      var weekStartIdx = -1, weekEndIdx = -1;
      for (var mi3 = 0; mi3 < allMonths.length; mi3++) {
        if (allMonths[mi3].month >= qMonthStart && allMonths[mi3].month <= qMonthEnd && allMonths[mi3].year === yr2) {
          if (weekStartIdx < 0) weekStartIdx = allMonths[mi3].weekStart;
          weekEndIdx = allMonths[mi3].weekStart + allMonths[mi3].weekCount - 1;
        }
      }
      if (weekStartIdx >= 0) {
        allQuarters.push({
          year: yr2, quarter: q,
          label: yr2 + '年 ' + qNames[q - 1],
          weekStart: weekStartIdx,
          weekCount: weekEndIdx - weekStartIdx + 1
        });
      }
    }
  }

  var totalWeeks = allWeeks.length;

  // Find current week index for today marker
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var currentWeekIdx = -1;
  for (var ci = 0; ci < allWeeks.length; ci++) {
    if (today >= allWeeks[ci].startDate && today <= allWeeks[ci].endDate) {
      currentWeekIdx = ci;
      break;
    }
  }

  // Build task rows
  var tasks = [];
  if (p.subSteps) {
    for (var si = 0; si < p.subSteps.length; si++) {
      var ss = p.subSteps[si];
      var rate = ss.rate || 0;
      tasks.push({
        name: ss.name, progress: rate,
        color: rate >= 100 ? '#34c724' : rate >= 80 ? '#f59e0b' : rate < 60 ? '#ef4444' : '#3b82f6',
        type: 'task'
      });
    }
  }
  if (p.nextPlan) {
    var planLines = p.nextPlan.split('\n').filter(function(l) { return l.trim().length > 0; });
    for (var pli = 0; pli < planLines.length; pli++) {
      var pl = planLines[pli].replace(/^[-*\d.\u3001)\s]+/, '').trim();
      if (pl.length > 0) tasks.push({ name: pl.substring(0, 30), progress: 0, color: '#64748b', type: 'plan' });
    }
  }
  if (p.risks) {
    var riskLines = p.risks.split('\n').filter(function(l) { return l.trim().length > 0; });
    for (var rli = 0; rli < Math.min(riskLines.length, 5); rli++) {
      var rl = riskLines[rli].replace(/^[-*\d.\u3001)\s]+/, '').trim();
      if (rl.length > 0) tasks.push({ name: rl.substring(0, 30), progress: 0, color: '#ef4444', type: 'risk' });
    }
  }
  if (tasks.length === 0) tasks.push({ name: '暂无详细事项', progress: 0, color: '#64748b', type: 'empty' });

  // Calculate estimated start/end week for each task based on project date range
  var projStart = new Date(startYear, startMonth - 1, 1);
  var projEnd = new Date(endYear, endMonth, 0);
  var projTotalDays = (projEnd - projStart) / 86400000 || 1;

  // Build HTML
  var chartId = 'gantt_chart_' + projectId;
  var uid = 'gz_' + projectId;

  var h = '';
  // Zoom controls
  h += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px;color:#94a3b8">';
  h += '<span>缩放:</span>';
  h += '<button onclick="ganttZoomLevel=Math.max(20,ganttZoomLevel-4);renderGanttChart(\'' + projectId + '\')" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:4px;padding:2px 10px;cursor:pointer;font-size:12px">-</button>';
  h += '<span id="' + uid + '_zoom_label" style="min-width:40px;text-align:center">' + colW + 'px</span>';
  h += '<button onclick="ganttZoomLevel=Math.min(60,ganttZoomLevel+4);renderGanttChart(\'' + projectId + '\')" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:4px;padding:2px 10px;cursor:pointer;font-size:12px">+</button>';
  h += '<span style="margin-left:auto;font-size:11px;color:#64748b">共 ' + totalWeeks + ' 周 / ' + tasks.length + ' 项</span>';
  h += '</div>';

  // Scrollable wrapper
  h += '<div id="' + chartId + '" style="overflow-x:auto;overflow-y:visible;border:1px solid #1e3a5f;border-radius:8px;background:#0c1222">';
  h += '<table style="border-collapse:collapse;font-size:11px;min-width:' + (labelW + totalWeeks * colW) + 'px" cellpadding="0" cellspacing="0">';

  // Row 1: Quarters + Year
  h += '<tr>';
  h += '<td rowspan="3" style="width:' + labelW + 'px;min-width:' + labelW + 'px;max-width:' + labelW + 'px;position:sticky;left:0;z-index:10;background:#0f172a;border-bottom:2px solid #1e3a5f;padding:4px 8px;color:#60a5fa;font-weight:700;font-size:13px;text-align:center;vertical-align:middle">进度甘特图</td>';
  for (var qi = 0; qi < allQuarters.length; qi++) {
    var qtr = allQuarters[qi];
    var qSpan = qtr.weekCount;
    h += '<td colspan="' + qSpan + '" style="text-align:center;padding:5px 0;color:#e2e8f0;font-weight:600;background:#0f172a;border-left:1px solid #1e3a5f;border-bottom:2px solid #1e3a5f;font-size:12px">' + qtr.label + '</td>';
  }
  h += '</tr>';

  // Row 2: Months
  h += '<tr>';
  for (var mi4 = 0; mi4 < allMonths.length; mi4++) {
    var mon = allMonths[mi4];
    h += '<td colspan="' + mon.weekCount + '" style="text-align:center;padding:3px 0;color:#cbd5e1;font-weight:600;background:#0f172a;border-left:1px solid #1e3a5f;border-bottom:1px solid #334155;font-size:11px">' + mon.label + '</td>';
  }
  h += '</tr>';

  // Row 3: Weeks
  h += '<tr>';
  for (var wi2 = 0; wi2 < allWeeks.length; wi2++) {
    var wk = allWeeks[wi2];
    h += '<td style="width:' + colW + 'px;min-width:' + colW + 'px;max-width:' + colW + 'px;text-align:center;padding:2px 0;color:#64748b;background:#0f172a;border-left:1px solid rgba(51,65,85,0.5);border-bottom:1px solid #334155;font-size:9px;white-space:nowrap;overflow:hidden">' + wk.label + '</td>';
  }
  h += '</tr>';

  // Task rows
  for (var ti2 = 0; ti2 < tasks.length; ti2++) {
    var t = tasks[ti2];
    var rowBg = ti2 % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)';
    var icon = '';
    if (t.type === 'risk') icon = '<span style="color:#ef4444">&#x26A0; </span>';
    else if (t.type === 'plan') icon = '<span style="color:#60a5fa">&#x1F4CC; </span>';

    h += '<tr style="background:' + rowBg + '">';
    // Label cell (sticky)
    h += '<td style="width:' + labelW + 'px;min-width:' + labelW + 'px;max-width:' + labelW + 'px;position:sticky;left:0;z-index:5;background:' + (ti2 % 2 === 0 ? '#0f172a' : '#111827') + ';padding:4px 8px;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid rgba(51,65,85,0.3);font-size:11px;max-width:' + labelW + 'px" title="' + escapeHtml(t.name) + '">';
    h += icon + escapeHtml(t.name);
    h += '</td>';

    // Calculate task bar position: distribute tasks evenly across timeline
    // Each task gets a proportional start based on its index and total tasks
    var taskStartFrac = ti2 / tasks.length;
    var taskEndFrac = (ti2 + 1) / tasks.length;
    var startCol = Math.floor(taskStartFrac * totalWeeks);
    var endCol = Math.floor(taskEndFrac * totalWeeks);
    if (endCol <= startCol) endCol = startCol + 1;
    var spanCols = endCol - startCol;
    var doneCols = Math.round(t.progress / 100 * spanCols);

    // Progress bar offset from left (after label)
    var barLeft = startCol * colW;
    var doneWidth = doneCols * colW;
    var totalWidth = spanCols * colW;

    // Week cells
    h += '<td colspan="' + totalWeeks + '" style="padding:0;border-bottom:1px solid rgba(51,65,85,0.3);position:relative;height:' + rowH + 'px">';
    // Grid lines for each week
    for (var gc = 0; gc < totalWeeks; gc++) {
      h += '<div style="position:absolute;left:' + (gc * colW) + 'px;top:0;width:1px;height:100%;background:rgba(51,65,85,0.15)"></div>';
    }

    // Progress bar background (total span - semi-transparent)
    if (spanCols > 0) {
      h += '<div style="position:absolute;top:6px;left:' + (barLeft + 2) + 'px;width:' + (totalWidth - 4) + 'px;height:20px;background:' + t.color + ';opacity:0.18;border-radius:4px"></div>';
    }
    // Progress bar - done portion (solid)
    if (doneCols > 0) {
      h += '<div style="position:absolute;top:6px;left:' + (barLeft + 2) + 'px;width:' + Math.max(0, doneWidth - 4) + 'px;height:20px;background:' + t.color + ';opacity:0.8;border-radius:4px;box-shadow:0 0 8px ' + t.color + '44"></div>';
    }
    // Percentage label
    h += '<div style="position:absolute;top:8px;right:6px;color:#e2e8f0;font-size:10px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.8);z-index:2">' + t.progress + '%</div>';

    // Today marker
    if (currentWeekIdx >= 0) {
      var todayX = currentWeekIdx * colW + colW / 2;
      h += '<div style="position:absolute;left:' + todayX + 'px;top:0;width:0;height:100%;border-left:2px dashed #ef4444;z-index:3;opacity:0.8"></div>';
    }

    h += '</td>';
    h += '</tr>';
  }

  // Today marker row (if applicable, show across all weeks)
  if (currentWeekIdx >= 0) {
    // Already rendered per-row above
  }

  h += '</table>';
  h += '</div>';

  // Legend
  h += '<div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:#94a3b8;flex-wrap:wrap">';
  h += '<span><span style="display:inline-block;width:12px;height:12px;background:#3b82f6;border-radius:2px;vertical-align:middle;margin-right:4px"></span>进行中</span>';
  h += '<span><span style="display:inline-block;width:12px;height:12px;background:#f59e0b;border-radius:2px;vertical-align:middle;margin-right:4px"></span>即将完成</span>';
  h += '<span><span style="display:inline-block;width:12px;height:12px;background:#34c724;border-radius:2px;vertical-align:middle;margin-right:4px"></span>已完成</span>';
  h += '<span><span style="display:inline-block;width:12px;height:12px;background:#ef4444;border-radius:2px;vertical-align:middle;margin-right:4px"></span>风险/落后</span>';
  h += '<span><span style="display:inline-block;width:12px;height:12px;background:#64748b;border-radius:2px;vertical-align:middle;margin-right:4px"></span>后续计划</span>';
  h += '<span style="margin-left:auto"><span style="display:inline-block;width:16px;height:0;border-top:2px dashed #ef4444;vertical-align:middle;margin-right:4px"></span>今日</span>';
  h += '</div>';

  container.innerHTML = h;
}

function updateProgress(projectId) {
  var projects = getAllProjects();
  var p = null;
  for (var i = 0; i < projects.length; i++) { if (projects[i].id === projectId) { p = projects[i]; break; } }
  if (!p) return;
  var html = '<div class="modal-overlay" id="progressUpdateModal" onclick="if(event.target===this)this.remove()">';
  html += '<div class="modal" style="max-width:420px"><div class="modal-header"><h3>更新进度 - ' + escapeHtml(p.name) + '</h3><button onclick="document.getElementById(\'progressUpdateModal\').remove()">✕</button></div>';
  html += '<div class="modal-body">';
  html += '<div style="margin-bottom:12px;padding:8px 12px;background:rgba(59,130,246,0.06);border-radius:6px;font-size:13px">当前进度：<b style="color:#60a5fa">' + p.progress + '%</b></div>';
  html += '<label>新进度(%)</label><input type="number" id="pu_progress" value="' + p.progress + '" min="0" max="100" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;color:#e2e8f0;font-size:13px">';
  html += '<label style="margin-top:8px">更新说明</label><textarea id="pu_note" rows="3" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;color:#e2e8f0;font-size:13px;resize:vertical" placeholder="描述本次进度变更原因和内容..."></textarea>';
  html += '</div><div class="modal-footer">';
  html += '<button class="btn bp" onclick="doUpdateProgress(\'' + projectId + '\')">保存</button>';
  html += '<button class="btn" onclick="document.getElementById(\'progressUpdateModal\').remove()">取消</button>';
  html += '</div></div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function doUpdateProgress(projectId) {
  var newProgress = parseInt(document.getElementById('pu_progress').value) || 0;
  var note = document.getElementById('pu_note').value;
  if (newProgress < 0 || newProgress > 100) { showToast('进度必须在0-100之间', 'error'); return; }
  var projects = getAllProjects();
  for (var i = 0; i < projects.length; i++) {
    if (projects[i].id === projectId) {
      var oldProgress = projects[i].progress;
      projects[i].progress = newProgress;
      if (!projects[i].progressHistory) projects[i].progressHistory = [];
      projects[i].progressHistory.push({
        date: new Date().toLocaleString('zh-CN'),
        oldProgress: oldProgress,
        newProgress: newProgress,
        note: note || ''
      });
      break;
    }
  }
  saveLocalProjects(projects);
  document.getElementById('progressUpdateModal').remove();
  showToast('进度已更新：' + oldProgress + '% → ' + newProgress + '%');
  openProjectDetail(projectId);
}

function formatDescription(desc) {
  if (!desc) return '';
  var idx = desc.indexOf('【下半年计划】');
  if (idx === -1) return escapeHtml(desc);
  var before = desc.substring(0, idx);
  var after = desc.substring(idx);
  return escapeHtml(before) + '<div style="margin-top:12px;padding:10px 14px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:8px"><b style="color:#f59e0b">【下半年计划】</b>' + escapeHtml(after.substring(7)) + '</div>';
}

function toggleDeviceRow(rowId) {
  var row = document.getElementById(rowId);
  if (row) { row.style.display = row.style.display === 'none' ? 'table-row' : 'none'; }
}

  // 进度历史记录
  var ph = p.progressHistory || [];
  if (ph.length > 0) {
    h += '<div style="margin:8px 0;font-size:12px"><b style="color:#94a3b8">进度变更记录</b><div style="max-height:100px;overflow-y:auto;margin-top:4px">';
    for (var phi = ph.length - 1; phi >= Math.max(0, ph.length - 8); phi--) {

      var delta = item.newProgress - item.oldProgress;
      var deltaStr = delta > 0 ? '<span style="color:#34c724">+' + delta + '%</span>' : delta < 0 ? '<span style="color:#ef4444">' + delta + '%</span>' : '<span style="color:#64748b">0%</span>';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(51,65,85,0.2);font-size:11px"><span style="color:#64748b">' + (item.date || '-') + '</span><span>' + item.oldProgress + '% → ' + item.newProgress + '% ' + deltaStr + '</span><span style="color:#94a3b8;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + escapeHtml(item.note || '') + '">' + escapeHtml(item.note || '') + '</span></div>';
    }

  }
  // 数据更新记录
  var uh = p.updateHistory || [];
  if (uh.length > 0) {
    h += '<div style="margin:8px 0;font-size:12px"><b style="color:#f59e0b">📜 数据更新记录</b><div style="max-height:120px;overflow-y:auto;margin-top:4px">';

  }
  h += '<div class="divider" style="height:1px;background:var(--br);margin:12px 0"></div>';
  h += '<div class="form-field"><label>项目名称</label><div style="padding:8px;background:#f7f8fa;border-radius:6px;font-size:13px;font-weight:600">' + p.name + '</div></div>';
  h += '<div class="form-field"><label>项目成员</label><div style="padding:8px;background:#f7f8fa;border-radius:6px;font-size:13px">' + (p.members || '-') + '</div></div>';
  h += '<div class="form-field"><label>项目描述</label><div style="white-space:pre-wrap;padding:8px;background:#f7f8fa;border-radius:6px;font-size:13px;line-height:1.6">' + formatDescription(p.description || '') + '</div></div>';

function editProjectPush(projectId) {
  var projects = getAllProjects();
  var p = null;
  for (var i = 0; i < projects.length; i++) { if (projects[i].id === projectId) { p = projects[i]; break; } }
  if (!p) return;
  var pc = p.pushConfig || {};
  var groups = lsGet('push_groups', []);
  var groupOptions = '<option value="">未配置</option>';
  for (var g = 0; g < groups.length; g++) {
    groupOptions += '<option value="' + escapeHtml(groups[g].name) + '"' + (pc.group === groups[g].name ? ' selected' : '') + '>' + escapeHtml(groups[g].name) + '</option>';
  }
  var html = '<div class="modal-overlay" id="pushConfigModal" onclick="if(event.target===this)this.remove()">';
  html += '<div class="modal" style="max-width:450px"><div class="modal-header"><h3>项目推送配置 - ' + escapeHtml(p.name || '') + '</h3><button onclick="document.getElementById(\'pushConfigModal\').remove()">✕</button></div>';
  html += '<div class="modal-body">';
  html += '<label>推送群组</label><select id="pc_group" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;color:#e2e8f0;font-size:13px">' + groupOptions + '</select>';
  html += '<label>推送频率</label>';
  html += '<div style="display:flex;gap:8px">';
  html += '<select id="pc_freq" style="flex:1;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;color:#e2e8f0;font-size:13px"><option value="每日"' + (pc.frequency === '每日' ? ' selected' : '') + '>每日</option><option value="每周"' + (pc.frequency === '每周' ? ' selected' : '') + '>每周</option><option value="每月"' + (pc.frequency === '每月' ? ' selected' : '') + '>每月</option><option value="里程碑"' + (pc.frequency === '里程碑' ? ' selected' : '') + '>里程碑触发</option></select>';
  html += '<input type="time" id="pc_time" value="' + (pc.time || '09:00') + '" style="width:120px;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;color:#e2e8f0;font-size:13px;color-scheme:dark">';
  html += '</div>';
  html += '<label>推送模板</label><select id="pc_template" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;color:#e2e8f0;font-size:13px"><option value="summary"' + (pc.template === 'summary' ? ' selected' : '') + '>进度汇总</option><option value="detail"' + (pc.template === 'detail' ? ' selected' : '') + '>详细报告</option><option value="risk"' + (pc.template === 'risk' ? ' selected' : '') + '>风险预警</option></select>';
  html += '<label style="margin-top:8px"><input type="checkbox" id="pc_enabled"' + (pc.enabled ? ' checked' : '') + '> 启用定期推送</label>';
  html += '</div><div class="modal-footer"><button class="btn" onclick="saveProjectPush(\'' + projectId + '\')">保存</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function saveProjectPush(projectId) {
  var group = document.getElementById('pc_group').value;
  var freq = document.getElementById('pc_freq').value;
  var time = document.getElementById('pc_time').value;
  var template = document.getElementById('pc_template').value;
  var enabled = document.getElementById('pc_enabled').checked;
  var projects = getAllProjects();
  for (var i = 0; i < projects.length; i++) {
    if (projects[i].id === projectId) {
      projects[i].pushConfig = {group: group, frequency: freq, time: time, template: template, enabled: enabled};
      break;
    }
  }
  saveLocalProjects(projects);
  document.getElementById('pushConfigModal').remove();
  showToast('推送配置已保存');
  goToPage('project-all');
}

function editProject(id) {
  var all = getAllProjects();
  var p = all.find(function(x){ return x.id === id; });
  if (!p) return;
  var peopleNames = PEOPLE_OBJ.map(function(pp){return pp.name;});
  var rpCheckboxes = '';
  for (var rpi = 0; rpi < all.length; rpi++) {
    if (all[rpi].id === id) continue;
    var checked = '';
    if (p.relatedProjects) {
      for (var rpk = 0; rpk < p.relatedProjects.length; rpk++) {
        if (p.relatedProjects[rpk].name === all[rpi].name) { checked = ' checked'; break; }
      }
    }
    rpCheckboxes += '<label style="display:block;margin-bottom:2px"><input type="checkbox" value="' + escapeHtml(all[rpi].id) + '" class="rp_check"' + checked + '> ' + escapeHtml(all[rpi].name) + '</label>';
  }
  var rpHtml = '<div style="margin-top:8px"><label>关联项目（可多选）</label><div id="relatedProjectsCheckboxes" style="max-height:120px;overflow-y:auto;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;font-size:12px;color:#94a3b8">' + rpCheckboxes + '</div></div>';
  submitFormModal({
    title: '编辑项目 - ' + id,
    extraHtml: rpHtml,
    fields: [
      {key:'name', label:'项目名称', type:'text', value:p.name, required:true},
      {key:'manager', label:'项目经理', type:'select', options:peopleNames, value:p.manager},
      {key:'status', label:'项目状态', type:'select', options:['规划中','进行中','已完成','已暂停'], value:p.status},
      {key:'progress', label:'进度(%)', type:'number', value:p.progress},
      {key:'startDate', label:'开始日期', type:'date', value:p.startDate},
      {key:'endDate', label:'结束日期', type:'date', value:p.endDate},
      {key:'budget', label:'预算(元)', type:'number', value:p.budget || ''},
      {key:'members', label:'项目成员', type:'text', value:p.members || ''},
      {key:'description', label:'项目描述', type:'textarea', rows:3, value:p.description || ''},
      {key:'leadType', label:'负责人类型', type:'select', options:['主导人','协助人','审批人'], value:p.leadType || ''},
      {key:'nextPlan', label:'后续计划', type:'textarea', rows:3, value:p.nextPlan || '', placeholder:'项目后续计划和里程碑...'},
      {key:'risks', label:'风险与问题', type:'textarea', rows:2, value:p.risks || '', placeholder:'当前风险和待解决问题...'}
    ],
    onSave: function(data) {
      var rpChecks = document.querySelectorAll('.rp_check:checked');
      var rpArr = [];
      for (var rci = 0; rci < rpChecks.length; rci++) {
        var rpId = rpChecks[rci].value;
        var rpName = '';
        var rpStatus = '进行中';
        for (var rj = 0; rj < all.length; rj++) {
          if (all[rj].id === rpId) { rpName = all[rj].name; rpStatus = all[rj].status; break; }
        }
        rpArr.push({name: rpName, status: rpStatus});
      }
      if (rpArr.length > 0) data.relatedProjects = rpArr;
      var local = lsGet('local_projects', []);
      var idx = local.findIndex(function(x){ return x.id === id; });
      data.id = id;
      if (idx >= 0) local[idx] = data;
      else local.push(data);
      saveLocalProjects(local);
      saveData('projects', local);
    },
    onAfter: function() { refresh(); openProjectDetail(id); }
  });
}

function deleteProject(id) {
  if (!confirm('确定删除此项目？')) return;
  var local = lsGet('local_projects', []);
  local = local.filter(function(x){ return x.id !== id; });
  saveLocalProjects(local);
  saveData('projects', local);
  closeMo();
  refresh();
}

function quickUpdateProgress(id, currentProgress) {
  var html = '<div class="form-field"><label>项目进度 (%)</label>';
  html += '<div style="display:flex;align-items:center;gap:12px">';
  html += '<input type="range" id="qprogress_slider" min="0" max="100" step="5" value="' + currentProgress + '" oninput="document.getElementById(\'qprogress_val\').value=this.value" style="flex:1">';
  html += '<input type="number" id="qprogress_val" class="fi" style="width:80px" min="0" max="100" value="' + currentProgress + '" oninput="document.getElementById(\'qprogress_slider\').value=this.value">';
  html += '<span style="color:var(--t3);font-weight:600">%</span>';
  html += '</div></div>';
  openMo({title:'更新进度 - ' + id, html:html, footer:'<button class="btn bp" onclick="doQuickUpdateProgress(\'' + id + '\')">保存</button>'});
}

function doQuickUpdateProgress(id) {
  var val = parseInt(document.getElementById('qprogress_val').value) || 0;
  if (val < 0 || val > 100) { showToast('进度必须在0-100之间', 'error'); return; }
  var local = lsGet('local_projects', []);
  var idx = local.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) {
    local[idx].progress = val;
    if (val >= 100) local[idx].status = '已完成';
    else if (val > 0 && local[idx].status === '规划中') local[idx].status = '进行中';
    saveLocalProjects(local);
    saveData('projects', local);
  }
  closeMo();
  refresh();
  showToast('项目 ' + id + ' 进度已更新为 ' + val + '%', 'success');
}

function changeProjectStatus(id) {
  var all = getAllProjects();
  var p = all.find(function(x){ return x.id === id; });
  if (!p) return;
  var currentStatus = p.status;
  var statuses = ['规划中','进行中','已完成','已暂停'];
  var html = '<div class="form-field"><label>当前状态</label>';
  html += '<div style="padding:8px 12px;background:var(--bg);border-radius:6px;font-size:13px"><span class="t ' + getStatusClass(currentStatus) + '">' + currentStatus + '</span></div></div>';
  html += '<div class="form-field"><label>变更为新状态</label>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
  statuses.forEach(function(s) {
    if (s !== currentStatus) {
      var cls = s==='已完成'?'tg':s==='进行中'?'tb':s==='已暂停'?'tr':'tx';
      html += '<button class="btn" style="background:var(--bg);border:1.5px solid var(--br)" onclick="doChangeProjectStatus(\'' + id + '\',\'' + s + '\')">';
      html += '<span class="t ' + cls + '">' + s + '</span></button>';
    }
  });
  html += '</div></div>';
  openMo({title:'变更状态 - ' + id, html:html, footer:''});
}

function doChangeProjectStatus(id, newStatus) {
  var local = lsGet('local_projects', []);
  var idx = local.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) {
    var oldStatus = local[idx].status;
    local[idx].status = newStatus;
    if (newStatus === '已完成' && (local[idx].progress || 0) < 100) local[idx].progress = 100;
    if (newStatus === '规划中' && (local[idx].progress || 0) > 0) local[idx].progress = 0;
    saveLocalProjects(local);
    saveData('projects', local);
    closeMo();
    refresh();
    showToast('项目 ' + id + ' 状态: ' + oldStatus + ' -> ' + newStatus, 'success');
  }
}

function createMaintain() {
  try {
    var today = new Date().toISOString().slice(0,10);
    var equips = getAllEquips();
    var equipOpts = equips.map(function(e){ return e.name; });
    var peopleNames = PEOPLE_OBJ.filter(function(p){return p.dept==='智能制造组' || p.dept==='保养组';}).map(function(p){return p.name;});
    submitFormModal({
      title: '新建保养计划',
      showSaveAndNew: true,
      fields: [
        {key:'equipName', label:'设备名称', type:'select', options:equipOpts, required:true},
        {key:'type', label:'保养类型', type:'select', options:['日常保养','周保养','月保养','季度保养','年度保养'], value:'日常保养'},
        {key:'planDate', label:'计划日期', type:'date', value:today, required:true},
        {key:'executor', label:'执行人', type:'select', options:peopleNames},
        {key:'status', label:'状态', type:'select', options:['待执行','进行中','已完成','已取消'], value:'待执行'},
        {key:'content', label:'保养内容', type:'textarea', rows:3, required:true, placeholder:'请输入保养内容'},
        {key:'result', label:'保养结果', type:'textarea', rows:2, placeholder:'保养完成后填写'},
        {key:'nextDate', label:'下次保养日期', type:'date'}
      ],
      onSave: function(data) {
        var all = getAllMaintains();
        var maxNum = 0;
        all.forEach(function(m) {
          var mm = String(m.id).match(/MT(\d+)/);
          if (mm) maxNum = Math.max(maxNum, parseInt(mm[1]));
        });
        data.id = 'MT' + String(maxNum + 1).padStart(3, '0');
        // 找设备编号
        var eq = equips.find(function(e){ return e.name === data.equipName; });
        data.equipNo = eq ? eq.equipNo : '';
        var local = lsGet('local_maintains', []);
        local.push(data);
        saveLocalMaintains(local);
        saveData('maintains', local);
      },
      onAfter: function() { refresh(); }
    });
  } catch(e) { showToast('新建保养失败: ' + e.message, 'error'); }
}

function editMaintain(id) {
  try {
    var all = getAllMaintains();
    var m = all.find(function(x){ return x.id === id; });
    if (!m) return;
    var peopleNames = PEOPLE_OBJ.filter(function(p){return p.dept==='智能制造组' || p.dept==='保养组';}).map(function(p){return p.name;});
    submitFormModal({
      title: '编辑保养计划 - ' + id,
      fields: [
        {key:'equipName', label:'设备名称', type:'text', value:m.equipName, required:true},
        {key:'type', label:'保养类型', type:'select', options:['日常保养','周保养','月保养','季度保养','年度保养'], value:m.type},
        {key:'planDate', label:'计划日期', type:'date', value:m.planDate, required:true},
        {key:'executor', label:'执行人', type:'select', options:peopleNames, value:m.executor || ''},
        {key:'status', label:'状态', type:'select', options:['待执行','进行中','已完成','已取消'], value:m.status},
        {key:'content', label:'保养内容', type:'textarea', rows:3, value:m.content || '', required:true},
        {key:'result', label:'保养结果', type:'textarea', rows:2, value:m.result || ''},
        {key:'nextDate', label:'下次保养日期', type:'date', value:m.nextDate || ''}
      ],
      onSave: function(data) {
        var local = lsGet('local_maintains', []);
        var idx = local.findIndex(function(x){ return x.id === id; });
        data.id = id;
        data.equipNo = m.equipNo;
        if (idx >= 0) local[idx] = data;
        else local.push(data);
        saveLocalMaintains(local);
        saveData('maintains', local);
      },
      onAfter: function() { refresh(); openMaintainDetail(id); }
    });
  } catch(e) { showToast('编辑保养失败: ' + e.message, 'error'); }
}

function deleteMaintain(id) {
  try {
    if (!confirm('确定删除此保养计划？')) return;
    var local = lsGet('local_maintains', []);
    local = local.filter(function(x){ return x.id !== id; });
    saveLocalMaintains(local);
    saveData('maintains', local);
    closeMo();
    refresh();
  } catch(e) { showToast('删除保养失败: ' + e.message, 'error'); }
}

  }
  var h = '<div class="page-enter">';

      {key:'name', label:'设备名称', type:'text', required:true, placeholder:'请输入设备名称'},

function editEquipAccept(id) {

    title: '编辑设备验收 - ' + id,

function doEquipAccept(id) {
  var all = getAllEquipAccepts();

    title: '执行验收 - ' + e.name,

    ],
    onSave: function(data) {
      var local = lsGet('local_equip_accepts', []);
      var idx = local.findIndex(function(x){ return x.id === id; });
      var merged = Object.assign({}, e, data);
      merged.id = id;
      if (idx >= 0) local[idx] = merged;
      else local.push(merged);
      saveLocalEquipAccepts(local);
    },
    onAfter: function() { refresh(); }
  });
}

function deleteEquipAccept(id) {
  if (!confirm('确定删除此设备验收记录？')) return;
  var local = lsGet('local_equip_accepts', []);
  local = local.filter(function(x){ return x.id !== id; });
  saveLocalEquipAccepts(local);
  closeMo();
  refresh();
}

function editSpare(id) {

  submitFormModal({
    title: '编辑备件 - ' + id,
    fields: [
      {key:'name', label:'备件名称', type:'text', value:s.name, required:true},
      {key:'no', label:'备件编号', type:'text', value:s.no, required:true},
      {key:'stock', label:'库存数量', type:'number', value:s.stock, required:true},
      {key:'minStock', label:'最低库存', type:'number', value:s.minStock, required:true},
      {key:'unit', label:'单位', type:'select', options:['个','条','组','支','套','根','件','片','块'], value:s.unit},
      {key:'location', label:'存放位置', type:'text', value:s.location||''},
      {key:'cycle', label:'更换周期', type:'text', value:s.cycle||''},
      {key:'price', label:'单价(元)', type:'number', value:s.price},
      {key:'status', label:'状态', type:'select', options:['正常','库存不足'], value:s.stock < s.minStock ? '库存不足' : '正常'}
    ],
    onSave: function(data) {
      data.stock = parseInt(data.stock) || 0;
      data.minStock = parseInt(data.minStock) || 0;
      data.price = parseInt(data.price) || 0;
      data.status = data.stock < data.minStock ? '库存不足' : '正常';
      var local = lsGet('local_spares', []);
      var idx = local.findIndex(function(x){ return x.id === id; });
      data.id = id;
      if (idx >= 0) local[idx] = data;
      else local.push(data);
      saveLocalSpares(local);
    },
    onAfter: function() { refresh(); }
  });
}

function restockSpare(id) {
  var all = getAllSpares();
  var s = all.find(function(x){ return x.id === id; });
  if (!s) return;
  submitFormModal({
    title: '备件补货 - ' + s.name,

      {key:'stock', label:'补货后库存数量', type:'number', required:true, value:s.stock, placeholder:'请输入补货后的库存数量'},

      data.minStock = parseInt(data.minStock) || 0;
      data.status = data.stock < data.minStock ? '库存不足' : '正常';

// 改善状态流程：待提案 -> 实施中 -> 验证中 -> 已标准化（或 已驳回）
var IMPROVE_STATUS_FLOW = ['待提案','实施中','验证中','已标准化'];
var IMPROVE_STATUS_LABELS = {
  '待提案': {icon:'📋', color:'tx', desc:'改善提案已提交，等待评审启动'},
  '实施中': {icon:'🛠', color:'tb', desc:'改善方案已批准，正在实施'},
  '验证中': {icon:'🔬', color:'to', desc:'改善措施已执行，正在验证效果'},
  '已标准化': {icon:'✅', color:'tg', desc:'改善效果已确认，已纳入标准流程'},
  '已驳回': {icon:'❌', color:'tr', desc:'改善提案未通过评审'}
};

function advanceImproveStatus(id) {
  var all = getAllImproves();
  var imp = all.find(function(x){ return x.id === id; });
  if (!imp) return;
  var currentStatus = imp.status;
  var flowIdx = IMPROVE_STATUS_FLOW.indexOf(currentStatus);

  // 生成完整流程展示
  var html = '<div style="margin-bottom:16px">';
  html += '<div style="font-size:13px;font-weight:600;color:var(--t2);margin-bottom:12px">改善流程状态</div>';
  html += '<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">';
  IMPROVE_STATUS_FLOW.forEach(function(s, idx) {
    var info = IMPROVE_STATUS_LABELS[s];
    var isActive = s === currentStatus;
    var isDone = flowIdx >= 0 && idx < flowIdx;
    var borderCls = isActive ? 'border:2px solid var(--blue);background:var(--bl)' : isDone ? 'border:2px solid var(--gn);background:var(--gn-l)' : 'border:2px solid var(--br);background:var(--bg)';
    html += '<div style="padding:8px 14px;border-radius:8px;text-align:center;min-width:80px;' + borderCls + '">';
    html += '<div style="font-size:18px">' + info.icon + '</div>';
    html += '<div style="font-size:12px;font-weight:600;color:' + (isActive?'var(--blue)':isDone?'var(--gn)':'var(--t3)') + '">' + s + '</div>';
    html += '</div>';
    if (idx < IMPROVE_STATUS_FLOW.length - 1) {
      html += '<span style="color:var(--t3);font-size:16px">→</span>';
    }
  });
  html += '</div></div>';

  // 当前状态说明
  var currentInfo = IMPROVE_STATUS_LABELS[currentStatus] || {desc:''};
  html += '<div style="padding:10px 14px;background:var(--bg);border-radius:8px;margin-bottom:16px;font-size:12px;color:var(--t2)">';
  html += '<span style="font-weight:600">当前:</span> ' + currentStatus + ' - ' + currentInfo.desc + '</div>';

  // 操作按钮
  html += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
  if (flowIdx >= 0 && flowIdx < IMPROVE_STATUS_FLOW.length - 1) {
    var nextStatus = IMPROVE_STATUS_FLOW[flowIdx + 1];
    var nextInfo = IMPROVE_STATUS_LABELS[nextStatus];
    html += '<button class="btn bp" onclick="doAdvanceImproveStatus(\'' + id + '\',\'' + nextStatus + '\')">';
    html += '推进至: ' + nextStatus + ' ' + nextInfo.icon + '</button>';
  }
  if (currentStatus !== '已驳回') {
    html += '<button class="btn" style="background:var(--rd);color:#fff" onclick="doAdvanceImproveStatus(\'' + id + '\',\'已驳回\')">';
    html += '驳回提案</button>';
  }
  // 允许回退到上一阶段
  if (flowIdx > 0) {
    var prevStatus = IMPROVE_STATUS_FLOW[flowIdx - 1];
    html += '<button class="btn" style="background:var(--br3);color:var(--t)" onclick="doAdvanceImproveStatus(\'' + id + '\',\'' + prevStatus + '\')">';
    html += '回退至: ' + prevStatus + '</button>';
  }
  html += '</div>';

  openMo({title:'改善流程推进 - ' + id, html:html, footer:''});
}

function doAdvanceImproveStatus(id, newStatus) {
  var local = lsGet('local_improves', []);
  var idx = local.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) {
    var oldStatus = local[idx].status;
    local[idx].status = newStatus;
    local[idx].lastStatusChange = new Date().toISOString().slice(0,10);
    saveLocalImproves(local);
    saveData('improvements', local);
    closeMo();
    refresh();
    showToast('改善 ' + id + ' 状态: ' + oldStatus + ' -> ' + newStatus, 'success');
  }
}

function renderSkillMatrix() {
  try {
    var skills = SKILL_NAMES;
    var people = PEOPLE_OBJ.filter(function(p){return p.dept==='智能制造组';}).slice(0, 10);
    var matrix = getSkillMatrix();
    
    // 计算平均技能等级
    var totalLvl = 0;
    var skillCount = 0;
    people.forEach(function(p) {
      skills.forEach(function(s) {
        var lvl = getSkillLevel(p.employeeId, s);
        if (lvl > 0) {
          totalLvl += lvl;
          skillCount++;
        }
      });
    });
    var avgLvl = skillCount > 0 ? (totalLvl / skillCount).toFixed(1) : '0.0';
    
    // 核心技能（平均等级>=3的技能）
    var coreSkills = 0;
    skills.forEach(function(s) {
      var sum = 0, cnt = 0;
      people.forEach(function(p) {
        var lvl = getSkillLevel(p.employeeId, s);
        if (lvl > 0) { sum += lvl; cnt++; }
      });
      if (cnt > 0 && sum/cnt >= 3) coreSkills++;

    var h = '<div class="page-enter">';

function uploadDoc() {
  try {
    var cats = ['方法论/工具','制度/规范','技术协议','报告/总结','参考资料','工具脚本'];
    submitFormModal({
      title: '上传文档',
      showSaveAndNew: true,
      fields: [
        {key:'name', label:'文档名称', type:'text', required:true, placeholder:'请输入文档名称'},
        {key:'type', label:'文档类型', type:'select', options:['PDF','Word','Excel','PPT','多维表格','视频','其他'], value:'PDF'},
        {key:'category', label:'文档分类', type:'select', options:cats, value:'制度/规范'},
        {key:'tags', label:'标签', type:'text', placeholder:'多个标签用逗号分隔'},
        {key:'desc', label:'文档描述', type:'textarea', rows:2, placeholder:'请输入文档描述'}
      ],
      onSave: function(data) {
        var all = getAllDocs();
        var maxNum = 0;
        all.forEach(function(d) {
          var m = String(d.id).match(/D(\d+)/);
          if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
        });
        data.id = 'D' + String(maxNum + 1).padStart(3, '0');
        data.date = new Date().toISOString().slice(0,10);
        data.link = '';
        data.content = '';
        var local = lsGet('local_docs', []);
        local.push(data);
        saveLocalDocs(local);
      },
      onAfter: function() { refresh(); }
    });
  } catch(e) { showToast('上传文档失败: ' + e.message, 'error'); }
}

function downloadDoc(id) {
  try {
    var all = getAllDocs();
    var d = all.find(function(x){ return x.id === id; });
    if (!d) { showToast('文档不存在', 'error'); return; }
    var content = d.content || '';
    if (!content) {
      content = '文档名称: ' + d.name + '\n';
      content += '类型: ' + d.type + '\n';
      content += '分类: ' + d.category + '\n';
      content += '日期: ' + d.date + '\n';
      content += '标签: ' + (d.tags || '') + '\n';
      content += '描述: ' + (d.desc || '') + '\n';
      content += '\n（此为文档元数据，原文内容请通过飞书链接获取）';
    }
    var ext = 'txt';
    if (d.type === 'PDF') ext = 'txt';
    else if (d.type === 'DOCX' || d.type === 'DOC') ext = 'txt';
    else if (d.type === 'XLSX' || d.type === 'XLS') ext = 'txt';
    else if (d.type === 'PPTX' || d.type === 'PPT') ext = 'txt';
    else if (d.type === 'Python') ext = 'py';
    else if (d.type === 'LOG') ext = 'log';
    var blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);

async function runAutoTask(id) {
  var all = getAllAutoTasks();
  var t = all.find(function(x){ return x.id === id; });
  if (!t) return;

  // 非日报提醒类型给出toast提示
  if (t.type === '飞书数据同步') {
    // 飞书数据同步任务
    if (!confirm('确定立即执行：' + t.name + '？')) return;
    var syncBtn = document.getElementById('btnRunAutoTask_' + id);
    if (syncBtn) { syncBtn.disabled = true; syncBtn.innerHTML = '⏳ 同步中...'; }
    showToast('正在从飞书同步数据...', 'info');
    (async function() {
      try {
        var result = await syncFeishuBitableData(t.source || '');
        var now2 = new Date();
        var ts2 = now2.getFullYear()+'-'+String(now2.getMonth()+1).padStart(2,'0')+'-'+String(now2.getDate()).padStart(2,'0')+' '+String(now2.getHours()).padStart(2,'0')+':'+String(now2.getMinutes()).padStart(2,'0');
        var logs2 = lsGet('auto_task_logs', []);
        if (result && result.success) {
          logs2.unshift({
            taskId: t.id,
            taskName: t.name,
            type: t.type,
            action: t.action || '执行',
            status: 'success',
            time: new Date().toISOString(),
            result: '同步' + (result.count || 0) + '条数据'
          });
          showToast('同步成功：' + (result.count||0) + '条数据', 'success');
        } else {
          logs2.unshift({
            taskId: t.id,
            taskName: t.name,
            type: t.type,
            action: t.action || '执行',
            status: '失败',
            time: new Date().toISOString(),
            result: result ? result.error : '同步失败'
          });
          showToast('同步失败: ' + (result?result.error:'未知错误'), 'error');
        }
        if (logs2.length > 1000) logs2 = logs2.slice(0, 1000);
        lsSet('auto_task_logs', logs2);
        var local2 = lsGet('local_autotasks', []);
        var idx2 = local2.findIndex(function(x){return x.id===id});
        if(idx2>=0) local2[idx2].lastRun = ts2;
        lsSet('local_autotasks', local2);
        saveData('auto_tasks', local2);
      } catch(e) {
        showToast('同步异常: '+e.message, 'error');
      }
      if (syncBtn) { syncBtn.disabled = false; syncBtn.innerHTML = '▶'; }
      refresh();
    })();
    return;
  }

  if (!confirm('确定立即执行任务：' + t.name + '？')) return;

  // 检查服务器连接
  if (SERVER_CONFIG.mode !== 'online') {
    showToast('请先连接服务器后再执行任务', 'warn');
    return;
  }

  // 按钮loading状态
  var btn = document.getElementById('btnRunAutoTask_' + id);
  var btnOrigHtml = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳ 执行中...'; }
  showToast('正在推送日报，请稍候...', 'info');

  try {
    var today = new Date().toISOString().split('T')[0];
    var resp = await apiRequest('POST', '/api/daily-report/send', { date: today });

    var now = new Date();
    var timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

    // 更新上次执行时间
    var local = lsGet('local_autotasks', []);
    var idx = local.findIndex(function(x){ return x.id === id; });
    if (idx >= 0) {
      local[idx].lastRun = timeStr;
    } else {
      local.push({id:t.id, name:t.name, type:t.type, action:t.action, trigger:t.trigger, schedule:t.schedule, status:t.status, lastRun:timeStr, target:t.target, template:t.template, remark:t.remark});
    }
    saveLocalAutoTasks(local);
    saveData('auto_tasks', local);

    // 记录日志
    if (resp.code === 0) {
      var workCount = resp.data.work_report_count || 0;
      var attendCount = resp.data.attendance_count || 0;
      var resultMsg = '工作汇报:' + workCount + '条, 出勤:' + attendCount + '条';
      var logs = lsGet('auto_task_logs', []);
      logs.unshift({
        taskId: t.id,
        taskName: t.name,
        type: t.type,
        action: t.action || '执行',
        status: 'success',
        time: new Date().toISOString(),
        result: resultMsg || '执行成功'
      });
      if (logs.length > 1000) logs = logs.slice(0, 1000);
      lsSet('auto_task_logs', logs);
      showToast('日报推送成功！' + resultMsg, 'success');
    } else {
      var logs = lsGet('auto_task_logs', []);
      logs.unshift({
        taskId: t.id,
        taskName: t.name,
        type: t.type,
        action: t.action || '执行',
        status: '失败',
        time: new Date().toISOString(),
        result: resp.msg || '未知错误'
      });
      if (logs.length > 1000) logs = logs.slice(0, 1000);
      lsSet('auto_task_logs', logs);
      showToast('日报推送失败: ' + (resp.msg || '未知错误'), 'error');
    }
  } catch(e) {
    var logs2 = lsGet('auto_task_logs', []);
    logs2.unshift({
      taskId: t.id,
      taskName: t.name,
      type: t.type,
      action: t.action || '执行',
      status: '失败',
      time: new Date().toISOString(),
      result: '异常: ' + e.message
    });
    if (logs2.length > 1000) logs2 = logs2.slice(0, 1000);
    lsSet('auto_task_logs', logs2);
    showToast('日报推送异常: ' + e.message, 'error');
    console.error('runAutoTask error:', e);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = btnOrigHtml; }
    refresh();
  }
}

function toggleWebhook(id) {

  else selectedWebhooks.push(id);
}

function selectAllWebhooks(select) {

  if (select) {
    selectedWebhooks = webhooks.map(function(w){ return w.id; });
  } else {
    selectedWebhooks = [];
  }

}

function addWebhook() {
  submitFormModal({
    title: '新增群组Webhook',
    fields: [
      {key:'name', label:'群组名称', type:'text', required:true, placeholder:'如：智能制造组全员'},
      {key:'type', label:'类型', type:'select', options:['飞书','企业微信','钉钉','邮件'], value:'飞书'},
      {key:'url', label:'Webhook URL', type:'text', required:true, placeholder:'https://...'}
    ],
    onSave: function(data) {
      var webhooks = getWebhooks();
      data.id = 'WH' + String(webhooks.length + 1).padStart(3, '0');
      webhooks.push(data);
      saveWebhooks(webhooks);
    },
    onAfter: function() { refresh(); }
  });
}

function deleteWebhook(id) {
  if (!confirm('确定删除此Webhook？')) return;
  var webhooks = getWebhooks().filter(function(w){ return w.id !== id; });
  saveWebhooks(webhooks);
  selectedWebhooks = selectedWebhooks.filter(function(wid){ return wid !== id; });
  refresh();
}

function createMsgTemplate() {
  try {
    submitFormModal({
      title: '新增消息模板',
      showSaveAndNew: true,
      fields: [
        {key:'name', label:'模板名称', type:'text', required:true, placeholder:'请输入模板名称'},
        {key:'type', label:'模板类型', type:'select', options:['text','richtext','card'], value:'text'},
        {key:'title', label:'消息标题', type:'text', placeholder:'请输入消息标题'},
        {key:'content', label:'消息内容', type:'textarea', rows:4, required:true, placeholder:'请输入消息内容，支持 {{变量名}} 替换'},
        {key:'variables', label:'变量列表', type:'text', placeholder:'多个变量用逗号分隔，如：name,date,content'}
      ],
      onSave: function(data) {
        var templates = getMsgTemplates();
        var maxNum = 0;
        templates.forEach(function(t) {
          var m = String(t.id).match(/MT(\d+)/);
          if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
        });
        data.id = 'MT' + String(maxNum + 1).padStart(3, '0');
        if (data.variables) {
          data.variables = data.variables.split(/[,，]/).map(function(v){return v.trim();}).filter(function(v){return v;});
        } else {
          data.variables = [];
        }
        templates.push(data);
        saveMsgTemplates(templates);
      },
      onAfter: function() { refresh(); }
    });
  } catch(e) { showToast('新增模板失败: ' + e.message, 'error'); }
}

function editMsgTemplate(id) {
  try {
    var templates = getMsgTemplates();
    var t = templates.find(function(x){ return x.id === id; });
    if (!t) return;
    submitFormModal({
      title: '编辑消息模板 - ' + id,
      fields: [
        {key:'name', label:'模板名称', type:'text', value:t.name, required:true},
        {key:'type', label:'模板类型', type:'select', options:['text','richtext','card'], value:t.type},
        {key:'title', label:'消息标题', type:'text', value:t.title || ''},
        {key:'content', label:'消息内容', type:'textarea', rows:4, value:t.content || '', required:true},
        {key:'variables', label:'变量列表', type:'text', value:(t.variables || []).join(',')}
      ],
      onSave: function(data) {
        var temps = getMsgTemplates();
        var idx = temps.findIndex(function(x){ return x.id === id; });
        data.id = id;
        if (data.variables) {
          data.variables = data.variables.split(/[,，]/).map(function(v){return v.trim();}).filter(function(v){return v;});
        } else {
          data.variables = [];
        }
        if (idx >= 0) temps[idx] = data;
        else temps.push(data);
        saveMsgTemplates(temps);
      },
      onAfter: function() { refresh(); }
    });
  } catch(e) { showToast('编辑模板失败: ' + e.message, 'error'); }
}

function deleteMsgTemplate(id) {
  try {
    if (!confirm('确定删除此消息模板？')) return;
    var templates = getMsgTemplates().filter(function(t){ return t.id !== id; });
    saveMsgTemplates(templates);
    refresh();
  } catch(e) { showToast('删除模板失败: ' + e.message, 'error'); }
}

function useMsgTemplate(id) {
  var templates = getMsgTemplates();
  var t = templates.find(function(x){ return x.id === id; });
  if (!t) return;
  var titleEl = document.getElementById('msgTitle');
  var contentEl = document.getElementById('msgContent');
  if (titleEl) titleEl.value = t.name;
  if (contentEl) contentEl.value = t.content;
  previewMsg();
}

function previewMsg() {
  var title = document.getElementById('msgTitle') ? document.getElementById('msgTitle').value : '';
  var content = document.getElementById('msgContent') ? document.getElementById('msgContent').value : '';
  var preview = document.getElementById('msgPreview');
  if (preview) {
    preview.innerHTML = '<b>' + (title || '无标题') + '</b><br><br>' + (content || '无内容').replace(/\n/g, '<br>');
  }
}

function sendMsg() {
  if (selectedWebhooks.length === 0) {
    showToast('请至少选择一个推送群组！', 'warn');
    return;
  }
  var title = document.getElementById('msgTitle') ? document.getElementById('msgTitle').value : '';
  var content = document.getElementById('msgContent') ? document.getElementById('msgContent').value : '';
  if (!content) {
    showToast('请输入消息内容！', 'warn');
    return;
  }
  var webhooks = getWebhooks();
  var targetNames = webhooks.filter(function(w){ return (selectedWebhooks||[]).indexOf(w.id) !== -1; }).map(function(w){ return w.name; }).join('、');
  
  // 记录历史
  var history = getPushHistory();
  var now = new Date();
  var timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  history.unshift({
    id: 'PH' + Date.now(),
    time: timeStr,
    target: targetNames,
    type: title || '自定义消息',
    status: '成功',
    content: content.substring(0, 50)
  });
  savePushHistory(history.slice(0, 50));
  
  showToast('消息已推送至 ' + selectedWebhooks.length + ' 个群组！\n目标：' + targetNames, 'info'); refresh();
}

function viewPushHistoryDetail(id) {
  try {
    var history = getPushHistory();
    var h = history.find(function(x){ return x.id === id; });
    if (!h) return;

    html += '<div class="info-item"><div class="ii-label">推送时间</div><div class="ii-value">' + h.time + '</div></div>';
    html += '<div class="info-item"><div class="ii-label">目标群组</div><div class="ii-value">' + h.target + '</div></div>';
    html += '<div class="info-item"><div class="ii-label">消息类型</div><div class="ii-value"><span class="t tb">' + h.type + '</span></div></div>';

function resendPush(id) {
  try {
    var history = getPushHistory();
    var h = history.find(function(x){ return x.id === id; });
    if (!h) return;
    if (!confirm('确定重发此消息？\n目标：' + h.target + '\n类型：' + h.type)) return;
    var now = new Date();
    var timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
    history.unshift({
      id: 'PH' + Date.now(),
      time: timeStr,
      target: h.target,
      type: h.type,
      status: '成功',
      content: h.content
    });
    savePushHistory(history.slice(0, 50));
    showToast('重发成功！', 'success');
    refresh();
  } catch(e) { showToast('重发失败: ' + e.message, 'error'); }
}

function clearPushHistory() {
  if (!confirm('确定清空推送历史？')) return;
  savePushHistory([]);
  refresh();
}

function togglePerm(moduleId, action, role, checked) {
  try {
    var matrix = getPermissionMatrix();
    if (!matrix[moduleId]) matrix[moduleId] = {};
    if (!matrix[moduleId][action]) matrix[moduleId][action] = [];
    
    var idx = matrix[moduleId][action].indexOf(role);
    if (checked && idx === -1) {
      matrix[moduleId][action].push(role);
    } else if (!checked && idx >= 0) {
      matrix[moduleId][action].splice(idx, 1);
    }
    savePermissionMatrix(matrix);
  } catch(e) { console.error('togglePerm error:', e); }
}

// V13 - 导入本地数据到服务器
async function importLocalToServer() {
  if (SERVER_CONFIG.mode !== 'online') {
    showToast('请先连接到后端服务器', 'warn');
    return;
  }
  if (!confirm('确定将所有本地数据导入到服务器？\n\n这将把本地数据推送到服务器，服务器上已有的同名数据将被覆盖。')) return;
  var typeKeyMap = [
    {type: 'tasks', key: 'local_tasks'},
    {type: 'daily_reports', key: 'local_daily'},
    {type: 'projects', key: 'local_projects'},
    {type: 'equipments', key: 'local_equips'},
    {type: 'improvements', key: 'local_improves'},
    {type: 'maintains', key: 'local_maintains'},
    {type: 'repairs', key: 'local_repairs'},
    {type: 'auto_tasks', key: 'local_autotasks'}
  ];
  setSyncStatus('syncing');
  try {
    for (var i = 0; i < typeKeyMap.length; i++) {
      var localData = lsGet(typeKeyMap[i].key, []);
      if (localData.length > 0) {
        await apiRequest('POST', '/api/data/' + typeKeyMap[i].type, localData);
        addSyncLog('导入 ' + typeKeyMap[i].type + ' 成功，共 ' + localData.length + ' 条');
      } else {
        addSyncLog('跳过 ' + typeKeyMap[i].type + '（本地无数据）');
      }
    }
    setSyncStatus('synced');
    showToast('数据已成功导入到服务器！', 'success');
    refresh();
  } catch(e) {
    setSyncStatus('error');
    showToast('导入失败: ' + e.message, 'error'); }
}

// V13 - 连接/断开服务器切换
async function toggleServerConnection() {
  if (SERVER_CONFIG.mode === 'online') {
    // 断开连接
    if (!confirm('确定断开与服务器 ' + SERVER_CONFIG.url + ' 的连接？')) return;
    SERVER_CONFIG.enabled = false;
    SERVER_CONFIG.mode = 'offline';
    API_BASE = '';
    localStorage.setItem('v13_server_enabled', 'false');
    updateSyncStatusBadge('offline', '本地模式');
    addSyncLog('已手动断开服务器连接');
    stopAutoSync();
    refresh();
  } else {
    // 尝试连接
    var url = document.getElementById('feishuServerUrl').value.trim() || 'http://localhost:3000';
    var resultDiv = document.getElementById('serverConnResult');
    if (resultDiv) resultDiv.innerHTML = '<span style="color:var(--or)">&#9201; 正在连接...</span>';
    try {
      var res = await fetch(url + '/api/status', {method:'GET', headers:{'Content-Type':'application/json'}});
      var json = await res.json();
      if (json.code === 0) {
        setServerUrl(url);
        updateSyncStatusBadge('connected', '已连接');
        addSyncLog('手动连接服务器成功: ' + url);
        if (resultDiv) {
          resultDiv.innerHTML = '<span style="color:var(--gn)">&#10004; 连接成功!</span>' +
            (json.data ? ' <span style="color:var(--t2)">版本: ' + (json.data.version || '-') + ' | 运行时间: ' + (json.data.uptime || '-') + '</span>' : '');
        }
        refresh();
      } else {
        if (resultDiv) resultDiv.innerHTML = '<span style="color:var(--rd)">&#10008; 连接失败: ' + (json.msg || '未知错误') + '</span>';
      }
    } catch(e) {
      if (resultDiv) resultDiv.innerHTML = '<span style="color:var(--rd)">&#10008; 连接失败: ' + e.message + '</span>';
    }
  }
}

// V13 - 增强testServerConnection
function testServerConnection() {
  var url = document.getElementById('feishuServerUrl').value.trim();
  if (!url) { showToast('请输入服务器地址', 'warn'); return; }
  var resultDiv = document.getElementById('serverConnResult');
  if (resultDiv) resultDiv.innerHTML = '<span style="color:var(--or)">&#9201; 正在测试连接...</span>';
 fetch(url + '/api/status', {
    method: 'GET',
    headers: {'Content-Type': 'application/json'},
    signal: AbortSignal.timeout ? AbortSignal.timeout(5000) : undefined
  }).then(function(res) {
    return res.json();
  }).then(function(json) {

// V13 - 数据表总览筛选功能
function filterTableOverview(filterType) {
  var rows = document.querySelectorAll('#tableOverviewBody .overview-row');
  rows.forEach(function(row) {
    var isMapped = row.getAttribute('data-mapped') === 'true';
    if (filterType === 'all') {
      row.style.display = '';
    } else if (filterType === 'mapped') {
      row.style.display = isMapped ? '' : 'none';
    } else if (filterType === 'unmapped') {
      row.style.display = isMapped ? 'none' : '';
    }
  });
  var btnAll = document.getElementById('filterAll');
  var btnMapped = document.getElementById('filterMapped');
  var btnUnmapped = document.getElementById('filterUnmapped');
  [btnAll, btnMapped, btnUnmapped].forEach(function(btn) {
    btn.className = 'btn-sm bo';
  });
  if (filterType === 'all') btnAll.className = 'btn-sm bp';
  else if (filterType === 'mapped') btnMapped.className = 'btn-sm bp';
  else btnUnmapped.className = 'btn-sm bp';
}

  localStorage.removeItem('v9_feishu_table_mappings');
  refresh();
}

async function testTableConnection(type) {
  if (SERVER_CONFIG.mode !== 'online') {
    showToast('请先连接服务器', 'warn');
    return;
  }
  showToast('测试读取 ' + type + ' 的前3条记录...', 'info'); try {
    var res = await apiRequest('POST', '/api/sync/read/' + type, {limit: 3});
    if (res.code === 0) {
      var count = res.data ? res.data.length : 0;

async function readAllFromFeishu() {
  if (SERVER_CONFIG.mode !== 'online') {
    showToast('请先连接服务器', 'warn');
    return;
  }
  setSyncStatus('syncing');
  try {
    var typeKeys = lsGet('feishu_table_mappings', DEFAULT_TABLE_MAPPINGS).map(function(m) { return m.type; });
    for (var i = 0; i < typeKeys.length; i++) {
      var res = await apiRequest('POST', '/api/sync/read/' + typeKeys[i]);
      if (res.code === 0 && res.data) {
        lsSet('local_' + typeKeys[i], res.data);
        lsSet('sync_last_' + typeKeys[i], new Date().toLocaleTimeString());
        addSyncLog('读取 ' + typeKeys[i] + ' 成功，共 ' + res.data.length + ' 条');
      } else {
        addSyncLog('读取 ' + typeKeys[i] + ' 失败: ' + (res.msg || ''));
      }
    }
    setSyncStatus('synced');
    showToast('全部数据读取完成!', 'info');
  } catch(e) {
    setSyncStatus('error');
    addSyncLog('读取飞书数据失败: ' + e.message);
    showToast('读取失败: ' + e.message, 'error'); }
  refresh();
}

function insertTemplateVar(varName) {
  var ta = document.getElementById('rpcTemplate');
  if (!ta) return;
  var start = ta.selectionStart;
  var end = ta.selectionEnd;
  var text = ta.value;
  ta.value = text.substring(0, start) + varName + text.substring(end);
  ta.selectionStart = ta.selectionEnd = start + varName.length;
  ta.focus();
}

function escapeHtml(str) {
  if (str == null || str === undefined) return '';
  str = String(str);
  return str.replace(/&/g, '&').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function testReportPushWebhook() {
  var url = document.getElementById('rpcWebhookUrl').value.trim();
  var resultEl = document.getElementById('rpcWebhookTestResult');
  if (!url) {
    resultEl.innerHTML = '<span style="color:var(--rd)">请先输入 Webhook URL</span>';
    return;
  }
  resultEl.innerHTML = '<span style="color:var(--or)">测试中...</span>';
  if (SERVER_CONFIG.mode === 'online') {
    apiRequest('POST', '/api/bot/send', {
      webhook_url: url,
      text: '[智能制造平台] Webhook 连接测试 - ' + new Date().toLocaleString('zh-CN')
    }).then(function(res) {
      if (res.code === 0) {
        resultEl.innerHTML = '<span style="color:var(--gn)">连接测试成功！消息已发送到飞书群</span>';
        showToast('测试消息发送成功', 'success');
      } else {
        resultEl.innerHTML = '<span style="color:var(--rd)">发送失败: ' + (res.msg || '未知错误') + '</span>';
        showToast('测试失败: ' + res.msg, 'error');
      }
    });
  } else {
    // 离线模式：直接 fetch
    fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        msg_type: 'text',
        content: { text: '[智能制造平台] Webhook 连接测试 - ' + new Date().toLocaleString('zh-CN') }
      })
    }).then(function(r) { return r.json(); }).then(function(json) {
      if (json.code === 0 || json.StatusCode === 0) {
        resultEl.innerHTML = '<span style="color:var(--gn)">连接测试成功！</span>';
        showToast('测试消息发送成功', 'success');
      } else {
        resultEl.innerHTML = '<span style="color:var(--rd)">发送失败: ' + (json.msg || JSON.stringify(json)) + '</span>';
      }
    }).catch(function(e) {
      resultEl.innerHTML = '<span style="color:var(--rd)">网络错误: ' + e.message + '</span>';
    });
  }
}

async function loadReportPushConfigFromServer() {
  if (SERVER_CONFIG.mode !== 'online') return;
  try {
    var res = await apiRequest('GET', '/api/report-config');
    if (res.code === 0 && res.data) {
      // 如果服务器有配置且本地没有，用服务器的覆盖
      var local = getReportPushConfig();
      if (!local.webhookUrl && res.data.webhookUrl) {
        saveReportPushConfigLocal(res.data);
      }
    }
  } catch(e) {
    console.error('[推送配置] 从服务器加载配置失败:', e);
  }
}

function createMemberApply() {
  var today = new Date().toISOString().slice(0,10);
  submitFormModal({
    title: '新增人员申请',
    showSaveAndNew: true,
    fields: [
      {key:'name', label:'申请人', type:'text', required:true, placeholder:'请输入申请人姓名'},
      {key:'employeeId', label:'工号', type:'text', required:true, placeholder:'请输入工号'},
      {key:'dept', label:'部门', type:'select', options:['智能制造组','机电设备组','电子设备组','保养组','设备部'], value:'智能制造组'},
      {key:'applyType', label:'申请类型', type:'select', options:['入职申请','调动申请','离职申请','转正申请','其他'], value:'入职申请'},
      {key:'date', label:'申请日期', type:'date', value:today},
      {key:'status', label:'状态', type:'select', options:['待审批','已通过','已拒绝'], value:'待审批'},
      {key:'reason', label:'申请原因', type:'textarea', rows:3, required:true, placeholder:'请输入申请原因'}
    ],
    onSave: function(data) {
      var all = getAllMemberApplies();
      var maxNum = 0;
      all.forEach(function(a) {
        var m = String(a.id).match(/AP(\d+)/);
        if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
      });
      data.id = 'AP' + String(maxNum + 1).padStart(3, '0');
      var local = lsGet('local_member_applies', []);
      local.push(data);
      saveLocalMemberApplies(local);
    },
    onAfter: function() { refresh(); }
  });
}

    footer += '<button class="btn dg" onclick="rejectMemberApply(\'' + a.id + '\');closeMo()">拒绝</button>';
  }
