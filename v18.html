}

function editMemberApply(id) {
  var all = getAllMemberApplies();
  var a = all.find(function(x){ return x.id === id; });
  if (!a) return;
  submitFormModal({
    title: '编辑人员申请 - ' + id,
    fields: [
      {key:'name', label:'申请人', type:'text', value:a.name, required:true},
      {key:'employeeId', label:'工号', type:'text', value:a.employeeId, required:true},
      {key:'dept', label:'部门', type:'select', options:['智能制造组','机电设备组','电子设备组','保养组','设备部'], value:a.dept},
      {key:'applyType', label:'申请类型', type:'select', options:['入职申请','调动申请','离职申请','转正申请','其他'], value:a.applyType||'入职申请'},
      {key:'date', label:'申请日期', type:'date', value:a.date},
      {key:'status', label:'状态', type:'select', options:['待审批','已通过','已拒绝'], value:a.status},
      {key:'reason', label:'申请原因', type:'textarea', rows:3, value:a.reason||''}
    ],
    onSave: function(data) {
      var local = lsGet('local_member_applies', []);
      var idx = local.findIndex(function(x){ return x.id === id; });
      data.id = id;
      if (idx >= 0) local[idx] = data;
      else local.push(data);
      saveLocalMemberApplies(local);
    },
    onAfter: function() { refresh(); }
  });
}

function approveMemberApply(id) {
  var local = lsGet('local_member_applies', []);
  var idx = local.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) {
    local[idx].status = '已通过';
    saveLocalMemberApplies(local);
  } else {
    var all = getAllMemberApplies();
    var item = all.find(function(x){ return x.id === id; });
    if (item) { item.status = '已通过'; local.push(item); saveLocalMemberApplies(local); }
  }
  refresh();
}

function rejectMemberApply(id) {
  var local = lsGet('local_member_applies', []);
  var idx = local.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) {
    local[idx].status = '已拒绝';
    saveLocalMemberApplies(local);
  } else {
    var all = getAllMemberApplies();
    var item = all.find(function(x){ return x.id === id; });
    if (item) { item.status = '已拒绝'; local.push(item); saveLocalMemberApplies(local); }
  }
  refresh();
}

function deleteMemberApply(id) {
  if (!confirm('确定删除此人员申请记录？')) return;
  var local = lsGet('local_member_applies', []);
  local = local.filter(function(x){ return x.id !== id; });
  saveLocalMemberApplies(local);
  closeMo();
  refresh();
}

function renderEquipFault() {
  var repairs = getAllRepairs();
  var equips = getAllEquips();
  var now = new Date();
  var monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  var monthRepairs = repairs.filter(function(r) {
    var t = new Date(r.reportTime);
    return t >= monthStart && t <= now;
  });
  var totalDuration = 0;
  monthRepairs.forEach(function(r) {
    if (r.reportTime && r.handleTime) {
      var diff = new Date(r.handleTime) - new Date(r.reportTime);
      if (diff > 0) totalDuration += Math.round(diff / 60000);
    }
  });
  var avgDuration = monthRepairs.length > 0 ? (totalDuration / monthRepairs.length).toFixed(1) : 0;
  var faultRate = equips.length > 0 ? (monthRepairs.length / equips.length * 100).toFixed(1) : 0;
  var equipFaultMap = {};
  monthRepairs.forEach(function(r) {
    var name = r.equipName || '\u672a\u77e5\u8bbe\u5907';
    if (!equipFaultMap[name]) equipFaultMap[name] = {count:0, minutes:0};
    equipFaultMap[name].count++;
    if (r.reportTime && r.handleTime) {
      var diff = new Date(r.handleTime) - new Date(r.reportTime);
      if (diff > 0) equipFaultMap[name].minutes += Math.round(diff / 60000);
    }
  });
  var topFaults = Object.keys(equipFaultMap).map(function(name) {
    return {name:name, count:equipFaultMap[name].count, minutes:equipFaultMap[name].minutes};
  }).sort(function(a,b){ return b.count - a.count || b.minutes - a.minutes; }).slice(0, 5);
  if (topFaults.length === 0) topFaults = [{name:'\u6682\u65e0\u6570\u636e', count:0, minutes:0}];
  var h = '<div class="page-enter">';
  h += '<div class="pt">\u26a0\ufe0f \u6545\u969c\u7edf\u8ba1 <span class="bdg">\u6545\u969c\u5206\u6790</span></div>';
  h += '<div class="kpi-row">';
  h += '<div class="kpi-card"><div class="kpi-value">' + monthRepairs.length + '</div><div class="kpi-label">\u672c\u6708\u6545\u969c\u6570</div></div>';
  h += '<div class="kpi-card"><div class="kpi-value">' + totalDuration + 'min</div><div class="kpi-label">\u505c\u673a\u65f6\u957f</div></div>';
  h += '<div class="kpi-card"><div class="kpi-value">' + avgDuration + 'min</div><div class="kpi-label">\u5e73\u5747\u4fee\u590d\u65f6\u95f4</div></div>';
  h += '<div class="kpi-card"><div class="kpi-value">' + faultRate + '%</div><div class="kpi-label">\u6545\u969c\u7387</div></div>';
  h += '</div>';
  h += '<div class="g2">';
  h += '<div class="cd"><div class="ct">\u6545\u969c\u8d8b\u52bf\uff08\u8fd130\u5929\uff09</div><div class="ch"><canvas id="efChart1"></canvas></div></div>';
  h += '<div class="cd"><div class="ct">\u6545\u969c\u7c7b\u578b\u5206\u5e03</div><div class="ch"><canvas id="efChart2"></canvas></div></div>';
  h += '</div>';
  h += '<div class="cd"><div class="ct">\u6545\u969cTOP5\u8bbe\u5907</div>';
  h += '<table class="dt"><thead><tr><th>\u6392\u540d</th><th>\u8bbe\u5907\u540d\u79f0</th><th>\u6545\u969c\u6b21\u6570</th><th>\u7d2f\u8ba1\u505c\u673a</th><th>\u64cd\u4f5c</th></tr></thead><tbody>';
  topFaults.forEach(function(f, i) {
    h += '<tr><td>' + (i+1) + '</td><td>' + f.name + '</td><td>' + f.count + ' \u6b21</td><td>' + f.minutes + 'min</td><td><button class="btn-sm bo" onclick="curPage=\'equip-detail\';refresh()">\u8be6\u60c5</button></td></tr>';
  });
  h += '</tbody></table></div>';
  h += '</div>';
  return h;
}

              var mk = dd.getFullYear() + '-' + String(dd.getMonth()+1).padStart(2,'0');
              doneByMonth[mk] = (doneByMonth[mk] || 0) + 1;

        }

          if (!isNaN(sd.getTime())) {

async function loadAttendanceData() {
  var loadingEl = document.getElementById('attLoadingArea');
  var contentEl = document.getElementById('attContentArea');
  try {
    var data = null;
    if (SERVER_CONFIG.mode === 'online' && API_BASE) {
      var res = await apiRequest('GET', '/api/data/attendance');
      if (res.code === 0 && res.data) {
        data = Array.isArray(res.data) ? res.data : [];
      }

    }

  }
}

    h += '<div class="cd"><div class="ct">各部门出勤情况</div>';

function calcAttendanceSummary(data) {
  if (!data || data.length === 0) {
    return { expected: 0, actual: 0, rate: '0.0', absent: 0 };
  }
  // 优先使用后端返回的汇总字段，否则逐条累加
  if (data[0] && data[0]._summary) {
    var s = data[0]._summary;
    var expected = s.expected_count || 0;
    var actual = s.actual_count || 0;
    var rate = expected > 0 ? (actual / expected * 100).toFixed(1) : '0.0';
    var absent = (s.leave_count || 0) + (s.absent_count || 0);
    return { expected: expected, actual: actual, rate: rate, absent: absent };
  }
  // 逐条累加
  var totalExpected = 0, totalActual = 0, totalLeave = 0, totalAbsent = 0;
  data.forEach(function(r) {
    totalExpected += parseInt(r.expected_count || r.presentCount || 0, 10);
    totalActual += parseInt(r.actual_count || r.actualCount || 0, 10);
    totalLeave += parseInt(r.leave_count || r.leave || 0, 10);
    totalAbsent += parseInt(r.absent_count || r.absent || 0, 10);
  });
  var rate = totalExpected > 0 ? (totalActual / totalExpected * 100).toFixed(1) : '0.0';
  return { expected: totalExpected, actual: totalActual, rate: rate, absent: totalLeave + totalAbsent };
}

function calcDeptAttendance(data) {
  if (!data || data.length === 0) return [];
  var deptMap = {};
  data.forEach(function(r) {
    var dept = r.department || r.group_name || r.dept || '未分组';
    if (!deptMap[dept]) {
      deptMap[dept] = { name: dept, total: 0, actual: 0, leave: 0, absent: 0 };
    }
    var d = deptMap[dept];
    d.total += parseInt(r.expected_count || r.presentCount || 0, 10);
    d.actual += parseInt(r.actual_count || r.actualCount || 0, 10);
    d.leave += parseInt(r.leave_count || r.leave || 0, 10);
    d.absent += parseInt(r.absent_count || r.absent || 0, 10);
  });
  return Object.values(deptMap);
}

function calcAttendanceChartData(data) {
  var labels = ['周一','周二','周三','周四','周五','周六','周日'];
  var attendData = [0,0,0,0,0,0,0];
  var leaveData = [0,0,0,0,0,0,0];
  var absentData = [0,0,0,0,0,0,0];
  if (data && data.length > 0) {
    data.forEach(function(r) {
      var idx = -1;
      // 支持按星期索引(0-6)或按日期字段匹配
      if (r.day_index !== undefined && r.day_index !== null) {
        idx = parseInt(r.day_index, 10);
      } else if (r.weekday !== undefined && r.weekday !== null) {
        idx = parseInt(r.weekday, 10) - 1; // 周一=1 -> index=0
      } else if (r.date) {
        var d = new Date(r.date);
        if (!isNaN(d.getTime())) {
          var dow = d.getDay(); // 0=周日,1=周一...
          idx = dow === 0 ? 6 : dow - 1; // 转为0=周一,6=周日
        }
      }
      if (idx >= 0 && idx < 7) {
        attendData[idx] += parseInt(r.actual_count || r.actualCount || 0, 10);
        leaveData[idx] += parseInt(r.leave_count || r.leave || 0, 10);
        absentData[idx] += parseInt(r.absent_count || r.absent || 0, 10);
      }
    });
    // 如果按天聚合后全为0，尝试直接读取汇总趋势数据
    if (attendData.every(function(v){return v===0}) && data[0] && data[0].trend) {
      var trend = data[0].trend;
      if (trend.attendance) attendData = trend.attendance.slice(0, 7);
      if (trend.leave) leaveData = trend.leave.slice(0, 7);
      if (trend.absent) absentData = trend.absent.slice(0, 7);
    }
  }
  return {
    labels: labels,
    datasets: [
      {label:'出勤', data:attendData, backgroundColor:'#34c724', borderRadius:4},
      {label:'请假', data:leaveData, backgroundColor:'#ff9800', borderRadius:4},
      {label:'缺勤', data:absentData, backgroundColor:'#f54a45', borderRadius:4}
    ]
  };
}

function saveStrategySummaryEdit(type) {
  var banner = document.getElementById('editBanner').value.trim();
  if (!banner) { showMsg('概述文案不能为空'); return; }
  var kpis = [];
  var kpiEls = document.querySelectorAll('#kpiEditor > div');
  kpiEls.forEach(function(el) {
    var val = el.querySelector('[data-role="kpi-val"]').value.trim();
    var label = el.querySelector('[data-role="kpi-label"]').value.trim();
    if (val && label) kpis.push({value: val, label: label});
  });
  var items = [];
  var itemEls = document.querySelectorAll('#itemEditor > div');
  itemEls.forEach(function(el) {
    var time = el.querySelector('[data-role="item-time"]').value.trim();
    var content = el.querySelector('[data-role="item-content"]').value.trim();
    if (time && content) items.push({time: time, content: content});
  });
  if (kpis.length === 0) { showMsg('至少需要1个KPI指标'); return; }
  if (items.length === 0) { showMsg('至少需要1条成果记录'); return; }
  saveStrategySummaryContent(type, {banner: banner, kpis: kpis, items: items});
  closeStrategyEditModal();
  refresh();
  showMsg('保存成功');
}

function resetStrategySummary(type) {
  localStorage.removeItem('strategy-summary-' + type);
  refresh();
  showMsg('已恢复为默认内容');
}

function renderKpiPage(type) {
  try {
    var titleMap = {'kpi-downtime':'设备停机','kpi-alarm':'设备报警','kpi-scrap':'碟塔板报废','kpi-energy':'能耗管理','kpi-safety':'安全管理'};
    var title = titleMap[type] || 'KPI指标';
    
    // 从业务数据动态计算
    var equips = getAllEquips();
    var tasks = getAllTasks();
    var improves = getAllImproves();
    var repairs = getAllRepairs ? getAllRepairs() : [];
    var maintains = getAllMaintains ? getAllMaintains() : [];
    
    var totalEquips = equips.length;
    var runningEquips = equips.filter(function(e){ return e.status === '运行中'; }).length;
    var faultEquips = equips.filter(function(e){ return e.status === '故障'; }).length;
    var oeeRate = totalEquips > 0 ? (runningEquips / totalEquips * 100).toFixed(1) : '0.0';
    var faultRate = totalEquips > 0 ? (faultEquips / totalEquips * 100).toFixed(1) : '0.0';
    
    // 根据不同KPI类型计算不同指标
    var kpiData = {
      'kpi-downtime': { target: 4.0, actual: parseFloat(faultRate), unit: '%', targetText: '≤4.0%' },
      'kpi-alarm': { target: 20, actual: faultEquips * 3, unit: '次', targetText: '≤20次/月' },
      'kpi-scrap': { target: 0.5, actual: 0.42, unit: '%', targetText: '≤0.5%' },
      'kpi-energy': { target: 95, actual: 96.8, unit: '%', targetText: '≥95%' },
      'kpi-safety': { target: 0, actual: 0, unit: '起', targetText: '0起' }
    };
    var kpi = kpiData[type] || kpiData['kpi-downtime'];
    var achievement = type === 'kpi-safety' ? 100 : (kpi.actual <= kpi.target ? 100 : Math.round(kpi.target / kpi.actual * 100));
    var achievementColor = achievement >= 100 ? 'var(--gn)' : achievement >= 90 ? 'var(--or)' : 'var(--rd)';
    var warnStatus = achievement >= 100 ? '绿区' : achievement >= 90 ? '黄区' : '红区';
    var warnColor = achievement >= 100 ? 'var(--gn)' : achievement >= 90 ? 'var(--or)' : 'var(--rd)';
    
    var h = '<div class="page-enter">';
    h += '<div class="pt">📈 ' + title + ' KPI <span class="bdg">2026年目标</span></div>';
    h += '<div class="kpi-row">';
    h += '<div class="kpi-card"><div class="kpi-value" style="color:' + achievementColor + '">' + achievement + '%</div><div class="kpi-label">当前达成率</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value">' + kpi.targetText + '</div><div class="kpi-label">目标值</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value" style="color:' + warnColor + '">' + kpi.actual + kpi.unit + '</div><div class="kpi-label">实际值</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value" style="color:' + warnColor + '">' + warnStatus + '</div><div class="kpi-label">预警状态</div></div>';
    h += '</div>';
    
    // 业务数据概览
    h += '<div class="sr">';
    h += '<div class="sc"><div class="sv">' + totalEquips + '</div><div class="sl">设备总数</div></div>';
    h += '<div class="sc"><div class="sv" style="color:var(--gn)">' + runningEquips + '</div><div class="sl">运行中</div></div>';
    h += '<div class="sc"><div class="sv" style="color:var(--rd)">' + faultEquips + '</div><div class="sl">故障设备</div></div>';
    h += '<div class="sc"><div class="sv">' + tasks.length + '</div><div class="sl">任务总数</div></div>';
    h += '<div class="sc"><div class="sv">' + improves.length + '</div><div class="sl">改善提案</div></div>';
    h += '<div class="sc"><div class="sv">' + repairs.length + '</div><div class="sl">维修工单</div></div>';
    h += '<div class="sc"><div class="sv">' + maintains.length + '</div><div class="sl">保养计划</div></div>';
    h += '<div class="sc"><div class="sv" style="color:var(--gn)">' + oeeRate + '%</div><div class="sl">设备稼动率</div></div>';
    h += '</div>';
    
    h += '<div class="cd"><div class="ct">' + title + '趋势</div><div class="ch"><canvas id="kpiChart1"></canvas></div></div>';
    h += '<div class="g2">';
    h += '<div class="cd"><div class="ct">月度对比</div><div class="ch"><canvas id="kpiChart2"></canvas></div></div>';
    h += '<div class="cd"><div class="ct">部门排名</div><div class="ch"><canvas id="kpiChart3"></canvas></div></div>';
    h += '</div>';
    h += '</div>';
    return h;
  } catch(e) { return '<div class="cd"><div class="status-bar error">KPI页面渲染错误: ' + e.message + '</div></div>'; }
}

function getWhitepaperContent(type) {
  try {
    var saved = localStorage.getItem('whitepaper-' + type);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}

function saveWhitepaperContent(type, content) {
  try {
    localStorage.setItem('whitepaper-' + type, JSON.stringify(content));
  } catch(e) {}
}

function addWpItemRow() {

function addWpCardRow() {
  var container = document.getElementById('wpCardEditor');

function saveWhitepaperEdit(type) {
  var items = [];
  var itemEls = document.querySelectorAll('#wpItemEditor > div');
  itemEls.forEach(function(el) {
    var time = el.querySelector('[data-role="wp-item-time"]').value.trim();
    var content = el.querySelector('[data-role="wp-item-content"]').value.trim();
    if (time && content) items.push({time: time, content: content});
  });
  var cards = [];
  var cardEls = document.querySelectorAll('#wpCardEditor > div');
  cardEls.forEach(function(el) {
    var icon = el.querySelector('[data-role="wp-card-icon"]').value.trim() || '📌';
    var title = el.querySelector('[data-role="wp-card-title"]').value.trim();
    var desc = el.querySelector('[data-role="wp-card-desc"]').value.trim();
    if (title && desc) cards.push({icon: icon, title: title, desc: desc});
  });
  if (items.length === 0) { showMsg('至少需要1条时间线'); return; }
  if (cards.length === 0) { showMsg('至少需要1个关键举措'); return; }
  saveWhitepaperContent(type, {items: items, cards: cards});
  closeWhitepaperEditModal();
  refresh();
  showMsg('保存成功');
}

function resetWhitepaper(type) {
  localStorage.removeItem('whitepaper-' + type);
  refresh();
  showMsg('已恢复为默认内容');
}

function closeWhitepaperEditModal() {
  var modal = document.getElementById('whitepaperEditModal');
  if (modal) modal.remove();
}

function saveCultureEdit(type) {
  var container = document.getElementById('cultureEditArea');
  if (!container) return;
  var rows = container.children;
  var result = [];
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    if (type === 'culture-slogan') {
      var slogan = row.querySelector('[data-role="c-slogan"]').value.trim();
      var desc = row.querySelector('[data-role="c-desc"]').value.trim();
      if (slogan) result.push({slogan: slogan, desc: desc || ''});
    } else if (type === 'culture-contest') {
      var name = row.querySelector('[data-role="c-name"]').value.trim();
      var time = row.querySelector('[data-role="c-time"]').value.trim();
      var target = row.querySelector('[data-role="c-target"]').value.trim();
      var status = row.querySelector('[data-role="c-status"]').value;
      var detail = row.querySelector('[data-role="c-detail"]').value.trim();
      if (name && time) result.push({name: name, time: time, target: target, status: status, desc: detail});
    } else if (type === 'culture-teambuild') {
      var name2 = row.querySelector('[data-role="c-name"]').value.trim();
      var time2 = row.querySelector('[data-role="c-time"]').value.trim();
      var place = row.querySelector('[data-role="c-place"]').value.trim();
      var people = parseInt(row.querySelector('[data-role="c-people"]').value) || 0;
      var status2 = row.querySelector('[data-role="c-status"]').value;
      var detail2 = row.querySelector('[data-role="c-detail"]').value.trim();
      if (name2 && time2) result.push({name: name2, time: time2, place: place, people: people, status: status2, desc: detail2});
    } else {
      var quote = row.querySelector('[data-role="c-quote"]').value.trim();
      var author = row.querySelector('[data-role="c-author"]').value.trim();
      if (quote) result.push({quote: quote, author: author || '佚名'});
    }
  }
  if (result.length === 0) { showMsg('至少需要1条记录'); return; }
  saveCultureContent(type, result);
  document.getElementById('cultureEditModal').remove();
  refresh();
  showMsg('保存成功');
}

function resetCulturePage(type) {
  localStorage.removeItem('culture-' + type);
  refresh();
  showMsg('已恢复为默认内容');
}

function initCharts() {
  try {
    // 销毁旧图表
    Object.keys(chartInstances).forEach(function(key) {
      try {
        if (chartInstances[key] && typeof chartInstances[key].destroy === 'function') {
          chartInstances[key].destroy();
        }
      } catch(e) {}
    });
    chartInstances = {};
    
    if (curPage === 'home') {
      initHomeCharts();
      return;
    }
    
    // 数据看板
    if (curPage === 'dash-work') {
      initDashWorkCharts();
      return;
    }
    if (curPage === 'dash-overview') {
      initDashOverviewCharts();
      return;
    }
    if (curPage === 'dash-task-rate') {
      initTaskRateCharts();
      return;
    }
    if (curPage === 'equip-status' || curPage === 'dash-equip') {
      initEquipStatusCharts();
      return;
    }
    if (curPage === 'equip-fault') {
      initEquipFaultCharts();
      return;
    }
    if (curPage === 'dash-attendance') {
      // 图表由loadAttendanceData在数据加载完成后初始化，此处不重复调用
      return;
    }
    
    // 日报统计
    if (curPage === 'daily-stats') {
      initDailyStatsCharts();
      return;
    }
    
    // 改善统计
    if (curPage === 'improve-by-dept' || curPage === 'improve-by-person' || curPage === 'improve-stats') {
      initImproveCharts();
      return;
    }
    
    // 战略规划
    if (curPage === 'summary-equip' || curPage === 'summary-smart' || curPage === 'summary-manage' || curPage === 'summary-improve' || curPage === 'strategy-2025') {
      initStrategySummaryCharts();
      return;
    }
    if (curPage === 'kpi-downtime' || curPage === 'kpi-alarm' || curPage === 'kpi-scrap' || curPage === 'kpi-energy' || curPage === 'kpi-safety' || curPage === 'kpi-contract' || curPage === 'strategy-2026') {
      initKpiCharts();
      return;
    }
    if (curPage === 'track-kpi' || curPage === 'strategy-track') {
      initTrackKpiCharts();
      return;
    }
  } catch(e) { console.error('initCharts error:', e); }
}

function renderModuleRegisterPage() {

  h += '<div class="status-bar info">填写模块信息并注册到系统。注册后模块将自动出现在侧边栏菜单中。</div>';

  h += '<div class="form-field"><label>父菜单ID（可选，挂在哪个菜单下）</label><input id="mod_parent" placeholder="例如: config（留空则为顶级菜单）"></div>';

function doRegisterModule() {
  var id = document.getElementById('mod_id').value.trim();
  var name = document.getElementById('mod_name').value.trim();
  var icon = document.getElementById('mod_icon').value.trim() || '📦';
  var version = document.getElementById('mod_version').value.trim() || '1.0';
  var parentId = document.getElementById('mod_parent').value.trim();
  if (!id || !name) { showToast('模块ID和名称不能为空', 'warn'); return; }
  if (!/^[a-zA-Z0-9_-]+$/.test(id)) { showToast('模块ID只能包含英文、数字、横线和下划线', 'warn'); return; }
  // Check if already exists
  var existing = MODULE_REGISTRY.find(function(m){ return m.id === id; });
  if (existing) { showToast('模块ID "' + id + '" 已存在', 'warn'); return; }
  registerModule({id:id, name:name, icon:icon, version:version, parentId:parentId || null, enabled:true, builtIn:false});
}

function manualPush(type) {
  var groups = lsGet('push_groups', []);
  var targetGroup = null;
  for (var i = 0; i < groups.length; i++) {
    if (groups[i].enabled && groups[i].webhookUrl) { targetGroup = groups[i]; break; }
  }
  if (!targetGroup) { showToast('没有已启用的推送群组，请先在推送管理中配置', 'error'); return; }
  
  var projects = getAllProjects();
  var content = '';
  
  if (type === 'project_summary') {
    content = '\ud83d\udcca 智能制造专项进度汇总\n';
    content += '\ud83d\udcc5 更新时间：' + new Date().toLocaleString('zh-CN') + '\n\n';
    var totalProgress = 0;
    for (var i = 0; i < projects.length; i++) {
      var p = projects[i];
      totalProgress += (p.progress || 0);
      var icon = (p.progress || 0) >= 100 ? '\u2705' : (p.progress || 0) >= 80 ? '\ud83d\udfe1' : (p.progress || 0) >= 50 ? '\ud83d\udd35' : '\ud83d\udd34';
      content += icon + ' ' + (p.name || '') + ' - ' + (p.progress || 0) + '% (' + (p.manager || '') + ')\n';
    }
    content += '\n\ud83d\udcc8 整体平均进度：' + (projects.length > 0 ? (totalProgress / projects.length).toFixed(1) : 0) + '%';
  } else if (type === 'project_detail') {
    content = '\ud83d\udccb 智能制造专项详情\n';
    content += '\ud83d\udcc5 ' + new Date().toLocaleString('zh-CN') + '\n\n';
    for (var i = 0; i < projects.length; i++) {
      var p = projects[i];
      content += '\u2501\u2501\u2501 ' + (p.name || '') + ' \u2501\u2501\u2501\n';
      content += '\u8d1f\u8d23\u4eba\uff1a' + (p.manager || '') + (p.leadType ? '(' + p.leadType + ')' : '') + '\n';
      content += '\u8fdb\u5ea6\uff1a' + (p.progress || 0) + '% | \u72b6\u6001\uff1a' + (p.status || '') + '\n';
      content += '\u63cf\u8ff0\uff1a' + ((p.description || '').substring(0, 80)) + '\n';
      if (p.nextPlan) { var lines = (p.nextPlan || '').split('\n'); content += '\u540e\u7eed\u8ba1\u5212\uff1a' + lines[0] + '\n'; }
      if (p.risks) { var rlines = (p.risks || '').split('\n'); content += '\u98ce\u9669\uff1a' + rlines[0] + '\n'; }
      content += '\n';
    }
  } else if (type === 'risk_alert') {
    content = '\u26a0\ufe0f 风险预警通知\n';
    content += '\ud83d\udcc5 ' + new Date().toLocaleString('zh-CN') + '\n\n';
    var hasRisk = false;
    for (var i = 0; i < projects.length; i++) {
      var p = projects[i];
      if (p.risks && (p.progress || 0) < 80) {
        hasRisk = true;
        content += '\ud83d\udd34 ' + (p.name || '') + '（进度' + (p.progress || 0) + '%）\n';
        content += '   负责人：' + (p.manager || '') + '\n';
        content += '   风险：' + ((p.risks || '').substring(0, 100)) + '\n\n';
      }
    }
    if (!hasRisk) content += '\u2705 当前无低进度高风险项目';
  } else if (type === 'daily_report') {
    content = '\ud83d\udcdd 智能制造工作日报\n';
    content += '\ud83d\udcc5 ' + new Date().toLocaleDateString('zh-CN') + '\n\n';
    content += '【项目进度】\n';
    for (var i = 0; i < projects.length; i++) {
      var p = projects[i];
      if ((p.status || '') === '进行中') {
        content += '\u2022 ' + (p.name || '') + '：' + (p.progress || 0) + '%（' + (p.manager || '') + '）\n';
      }
    }
    content += '\n【低进度预警】\n';
    for (var i = 0; i < projects.length; i++) {
      var p = projects[i];
      if ((p.progress || 0) < 70 && (p.status || '') === '进行中') {
        content += '\u26a0\ufe0f ' + (p.name || '') + '：' + (p.progress || 0) + '%\n';
      }
    }
    content += '\n由智能制造管理平台自动生成';
  }
  
  showToast('正在推送...');
  var payload = {msg_type: 'text', content: {text: content}};
  fetch(targetGroup.webhookUrl, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r){return r.json()}).then(function(j){
    if (j.code === 0) showToast('推送成功！已发送到 "' + targetGroup.name + '"');
    else showToast('推送失败: ' + (j.msg || '未知错误'), 'error');
  }).catch(function(e){showToast('推送失败: ' + e.message, 'error')});
}

// 推送类型定义
var PUSH_TYPES = {
  daily:    {label:'日报推送', icon:'📃', desc:'日报提交时推送到关联群组'},
  weekly:   {label:'周报推送', icon:'📅', desc:'周报提交时推送到关联群组'},
  monthly:  {label:'月报推送', icon:'📆', desc:'月报提交时推送到关联群组'},
  project:  {label:'项目推送', icon:'📊', desc:'项目进度更新时推送到关联群组'},
  improve:  {label:'改善推送', icon:'💡', desc:'改善提案提交时推送到关联群组'},
  equipment:{label:'设备推送', icon:'🔧', desc:'设备故障/保养时推送到关联群组'},
  task:     {label:'任务推送', icon:'✅', desc:'任务状态变更时推送到关联群组'},
  message:  {label:'消息推送', icon:'📢', desc:'自定义消息推送到关联群组'},
  alarm:    {label:'报警推送', icon:'🚨', desc:'设备报警/异常时推送到关联群组'}
};

// ---- 统一群组管理 ----
function getPushGroups() {
  var raw = localStorage.getItem('push_groups');
  if (!raw || raw === '[]') {
    // 迁移旧数据：合并 webhooks + push_groups(旧)
    var oldWebhooks = JSON.parse(localStorage.getItem('webhooks') || '[]');
    var oldPushGroups = JSON.parse(localStorage.getItem('push_groups') || '[]');
    var migrated = [];
    var seen = {};
    // 先从旧push_groups迁移
    oldPushGroups.forEach(function(g) {
      var id = g.id || ('pg_' + Date.now() + '_' + Math.random().toString(36).slice(2,6));
      var url = g.webhookUrl || g.webhook || '';
      if (url && !seen[url]) {
        seen[url] = true;
        migrated.push({
          id: id, name: g.name || '未命名群组', webhookUrl: url,
          enabled: g.enabled !== false, desc: g.desc || '',
          types: g.types || Object.keys(PUSH_TYPES),
          createdAt: new Date().toISOString().slice(0,10)
        });
      }
    });
    // 再从旧webhooks迁移
    oldWebhooks.forEach(function(w) {
      if (w.url && !seen[w.url]) {
        seen[w.url] = true;
        migrated.push({
          id: w.id || ('pg_' + Date.now() + '_' + Math.random().toString(36).slice(2,6)),
          name: w.name || '未命名群组', webhookUrl: w.url,
          enabled: true, desc: '',
          types: Object.keys(PUSH_TYPES),
          createdAt: new Date().toISOString().slice(0,10)
        });
      }
    });
    if (migrated.length > 0) {
      localStorage.setItem('push_groups', JSON.stringify(migrated));
      return migrated;
    }
    return [];
  }
  return JSON.parse(raw);
}

function savePushGroups(groups) {
  localStorage.setItem('push_groups', JSON.stringify(groups));
}

// ---- 推送关联配置（每种推送类型关联哪些群组）----
function getPushBindings() {
  var raw = localStorage.getItem('push_bindings');
  if (!raw) {
    // 默认：所有类型关联所有启用的群组
    var groups = getPushGroups();
    var enabledIds = groups.filter(function(g){return g.enabled;}).map(function(g){return g.id;});
    var bindings = {};
    Object.keys(PUSH_TYPES).forEach(function(type) {
      bindings[type] = enabledIds.slice();
    });
    return bindings;
  }
  return JSON.parse(raw);
}

function savePushBindings(bindings) {
  localStorage.setItem('push_bindings', JSON.stringify(bindings));
}

function savePushHistory(history) {

// ---- 统一推送入口函数 ----
async function sendToPushGroup(type, options) {
  options = options || {};
  var groups = [];

  // 获取目标群组
  if (options.groupIds && options.groupIds.length > 0) {
    var allGroups = getPushGroups();
    groups = allGroups.filter(function(g) {
      return options.groupIds.indexOf(g.id) !== -1 && g.enabled && g.webhookUrl;
    });
  } else {
    // 从关联配置中获取
    var bindings = getPushBindings();
    var groupIds = bindings[type] || [];
    var allGroups2 = getPushGroups();
    groups = allGroups2.filter(function(g) {
      return groupIds.indexOf(g.id) !== -1 && g.enabled && g.webhookUrl;
    });
  }

  if (groups.length === 0) {
    showToast('没有可用的推送群组，请先在推送中心配置群组关联', 'error');
    return { success: 0, failed: 0, total: 0 };
  }

  // 构建卡片（统一使用 card 格式，符合飞书硬约束）
  var card = options.card || buildPushCard(type, options);

  // 逐个发送
  var success = 0, failed = 0;
  var results = [];

  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    try {
      var response = await fetch(g.webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ msg_type: 'interactive', card: card })
      });
      var result = await response.json();
      if (result.code === 0) {
        success++;
        results.push({ groupId: g.id, groupName: g.name, status: 'success' });
      } else {
        failed++;
        results.push({ groupId: g.id, groupName: g.name, status: 'failed', error: result.msg || 'unknown' });
      }
    } catch(e) {
      failed++;
      results.push({ groupId: g.id, groupName: g.name, status: 'failed', error: e.message });
    }
  }

  // 记录历史
  var history = getPushHistory();
  history.unshift({
    id: 'PH' + Date.now(),
    time: new Date().toISOString().slice(0,19).replace('T',' '),
    type: type,
    groupIds: groups.map(function(gg){return gg.id;}),
    groupNames: groups.map(function(gg){return gg.name;}).join(', '),
    title: options.title || (PUSH_TYPES[type] ? PUSH_TYPES[type].label : '推送'),
    status: failed === 0 ? 'success' : (success === 0 ? 'failed' : 'partial'),
    detail: '成功:' + success + ',失败:' + failed,
    content: (options.content || '').substring(0,200),
    results: results
  });
  savePushHistory(history);

  // 提示
  if (failed === 0) {
    showToast('推送成功：已发送到 ' + success + ' 个群组');
  } else if (success === 0) {
    showToast('推送失败：' + failed + ' 个群组发送失败', 'error');
  } else {
    showToast('部分成功：成功 ' + success + ' 个，失败 ' + failed + ' 个');
  }

  return { success: success, failed: failed, total: groups.length };
}

// 构建飞书交互卡片
function buildPushCard(type, options) {
  var typeInfo = PUSH_TYPES[type] || PUSH_TYPES.message;
  var title = options.title || typeInfo.label;
  var content = options.content || '';
  var elements = [];
  if (content) {
    elements.push({ tag: 'div', text: { tag: 'lark_md', content: content } });
  }
  if (options.fields && options.fields.length > 0) {
    var colElements = options.fields.map(function(f) {
      return { tag: 'div', text: { tag: 'lark_md', content: '**' + f.label + '**\n' + f.value } };
    });
    elements.push({ tag: 'column_set', flex_mode: 'bisect', columns: colElements.length === 1 ? [{width:'weighted',weight:1,elements:colElements}] : [{width:'weighted',weight:1,elements:colElements.slice(0,Math.ceil(colElements.length/2))},{width:'weighted',weight:1,elements:colElements.slice(Math.ceil(colElements.length/2))}] });
  }
  elements.push({ tag: 'hr' });
  elements.push({ tag: 'note', elements: [{ tag: 'plain_text', content: '智能制造组管理平台 V18 · ' + new Date().toISOString().slice(0,10) + ' ' + new Date().toISOString().slice(11,16) }] });
  return {

// ---- 推送中心页面 ----

  h += '</div>';

  // Tab 切换
  h += '<div style="display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border)">';
  var tabs = [
    {id:'groups', label:'群组管理', icon:'👥'},
    {id:'bindings', label:'推送关联', icon:'🔗'},
    {id:'templates', label:'模板管理', icon:'📋'},
    {id:'history', label:'推送历史', icon:'📊'}
  ];
  tabs.forEach(function(t) {
    var active = tab === t.id;
    h += '<button class="btn ' + (active ? 'bp' : 'bo') + '" style="border-radius:6px 6px 0 0;border-bottom:2px solid ' + (active ? 'var(--blue)' : 'transparent') + ';margin-bottom:-2px" onclick="switchPushTab(\'' + t.id + '\')">' + t.icon + ' ' + t.label + '</button>';
  });
  h += '</div>';

  // Tab 内容
  if (tab === 'groups') h += renderPushCenterGroups(groups);
  else if (tab === 'bindings') h += renderPushCenterBindings(bindings, groups);
  else if (tab === 'templates') h += renderPushCenterTemplates(templates);
  else if (tab === 'history') h += renderPushCenterHistory(history);

  h += '</div>';
  return h;
}

function switchPushTab(tab) {

function savePushGroupV2(id) {
  var name = document.getElementById('pg_name').value.trim();
  var url = document.getElementById('pg_url').value.trim();
  var desc = document.getElementById('pg_desc').value.trim();
  var enabled = document.getElementById('pg_enabled').checked;
  var types = [];
  Object.keys(PUSH_TYPES).forEach(function(t) {
    var cb = document.getElementById('pg_type_' + t);
    if (cb && cb.checked) types.push(t);
  });
  if (!name) { showToast('请输入群组名称', 'error'); return; }
  if (!url) { showToast('请输入Webhook地址', 'error'); return; }
  if (url.indexOf('open.feishu.cn/open-apis/bot/v2/hook/') === -1 && url.indexOf('open.larksuite.com') === -1) {
    if (!confirm('Webhook地址格式可能不正确，确定保存？')) return;
  }
  var groups = getPushGroups();
  if (id) {
    var idx = groups.findIndex(function(g){return g.id===id;});
    if (idx !== -1) {
      groups[idx].name = name; groups[idx].webhookUrl = url;
      groups[idx].desc = desc; groups[idx].enabled = enabled;
      groups[idx].types = types;
    }
  } else {
    groups.push({id:'pg_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), name:name, webhookUrl:url, enabled:enabled, desc:desc, types:types, createdAt:new Date().toISOString().slice(0,10)});
  }
  savePushGroups(groups);
  closePushGroupModal();
  showToast('保存成功');
  document.querySelector('.page-enter').outerHTML = renderPushCenter();
}

function deletePushGroupV2(id) {
  if (!confirm('确定删除此群组？关联的推送类型将不再推送到此群组。')) return;
  var groups = getPushGroups();
  groups = groups.filter(function(g){return g.id!==id;});
  savePushGroups(groups);
  // 同时从关联配置中移除
  var bindings = getPushBindings();
  Object.keys(bindings).forEach(function(type) {
    bindings[type] = (bindings[type]||[]).filter(function(gid){return gid!==id;});
  });
  savePushBindings(bindings);
  showToast('已删除');
  document.querySelector('.page-enter').outerHTML = renderPushCenter();
}

async function testPushGroupV2(id) {
  var groups = getPushGroups();
  var g = groups.find(function(x){return x.id===id;});
  if (!g || !g.webhookUrl) { showToast('群组配置无效', 'error'); return; }
  showToast('正在发送测试消息...');
  try {
    var card = buildPushCard('message', {
      title: '推送测试 - 群组"' + g.name + '"',
      content: '✅ 这是一条测试消息，确认群组Webhook配置正常。\n\n**群组名称：**' + g.name + '\n**Webhook地址：**' + g.webhookUrl.substring(0,40) + '...'
    });
    var response = await fetch(g.webhookUrl, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({msg_type:'interactive', card:card})
    });
    var result = await response.json();
    if (result.code === 0) showToast('测试消息发送成功');
    else showToast('发送失败: ' + (result.msg||'未知错误'), 'error');
  } catch(e) {
    showToast('发送失败: ' + e.message, 'error');
  }
}

      h += (g.enabled !== false ? '' : '🚫 ') + g.name;

  });

function togglePushBinding(type, groupId) {
  var bindings = getPushBindings();
  if (!bindings[type]) bindings[type] = [];
  var idx = bindings[type].indexOf(groupId);
  if (idx === -1) bindings[type].push(groupId);
  else bindings[type].splice(idx, 1);
  savePushBindings(bindings);
  document.querySelector('.page-enter').outerHTML = renderPushCenter();
}

function syncFeishuBitableData(source) {
  return new Promise(function(resolve) {
    var token = lsGet('feishu_personal_base_token', '');
    if (!token || token === 'YOUR_FEISHU_TOKEN_HERE') {
      resolve({success: false, error: '未配置飞书PersonalBaseToken', count: 0});
      return;
    }
    var tableMappings = lsGet('feishu_table_mappings', {});
    var mapping = tableMappings[source];
    if (!mapping || !mapping.appToken || !mapping.tableId) {
      resolve({success: false, error: '未配置多维表格映射: ' + source, count: 0});
      return;
    }
    var url = 'https://open.feishu.cn/open-apis/bitable/v1/apps/' + mapping.appToken + '/tables/' + mapping.tableId + '/records';
    fetch(url, {method:'GET', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}})
    .then(function(res){return res.json()})
    .then(function(data) {
      if (data.code === 0 && data.data && data.data.items) {
        var records = data.data.items;
        var localKey = source.replace('_bitable', '');
        if (localKey === 'daily') localKey = 'local_daily';
        else if (localKey === 'weekly') localKey = 'local_weekly';
        else if (localKey === 'monthly') localKey = 'local_monthly';
        else if (localKey === 'equip') localKey = 'local_equips';
        else if (localKey === 'improve') localKey = 'local_improves';
        var existing = lsGet(localKey, []);
        var idMap = {};
        existing.forEach(function(r){idMap[r.id||r.record_id]=r;});
        records.forEach(function(fr){
          var fid = fr.record_id || fr.id;
          if(idMap[fid]){Object.keys(fr.fields||{}).forEach(function(k){idMap[fid][k]=fr.fields[k]});idMap[fid]._synced=new Date().toISOString();}
          else{var newItem=Object.assign({id:fid},fr.fields||{});newItem._synced=new Date().toISOString();existing.push(newItem);}
        });
        lsSet(localKey, existing);
        resolve({success:true, count:records.length, source:source});
      } else {
        resolve({success:false, error:data.msg||'飞书API返回错误', count:0});
      }
    })
    .catch(function(e){resolve({success:false, error:e.message, count:0})});
  });
}

(function SERVER_DATA_RESTORE(){
  // V18.5: 页面加载时，优先从服务器拉取全量数据覆盖localStorage，确保多终端一致
  setTimeout(function(){
    if(typeof SERVER_URL==='undefined'||!SERVER_URL)return;
    console.log('[restore] 开始从服务器恢复数据...');
    // 1. 先将本地数据上传到服务器（保存本地最新修改）
    (function(){
      var items=[];
      for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);var v=localStorage.getItem(k);if(v&&v.length>2)items.push({key:k,value:v});}
      if(items.length>2){
        fetch(SERVER_URL+'/api/localstorage/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:items})}).catch(function(){});
      }
    })();
    // 2. 从服务器下载数据，直接覆盖localStorage（确保多终端一致）
    fetch(SERVER_URL+'/api/localstorage/sync',{method:'GET'}).then(function(r){return r.json()}).then(function(res){
      if(!res||!res.data)return;
      var count=0;
      Object.keys(res.data).forEach(function(key){
        var sv=res.data[key];
        if(sv && sv!=='null' && sv!=='undefined'){
          try{JSON.parse(sv);localStorage.setItem(key, sv);count++;}catch(e){}
        }
      });
      console.log('[restore] 从服务器恢复了 '+count+' 条数据');
      try{refresh();}catch(e){}
    }).catch(function(e){
      console.log('[restore] 从服务器恢复数据失败，使用本地数据:', e.message);
    });
    // 3. 连接WebSocket实时同步
    connectRealtimeSync();
  }, 800);
})();

// ========== V18.5 实时同步 - WebSocket连接 ==========
function connectRealtimeSync(){
  if(typeof SERVER_URL==='undefined'||!SERVER_URL)return;
  var wsUrl = SERVER_URL.replace(/^http/, 'ws');
  try{
    var ws = new WebSocket(wsUrl);
    var reconnectTimer = null;
    var heartbeatTimer = null;
    ws.onopen = function(){
      console.log('[ws] 实时同步已连接');
      heartbeatTimer = setInterval(function(){
        try{ws.send(JSON.stringify({type:'ping'}));}catch(e){}
      }, 30000);
    };
    ws.onmessage = function(evt){
      try{
        var msg = JSON.parse(evt.data);
        if(msg.type === 'pong') return;
        console.log('[ws] 收到变更通知:', msg.type);
        if(msg.type === 'sync' || msg.type === 'data-update' || msg.type === 'push-groups-update' || msg.type === 'config-update'){
          fetch(SERVER_URL+'/api/localstorage/sync',{method:'GET'}).then(function(r){return r.json()}).then(function(res){
            if(!res||!res.data)return;
            Object.keys(res.data).forEach(function(key){
              var sv=res.data[key];
              if(sv && sv!=='null' && sv!=='undefined'){
                try{JSON.parse(sv);localStorage.setItem(key, sv);}catch(e){}
              }
            });
            try{refresh();}catch(e){}
          }).catch(function(){});
        }
      }catch(e){}
    };
    ws.onclose = function(){
      console.log('[ws] 连接断开，5秒后重连');
      clearInterval(heartbeatTimer);
      reconnectTimer = setTimeout(connectRealtimeSync, 5000);
    };
    ws.onerror = function(){ws.close();};
  }catch(e){
    console.log('[ws] WebSocket不可用:', e.message);
  }
}

// ========== 数据防护机制 ==========
(function dataProtection(){
  var CRITICAL_KEYS = ['local_tasks','local_daily','local_projects','local_equips','local_improves','local_docs','local_scripts','local_maintains','local_repairs','local_autotasks','local_weekly','local_monthly','local_equip_accepts','local_spares','local_member_applies','people_obj','members','push_groups','msg_templates'];
  var lastChecksum = '';

  function getLsChecksum(){
    var s = '';
    for(var i=0;i<localStorage.length;i++){
      var k = localStorage.key(i);
      if(k && k.indexOf('v9_')===0){ s += k + ':' + localStorage.getItem(k) + ';'; }
    }
    return s;
  }

  function syncAllToServer(){
    if(SERVER_CONFIG.mode !== 'online') return;
    try{
      var items = [];
      for(var i=0;i<localStorage.length;i++){
        var k = localStorage.key(i);
        var v = localStorage.getItem(k);
        if(v && v.length > 2) items.push({key:k,value:v});
      }
      if(items.length <= 5) return;
      fetch(SERVER_CONFIG.url + '/api/localstorage/sync', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({items:items})
      }).catch(function(){});
    }catch(e){}
  }

  // 1. 每次操作后自动同步已在 lsSet 中实现

  // 2. 定时自动保存（每30秒）
  setInterval(function(){
    var checksum = getLsChecksum();
    if(checksum !== lastChecksum){
      lastChecksum = checksum;
      syncAllToServer();
    }
  }, 30000);

  // 3. 页面关闭/刷新前静默同步到服务器（不弹窗、不下载文件）
  window.addEventListener('beforeunload', function(){
    try{
      // 触发一次服务器同步（fetch with keepalive 确保页面关闭前尽力发送）
      if(typeof syncAllToServer === 'function'){ syncAllToServer(); }
    }catch(e){}
  });

  // 4. 页面打开时强制全量同步（约2秒后）
  setTimeout(function(){
    syncAllToServer();
  }, 2000);
})();
