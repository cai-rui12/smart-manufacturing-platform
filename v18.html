function editRepair(id) {
  try {
    var all = getAllRepairs();
    var r = all.find(function(x){ return x.id === id; });
    if (!r) return;
    var peopleNames = PEOPLE_OBJ.filter(function(p){return p.dept==='智能制造组' || p.dept==='机电设备组';}).map(function(p){return p.name;});
    submitFormModal({
      title: '编辑维修单 - ' + id,
      fields: [
        {key:'equipName', label:'设备名称', type:'text', value:r.equipName, required:true},
        {key:'faultDesc', label:'故障描述', type:'textarea', rows:3, value:r.faultDesc || '', required:true},
        {key:'reporter', label:'报修人', type:'text', value:r.reporter},
        {key:'reportTime', label:'报修时间', type:'text', value:r.reportTime},
        {key:'status', label:'状态', type:'select', options:['待执行','进行中','已完成','已取消'], value:r.status},
        {key:'handler', label:'处理人', type:'select', options:peopleNames, value:r.handler || ''},
        {key:'handleTime', label:'处理时间', type:'text', value:r.handleTime || ''},
        {key:'solution', label:'解决方案', type:'textarea', rows:3, value:r.solution || ''},
        {key:'cost', label:'维修费用(元)', type:'number', value:r.cost || 0}
      ],
      onSave: function(data) {
        var local = lsGet('local_repairs', []);
        var idx = local.findIndex(function(x){ return x.id === id; });
        data.id = id;
        data.equipNo = r.equipNo;
        if (idx >= 0) local[idx] = data;
        else local.push(data);
        saveLocalRepairs(local);
        saveData('repairs', local);
      },
      onAfter: function() { refresh(); openRepairDetail(id); }
    });
  } catch(e) { showToast('编辑维修失败: ' + e.message, 'error'); }
}

function deleteRepair(id) {
  try {
    if (!confirm('确定删除此维修记录？')) return;
    var local = lsGet('local_repairs', []);
    local = local.filter(function(x){ return x.id !== id; });
    saveLocalRepairs(local);
    saveData('repairs', local);
    closeMo();
    refresh();
  } catch(e) { showToast('删除维修失败: ' + e.message, 'error'); }
}

function createEquip() {
  var today = new Date().toISOString().slice(0,10);
  submitFormModal({
    title: '新增设备',
    showSaveAndNew: true,
    fields: [
      {key:'equipNo', label:'设备编号', type:'text', required:true, placeholder:'如 EQ-XXX-001'},
      {key:'name', label:'设备名称', type:'text', required:true},
      {key:'process', label:'所属工序', type:'select', options:['智能物流','电镀','沉铜','阻焊','沉金','内层','外层','层压','钻孔','去毛刺','蚀刻','棕化'], value:'智能物流'},
      {key:'status', label:'设备状态', type:'select', options:['运行中','保养中','故障','停机','待验收'], value:'运行中'},
      {key:'installDate', label:'安装日期', type:'date', value:today},
      {key:'group', label:'所属班组', type:'select', options:['智能制造组','机电设备组','电子设备组','保养组'], value:'智能制造组'},
      {key:'location', label:'安装位置', type:'text', placeholder:'如 二楼车间A区'}
    ],
    onSave: function(data) {
      var all = getAllEquips();
      var maxNum = 0;
      all.forEach(function(e) {
        var m = String(e.id).match(/E(\d+)/);
        if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
      });
      data.id = 'E' + String(maxNum + 1).padStart(3, '0');
      var local = lsGet('local_equips', []);
      local.push(data);
      saveLocalEquips(local);
      saveData('equipments', local); // V13 - 实时同步后端
    },
    onAfter: function() { refresh(); }
  });
}

function editEquip(id) {
  var all = getAllEquips();
  var e = all.find(function(x){ return x.id === id; });
  if (!e) return;
  submitFormModal({
    title: '编辑设备 - ' + e.equipNo,
    fields: [
      {key:'equipNo', label:'设备编号', type:'text', value:e.equipNo, required:true},
      {key:'name', label:'设备名称', type:'text', value:e.name, required:true},
      {key:'process', label:'所属工序', type:'select', options:['智能物流','电镀','沉铜','阻焊','沉金','内层','外层','层压','钻孔','去毛刺','蚀刻','棕化'], value:e.process},
      {key:'status', label:'设备状态', type:'select', options:['运行中','保养中','故障','停机','待验收'], value:e.status},
      {key:'installDate', label:'安装日期', type:'date', value:e.installDate},
      {key:'group', label:'所属班组', type:'select', options:['智能制造组','机电设备组','电子设备组','保养组'], value:e.group},
      {key:'location', label:'安装位置', type:'text', value:e.location || ''}
    ],
    onSave: function(data) {
      var local = lsGet('local_equips', []);
      var idx = local.findIndex(function(x){ return x.id === id; });
      data.id = id;
      if (idx >= 0) local[idx] = data;
      else local.push(data);
      saveLocalEquips(local);
      saveData('equipments', local); // V13 - 实时同步后端
    },
    onAfter: function() { refresh(); openEquipDetail(id); }
  });
}

function deleteEquip(id) {
  if (!confirm('确定删除此设备？')) return;
  var local = lsGet('local_equips', []);
  local = local.filter(function(x){ return x.id !== id; });
  saveLocalEquips(local);
  saveData('equipments', local); // V13 - 实时同步后端
  closeMo();
  refresh();
}

  var all = getAllEquips();
  var processes = {};
  all.forEach(function(e) {
    if (!processes[e.process]) processes[e.process] = [];
    processes[e.process].push(e);
  });
  var h = '<div class="page-enter">';
  h += '<div class="pt">🔧 按工序分类 <span class="bdg">' + Object.keys(processes).length + ' 个工序</span></div>';
  h += '<div class="kpi-row">';
  Object.keys(processes).forEach(function(p) {
    h += '<div class="kpi-card" onclick="filterEquipByProcess(\'' + p + '\')"><div class="kpi-value">' + processes[p].length + '</div><div class="kpi-label">' + p + '</div></div>';
  });
  h += '</div>';
  Object.keys(processes).forEach(function(p) {
    h += '<div class="cd">';
    h += '<div class="ct">' + p + ' <span class="bdg">' + processes[p].length + ' 台</span></div>';
    h += '<table class="dt"><thead><tr><th>设备编号</th><th>设备名称</th><th>状态</th><th>位置</th><th>操作</th></tr></thead><tbody>';
    processes[p].forEach(function(e) {
      h += '<tr><td>' + e.equipNo + '</td><td>' + e.name + '</td><td><span class="t ' + getStatusClass(e.status) + '">' + e.status + '</span></td><td>' + e.location + '</td>';
      h += '<td><button class="btn-sm bo" onclick="openEquipDetail(\'' + e.id + '\')">查看</button></td></tr>';
    });
    h += '</tbody></table></div>';
  });
  h += '</div>';
  return h;
}

function getAllEquipAccepts() { return mergeData(EQUIP_ACCEPT_DEFAULTS, 'local_equip_accepts'); }
function saveLocalEquipAccepts(arr) { lsSet('local_equip_accepts', arr); }

function renderEquipAccept(status) {
  var title = status === 'done' ? '已验收设备' : '待验收设备';
  var allEquips = getAllEquipAccepts();
  var equips = allEquips.slice();
  // 按状态筛选
  if (status === 'done') {
    equips = equips.filter(function(e){return e.status==='已验收';});
  } else {
    equips = equips.filter(function(e){return e.status==='待验收';});
  }
  // 搜索
  var search = getSearch('equipAccept');
  if (search) {
    equips = equips.filter(function(e) {
      return (e.name||'').indexOf(search) !== -1 || (e.no||'').indexOf(search) !== -1 || (e.vendor||'').indexOf(search) !== -1 || (e.inspector||'').indexOf(search) !== -1;
    });
  }
  // 结果筛选
  var resultFilter = getSearch('equipAcceptResult');
  if (resultFilter && status === 'done') {
    equips = equips.filter(function(e) { return e.result === resultFilter; });
  }
  var h = '<div class="page-enter">';
  h += '<div class="pt">✅ 设备验收 - ' + title + ' <span class="bdg">共 ' + equips.length + ' 台</span></div>';
  h += '<div class="kpi-row">';
  h += '<div class="kpi-card"><div class="kpi-value">' + allEquips.length + '</div><div class="kpi-label">验收总数</div></div>';
  h += '<div class="kpi-card"><div class="kpi-value" style="color:var(--gn)">' + allEquips.filter(function(e){return e.status==='已验收';}).length + '</div><div class="kpi-label">已验收</div></div>';
  h += '<div class="kpi-card"><div class="kpi-value" style="color:var(--or)">' + allEquips.filter(function(e){return e.status==='待验收';}).length + '</div><div class="kpi-label">待验收</div></div>';
  var passRate = allEquips.filter(function(e){return e.status==='已验收';}).length;
  h += '<div class="kpi-card"><div class="kpi-value">' + Math.round(passRate/Math.max(allEquips.length,1)*100) + '%</div><div class="kpi-label">验收率</div></div>';
  h += '</div>';
  h += '<div class="bg">';
  h += '<input class="fi" style="width:220px" placeholder="搜索设备名称/编号/供应商..." value="' + search + '" oninput="setSearch(\'equipAccept\',this.value);refresh()">';
  if (status === 'done') {
    h += '<select class="fi" style="width:130px" onchange="setSearch(\'equipAcceptResult\',this.value);refresh()">';
    h += '<option value="">全部结果</option>';
    h += '<option value="合格"' + (resultFilter==='合格'?' selected':'') + '>合格</option>';
    h += '<option value="不合格"' + (resultFilter==='不合格'?' selected':'') + '>不合格</option>';
    h += '</select>';
  }
  if (hasPermission('equip-manage','create')) {
    h += '<button class="btn bp" onclick="createEquipAccept()">&#10133; 新增验收</button>';
  }
  h += '<button class="btn bo" onclick="refresh()">&#8635; 刷新</button>';
  if (hasPermission('equip-manage','export')) {
    h += '<button class="btn bo" onclick="exportCSV(getAllEquipAccepts(), \'设备验收\')">&#128190; 导出</button>';
  }
  h += '<button class="btn bo no-print" onclick="printPage()">🖨️ 打印</button>';
  h += '</div>';
  h += '<div class="cd" style="padding:0"><div class="table-responsive"><table class="dt">';
  h += '<thead><tr><th>设备名称</th><th>设备编号</th><th>供应商</th><th>验收日期</th><th>验收人员</th><th>验收结果</th><th>状态</th><th>操作</th></tr></thead><tbody>';
  if (equips.length === 0) {
    h += '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--t3)">暂无数据</td></tr>';
  } else {
    equips.forEach(function(e) {
      h += '<tr><td>' + e.name + '</td><td>' + e.no + '</td><td>' + (e.vendor||'') + '</td><td>' + e.date + '</td>';
      h += '<td>' + (e.inspector||'-') + '</td>';
      h += '<td><span class="t ' + (e.result==='合格'?'tg':'tx') + '">' + (e.result||'-') + '</span></td>';
      h += '<td><span class="t ' + (e.status==='已验收'?'tg':'to') + '">' + e.status + '</span></td>';
      h += '<td>';
      h += '<button class="btn-sm bo" onclick="viewEquipAccept(\'' + e.id + '\')">查看</button> ';
      if (hasPermission('equip-manage','edit')) {
        h += '<button class="btn-sm bp" onclick="editEquipAccept(\'' + e.id + '\')">编辑</button> ';
        if (e.status !== '已验收') {
          h += '<button class="btn-sm bp" onclick="doEquipAccept(\'' + e.id + '\')">验收</button> ';
        }
      }
      if (hasPermission('equip-manage','del')) {
        h += '<button class="btn-sm dg" onclick="deleteEquipAccept(\'' + e.id + '\')">删除</button>';
      }
      h += '</td></tr>';
    });
  }
  h += '</tbody></table></div></div>';
  h += '</div>';
  return h;
}

function createEquipAccept() {
  var today = new Date().toISOString().slice(0,10);
  submitFormModal({
    title: '新增设备验收记录',
    showSaveAndNew: true,
    fields: [
      {key:'name', label:'设备名称', type:'text', required:true, placeholder:'请输入设备名称'},
      {key:'no', label:'设备编号', type:'text', required:true, placeholder:'请输入设备编号'},
      {key:'vendor', label:'供应商', type:'text', placeholder:'请输入供应商'},
      {key:'date', label:'验收日期', type:'date', value:today},
      {key:'inspector', label:'验收人员', type:'text', placeholder:'请输入验收人员'},
      {key:'result', label:'验收结果', type:'select', options:['合格','不合格'], value:'合格'},
      {key:'status', label:'状态', type:'select', options:['待验收','已验收'], value:'待验收'},
      {key:'remark', label:'备注', type:'textarea', rows:3, placeholder:'请输入备注信息'}
    ],
    onSave: function(data) {
      var all = getAllEquipAccepts();
      var maxNum = 0;
      all.forEach(function(e) {
        var m = String(e.id).match(/AE(\d+)/);
        if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
      });
      data.id = 'AE' + String(maxNum + 1).padStart(3, '0');
      var local = lsGet('local_equip_accepts', []);
      local.push(data);
      saveLocalEquipAccepts(local);
    },
    onAfter: function() { refresh(); }
  });
}

function viewEquipAccept(id) {
  var all = getAllEquipAccepts();
  var e = all.find(function(x){ return x.id === id; });
  if (!e) return;
  var h = '<div class="info-grid">';
  h += '<div class="info-item"><div class="ii-label">验收编号</div><div class="ii-value">' + e.id + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">设备名称</div><div class="ii-value">' + e.name + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">设备编号</div><div class="ii-value">' + e.no + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">供应商</div><div class="ii-value">' + (e.vendor||'-') + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">验收日期</div><div class="ii-value">' + e.date + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">验收人员</div><div class="ii-value">' + (e.inspector||'-') + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">验收结果</div><div class="ii-value"><span class="t ' + (e.result==='合格'?'tg':'tr') + '">' + (e.result||'-') + '</span></div></div>';
  h += '<div class="info-item"><div class="ii-label">状态</div><div class="ii-value"><span class="t ' + (e.status==='已验收'?'tg':'to') + '">' + e.status + '</span></div></div>';
  h += '</div>';
  h += '<div class="divider" style="height:1px;background:var(--br);margin:12px 0"></div>';
  h += '<div class="form-field"><label>备注</label><div style="white-space:pre-wrap;padding:8px;background:#f7f8fa;border-radius:6px;font-size:13px;line-height:1.6">' + (e.remark || '无') + '</div></div>';
  var footer = '<button class="btn bp" onclick="editEquipAccept(\'' + e.id + '\')">编辑</button>';
  if (e.status !== '已验收') {
    footer += '<button class="btn bp" onclick="doEquipAccept(\'' + e.id + '\');closeMo()">验收</button>';
  }
  footer += '<button class="btn dg" onclick="deleteEquipAccept(\'' + e.id + '\');closeMo()">删除</button>';
  openMo({title:'设备验收详情 - ' + e.name, html:h, footer:footer});
}

function editEquipAccept(id) {
  var all = getAllEquipAccepts();
  var e = all.find(function(x){ return x.id === id; });
  if (!e) return;
  submitFormModal({
    title: '编辑设备验收 - ' + id,
    fields: [
      {key:'name', label:'设备名称', type:'text', value:e.name, required:true},
      {key:'no', label:'设备编号', type:'text', value:e.no, required:true},
      {key:'vendor', label:'供应商', type:'text', value:e.vendor||''},
      {key:'date', label:'验收日期', type:'date', value:e.date},
      {key:'inspector', label:'验收人员', type:'text', value:e.inspector||''},
      {key:'result', label:'验收结果', type:'select', options:['合格','不合格'], value:e.result||'合格'},
      {key:'status', label:'状态', type:'select', options:['待验收','已验收'], value:e.status},
      {key:'remark', label:'备注', type:'textarea', rows:3, value:e.remark||''}
    ],
    onSave: function(data) {
      var local = lsGet('local_equip_accepts', []);
      var idx = local.findIndex(function(x){ return x.id === id; });
      data.id = id;
      if (idx >= 0) local[idx] = data;
      else local.push(data);
      saveLocalEquipAccepts(local);
    },
    onAfter: function() { refresh(); }
  });
}

function doEquipAccept(id) {
  var all = getAllEquipAccepts();
  var e = all.find(function(x){ return x.id === id; });
  if (!e) return;
  submitFormModal({
    title: '执行验收 - ' + e.name,
    fields: [
      {key:'inspector', label:'验收人员', type:'text', required:true, placeholder:'请输入验收人员', value:e.inspector||currentUser.name},
      {key:'result', label:'验收结果', type:'select', options:['合格','不合格'], value:'合格'},
      {key:'status', label:'状态', type:'select', options:['已验收','待验收'], value:'已验收'},
      {key:'remark', label:'验收备注', type:'textarea', rows:3, placeholder:'请输入验收备注', value:e.remark||''}
    ],
    onSave: function(data) {
      var local = lsGet('local_equip_accepts', []);
      var idx = local.findIndex(function(x){ return x.id === id; });
      var merged = Object.assign({}, e, data);
      merged.id = id;
      if (idx >= 0) local[idx] = merged;
      else local.push(merged);
      saveLocalEquipAccepts(local);
    },
    onAfter: function() { refresh(); }
  });
}

function deleteEquipAccept(id) {
  if (!confirm('确定删除此设备验收记录？')) return;
  var local = lsGet('local_equip_accepts', []);
  local = local.filter(function(x){ return x.id !== id; });
  saveLocalEquipAccepts(local);
  closeMo();
  refresh();
}

function renderSpare(kind) {
  var title = kind === 'cycle' ? '备件更换周期' : '备件库存';
  var allSpares = getAllSpares();
  var spares = allSpares.slice();
  // 搜索
  var search = getSearch('spare');
  if (search) {
    spares = spares.filter(function(s) {
      return (s.name||'').indexOf(search) !== -1 || (s.no||'').indexOf(search) !== -1 || (s.location||'').indexOf(search) !== -1;
    });
  }
  // 状态筛选
  var statusFilter = getSearch('spareStatus');
  if (statusFilter) {
    spares = spares.filter(function(s) {
      return statusFilter === '库存不足' ? s.stock < s.minStock : s.stock >= s.minStock;
    });
  }
  var h = '<div class="page-enter">';
  h += '<div class="pt">📦 ' + title + ' <span class="bdg">共 ' + allSpares.length + ' 项</span></div>';
  h += '<div class="kpi-row">';
  h += '<div class="kpi-card"><div class="kpi-value">' + allSpares.length + '</div><div class="kpi-label">备件种类</div></div>';
  h += '<div class="kpi-card"><div class="kpi-value" style="color:var(--rd)">' + allSpares.filter(function(s){return s.stock < s.minStock;}).length + '</div><div class="kpi-label">库存不足</div></div>';
  h += '<div class="kpi-card"><div class="kpi-value" style="color:var(--gn)">' + allSpares.filter(function(s){return s.stock >= s.minStock;}).length + '</div><div class="kpi-label">库存正常</div></div>';
  h += '<div class="kpi-card"><div class="kpi-value">¥' + (allSpares.reduce(function(s,p){return s+p.stock*p.price;},0)/10000).toFixed(1) + '万</div><div class="kpi-label">库存价值</div></div>';
  h += '</div>';
  h += '<div class="bg">';
  h += '<input class="fi" style="width:220px" placeholder="搜索备件名称/编号/位置..." value="' + search + '" oninput="setSearch(\'spare\',this.value);refresh()">';
  h += '<select class="fi" style="width:130px" onchange="setSearch(\'spareStatus\',this.value);refresh()">';
  h += '<option value="">全部状态</option>';
  h += '<option value="正常"' + (statusFilter==='正常'?' selected':'') + '>正常</option>';
  h += '<option value="库存不足"' + (statusFilter==='库存不足'?' selected':'') + '>库存不足</option>';
  h += '</select>';
  if (hasPermission('equip-manage','create')) {
    h += '<button class="btn bp" onclick="createSpare()">&#10133; 新增备件</button>';
  }
  h += '<button class="btn bo" onclick="refresh()">&#8635; 刷新</button>';
  if (hasPermission('equip-manage','export')) {
    h += '<button class="btn bo" onclick="exportCSV(getAllSpares(), \'备件管理\')">&#128190; 导出</button>';
  }
  h += '<button class="btn bo no-print" onclick="printPage()">🖨️ 打印</button>';
  h += '</div>';
  h += '<div class="cd" style="padding:0"><div class="table-responsive"><table class="dt">';
  h += '<thead><tr><th>备件编号</th><th>备件名称</th><th>库存数量</th><th>最低库存</th><th>单位</th><th>存放位置</th>';
  if (kind === 'cycle') h += '<th>更换周期</th>';
  h += '<th>单价</th><th>状态</th><th>操作</th></tr></thead><tbody>';
  if (spares.length === 0) {
    var cols = kind === 'cycle' ? 10 : 9;
    h += '<tr><td colspan="' + cols + '" style="text-align:center;padding:40px;color:var(--t3)">暂无数据</td></tr>';
  } else {
    spares.forEach(function(s) {
      var warn = s.stock < s.minStock;
      h += '<tr><td>' + s.no + '</td><td>' + s.name + '</td><td>' + s.stock + '</td><td>' + s.minStock + '</td><td>' + s.unit + '</td>';
      h += '<td>' + (s.location||'-') + '</td>';
      if (kind === 'cycle') h += '<td>' + s.cycle + '</td>';
      h += '<td>¥' + s.price + '</td>';
      h += '<td><span class="t ' + (warn?'tr':'tg') + '">' + (warn?'库存不足':'正常') + '</span></td>';
      h += '<td>';
      h += '<button class="btn-sm bo" onclick="viewSpare(\'' + s.id + '\')">查看</button> ';
      if (hasPermission('equip-manage','edit')) {
        h += '<button class="btn-sm bp" onclick="editSpare(\'' + s.id + '\')">编辑</button> ';
        if (warn) h += '<button class="btn-sm bp" onclick="restockSpare(\'' + s.id + '\')">补货</button> ';
      }
      if (hasPermission('equip-manage','del')) {
        h += '<button class="btn-sm dg" onclick="deleteSpare(\'' + s.id + '\')">删除</button>';
      }
      h += '</td></tr>';
    });
  }
  h += '</tbody></table></div></div>';
  h += '</div>';
  return h;
}

function createSpare() {
  submitFormModal({
    title: '新增备件',
    showSaveAndNew: true,
    fields: [
      {key:'name', label:'备件名称', type:'text', required:true, placeholder:'请输入备件名称'},
      {key:'no', label:'备件编号', type:'text', required:true, placeholder:'请输入备件编号'},
      {key:'stock', label:'库存数量', type:'number', required:true, placeholder:'0'},
      {key:'minStock', label:'最低库存', type:'number', required:true, placeholder:'0'},
      {key:'unit', label:'单位', type:'select', options:['个','条','组','支','套','根','件','片','块'], value:'个'},
      {key:'location', label:'存放位置', type:'text', placeholder:'如：A区仓库-01架'},
      {key:'cycle', label:'更换周期', type:'text', placeholder:'如：6个月'},
      {key:'price', label:'单价(元)', type:'number', placeholder:'0'},
      {key:'status', label:'状态', type:'select', options:['正常','库存不足'], value:'正常'}
    ],
    onSave: function(data) {
      data.stock = parseInt(data.stock) || 0;
      data.minStock = parseInt(data.minStock) || 0;
      data.price = parseInt(data.price) || 0;
      data.status = data.stock < data.minStock ? '库存不足' : '正常';
      var all = getAllSpares();
      var maxNum = 0;
      all.forEach(function(s) {
        var m = String(s.id).match(/SP(\d+)/);
        if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
      });
      data.id = 'SP' + String(maxNum + 1).padStart(3, '0');
      var local = lsGet('local_spares', []);
      local.push(data);
      saveLocalSpares(local);
    },
    onAfter: function() { refresh(); }
  });
}

function viewSpare(id) {

  var warn = s.stock < s.minStock;

  h += '<div class="info-item"><div class="ii-label">库存数量</div><div class="ii-value" style="color:' + (warn?'var(--rd)':'var(--gn)') + ';font-weight:700">' + s.stock + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">最低库存</div><div class="ii-value">' + s.minStock + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">存放位置</div><div class="ii-value">' + (s.location||'-') + '</div></div>';

// 改善状态流程：待提案 -> 实施中 -> 验证中 -> 已标准化（或 已驳回）
var IMPROVE_STATUS_FLOW = ['待提案','实施中','验证中','已标准化'];
var IMPROVE_STATUS_LABELS = {
  '待提案': {icon:'📋', color:'tx', desc:'改善提案已提交，等待评审启动'},
  '实施中': {icon:'🛠', color:'tb', desc:'改善方案已批准，正在实施'},
  '验证中': {icon:'🔬', color:'to', desc:'改善措施已执行，正在验证效果'},
  '已标准化': {icon:'✅', color:'tg', desc:'改善效果已确认，已纳入标准流程'},
  '已驳回': {icon:'❌', color:'tr', desc:'改善提案未通过评审'}
};

function advanceImproveStatus(id) {
  var all = getAllImproves();
  var imp = all.find(function(x){ return x.id === id; });
  if (!imp) return;
  var currentStatus = imp.status;
  var flowIdx = IMPROVE_STATUS_FLOW.indexOf(currentStatus);

  // 生成完整流程展示
  var html = '<div style="margin-bottom:16px">';
  html += '<div style="font-size:13px;font-weight:600;color:var(--t2);margin-bottom:12px">改善流程状态</div>';
  html += '<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">';
  IMPROVE_STATUS_FLOW.forEach(function(s, idx) {
    var info = IMPROVE_STATUS_LABELS[s];
    var isActive = s === currentStatus;
    var isDone = flowIdx >= 0 && idx < flowIdx;
    var borderCls = isActive ? 'border:2px solid var(--blue);background:var(--bl)' : isDone ? 'border:2px solid var(--gn);background:var(--gn-l)' : 'border:2px solid var(--br);background:var(--bg)';
    html += '<div style="padding:8px 14px;border-radius:8px;text-align:center;min-width:80px;' + borderCls + '">';
    html += '<div style="font-size:18px">' + info.icon + '</div>';
    html += '<div style="font-size:12px;font-weight:600;color:' + (isActive?'var(--blue)':isDone?'var(--gn)':'var(--t3)') + '">' + s + '</div>';
    html += '</div>';
    if (idx < IMPROVE_STATUS_FLOW.length - 1) {
      html += '<span style="color:var(--t3);font-size:16px">→</span>';
    }
  });
  html += '</div></div>';

  // 当前状态说明
  var currentInfo = IMPROVE_STATUS_LABELS[currentStatus] || {desc:''};
  html += '<div style="padding:10px 14px;background:var(--bg);border-radius:8px;margin-bottom:16px;font-size:12px;color:var(--t2)">';
  html += '<span style="font-weight:600">当前:</span> ' + currentStatus + ' - ' + currentInfo.desc + '</div>';

  // 操作按钮
  html += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
  if (flowIdx >= 0 && flowIdx < IMPROVE_STATUS_FLOW.length - 1) {
    var nextStatus = IMPROVE_STATUS_FLOW[flowIdx + 1];
    var nextInfo = IMPROVE_STATUS_LABELS[nextStatus];
    html += '<button class="btn bp" onclick="doAdvanceImproveStatus(\'' + id + '\',\'' + nextStatus + '\')">';
    html += '推进至: ' + nextStatus + ' ' + nextInfo.icon + '</button>';
  }
  if (currentStatus !== '已驳回') {
    html += '<button class="btn" style="background:var(--rd);color:#fff" onclick="doAdvanceImproveStatus(\'' + id + '\',\'已驳回\')">';
    html += '驳回提案</button>';
  }
  // 允许回退到上一阶段
  if (flowIdx > 0) {
    var prevStatus = IMPROVE_STATUS_FLOW[flowIdx - 1];
    html += '<button class="btn" style="background:var(--br3);color:var(--t)" onclick="doAdvanceImproveStatus(\'' + id + '\',\'' + prevStatus + '\')">';
    html += '回退至: ' + prevStatus + '</button>';
  }
  html += '</div>';

  openMo({title:'改善流程推进 - ' + id, html:html, footer:''});
}

function doAdvanceImproveStatus(id, newStatus) {
  var local = lsGet('local_improves', []);
  var idx = local.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) {
    var oldStatus = local[idx].status;
    local[idx].status = newStatus;
    local[idx].lastStatusChange = new Date().toISOString().slice(0,10);
    saveLocalImproves(local);
    saveData('improvements', local);
    closeMo();
    refresh();
    showToast('改善 ' + id + ' 状态: ' + oldStatus + ' -> ' + newStatus, 'success');
  }
}

function renderImproveStats(type) {
  var title = type === 'by-person' ? '按人员统计' : '按部门统计';

  var h = '<div class="page-enter">';

  h += '<div class="kpi-card"><div class="kpi-value">' + Math.round(all.filter(function(i){return i.status==='已标准化';}).length/Math.max(all.length,1)*100) + '%</div><div class="kpi-label">标准化率</div></div>';
  h += '<div class="kpi-card"><div class="kpi-value">¥' + Math.round(all.filter(function(i){return i.status==='已标准化';}).length / Math.max(all.length,1) * 12) + '万</div><div class="kpi-label">创造效益</div></div>';
  h += '</div>';
  h += '<div class="g2">';
  h += '<div class="cd"><div class="ct">改善状态分布</div><div class="ch"><canvas id="impChart1"></canvas></div></div>';
  if (type === 'by-dept') {
    h += '<div class="cd"><div class="ct">各部门改善数</div><div class="ch"><canvas id="impChart2"></canvas></div></div>';
  } else {
    h += '<div class="cd"><div class="ct">人员改善排行TOP10</div><div class="ch"><canvas id="impChart2"></canvas></div></div>';
  }
  h += '</div>';
  h += '<div class="cd"><div class="ct">' + title + '明细</div>';
  if (type === 'by-dept') {
    var deptMap = {};
    all.forEach(function(i) {
      deptMap[i.dept] = (deptMap[i.dept] || 0) + 1;
    });
    h += '<table class="dt"><thead><tr><th>部门</th><th>改善数量</th><th>占比</th><th>已标准化</th><th>实施中</th><th>待提案</th></tr></thead><tbody>';
    Object.keys(deptMap).forEach(function(d) {
      var deptItems = all.filter(function(i){return i.dept===d;});
      h += '<tr><td>' + d + '</td><td>' + deptMap[d] + '</td><td>' + Math.round(deptMap[d]/all.length*100) + '%</td>';
      h += '<td>' + deptItems.filter(function(i){return i.status==='已标准化';}).length + '</td>';
      h += '<td>' + deptItems.filter(function(i){return i.status==='实施中';}).length + '</td>';
      h += '<td>' + deptItems.filter(function(i){return i.status==='待提案';}).length + '</td></tr>';
    });
    h += '</tbody></table>';
  } else {
    var personMap = {};
    all.forEach(function(i) {
      personMap[i.proposer] = (personMap[i.proposer] || 0) + 1;

function renderSkillMatrix() {
  try {
    var skills = SKILL_NAMES;
    var people = PEOPLE_OBJ.filter(function(p){return p.dept==='智能制造组';}).slice(0, 10);
    var matrix = getSkillMatrix();
    
    // 计算平均技能等级
    var totalLvl = 0;
    var skillCount = 0;
    people.forEach(function(p) {
      skills.forEach(function(s) {
        var lvl = getSkillLevel(p.employeeId, s);
        if (lvl > 0) {
          totalLvl += lvl;
          skillCount++;
        }
      });
    });
    var avgLvl = skillCount > 0 ? (totalLvl / skillCount).toFixed(1) : '0.0';
    
    // 核心技能（平均等级>=3的技能）
    var coreSkills = 0;
    skills.forEach(function(s) {
      var sum = 0, cnt = 0;
      people.forEach(function(p) {
        var lvl = getSkillLevel(p.employeeId, s);
        if (lvl > 0) { sum += lvl; cnt++; }
      });
      if (cnt > 0 && sum/cnt >= 3) coreSkills++;
    });
    
    var h = '<div class="page-enter">';
    h += '<div class="pt">🎯 技能矩阵 <span class="bdg">技能管理</span></div>';
    h += '<div class="status-bar info">技能等级：1-了解 / 2-基础 / 3-熟练 / 4-精通 / 5-专家 &nbsp;&nbsp; 点击技能等级可编辑</div>';

    h += '<div class="kpi-card"><div class="kpi-value">' + avgLvl + '</div><div class="kpi-label">平均技能等级</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value">' + coreSkills + '</div><div class="kpi-label">核心技能</div></div>';
    h += '</div>';
    h += '<div class="bg">';

      h += '<button class="btn bo" onclick="resetSkillMatrix()">↺ 重置默认</button>';

function uploadDoc() {
  try {
    var cats = ['方法论/工具','制度/规范','技术协议','报告/总结','参考资料','工具脚本'];
    submitFormModal({
      title: '上传文档',
      showSaveAndNew: true,
      fields: [
        {key:'name', label:'文档名称', type:'text', required:true, placeholder:'请输入文档名称'},
        {key:'type', label:'文档类型', type:'select', options:['PDF','Word','Excel','PPT','视频','其他'], value:'PDF'},
        {key:'category', label:'文档分类', type:'select', options:cats, value:'制度/规范'},
        {key:'tags', label:'标签', type:'text', placeholder:'多个标签用逗号分隔'},
        {key:'desc', label:'文档描述', type:'textarea', rows:2, placeholder:'请输入文档描述'}
      ],
      onSave: function(data) {
        var all = getAllDocs();
        var maxNum = 0;
        all.forEach(function(d) {
          var m = String(d.id).match(/D(\d+)/);
          if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
        });
        data.id = 'D' + String(maxNum + 1).padStart(3, '0');
        data.date = new Date().toISOString().slice(0,10);
        data.link = '';
        data.content = '';
        var local = lsGet('local_docs', []);
        local.push(data);

function downloadDoc(id) {
  try {
    var all = getAllDocs();
    var d = all.find(function(x){ return x.id === id; });
    if (!d) { showToast('文档不存在', 'error'); return; }
    var content = d.content || '';
    if (!content) {
      content = '文档名称: ' + d.name + '\n';
      content += '类型: ' + d.type + '\n';
      content += '分类: ' + d.category + '\n';
      content += '日期: ' + d.date + '\n';
      content += '标签: ' + (d.tags || '') + '\n';
      content += '描述: ' + (d.desc || '') + '\n';
      content += '\n（此为文档元数据，原文内容请通过飞书链接获取）';
    }
    var ext = 'txt';
    if (d.type === 'PDF') ext = 'txt';
    else if (d.type === 'DOCX' || d.type === 'DOC') ext = 'txt';
    else if (d.type === 'XLSX' || d.type === 'XLS') ext = 'txt';
    else if (d.type === 'PPTX' || d.type === 'PPT') ext = 'txt';
    else if (d.type === 'Python') ext = 'py';
    else if (d.type === 'LOG') ext = 'log';
    var blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = d.name + '.' + ext;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
  } catch(e) { showToast('下载失败: ' + e.message, 'error'); }
}

async function runAutoTask(id) {
  var all = getAllAutoTasks();
  var t = all.find(function(x){ return x.id === id; });
  if (!t) return;

  // 非日报提醒类型给出toast提示
  if (t.type !== '日报提醒') {
    showToast('当前任务类型为"' + t.type + '"，暂不支持手动执行。仅"日报提醒"类型支持立即推送日报。', 'warn');
    return;
  }

  if (!confirm('确定立即执行任务：' + t.name + '？')) return;

  // 检查服务器连接
  if (SERVER_CONFIG.mode !== 'online') {
    showToast('请先连接服务器后再执行任务', 'warn');
    return;
  }

  // 按钮loading状态
  var btn = document.getElementById('btnRunAutoTask_' + id);
  var btnOrigHtml = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳ 执行中...'; }
  showToast('正在推送日报，请稍候...', 'info');

  try {
    var today = new Date().toISOString().split('T')[0];
    var resp = await apiRequest('POST', '/api/daily-report/send', { date: today });

    var now = new Date();
    var timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

    // 更新上次执行时间
    var local = lsGet('local_autotasks', []);
    var idx = local.findIndex(function(x){ return x.id === id; });
    if (idx >= 0) {
      local[idx].lastRun = timeStr;
    } else {
      local.push({id:t.id, name:t.name, type:t.type, action:t.action, trigger:t.trigger, schedule:t.schedule, status:t.status, lastRun:timeStr, target:t.target, template:t.template, remark:t.remark});
    }
    saveLocalAutoTasks(local);
    saveData('auto_tasks', local);

    // 记录日志
    var logs = lsGet('auto_task_logs', []);
    if (resp.code === 0) {
      var workCount = resp.data.work_report_count || 0;
      var attendCount = resp.data.attendance_count || 0;
      var resultMsg = '工作汇报:' + workCount + '条, 出勤:' + attendCount + '条';
      logs.unshift({id:'LOG' + Date.now(), taskId:id, taskName:t.name, time:timeStr, status:'成功', result:resultMsg});
      lsSet('auto_task_logs', logs.slice(0, 100));
      showToast('日报推送成功！' + resultMsg, 'success');
    } else {
      logs.unshift({id:'LOG' + Date.now(), taskId:id, taskName:t.name, time:timeStr, status:'失败', result: resp.msg || '未知错误'});
      lsSet('auto_task_logs', logs.slice(0, 100));
      showToast('日报推送失败: ' + (resp.msg || '未知错误'), 'error');
    }
  } catch(e) {
    var now2 = new Date();
    var timeStr2 = now2.getFullYear() + '-' + String(now2.getMonth()+1).padStart(2,'0') + '-' + String(now2.getDate()).padStart(2,'0') + ' ' + String(now2.getHours()).padStart(2,'0') + ':' + String(now2.getMinutes()).padStart(2,'0');
    var logs2 = lsGet('auto_task_logs', []);
    logs2.unshift({id:'LOG' + Date.now(), taskId:id, taskName:t.name, time:timeStr2, status:'失败', result:'异常: ' + e.message});
    lsSet('auto_task_logs', logs2.slice(0, 100));
    showToast('日报推送异常: ' + e.message, 'error');
    console.error('runAutoTask error:', e);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = btnOrigHtml; }
    refresh();
  }

function switchMsgTab(tab) {

function toggleWebhook(id) {
  var idx = (selectedWebhooks||[]).indexOf(id);
  if (idx >= 0) selectedWebhooks.splice(idx, 1);
  else selectedWebhooks.push(id);
}

function selectAllWebhooks(select) {
  var webhooks = getWebhooks();
  if (select) {
    selectedWebhooks = webhooks.map(function(w){ return w.id; });
  } else {
    selectedWebhooks = [];
  }
  refresh();
}

function addWebhook() {
  submitFormModal({
    title: '新增群组Webhook',
    fields: [
      {key:'name', label:'群组名称', type:'text', required:true, placeholder:'如：智能制造组全员'},
      {key:'type', label:'类型', type:'select', options:['飞书','企业微信','钉钉','邮件'], value:'飞书'},
      {key:'url', label:'Webhook URL', type:'text', required:true, placeholder:'https://...'}
    ],
    onSave: function(data) {
      var webhooks = getWebhooks();
      data.id = 'WH' + String(webhooks.length + 1).padStart(3, '0');
      webhooks.push(data);
      saveWebhooks(webhooks);
    },
    onAfter: function() { refresh(); }
  });
}

function deleteWebhook(id) {
  if (!confirm('确定删除此Webhook？')) return;
  var webhooks = getWebhooks().filter(function(w){ return w.id !== id; });
  saveWebhooks(webhooks);
  selectedWebhooks = selectedWebhooks.filter(function(wid){ return wid !== id; });
  refresh();
}

function createMsgTemplate() {
  try {
    submitFormModal({
      title: '新增消息模板',
      showSaveAndNew: true,
      fields: [
        {key:'name', label:'模板名称', type:'text', required:true, placeholder:'请输入模板名称'},
        {key:'type', label:'模板类型', type:'select', options:['text','richtext','card'], value:'text'},
        {key:'title', label:'消息标题', type:'text', placeholder:'请输入消息标题'},
        {key:'content', label:'消息内容', type:'textarea', rows:4, required:true, placeholder:'请输入消息内容，支持 {{变量名}} 替换'},
        {key:'variables', label:'变量列表', type:'text', placeholder:'多个变量用逗号分隔，如：name,date,content'}
      ],
      onSave: function(data) {
        var templates = getMsgTemplates();
        var maxNum = 0;
        templates.forEach(function(t) {
          var m = String(t.id).match(/MT(\d+)/);
          if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
        });
        data.id = 'MT' + String(maxNum + 1).padStart(3, '0');
        if (data.variables) {
          data.variables = data.variables.split(/[,，]/).map(function(v){return v.trim();}).filter(function(v){return v;});
        } else {
          data.variables = [];
        }
        templates.push(data);
        saveMsgTemplates(templates);
      },
      onAfter: function() { refresh(); }
    });
  } catch(e) { showToast('新增模板失败: ' + e.message, 'error'); }
}

function editMsgTemplate(id) {
  try {
    var templates = getMsgTemplates();
    var t = templates.find(function(x){ return x.id === id; });
    if (!t) return;
    submitFormModal({
      title: '编辑消息模板 - ' + id,
      fields: [
        {key:'name', label:'模板名称', type:'text', value:t.name, required:true},
        {key:'type', label:'模板类型', type:'select', options:['text','richtext','card'], value:t.type},
        {key:'title', label:'消息标题', type:'text', value:t.title || ''},
        {key:'content', label:'消息内容', type:'textarea', rows:4, value:t.content || '', required:true},
        {key:'variables', label:'变量列表', type:'text', value:(t.variables || []).join(',')}
      ],
      onSave: function(data) {
        var temps = getMsgTemplates();
        var idx = temps.findIndex(function(x){ return x.id === id; });
        data.id = id;
        if (data.variables) {
          data.variables = data.variables.split(/[,，]/).map(function(v){return v.trim();}).filter(function(v){return v;});
        } else {
          data.variables = [];
        }
        if (idx >= 0) temps[idx] = data;
        else temps.push(data);
        saveMsgTemplates(temps);
      },
      onAfter: function() { refresh(); }
    });
  } catch(e) { showToast('编辑模板失败: ' + e.message, 'error'); }
}

function deleteMsgTemplate(id) {
  try {
    if (!confirm('确定删除此消息模板？')) return;
    var templates = getMsgTemplates().filter(function(t){ return t.id !== id; });
    saveMsgTemplates(templates);
    refresh();
  } catch(e) { showToast('删除模板失败: ' + e.message, 'error'); }
}

function useMsgTemplate(id) {
  var templates = getMsgTemplates();
  var t = templates.find(function(x){ return x.id === id; });
  if (!t) return;
  var titleEl = document.getElementById('msgTitle');
  var contentEl = document.getElementById('msgContent');
  if (titleEl) titleEl.value = t.name;
  if (contentEl) contentEl.value = t.content;
  previewMsg();
}

function previewMsg() {
  var title = document.getElementById('msgTitle') ? document.getElementById('msgTitle').value : '';
  var content = document.getElementById('msgContent') ? document.getElementById('msgContent').value : '';
  var preview = document.getElementById('msgPreview');
  if (preview) {
    preview.innerHTML = '<b>' + (title || '无标题') + '</b><br><br>' + (content || '无内容').replace(/\n/g, '<br>');
  }
}

function sendMsg() {
  if (selectedWebhooks.length === 0) {
    showToast('请至少选择一个推送群组！', 'warn');
    return;
  }
  var title = document.getElementById('msgTitle') ? document.getElementById('msgTitle').value : '';
  var content = document.getElementById('msgContent') ? document.getElementById('msgContent').value : '';
  if (!content) {
    showToast('请输入消息内容！', 'warn');
    return;
  }
  var webhooks = getWebhooks();
  var targetNames = webhooks.filter(function(w){ return (selectedWebhooks||[]).indexOf(w.id) !== -1; }).map(function(w){ return w.name; }).join('、');
  
  // 记录历史
  var history = getPushHistory();
  var now = new Date();
  var timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  history.unshift({
    id: 'PH' + Date.now(),
    time: timeStr,
    target: targetNames,
    type: title || '自定义消息',
    status: '成功',
    content: content.substring(0, 50)
  });
  savePushHistory(history.slice(0, 50));
  
  showToast('消息已推送至 ' + selectedWebhooks.length + ' 个群组！\n目标：' + targetNames, 'info'); refresh();
}

function viewPushHistoryDetail(id) {
  try {
    var history = getPushHistory();
    var h = history.find(function(x){ return x.id === id; });
    if (!h) return;
    var html = '<div class="info-grid">';

    history.unshift({
      id: 'PH' + Date.now(),
      time: timeStr,
      target: h.target,
      type: h.type,

      content: h.content

function togglePerm(moduleId, action, role, checked) {
  try {
    var matrix = getPermissionMatrix();
    if (!matrix[moduleId]) matrix[moduleId] = {};
    if (!matrix[moduleId][action]) matrix[moduleId][action] = [];
    
    var idx = matrix[moduleId][action].indexOf(role);
    if (checked && idx === -1) {
      matrix[moduleId][action].push(role);
    } else if (!checked && idx >= 0) {
      matrix[moduleId][action].splice(idx, 1);
    }
    savePermissionMatrix(matrix);
  } catch(e) { console.error('togglePerm error:', e); }
}

// V13 - 导入本地数据到服务器
async function importLocalToServer() {
  if (SERVER_CONFIG.mode !== 'online') {
    showToast('请先连接到后端服务器', 'warn');
    return;
  }
  if (!confirm('确定将所有本地数据导入到服务器？\n\n这将把本地数据推送到服务器，服务器上已有的同名数据将被覆盖。')) return;
  var typeKeyMap = [
    {type: 'tasks', key: 'local_tasks'},
    {type: 'daily_reports', key: 'local_daily'},
    {type: 'projects', key: 'local_projects'},
    {type: 'equipments', key: 'local_equips'},
    {type: 'improvements', key: 'local_improves'},
    {type: 'maintains', key: 'local_maintains'},
    {type: 'repairs', key: 'local_repairs'},
    {type: 'auto_tasks', key: 'local_autotasks'}
  ];
  setSyncStatus('syncing');
  try {
    for (var i = 0; i < typeKeyMap.length; i++) {
      var localData = lsGet(typeKeyMap[i].key, []);
      if (localData.length > 0) {
        await apiRequest('POST', '/api/data/' + typeKeyMap[i].type, localData);
        addSyncLog('导入 ' + typeKeyMap[i].type + ' 成功，共 ' + localData.length + ' 条');
      } else {
        addSyncLog('跳过 ' + typeKeyMap[i].type + '（本地无数据）');
      }
    }
    setSyncStatus('synced');
    showToast('数据已成功导入到服务器！', 'success');
    refresh();
  } catch(e) {
    setSyncStatus('error');
    showToast('导入失败: ' + e.message, 'error'); }
}

// V13 - 连接/断开服务器切换
async function toggleServerConnection() {
  if (SERVER_CONFIG.mode === 'online') {
    // 断开连接
    if (!confirm('确定断开与服务器 ' + SERVER_CONFIG.url + ' 的连接？')) return;
    SERVER_CONFIG.enabled = false;
    SERVER_CONFIG.mode = 'offline';
    API_BASE = '';
    localStorage.setItem('v13_server_enabled', 'false');
    updateSyncStatusBadge('offline', '离线');
    addSyncLog('已手动断开服务器连接');
    stopAutoSync();
    refresh();
  } else {
    // 尝试连接
    var url = document.getElementById('feishuServerUrl').value.trim() || 'http://localhost:3000';
    var resultDiv = document.getElementById('serverConnResult');
    if (resultDiv) resultDiv.innerHTML = '<span style="color:var(--or)">&#9201; 正在连接...</span>';
    try {
      var res = await fetch(url + '/api/status', {method:'GET', headers:{'Content-Type':'application/json'}});
      var json = await res.json();
      if (json.code === 0) {
        setServerUrl(url);
        updateSyncStatusBadge('connected', '已连接');
        addSyncLog('手动连接服务器成功: ' + url);
        if (resultDiv) {
          resultDiv.innerHTML = '<span style="color:var(--gn)">&#10004; 连接成功!</span>' +
            (json.data ? ' <span style="color:var(--t2)">版本: ' + (json.data.version || '-') + ' | 运行时间: ' + (json.data.uptime || '-') + '</span>' : '');
        }
        refresh();
      } else {
        if (resultDiv) resultDiv.innerHTML = '<span style="color:var(--rd)">&#10008; 连接失败: ' + (json.msg || '未知错误') + '</span>';
      }
    } catch(e) {
      if (resultDiv) resultDiv.innerHTML = '<span style="color:var(--rd)">&#10008; 连接失败: ' + e.message + '</span>';
    }
  }
}

// V13 - 数据表总览筛选功能
function filterTableOverview(filterType) {
  var rows = document.querySelectorAll('#tableOverviewBody .overview-row');
  rows.forEach(function(row) {
    var isMapped = row.getAttribute('data-mapped') === 'true';
    if (filterType === 'all') {
      row.style.display = '';
    } else if (filterType === 'mapped') {
      row.style.display = isMapped ? '' : 'none';
    } else if (filterType === 'unmapped') {
      row.style.display = isMapped ? 'none' : '';
    }
  });
  var btnAll = document.getElementById('filterAll');
  var btnMapped = document.getElementById('filterMapped');
  var btnUnmapped = document.getElementById('filterUnmapped');
  [btnAll, btnMapped, btnUnmapped].forEach(function(btn) {
    btn.className = 'btn-sm bo';
  });
  if (filterType === 'all') btnAll.className = 'btn-sm bp';
  else if (filterType === 'mapped') btnMapped.className = 'btn-sm bp';
  else btnUnmapped.className = 'btn-sm bp';
}

// V13 - 恢复映射配置为默认值
function resetTableMappingsToDefault() {
  if (!confirm('确定要恢复为默认映射配置吗？这将覆盖当前的自定义配置。')) return;
  localStorage.removeItem('v9_feishu_table_mappings');
  refresh();
}

async function testTableConnection(type) {
  if (SERVER_CONFIG.mode !== 'online') {
    showToast('请先连接服务器', 'warn');
    return;
  }
  showToast('测试读取 ' + type + ' 的前3条记录...', 'info'); try {
    var res = await apiRequest('POST', '/api/sync/read/' + type, {limit: 3});
    if (res.code === 0) {
      var count = res.data ? res.data.length : 0;
      showToast('测试成功! 读取到 ' + count + ' 条记录', 'success'); addSyncLog('测试连接 ' + type + ' 成功，读取 ' + count + ' 条');
    } else {
      showToast('测试失败: ' + res.msg, 'error'); addSyncLog('测试连接 ' + type + ' 失败: ' + res.msg);
    }
  } catch(e) {
    showToast('测试失败: ' + e.message, 'error'); }
  refresh();
}

function saveFeishuCredentials() {
  var appId = document.getElementById('feishuAppId').value.trim();
  var appSecret = document.getElementById('feishuAppSecret').value.trim();
  lsSet('feishu_app_id', appId);
  lsSet('feishu_app_secret', appSecret);
  if (SERVER_CONFIG.mode === 'online') {
    apiRequest('POST', '/api/config', {appId: appId, appSecret: appSecret});
  }
  showToast('凭证已保存', 'success');
  addSyncLog('飞书凭证已保存');
}

function saveTableMappings() {
  var savedMappings = lsGet('feishu_table_mappings', DEFAULT_TABLE_MAPPINGS);
  var count = savedMappings.length;
  var mappings = [];
  for (var idx = 0; idx < count; idx++) {
    mappings.push({
      type: savedMappings[idx].type,
      tableName: document.getElementById('fm_name_' + idx).value,
      appToken: document.getElementById('fm_app_' + idx).value,
      tableId: document.getElementById('fm_tbl_' + idx).value
    });
  }
  lsSet('feishu_table_mappings', mappings);
  if (SERVER_CONFIG.mode === 'online') {
    apiRequest('POST', '/api/config', {tableMappings: mappings});
  }
  showToast('映射配置已保存', 'success');
  addSyncLog('多维表格映射配置已保存');
}

async function readAllFromFeishu() {
  if (SERVER_CONFIG.mode !== 'online') {
    showToast('请先连接服务器', 'warn');
    return;
  }
  setSyncStatus('syncing');
  try {
    var typeKeys = lsGet('feishu_table_mappings', DEFAULT_TABLE_MAPPINGS).map(function(m) { return m.type; });
    for (var i = 0; i < typeKeys.length; i++) {
      var res = await apiRequest('POST', '/api/sync/read/' + typeKeys[i]);
      if (res.code === 0 && res.data) {
        lsSet('local_' + typeKeys[i], res.data);
        lsSet('sync_last_' + typeKeys[i], new Date().toLocaleTimeString());
        addSyncLog('读取 ' + typeKeys[i] + ' 成功，共 ' + res.data.length + ' 条');
      } else {
        addSyncLog('读取 ' + typeKeys[i] + ' 失败: ' + (res.msg || ''));
      }
    }
    setSyncStatus('synced');
    showToast('全部数据读取完成!', 'info');
  } catch(e) {
    setSyncStatus('error');
    addSyncLog('读取飞书数据失败: ' + e.message);
    showToast('读取失败: ' + e.message, 'error'); }
  refresh();
}

function toggleAutoSync() {
  var enabled = document.getElementById('autoSyncSwitch').checked;
  lsSet('feishu_auto_sync', enabled);
  if (enabled && SERVER_CONFIG.enabled) {
    var interval = parseInt(document.getElementById('syncIntervalSelect').value) || 30;
    startAutoSync(interval);
  } else {
    stopAutoSync();
  }
}

function changeSyncInterval() {
  var interval = parseInt(document.getElementById('syncIntervalSelect').value) || 30;

function insertTemplateVar(varName) {
  var ta = document.getElementById('rpcTemplate');
  if (!ta) return;
  var start = ta.selectionStart;
  var end = ta.selectionEnd;
  var text = ta.value;
  ta.value = text.substring(0, start) + varName + text.substring(end);
  ta.selectionStart = ta.selectionEnd = start + varName.length;
  ta.focus();
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function testReportPushWebhook() {
  var url = document.getElementById('rpcWebhookUrl').value.trim();
  var resultEl = document.getElementById('rpcWebhookTestResult');
  if (!url) {
    resultEl.innerHTML = '<span style="color:var(--rd)">请先输入 Webhook URL</span>';
    return;
  }
  resultEl.innerHTML = '<span style="color:var(--or)">测试中...</span>';
  if (SERVER_CONFIG.mode === 'online') {
    apiRequest('POST', '/api/bot/send', {
      webhook_url: url,
      text: '[智能制造平台] Webhook 连接测试 - ' + new Date().toLocaleString('zh-CN')
    }).then(function(res) {
      if (res.code === 0) {
        resultEl.innerHTML = '<span style="color:var(--gn)">连接测试成功！消息已发送到飞书群</span>';
        showToast('测试消息发送成功', 'success');
      } else {
        resultEl.innerHTML = '<span style="color:var(--rd)">发送失败: ' + (res.msg || '未知错误') + '</span>';
        showToast('测试失败: ' + res.msg, 'error');
      }
    });
  } else {
    // 离线模式：直接 fetch
    fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        msg_type: 'text',
        content: { text: '[智能制造平台] Webhook 连接测试 - ' + new Date().toLocaleString('zh-CN') }
      })
    }).then(function(r) { return r.json(); }).then(function(json) {
      if (json.code === 0 || json.StatusCode === 0) {
        resultEl.innerHTML = '<span style="color:var(--gn)">连接测试成功！</span>';
        showToast('测试消息发送成功', 'success');
      } else {
        resultEl.innerHTML = '<span style="color:var(--rd)">发送失败: ' + (json.msg || JSON.stringify(json)) + '</span>';
      }
    }).catch(function(e) {
      resultEl.innerHTML = '<span style="color:var(--rd)">网络错误: ' + e.message + '</span>';
    });
  }
}

function saveReportPushConfig() {
  var cfg = {
    webhookUrl: document.getElementById('rpcWebhookUrl').value.trim(),
    template: document.getElementById('rpcTemplate').value,
    pushTime: document.getElementById('rpcPushTime').value || '18:00',
    enabled: document.getElementById('rpcEnabled').checked,
    useCustomTemplate: document.getElementById('rpcUseCustomTemplate').checked
  };

  // 验证
  if (cfg.enabled && !cfg.webhookUrl) {
    showToast('启用推送时必须填写 Webhook URL', 'warn');
    return;
  }

  // 保存到 localStorage
  saveReportPushConfigLocal(cfg);

  // 同步到后端
  if (SERVER_CONFIG.mode === 'online') {
    apiRequest('POST', '/api/report-config', cfg).then(function(res) {
      if (res.code === 0) {
        showToast('推送配置已保存（本地+服务器）', 'success');
      } else {
        showToast('配置已保存到本地，服务器同步失败: ' + (res.msg || ''), 'warn');
      }
    });
  } else {
    showToast('推送配置已保存到本地（离线模式，未同步到服务器）', 'success');
  }
}

function resetReportPushConfig() {
  if (!confirm('确定恢复为默认推送配置？当前配置将丢失。')) return;
  var cfg = JSON.parse(JSON.stringify(DEFAULT_REPORT_PUSH_CONFIG));
  cfg.template = DEFAULT_DAILY_REPORT_TEMPLATE;
  saveReportPushConfigLocal(cfg);
  if (SERVER_CONFIG.mode === 'online') {
    apiRequest('POST', '/api/report-config', cfg);
  }
  refresh();
  showToast('推送配置已恢复默认', 'success');
}

async function loadReportPushConfigFromServer() {
  if (SERVER_CONFIG.mode !== 'online') return;
  try {
    var res = await apiRequest('GET', '/api/report-config');
    if (res.code === 0 && res.data) {
      // 如果服务器有配置且本地没有，用服务器的覆盖
      var local = getReportPushConfig();
      if (!local.webhookUrl && res.data.webhookUrl) {
        saveReportPushConfigLocal(res.data);
        console.log('[推送配置] 已从服务器加载推送配置');
      }
    }
  } catch(e) {
    console.error('[推送配置] 从服务器加载配置失败:', e);
  }
}

// 页面加载时尝试从服务器拉取推送配置
setTimeout(loadReportPushConfigFromServer, 3000);

function createMemberApply() {
  var today = new Date().toISOString().slice(0,10);
  submitFormModal({
    title: '新增人员申请',
    showSaveAndNew: true,
    fields: [
      {key:'name', label:'申请人', type:'text', required:true, placeholder:'请输入申请人姓名'},
      {key:'employeeId', label:'工号', type:'text', required:true, placeholder:'请输入工号'},
      {key:'dept', label:'部门', type:'select', options:['智能制造组','机电设备组','电子设备组','保养组','设备部'], value:'智能制造组'},
      {key:'applyType', label:'申请类型', type:'select', options:['入职申请','调动申请','离职申请','转正申请','其他'], value:'入职申请'},
      {key:'date', label:'申请日期', type:'date', value:today},
      {key:'status', label:'状态', type:'select', options:['待审批','已通过','已拒绝'], value:'待审批'},
      {key:'reason', label:'申请原因', type:'textarea', rows:3, required:true, placeholder:'请输入申请原因'}
    ],
    onSave: function(data) {
      var all = getAllMemberApplies();
      var maxNum = 0;
      all.forEach(function(a) {
        var m = String(a.id).match(/AP(\d+)/);
        if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
      });
      data.id = 'AP' + String(maxNum + 1).padStart(3, '0');
      var local = lsGet('local_member_applies', []);
      local.push(data);
      saveLocalMemberApplies(local);
    },
    onAfter: function() { refresh(); }
  });
}

function viewMemberApply(id) {

  if (!a) return;
  var h = '<div class="info-grid">';
  h += '<div class="info-item"><div class="ii-label">申请编号</div><div class="ii-value">' + a.id + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">申请人</div><div class="ii-value">' + a.name + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">工号</div><div class="ii-value">' + a.employeeId + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">部门</div><div class="ii-value">' + a.dept + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">申请类型</div><div class="ii-value"><span class="t tb">' + (a.applyType||'') + '</span></div></div>';
  h += '<div class="info-item"><div class="ii-label">申请日期</div><div class="ii-value">' + a.date + '</div></div>';
  h += '<div class="info-item"><div class="ii-label">状态</div><div class="ii-value"><span class="t ' + (a.status==='已通过'?'tg':a.status==='待审批'?'to':'tr') + '">' + a.status + '</span></div></div>';
  h += '</div>';
  h += '<div class="divider" style="height:1px;background:var(--br);margin:12px 0"></div>';
  h += '<div class="form-field"><label>申请原因</label><div style="white-space:pre-wrap;padding:8px;background:#f7f8fa;border-radius:6px;font-size:13px;line-height:1.6">' + (a.reason || '') + '</div></div>';

  footer += '<button class="btn bp" onclick="editMemberApply(\'' + a.id + '\')">编辑</button>';
  if (a.status === '待审批') {
    footer += '<button class="btn bg" onclick="approveMemberApply(\'' + a.id + '\');closeMo()">通过</button>';
    footer += '<button class="btn dg" onclick="rejectMemberApply(\'' + a.id + '\');closeMo()">拒绝</button>';
  }
  footer += '<button class="btn dg" onclick="deleteMemberApply(\'' + a.id + '\');closeMo()">删除</button>';
  openMo({title:'人员申请详情 - ' + a.id, html:h, footer:footer});
}

function editMemberApply(id) {
  var all = getAllMemberApplies();
  var a = all.find(function(x){ return x.id === id; });
  if (!a) return;
  submitFormModal({
    title: '编辑人员申请 - ' + id,
    fields: [
      {key:'name', label:'申请人', type:'text', value:a.name, required:true},
      {key:'employeeId', label:'工号', type:'text', value:a.employeeId, required:true},
      {key:'dept', label:'部门', type:'select', options:['智能制造组','机电设备组','电子设备组','保养组','设备部'], value:a.dept},
      {key:'applyType', label:'申请类型', type:'select', options:['入职申请','调动申请','离职申请','转正申请','其他'], value:a.applyType||'入职申请'},
      {key:'date', label:'申请日期', type:'date', value:a.date},
      {key:'status', label:'状态', type:'select', options:['待审批','已通过','已拒绝'], value:a.status},
      {key:'reason', label:'申请原因', type:'textarea', rows:3, value:a.reason||''}
    ],
    onSave: function(data) {
      var local = lsGet('local_member_applies', []);
      var idx = local.findIndex(function(x){ return x.id === id; });
      data.id = id;
      if (idx >= 0) local[idx] = data;
      else local.push(data);
      saveLocalMemberApplies(local);
    },
    onAfter: function() { refresh(); }
  });
}

function approveMemberApply(id) {
  var local = lsGet('local_member_applies', []);
  var idx = local.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) {
    local[idx].status = '已通过';
    saveLocalMemberApplies(local);
  } else {
    var all = getAllMemberApplies();
    var item = all.find(function(x){ return x.id === id; });
    if (item) { item.status = '已通过'; local.push(item); saveLocalMemberApplies(local); }
  }
  refresh();
}

function rejectMemberApply(id) {
  var local = lsGet('local_member_applies', []);
  var idx = local.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) {
    local[idx].status = '已拒绝';
    saveLocalMemberApplies(local);
  } else {
    var all = getAllMemberApplies();
    var item = all.find(function(x){ return x.id === id; });
    if (item) { item.status = '已拒绝'; local.push(item); saveLocalMemberApplies(local); }
  }
  refresh();
}

function deleteMemberApply(id) {
  if (!confirm('确定删除此人员申请记录？')) return;
  var local = lsGet('local_member_applies', []);
  local = local.filter(function(x){ return x.id !== id; });
  saveLocalMemberApplies(local);
  closeMo();
  refresh();
}

async function loadAttendanceData() {
  var loadingEl = document.getElementById('attLoadingArea');

    if (SERVER_CONFIG.mode === 'online' && API_BASE) {

function calcAttendanceSummary(data) {
  if (!data || data.length === 0) {
    return { expected: 0, actual: 0, rate: '0.0', absent: 0 };
  }
  // 优先使用后端返回的汇总字段，否则逐条累加
  if (data[0] && data[0]._summary) {
    var s = data[0]._summary;
    var expected = s.expected_count || 0;
    var actual = s.actual_count || 0;
    var rate = expected > 0 ? (actual / expected * 100).toFixed(1) : '0.0';
    var absent = (s.leave_count || 0) + (s.absent_count || 0);
    return { expected: expected, actual: actual, rate: rate, absent: absent };
  }
  // 逐条累加
  var totalExpected = 0, totalActual = 0, totalLeave = 0, totalAbsent = 0;
  data.forEach(function(r) {
    totalExpected += parseInt(r.expected_count || r.presentCount || 0, 10);
    totalActual += parseInt(r.actual_count || r.actualCount || 0, 10);
    totalLeave += parseInt(r.leave_count || r.leave || 0, 10);
    totalAbsent += parseInt(r.absent_count || r.absent || 0, 10);
  });
  var rate = totalExpected > 0 ? (totalActual / totalExpected * 100).toFixed(1) : '0.0';
  return { expected: totalExpected, actual: totalActual, rate: rate, absent: totalLeave + totalAbsent };
}

function calcDeptAttendance(data) {
  if (!data || data.length === 0) return [];
  var deptMap = {};
  data.forEach(function(r) {
    var dept = r.department || r.group_name || r.dept || '未分组';
    if (!deptMap[dept]) {
      deptMap[dept] = { name: dept, total: 0, actual: 0, leave: 0, absent: 0 };
    }
    var d = deptMap[dept];
    d.total += parseInt(r.expected_count || r.presentCount || 0, 10);
    d.actual += parseInt(r.actual_count || r.actualCount || 0, 10);
    d.leave += parseInt(r.leave_count || r.leave || 0, 10);
    d.absent += parseInt(r.absent_count || r.absent || 0, 10);
  });
  return Object.values(deptMap);
}

function calcAttendanceChartData(data) {
  var labels = ['周一','周二','周三','周四','周五','周六','周日'];
  var attendData = [0,0,0,0,0,0,0];
  var leaveData = [0,0,0,0,0,0,0];
  var absentData = [0,0,0,0,0,0,0];
  if (data && data.length > 0) {
    data.forEach(function(r) {
      var idx = -1;
      // 支持按星期索引(0-6)或按日期字段匹配
      if (r.day_index !== undefined && r.day_index !== null) {
        idx = parseInt(r.day_index, 10);
      } else if (r.weekday !== undefined && r.weekday !== null) {
        idx = parseInt(r.weekday, 10) - 1; // 周一=1 -> index=0
      } else if (r.date) {
        var d = new Date(r.date);
        if (!isNaN(d.getTime())) {
          var dow = d.getDay(); // 0=周日,1=周一...
          idx = dow === 0 ? 6 : dow - 1; // 转为0=周一,6=周日
        }
      }
      if (idx >= 0 && idx < 7) {
        attendData[idx] += parseInt(r.actual_count || r.actualCount || 0, 10);
        leaveData[idx] += parseInt(r.leave_count || r.leave || 0, 10);
        absentData[idx] += parseInt(r.absent_count || r.absent || 0, 10);
      }
    });
    // 如果按天聚合后全为0，尝试直接读取汇总趋势数据
    if (attendData.every(function(v){return v===0}) && data[0] && data[0].trend) {
      var trend = data[0].trend;
      if (trend.attendance) attendData = trend.attendance.slice(0, 7);
      if (trend.leave) leaveData = trend.leave.slice(0, 7);
      if (trend.absent) absentData = trend.absent.slice(0, 7);
    }
  }
  return {
    labels: labels,
    datasets: [
      {label:'出勤', data:attendData, backgroundColor:'#34c724', borderRadius:4},
      {label:'请假', data:leaveData, backgroundColor:'#ff9800', borderRadius:4},
      {label:'缺勤', data:absentData, backgroundColor:'#f54a45', borderRadius:4}
    ]
  };
}

function saveStrategySummaryEdit(type) {
  var banner = document.getElementById('editBanner').value.trim();
  if (!banner) { showMsg('概述文案不能为空'); return; }
  var kpis = [];
  var kpiEls = document.querySelectorAll('#kpiEditor > div');
  kpiEls.forEach(function(el) {
    var val = el.querySelector('[data-role="kpi-val"]').value.trim();
    var label = el.querySelector('[data-role="kpi-label"]').value.trim();
    if (val && label) kpis.push({value: val, label: label});
  });
  var items = [];
  var itemEls = document.querySelectorAll('#itemEditor > div');
  itemEls.forEach(function(el) {
    var time = el.querySelector('[data-role="item-time"]').value.trim();
    var content = el.querySelector('[data-role="item-content"]').value.trim();
    if (time && content) items.push({time: time, content: content});
  });
  if (kpis.length === 0) { showMsg('至少需要1个KPI指标'); return; }
  if (items.length === 0) { showMsg('至少需要1条成果记录'); return; }
  saveStrategySummaryContent(type, {banner: banner, kpis: kpis, items: items});
  closeStrategyEditModal();
  refresh();
  showMsg('保存成功');
}

function resetStrategySummary(type) {
  localStorage.removeItem('strategy-summary-' + type);
  refresh();
  showMsg('已恢复为默认内容');
}

function closeStrategyEditModal() {
  var modal = document.getElementById('strategyEditModal');
  if (modal) modal.remove();
}

function renderKpiPage(type) {
  try {
    var titleMap = {'kpi-downtime':'设备停机','kpi-alarm':'设备报警','kpi-scrap':'碟塔板报废','kpi-energy':'能耗管理','kpi-safety':'安全管理'};
    var title = titleMap[type] || 'KPI指标';
    
    // 从业务数据动态计算
    var equips = getAllEquips();
    var tasks = getAllTasks();
    var improves = getAllImproves();
    var repairs = getAllRepairs ? getAllRepairs() : [];
    var maintains = getAllMaintains ? getAllMaintains() : [];
    
    var totalEquips = equips.length;
    var runningEquips = equips.filter(function(e){ return e.status === '运行中'; }).length;
    var faultEquips = equips.filter(function(e){ return e.status === '故障'; }).length;
    var oeeRate = totalEquips > 0 ? (runningEquips / totalEquips * 100).toFixed(1) : '0.0';
    var faultRate = totalEquips > 0 ? (faultEquips / totalEquips * 100).toFixed(1) : '0.0';
    
    // 根据不同KPI类型计算不同指标
    var kpiData = {
      'kpi-downtime': { target: 4.0, actual: parseFloat(faultRate), unit: '%', targetText: '≤4.0%' },
      'kpi-alarm': { target: 20, actual: faultEquips * 3, unit: '次', targetText: '≤20次/月' },
      'kpi-scrap': { target: 0.5, actual: 0.42, unit: '%', targetText: '≤0.5%' },
      'kpi-energy': { target: 95, actual: 96.8, unit: '%', targetText: '≥95%' },
      'kpi-safety': { target: 0, actual: 0, unit: '起', targetText: '0起' }
    };
    var kpi = kpiData[type] || kpiData['kpi-downtime'];
    var achievement = type === 'kpi-safety' ? 100 : (kpi.actual <= kpi.target ? 100 : Math.round(kpi.target / kpi.actual * 100));
    var achievementColor = achievement >= 100 ? 'var(--gn)' : achievement >= 90 ? 'var(--or)' : 'var(--rd)';
    var warnStatus = achievement >= 100 ? '绿区' : achievement >= 90 ? '黄区' : '红区';
    var warnColor = achievement >= 100 ? 'var(--gn)' : achievement >= 90 ? 'var(--or)' : 'var(--rd)';
    
    var h = '<div class="page-enter">';
    h += '<div class="pt">📈 ' + title + ' KPI <span class="bdg">2026年目标</span></div>';
    h += '<div class="kpi-row">';
    h += '<div class="kpi-card"><div class="kpi-value" style="color:' + achievementColor + '">' + achievement + '%</div><div class="kpi-label">当前达成率</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value">' + kpi.targetText + '</div><div class="kpi-label">目标值</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value" style="color:' + warnColor + '">' + kpi.actual + kpi.unit + '</div><div class="kpi-label">实际值</div></div>';
    h += '<div class="kpi-card"><div class="kpi-value" style="color:' + warnColor + '">' + warnStatus + '</div><div class="kpi-label">预警状态</div></div>';
    h += '</div>';
    
    // 业务数据概览
    h += '<div class="sr">';
    h += '<div class="sc"><div class="sv">' + totalEquips + '</div><div class="sl">设备总数</div></div>';
    h += '<div class="sc"><div class="sv" style="color:var(--gn)">' + runningEquips + '</div><div class="sl">运行中</div></div>';
    h += '<div class="sc"><div class="sv" style="color:var(--rd)">' + faultEquips + '</div><div class="sl">故障设备</div></div>';
    h += '<div class="sc"><div class="sv">' + tasks.length + '</div><div class="sl">任务总数</div></div>';
    h += '<div class="sc"><div class="sv">' + improves.length + '</div><div class="sl">改善提案</div></div>';
    h += '<div class="sc"><div class="sv">' + repairs.length + '</div><div class="sl">维修工单</div></div>';
    h += '<div class="sc"><div class="sv">' + maintains.length + '</div><div class="sl">保养计划</div></div>';
    h += '<div class="sc"><div class="sv" style="color:var(--gn)">' + oeeRate + '%</div><div class="sl">设备稼动率</div></div>';
    h += '</div>';
    
    h += '<div class="cd"><div class="ct">' + title + '趋势</div><div class="ch"><canvas id="kpiChart1"></canvas></div></div>';
    h += '<div class="g2">';
    h += '<div class="cd"><div class="ct">月度对比</div><div class="ch"><canvas id="kpiChart2"></canvas></div></div>';
    h += '<div class="cd"><div class="ct">部门排名</div><div class="ch"><canvas id="kpiChart3"></canvas></div></div>';
    h += '</div>';
    h += '</div>';
    return h;
  } catch(e) { return '<div class="cd"><div class="status-bar error">KPI页面渲染错误: ' + e.message + '</div></div>'; }
}

function getWhitepaperContent(type) {
  try {
    var saved = localStorage.getItem('whitepaper-' + type);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}

function saveWhitepaperContent(type, content) {
  try {
    localStorage.setItem('whitepaper-' + type, JSON.stringify(content));
  } catch(e) {}
}

function renderWhitepaper(type) {
  var defaultData = whitepaperData[type] || whitepaperData['wp-smart-maint'];
  var customContent = getWhitepaperContent(type);
  var title = defaultData.title;

function editWhitepaper(type) {

  var itemHtml = '';

    itemHtml += '<button class="btn-sm bd" onclick="this.parentElement.remove()">删除</button></div>';
  });

  var cardHtml = '';

    cardHtml += '<button class="btn-sm bd" onclick="this.parentElement.parentElement.remove()">删除</button></div>';
    cardHtml += '<textarea data-role="wp-card-desc" data-idx="' + idx + '" rows="2" style="width:100%;padding:4px 8px;border:1px solid var(--br);border-radius:4px;font-size:12px;resize:vertical">' + c.desc + '</textarea>';
    cardHtml += '</div>';
  });

  var modal = '<div id="whitepaperEditModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center">';
  modal += '<div style="background:#fff;border-radius:12px;padding:24px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2)">';

function addWpItemRow() {
  var container = document.getElementById('wpItemEditor');

  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
  div.innerHTML = '<input type="text" value="" data-role="wp-item-time" placeholder="时间阶段" style="width:120px;padding:4px 8px;border:1px solid var(--br);border-radius:4px;font-size:13px"><input type="text" value="" data-role="wp-item-content" placeholder="内容" style="flex:1;padding:4px 8px;border:1px solid var(--br);border-radius:4px;font-size:13px"><button class="btn-sm bd" onclick="this.parentElement.remove()">删除</button>';

function addWpCardRow() {
  var container = document.getElementById('wpCardEditor');
  if (!container) return;
  var idx = container.children.length;

function saveWhitepaperEdit(type) {
  var items = [];
  var itemEls = document.querySelectorAll('#wpItemEditor > div');
  itemEls.forEach(function(el) {
    var time = el.querySelector('[data-role="wp-item-time"]').value.trim();
    var content = el.querySelector('[data-role="wp-item-content"]').value.trim();
    if (time && content) items.push({time: time, content: content});
  });
  var cards = [];
  var cardEls = document.querySelectorAll('#wpCardEditor > div');
  cardEls.forEach(function(el) {
    var icon = el.querySelector('[data-role="wp-card-icon"]').value.trim() || '📌';
    var title = el.querySelector('[data-role="wp-card-title"]').value.trim();
    var desc = el.querySelector('[data-role="wp-card-desc"]').value.trim();
    if (title && desc) cards.push({icon: icon, title: title, desc: desc});
  });
  if (items.length === 0) { showMsg('至少需要1条时间线'); return; }
  if (cards.length === 0) { showMsg('至少需要1个关键举措'); return; }
  saveWhitepaperContent(type, {items: items, cards: cards});
  closeWhitepaperEditModal();
  refresh();
  showMsg('保存成功');
}

function resetWhitepaper(type) {
  localStorage.removeItem('whitepaper-' + type);
  refresh();
  showMsg('已恢复为默认内容');
}

function closeWhitepaperEditModal() {
  var modal = document.getElementById('whitepaperEditModal');
  if (modal) modal.remove();
}

function getCultureContent(type) {
  try {
    var saved = localStorage.getItem('culture-' + type);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}

function saveCultureContent(type, data) {
  try {
    localStorage.setItem('culture-' + type, JSON.stringify(data));
  } catch(e) {}
}

function saveCultureEdit(type) {
  var container = document.getElementById('cultureEditArea');
  if (!container) return;
  var rows = container.children;
  var result = [];
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    if (type === 'culture-slogan') {
      var slogan = row.querySelector('[data-role="c-slogan"]').value.trim();
      var desc = row.querySelector('[data-role="c-desc"]').value.trim();
      if (slogan) result.push({slogan: slogan, desc: desc || ''});
    } else if (type === 'culture-contest') {
      var name = row.querySelector('[data-role="c-name"]').value.trim();
      var time = row.querySelector('[data-role="c-time"]').value.trim();
      var target = row.querySelector('[data-role="c-target"]').value.trim();
      var status = row.querySelector('[data-role="c-status"]').value;
      var detail = row.querySelector('[data-role="c-detail"]').value.trim();
      if (name && time) result.push({name: name, time: time, target: target, status: status, desc: detail});
    } else if (type === 'culture-teambuild') {
      var name2 = row.querySelector('[data-role="c-name"]').value.trim();
      var time2 = row.querySelector('[data-role="c-time"]').value.trim();
      var place = row.querySelector('[data-role="c-place"]').value.trim();
      var people = parseInt(row.querySelector('[data-role="c-people"]').value) || 0;
      var status2 = row.querySelector('[data-role="c-status"]').value;
      var detail2 = row.querySelector('[data-role="c-detail"]').value.trim();
      if (name2 && time2) result.push({name: name2, time: time2, place: place, people: people, status: status2, desc: detail2});
    } else {
      var quote = row.querySelector('[data-role="c-quote"]').value.trim();
      var author = row.querySelector('[data-role="c-author"]').value.trim();
      if (quote) result.push({quote: quote, author: author || '佚名'});
    }
  }
  if (result.length === 0) { showMsg('至少需要1条记录'); return; }
  saveCultureContent(type, result);
  document.getElementById('cultureEditModal').remove();
  refresh();
  showMsg('保存成功');
}

function resetCulturePage(type) {
  localStorage.removeItem('culture-' + type);
  refresh();
  showMsg('已恢复为默认内容');
}

// =========================================
// V10 - 图表初始化
// =========================================
function initCharts() {
  try {
    // 销毁旧图表
    Object.keys(chartInstances).forEach(function(key) {
      try {
        if (chartInstances[key] && typeof chartInstances[key].destroy === 'function') {
          chartInstances[key].destroy();
        }
      } catch(e) {}
    });
    chartInstances = {};
    
    if (curPage === 'home') {
      initHomeCharts();
      return;
    }
    
    // 数据看板
    if (curPage === 'dash-work' || curPage === 'dash-overview' || curPage === 'dash-task-rate') {
      initDashWorkCharts();
      return;
    }
    if (curPage === 'equip-status' || curPage === 'dash-equip') {
      initEquipStatusCharts();
      return;
    }
    if (curPage === 'equip-fault') {
      initEquipFaultCharts();
      return;
    }
    if (curPage === 'dash-attendance') {
      // 图表由loadAttendanceData在数据加载完成后初始化，此处不重复调用
      return;
    }
    
    // 日报统计
    if (curPage === 'daily-stats') {
      initDailyStatsCharts();
      return;
    }
    
    // 改善统计
    if (curPage === 'improve-by-dept' || curPage === 'improve-by-person' || curPage === 'improve-stats') {
      initImproveCharts();
      return;
    }
    
    // 战略规划
    if (curPage === 'summary-equip' || curPage === 'summary-smart' || curPage === 'summary-manage' || curPage === 'summary-improve' || curPage === 'strategy-2025') {
      initStrategySummaryCharts();
      return;
    }
    if (curPage === 'kpi-downtime' || curPage === 'kpi-alarm' || curPage === 'kpi-scrap' || curPage === 'kpi-energy' || curPage === 'kpi-safety' || curPage === 'kpi-contract' || curPage === 'strategy-2026') {
      initKpiCharts();
      return;
    }
    if (curPage === 'track-kpi' || curPage === 'strategy-track') {
      initTrackKpiCharts();
      return;
    }
  } catch(e) { console.error('initCharts error:', e); }
}

function refreshData(type) {
  try {
    if (type === 'daily') {
      // 重新从localStorage加载
    } else if (type === 'weekly') {
      lsSet('local_weekly', lsGet('local_weekly', []));

      lsSet('local_monthly', lsGet('local_monthly', []));

// 回车键登录
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var loginOverlay = document.getElementById('loginOverlay');
    if (loginOverlay && loginOverlay.style.display !== 'none') {
      var pwdForm = document.getElementById('changePwdForm');
      if (pwdForm && pwdForm.style.display !== 'none') {
        doChangePwd();
      } else {
        doLogin();
      }
    }
  }
});

// V17 - 模块管理页面
// =========================================
function renderModuleListPage() {
  var mods = getRegisteredModules();
  var h = '<div class="page-enter">';
  h += '<div class="pt">模块管理 <span class="bdg">共 ' + mods.length + ' 个模块</span></div>';
  h += '<div class="status-bar info">模块注册系统允许动态扩展平台功能。内置模块不可禁用。</div>';
  h += '<div class="g2">';
  mods.forEach(function(mod) {
    h += '<div class="cd" style="border-left:4px solid ' + (mod.builtIn ? 'var(--blue)' : 'var(--gn)') + '">';
    h += '<div class="ct"><span style="font-size:20px;margin-right:8px">' + (mod.icon || '📦') + '</span> ' + mod.name + ' <span class="bdg" style="margin-left:8px">v' + (mod.version || '1.0') + '</span>';
    if (mod.builtIn) h += '<span class="t tb" style="margin-left:8px">内置</span>';
    h += '</div>';
    h += '<div class="info-grid"><div class="info-item"><div class="ii-label">模块ID</div><div class="ii-value">' + mod.id + '</div></div>';
    h += '<div class="info-item"><div class="ii-label">状态</div><div class="ii-value"><span class="t ' + (mod.enabled ? 'tg' : 'tr') + '">' + (mod.enabled ? '已启用' : '已禁用') + '</span></div></div></div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div class="cd"><div class="ct">如何注册新模块</div>';
  h += '<div style="font-size:13px;color:var(--t2);line-height:1.8">';
  h += '<p>1. 在浏览器控制台调用 <code style="background:var(--bg-s);padding:2px 6px;border-radius:4px">registerModule({id:"my-mod", name:"我的模块", icon:"🔧", version:"1.0", parentId:"config"})</code></p>';
  h += '<p>2. 或前往 <a href="javascript:void(0)" onclick="goToPage(&apos;module-register&amp;apos;)" style="color:var(--blue)">注册新模块</a> 页面填写表单</p>';
  h += '<p>3. 注册后模块会自动出现在侧边栏菜单中</p>';
  h += '</div></div>';
  h += '</div>';
  return h;
}

function renderModuleRegisterPage() {
  var h = '<div class="page-enter">';
  h += '<div class="pt">注册新模块</div>';
  h += '<div class="status-bar info">填写模块信息并注册到系统。注册后模块将自动出现在侧边栏菜单中。</div>';
  h += '<div class="cd" style="max-width:600px">';
  h += '<div class="form-field"><label>模块ID（英文，唯一标识）</label><input id="mod_id" placeholder="例如: my-module"></div>';
  h += '<div class="form-field"><label>模块名称</label><input id="mod_name" placeholder="例如: 我的模块"></div>';
  h += '<div class="form-field"><label>图标（emoji）</label><input id="mod_icon" placeholder="例如: 🔧" value="📦"></div>';
  h += '<div class="form-field"><label>版本号</label><input id="mod_version" placeholder="例如: 1.0" value="1.0"></div>';
  h += '<div class="form-field"><label>父菜单ID（可选，挂在哪个菜单下）</label><input id="mod_parent" placeholder="例如: config（留空则为顶级菜单）"></div>';
  h += '<div class="bg"><button class="btn bp" onclick="doRegisterModule()">注册模块</button><button class="btn bo" onclick="goToPage(&apos;module-list&apos;)">取消</button></div>';
  h += '</div></div>';
  return h;
}

function doRegisterModule() {
  var id = document.getElementById('mod_id').value.trim();
  var name = document.getElementById('mod_name').value.trim();
  var icon = document.getElementById('mod_icon').value.trim() || '📦';
  var version = document.getElementById('mod_version').value.trim() || '1.0';
  var parentId = document.getElementById('mod_parent').value.trim();
  if (!id || !name) { showToast('模块ID和名称不能为空', 'warn'); return; }
  if (!/^[a-zA-Z0-9_-]+$/.test(id)) { showToast('模块ID只能包含英文、数字、横线和下划线', 'warn'); return; }
  // Check if already exists
  var existing = MODULE_REGISTRY.find(function(m){ return m.id === id; });
  if (existing) { showToast('模块ID "' + id + '" 已存在', 'warn'); return; }
  registerModule({id:id, name:name, icon:icon, version:version, parentId:parentId || null, enabled:true, builtIn:false});
}
